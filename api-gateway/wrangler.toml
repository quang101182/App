# ─────────────────────────────────────────────────────────────────────────────
# api-gateway — Cloudflare Worker
# URL : https://api-gateway.quang101182.workers.dev
# ─────────────────────────────────────────────────────────────────────────────
name               = "api-gateway"
main               = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────────────────────────
# KV Namespace — stockage clés API, rate limiting, audit log
# Créé avec : wrangler kv namespace create "GATEWAY_KV"
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "GATEWAY_KV"
id         = "3c23ec572c86471cbdce68e3ba4fdd1c"
preview_id = "3c23ec572c86471cbdce68e3ba4fdd1c"

# ─────────────────────────────────────────────────────────────────────────────
# Secrets (NE PAS mettre les valeurs ici — utiliser wrangler secret put)
#
#   wrangler secret put WORKER_SECRET   → token partagé pour les apps /api/*
#   wrangler secret put ADMIN_TOKEN     → token admin pour /admin/*
#
# Les clés API (Gemini, Groq, etc.) sont stockées dans KV via /admin/keys/set
# ─────────────────────────────────────────────────────────────────────────────
