<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SubWhisper Pro — Monitoring v1.0.0</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel-2: #1b2030;
    --border: #2a3142;
    --text: #e6e9ef;
    --muted: #8a92a6;
    --accent: #9333ea;
    --accent-2: #c084fc;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel);
  }
  h1 {
    margin: 0; font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .v { font-size: 11px; color: var(--muted); margin-left: 8px; font-weight: 400; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .meta { color: var(--muted); font-size: 12px; }
  button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: var(--border); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); }
  button.primary:hover { background: var(--accent-2); }
  button.danger { color: var(--red); }
  main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px;
  }
  .card-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 30px; font-weight: 700; line-height: 1.1; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .card.trial .card-value { color: var(--yellow); }
  .card.pro .card-value { color: var(--green); }
  .card.revoked .card-value { color: var(--red); }
  .card.usage .card-value { color: var(--blue); }
  .section-title { font-size: 14px; font-weight: 600; margin: 28px 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--panel); border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
  }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { background: var(--panel-2); color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(147, 51, 234, 0.05); }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge.trial { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
  .badge.pro { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .badge.revoked { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .muted { color: var(--muted); }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error {
    background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red);
    color: var(--red); padding: 12px 16px; border-radius: 8px;
    margin-bottom: 20px; font-size: 13px;
  }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
    width: 100%; max-width: 420px;
  }
  .modal h2 { margin: 0 0 12px; font-size: 18px; }
  .modal p { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
  .modal input {
    width: 100%; padding: 10px 12px; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); margin-bottom: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>SubWhisper Pro — Monitoring <span class="v">v1.0.0</span></h1>
    <div class="meta" id="lastUpdate">—</div>
  </div>
  <div class="header-actions">
    <button id="btnRefresh" class="primary">↻ Rafraîchir</button>
    <button id="btnLogout" class="danger">Déconnexion</button>
  </div>
</header>

<main>
  <div id="errorBox"></div>
  <div id="content" class="loading">Chargement…</div>
</main>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>Connexion admin</h2>
    <p>Entrez votre token admin pour accéder au monitoring SubWhisper Pro.</p>
    <input type="password" id="tokenInput" placeholder="Admin token" autocomplete="off" />
    <div class="actions">
      <button id="btnConnect" class="primary">Se connecter</button>
    </div>
  </div>
</div>

<script>
const VERSION = '1.0.0';
const GATEWAY = 'https://api-gateway-pro.quang101182.workers.dev';
const TOKEN_KEY = 'monitoring_swp_token';
const ENDPOINT = '/admin/swp/overview';

const $ = (id) => document.getElementById(id);
const getToken = () => localStorage.getItem(TOKEN_KEY);
const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
const clearToken = () => localStorage.removeItem(TOKEN_KEY);

let abortCtrl = null;

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">${msg}</div>`;
}
function clearError() { $('errorBox').innerHTML = ''; }

function openLogin() {
  $('loginModal').classList.add('active');
  $('tokenInput').focus();
}
function closeLogin() {
  $('loginModal').classList.remove('active');
  $('tokenInput').value = '';
}

async function fetchOverview() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  const token = getToken();
  if (!token) { openLogin(); return null; }
  try {
    const resp = await fetch(GATEWAY + ENDPOINT, {
      headers: { 'Authorization': 'Bearer ' + token },
      signal: abortCtrl.signal,
    });
    if (resp.status === 401) {
      clearToken();
      openLogin();
      showError('Token invalide ou expiré.');
      return null;
    }
    if (!resp.ok) {
      showError(`Erreur ${resp.status} sur ${ENDPOINT}`);
      return null;
    }
    clearError();
    return await resp.json();
  } catch (e) {
    if (e.name === 'AbortError') return null;
    showError('Erreur réseau : ' + e.message);
    return null;
  }
}

function fmtDate(iso) {
  if (!iso) return '<span class="muted">—</span>';
  const d = new Date(iso);
  return d.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtDateShort(iso) {
  if (!iso) return '<span class="muted">—</span>';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function fmtRelative(iso) {
  if (!iso) return '<span class="muted">jamais</span>';
  const diffMs = Date.now() - new Date(iso).getTime();
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays === 0) return 'aujourd\'hui';
  if (diffDays === 1) return 'hier';
  if (diffDays < 30) return `il y a ${diffDays}j`;
  if (diffDays < 365) return `il y a ${Math.floor(diffDays/30)} mois`;
  return `il y a ${Math.floor(diffDays/365)} an(s)`;
}
function planBadge(c) {
  if (c.revoked) return '<span class="badge revoked">Revoked</span>';
  if (c.plan === 'trial') return '<span class="badge trial">Trial</span>';
  if (c.plan === 'pro') return '<span class="badge pro">Pro</span>';
  return `<span class="badge">${c.plan || '?'}</span>`;
}

function render(data) {
  if (!data) return;
  $('lastUpdate').textContent = 'Maj : ' + new Date(data.generatedAt).toLocaleTimeString('fr-FR');

  const c = data.customers;
  const u = data.usage_this_month;
  const v = data.site_visits;
  const limTrial = data.limits_per_plan.trial;
  const limPro = data.limits_per_plan.pro;

  const html = `
    <div class="grid">
      <div class="card">
        <div class="card-label">Total clients SWP</div>
        <div class="card-value">${c.total}</div>
        <div class="card-sub">${c.trial + c.pro} actifs · ${c.revoked} revoked</div>
      </div>
      <div class="card trial">
        <div class="card-label">Trial</div>
        <div class="card-value">${c.trial}</div>
        <div class="card-sub">en période d'essai</div>
      </div>
      <div class="card pro">
        <div class="card-label">Pro (payant)</div>
        <div class="card-value">${c.pro}</div>
        <div class="card-sub">abonnements actifs</div>
      </div>
      <div class="card revoked">
        <div class="card-label">Revoked</div>
        <div class="card-value">${c.revoked}</div>
        <div class="card-sub">annulés / expirés</div>
      </div>
    </div>

    <div class="section-title">Usage ${data.month}</div>
    <div class="grid">
      <div class="card usage">
        <div class="card-label">Transcriptions ce mois</div>
        <div class="card-value">${u.transcriptions}</div>
        <div class="card-sub">limites : ${limTrial.transcriptions} (trial) / ${limPro.transcriptions} (pro) par client</div>
      </div>
      <div class="card usage">
        <div class="card-label">Traductions ce mois</div>
        <div class="card-value">${u.translations}</div>
        <div class="card-sub">limites : ${limTrial.translations} (trial) / ${limPro.translations} (pro) par client</div>
      </div>
      <div class="card">
        <div class="card-label">Visites site</div>
        <div class="card-value">${v.total}</div>
        <div class="card-sub">+${v.today} aujourd'hui</div>
      </div>
    </div>

    <div class="section-title">Clients</div>
    ${c.total === 0 ? '<div class="empty">Aucun client pour le moment.</div>' : `
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Statut</th>
          <th>Créé le</th>
          <th>Expire le</th>
          <th>Dernière activité</th>
          <th>Usage ${data.month}</th>
          <th>Usage total</th>
        </tr>
      </thead>
      <tbody>
        ${data.customers_list.map(cu => `
          <tr>
            <td>${escape(cu.email)}</td>
            <td>${planBadge(cu)}</td>
            <td>${fmtDateShort(cu.created)}</td>
            <td>${fmtDateShort(cu.expiresAt)}</td>
            <td title="${cu.lastUsed || ''}">${fmtRelative(cu.lastUsed)}</td>
            <td class="mono">${cu.usageMonth.transcriptions}t / ${cu.usageMonth.translations}tr</td>
            <td class="mono muted">${cu.usageTotal.transcriptions}t / ${cu.usageTotal.translations}tr</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    `}
  `;
  $('content').innerHTML = html;
  $('content').classList.remove('loading');
}

function escape(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

async function refresh() {
  const data = await fetchOverview();
  if (data) render(data);
}

$('btnRefresh').addEventListener('click', refresh);
$('btnLogout').addEventListener('click', () => {
  clearToken();
  $('content').innerHTML = '<div class="empty">Déconnecté.</div>';
  openLogin();
});
$('btnConnect').addEventListener('click', () => {
  const t = $('tokenInput').value.trim();
  if (!t) return;
  setToken(t);
  closeLogin();
  refresh();
});
$('tokenInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('btnConnect').click();
});

if (getToken()) refresh();
else openLogin();
</script>

</body>
</html>
