<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logs Express</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-0: #090b12;
            --bg-1: #0f1220;
            --bg-2: #161b2e;
            --bg-3: #1e2540;
            --accent: #7c5cff;
            --accent-dim: rgba(124,92,255,0.15);
            --accent-border: rgba(124,92,255,0.35);
            --cyan: #22d3ee;
            --cyan-dim: rgba(34,211,238,0.12);
            --green: #10b981;
            --green-dim: rgba(16,185,129,0.15);
            --orange: #f97316;
            --red: #ef4444;
            --text-1: #e2e8f0;
            --text-2: #94a3b8;
            --text-3: #4b5a6e;
            --border: rgba(148,163,184,0.1);
            --border-bright: rgba(148,163,184,0.2);
            --nav-h: 64px;
            --header-h: 54px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-0);
            color: var(--text-1);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ── NOISE OVERLAY ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.5;
        }

        /* ── HEADER ── */
        .header {
            height: var(--header-h);
            background: rgba(15,18,32,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0; z-index: 10; position: relative;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .header-logo {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; font-weight: 700; color: white;
        }

        .header-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; font-weight: 600;
            color: var(--text-1);
            letter-spacing: 0.05em;
        }
        .header-title span { color: var(--accent); }

        .header-right { display: flex; align-items: center; gap: 6px; }

        .icon-btn {
            background: none; border: 1px solid var(--border); color: var(--text-2);
            width: 34px; height: 34px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 1rem;
        }
        .icon-btn:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }

        /* Drive status pill */
        .drive-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
            cursor: pointer; transition: all 0.25s;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-2);
        }
        .drive-pill .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-3); transition: background 0.3s;
        }
        .drive-pill.connected { border-color: var(--green-dim); color: var(--green); }
        .drive-pill.connected .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .drive-pill.connecting { border-color: rgba(249,115,22,0.3); color: var(--orange); }
        .drive-pill.connecting .dot { background: var(--orange); animation: blink 1s infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── MAIN ── */
        .main {
            flex: 1; overflow: hidden; position: relative; z-index: 1;
            display: flex; flex-direction: column;
            padding: 12px 14px 10px;
            gap: 10px;
        }

        /* ── INPUT ZONE ── */
        .input-section {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .input-section:focus-within {
            border-color: var(--accent-border);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 4px 24px rgba(124,92,255,0.1);
        }

        .input-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .input-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem; font-weight: 600;
            color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase;
        }

        .lb-control {
            display: flex; align-items: center; gap: 0;
            background: var(--bg-2); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }
        .lb-control button {
            background: none; border: none; color: var(--text-2);
            width: 26px; height: 26px; cursor: pointer;
            font-size: 0.9rem; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-control button:hover { color: var(--accent); background: var(--accent-dim); }
        .lb-control span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem; color: var(--text-2);
            min-width: 22px; text-align: center;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: var(--text-1);
            padding: 14px; resize: none; outline: none;
            font-size: 0.88rem; line-height: 1.65;
            font-family: 'Space Grotesk', sans-serif;
            width: 100%;
        }
        textarea::placeholder { color: var(--text-3); }

        .char-count {
            padding: 4px 12px 6px;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; color: var(--text-3);
        }

        /* ── ACTION BUTTON ── */
        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #5b3fd4 100%);
            color: white; border: none; border-radius: 14px;
            padding: 15px 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(124,92,255,0.3);
            flex-shrink: 0;
            position: relative; overflow: hidden;
        }
        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(124,92,255,0.45);
        }
        .btn-main:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(124,92,255,0.2); }
        .btn-main.loading {
            background: linear-gradient(135deg, #3d2d7c, #2a1f54);
            pointer-events: none;
        }
        .btn-main.success {
            background: linear-gradient(135deg, var(--green), #059669);
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
        }
        .btn-main.error {
            background: linear-gradient(135deg, var(--red), #b91c1c);
            box-shadow: 0 4px 20px rgba(239,68,68,0.3);
        }

        .btn-main::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0; transition: opacity 0.2s;
        }
        .btn-main:hover::after { opacity: 1; }

        .btn-icon { font-size: 1.1rem; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-main.loading .spinner { display: block; }
        .btn-main.loading .btn-icon,
        .btn-main.loading .btn-label { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── LAST LOG PREVIEW ── */
        .preview-section {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            max-height: 130px;
        }

        .preview-header {
            padding: 7px 12px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .preview-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.66rem; font-weight: 600;
            color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }
        .preview-label .tag {
            background: var(--cyan-dim); color: var(--cyan);
            border: 1px solid rgba(34,211,238,0.2);
            padding: 1px 6px; border-radius: 4px;
            font-size: 0.62rem;
        }

        .preview-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; color: var(--text-3);
        }

        .preview-body {
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; line-height: 1.6;
            color: var(--text-2);
            overflow: hidden;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .preview-empty { color: var(--text-3); font-style: italic; }

        /* ── SETTINGS MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--bg-2);
            border: 1px solid var(--border-bright);
            border-radius: 20px 20px 0 0;
            width: 100%; padding: 20px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: translateY(0); }

        .modal-handle {
            width: 36px; height: 4px; border-radius: 2px;
            background: var(--border-bright);
            margin: 0 auto 18px;
        }

        .modal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; font-weight: 700;
            color: var(--text-1); margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .field-group { margin-bottom: 14px; }
        .field-label {
            font-size: 0.72rem; color: var(--text-2);
            margin-bottom: 5px; display: block;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.04em;
        }
        .field-input {
            width: 100%; padding: 10px 12px;
            background: var(--bg-1); border: 1px solid var(--border);
            color: var(--text-1); border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem; outline: none;
            transition: border-color 0.2s;
        }
        .field-input:focus { border-color: var(--accent-border); }

        .modal-filename {
            background: var(--bg-3); border: 1px solid var(--accent-border);
            border-radius: 10px; padding: 10px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem; color: var(--accent);
            margin-bottom: 14px; word-break: break-all;
        }

        .modal-actions {
            display: flex; gap: 8px; margin-top: 18px;
        }
        .btn-cancel {
            flex: 1; padding: 12px;
            background: none; border: 1px solid var(--border);
            color: var(--text-2); border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel:hover { border-color: var(--border-bright); color: var(--text-1); }
        .btn-save {
            flex: 2; padding: 12px;
            background: var(--accent); border: none;
            color: white; border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { background: #6a4de0; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-3); color: var(--text-1);
            border: 1px solid var(--border-bright);
            padding: 9px 18px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 500;
            z-index: 2000; opacity: 0;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap; pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .toast.show {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }
        .toast.ok { border-color: rgba(16,185,129,0.4); color: var(--green); }
        .toast.err { border-color: rgba(239,68,68,0.4); color: var(--red); }

        /* ── BOTTOM NAV ── */
        .bottom-bar {
            height: var(--nav-h);
            background: rgba(15,18,32,0.97);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            display: flex; align-items: center;
            padding: 0 14px; gap: 8px;
            flex-shrink: 0; z-index: 10; position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .btn-secondary {
            flex: 1; padding: 8px 4px;
            background: var(--bg-2); border: 1px solid var(--border);
            color: var(--text-2); border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
            cursor: pointer; transition: all 0.2s; min-width: 0;
        }
        .btn-secondary:hover { border-color: var(--border-bright); color: var(--text-1); }
        .btn-secondary .s-icon { font-size: 1.1rem; }
        .btn-secondary .s-label { font-size: 0.65rem; white-space: nowrap; }

        /* ── ACTION BAR sticky ── */
        .action-bar-wrap {
            background: rgba(15,18,32,0.97);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            flex-shrink: 0; z-index: 11;
            padding: 10px 14px;
        }

        /* ── FILE BANNER ── */
        .file-banner {
            background: var(--bg-1);
            border-bottom: 1px solid var(--border);
            padding: 5px 16px;
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; z-index: 9;
            min-height: 28px;
        }
        .file-banner-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--text-3); flex-shrink: 0;
            transition: background 0.3s;
        }
        .file-banner.active .file-banner-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .file-banner-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem; color: var(--text-3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; transition: color 0.3s;
        }
        .file-banner.active .file-banner-name { color: var(--cyan); }
        .file-banner-folder {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem; color: var(--text-3);
            background: var(--bg-3); border: 1px solid var(--border);
            padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
            max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* ── RESPONSIVE PC ── */
        @media (min-width: 600px) {
            .main { max-width: 680px; margin: 0 auto; width: 100%; padding: 16px 20px 12px; }
            .preview-section { max-height: 160px; }
            .action-bar-wrap { display: flex; justify-content: center; }
            .action-bar-wrap .btn-main { max-width: 680px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="header-logo">LOG</div>
            <span class="header-title">Logs <span>Express</span></span>
        </div>
        <div class="header-right">
            <button class="drive-pill" id="drive-pill" title="Drive">
                <span class="dot"></span>
                <span id="drive-pill-text">Drive</span>
            </button>
            <button class="icon-btn" id="btn-settings" title="Paramètres">⚙️</button>
        </div>
    </header>

    <!-- FILE BANNER -->
    <div class="file-banner" id="file-banner">
        <span class="file-banner-dot"></span>
        <span class="file-banner-name" id="file-banner-name">Aucun fichier connecté</span>
        <span class="file-banner-folder" id="file-banner-folder" style="display:none"></span>
    </div>

    <!-- MAIN -->
    <main class="main">

        <!-- Zone de saisie -->
        <div class="input-section" id="input-section">
            <div class="input-header">
                <span class="input-label">Nouvelle entrée</span>
                <div class="lb-control">
                    <button id="lb-minus" title="Moins de sauts">−</button>
                    <span id="lb-val">2</span>
                    <button id="lb-plus" title="Plus de sauts">+</button>
                </div>
            </div>
            <textarea id="text-input" placeholder="Colle ta synthèse Gemini ici…" spellcheck="false"></textarea>
            <div class="char-count" id="char-count">0 car.</div>
        </div>

        <!-- Aperçu dernier log -->
        <div class="preview-section" id="preview-section">
            <div class="preview-header">
                <span class="preview-label">
                    Dernier log
                    <span class="tag" id="preview-tag">—</span>
                </span>
                <span class="preview-date" id="preview-date">—</span>
            </div>
            <div class="preview-body" id="preview-body">
                <span class="preview-empty">Aucun contenu chargé</span>
            </div>
        </div>

    </main>

    <!-- BOUTON PRINCIPAL — sticky, résiste au clavier mobile -->
    <div class="action-bar-wrap">
        <button class="btn-main" id="btn-main" style="width:100%;">
            <span class="btn-icon">⬆️</span>
            <span class="btn-label">Insérer & Sauver sur Drive</span>
            <div class="spinner"></div>
        </button>
    </div>

    <!-- BOTTOM BAR -->
    <nav class="bottom-bar">
        <button class="btn-secondary" id="btn-paste-clipboard">
            <span class="s-icon">📋</span><span class="s-label">Coller</span>
        </button>
        <button class="btn-secondary" id="btn-load-drive">
            <span class="s-icon">📂</span><span class="s-label">Charger Drive</span>
        </button>
        <button class="btn-secondary" id="btn-save-local">
            <span class="s-icon">💾</span><span class="s-label">Sauver local</span>
        </button>
        <button class="btn-secondary" id="btn-clear">
            <span class="s-icon">🗑️</span><span class="s-label">Vider</span>
        </button>
    </nav>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">⚙ Configuration Drive</div>

            <div class="field-group">
                <label class="field-label">Client ID OAuth</label>
                <input class="field-input" type="text" id="input-client-id" placeholder="xxx.apps.googleusercontent.com">
            </div>
            <div class="field-group">
                <label class="field-label">API Key</label>
                <input class="field-input" type="password" id="input-api-key" placeholder="AIza...">
            </div>
            <div class="field-group">
                <label class="field-label">Folder ID Drive (optionnel)</label>
                <input class="field-input" type="text" id="input-folder-id" placeholder="1BxiMVs0XRA...">
            </div>
            <div class="field-group">
                <label class="field-label">Nom du fichier cible</label>
                <div class="modal-filename" id="filename-display">Gemini_memory.txt</div>
                <input class="field-input" type="text" id="input-filename" placeholder="Gemini_memory.txt" value="Gemini_memory.txt">
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btn-close-modal">Fermer</button>
                <button class="btn-save" id="btn-save-settings">Sauvegarder</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
    (function () {
        'use strict';

        // ── STATE ──
        let config = { clientId: '', apiKey: '', folderId: '', fileName: 'Gemini_memory.txt' };
        let drive = { tokenClient: null, accessToken: null, connected: false, fileId: null };
        let state = { text: '', lineBreaks: 2 };

        // ── ELEMENTS ──
        const $ = id => document.getElementById(id);
        const textarea   = $('text-input');
        const charCount  = $('char-count');
        const lbVal      = $('lb-val');
        const btnMain    = $('btn-main');
        const btnPaste   = $('btn-paste-clipboard');
        const btnLoad    = $('btn-load-drive');
        const btnClear   = $('btn-clear');
        const btnSettings= $('btn-settings');
        const btnCloseM  = $('btn-close-modal');
        const btnSaveSet = $('btn-save-settings');
        const drivePill  = $('drive-pill');
        const pillText   = $('drive-pill-text');
        const overlay    = $('modal-overlay');
        const toastEl    = $('toast');
        const previewBody= $('preview-body');
        const previewTag = $('preview-tag');
        const previewDate= $('preview-date');
        const filenameDsp= $('filename-display');

        // ── INIT ──
        init();
        function init() {
            loadConfig();
            loadState();
            renderLB();
            renderPreview();
            bindEvents();
            if (config.clientId && config.apiKey) {
                setTimeout(silentConnect, 800);
            }
        }

        // ── PERSISTENCE ──
        function loadConfig() {
            try {
                const s = localStorage.getItem('log_config');
                if (s) config = { ...config, ...JSON.parse(s) };
                $('input-client-id').value = config.clientId;
                $('input-api-key').value   = config.apiKey;
                $('input-folder-id').value = config.folderId;
                $('input-filename').value  = config.fileName;
                filenameDsp.textContent    = config.fileName;
            } catch(e) {}
        }
        function saveConfig() {
            localStorage.setItem('log_config', JSON.stringify(config));
        }
        function loadState() {
            try {
                const s = localStorage.getItem('log_state');
                if (s) {
                    const p = JSON.parse(s);
                    state.text        = p.text        || '';
                    state.lineBreaks  = p.lineBreaks  ?? 2;
                    drive.fileId      = p.driveFileId || null;
                    if (p.lastContent) state.lastContent = p.lastContent;
                }
            } catch(e) {}
        }
        function saveState() {
            localStorage.setItem('log_state', JSON.stringify({
                text: state.text,
                lineBreaks: state.lineBreaks,
                driveFileId: drive.fileId,
                lastContent: state.lastContent || ''
            }));
        }

        // ── RENDER ──
        function renderLB() { lbVal.textContent = state.lineBreaks; }

        function renderPreview() {
            if (!state.lastContent) {
                previewBody.innerHTML = '<span class="preview-empty">Aucun contenu chargé</span>';
                previewTag.textContent = '—';
                previewDate.textContent = '—';
                return;
            }
            // Extraire le premier bloc ### LOG
            const blocks = state.lastContent.split(/\n(?=###\s)/);
            const first  = blocks.find(b => b.trim().startsWith('###')) || blocks[0];
            if (!first) return;

            // Extraire tag section et horodatage
            const sectionMatch = first.match(/Section cible\s*:\*\*\s*([^\n]+)/i);
            const dateMatch    = first.match(/Horodatage\s*:\*\*\s*([^\n]+)/i)
                              || first.match(/Horodatage\s*:\s*([^\n]+)/i);

            previewTag.textContent  = sectionMatch ? sectionMatch[1].replace(/[#*]/g,'').trim() : '—';
            previewDate.textContent = dateMatch     ? dateMatch[1].replace(/[*]/g,'').trim()     : '—';

            // Afficher les ~5 premières lignes non vides
            const lines = first.split('\n').filter(l => l.trim()).slice(0, 6);
            previewBody.textContent = lines.join('\n');
        }

        // ── EVENTS ──
        function bindEvents() {
            textarea.addEventListener('input', () => {
                charCount.textContent = textarea.value.length + ' car.';
            });

            $('lb-minus').addEventListener('click', () => {
                state.lineBreaks = Math.max(0, state.lineBreaks - 1);
                renderLB(); saveState();
            });
            $('lb-plus').addEventListener('click', () => {
                state.lineBreaks = Math.min(10, state.lineBreaks + 1);
                renderLB(); saveState();
            });

            btnMain.addEventListener('click', handleInsertAndSave);
            btnPaste.addEventListener('click', handlePaste);
            btnLoad.addEventListener('click', handleLoadDrive);
            $('btn-save-local').addEventListener('click', handleSaveLocal);
            btnClear.addEventListener('click', () => { textarea.value = ''; charCount.textContent = '0 car.'; });
            drivePill.addEventListener('click', handleDriveConnect);

            btnSettings.addEventListener('click', () => overlay.classList.add('open'));
            btnCloseM.addEventListener('click',   () => overlay.classList.remove('open'));
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

            $('input-filename').addEventListener('input', () => {
                filenameDsp.textContent = $('input-filename').value || 'Gemini_memory.txt';
            });

            btnSaveSet.addEventListener('click', () => {
                config.clientId  = $('input-client-id').value.trim();
                config.apiKey    = $('input-api-key').value.trim();
                config.folderId  = $('input-folder-id').value.trim();
                config.fileName  = $('input-filename').value.trim() || 'Gemini_memory.txt';
                saveConfig();
                drive.connected = false; drive.accessToken = null; drive.fileId = null;
                updateDrivePill();
                updateFileBanner();
                overlay.classList.remove('open');
                toast('Config sauvegardée', 'ok');
            });
        }

        // ── DRIVE STATUS ──
        function updateDrivePill(status) {
            drivePill.className = 'drive-pill';
            if (status === 'connecting') {
                drivePill.classList.add('connecting');
                pillText.textContent = '...';
            } else if (drive.connected) {
                drivePill.classList.add('connected');
                pillText.textContent = 'Drive ✓';
            } else {
                pillText.textContent = 'Drive';
            }
            updateFileBanner();
        }

        function updateFileBanner() {
            const banner     = $('file-banner');
            const bannerName = $('file-banner-name');
            const bannerFolder = $('file-banner-folder');

            if (!drive.connected) {
                banner.classList.remove('active');
                bannerName.textContent = 'Aucun fichier connecté';
                bannerFolder.style.display = 'none';
                return;
            }

            banner.classList.add('active');
            // Nom du fichier
            bannerName.textContent = config.fileName || 'Gemini_memory.txt';
            // Dossier si défini
            if (config.folderId) {
                bannerFolder.style.display = 'block';
                bannerFolder.textContent   = 'folder: ' + config.folderId.slice(0, 12) + '…';
            } else {
                bannerFolder.style.display = 'block';
                bannerFolder.textContent   = 'Mon Drive (racine)';
            }
        }

        // ── DRIVE CONNECT ──
        function silentConnect() {
            if (!config.clientId || !config.apiKey) return;
            updateDrivePill('connecting');
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({
                        apiKey: config.apiKey,
                        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
                    });
                    drive.tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: config.clientId,
                        scope: 'https://www.googleapis.com/auth/drive.file',
                        callback: (resp) => {
                            if (resp.error) { updateDrivePill(); return; }
                            drive.accessToken = resp.access_token;
                            drive.connected   = true;
                            updateDrivePill();
                            toast('Drive connecté ✓', 'ok');
                        }
                    });
                    // Sur file:// le prompt silencieux échoue — on demande toujours le consentement
                    const isFile = location.protocol === 'file:';
                    drive.tokenClient.requestAccessToken({ prompt: isFile ? 'consent' : '' });
                } catch(e) { updateDrivePill(); toast('Erreur init Drive', 'err'); }
            });
        }

        function handleDriveConnect() {
            if (drive.connected) { toast('Drive déjà connecté ✓', 'ok'); return; }
            if (!config.clientId || !config.apiKey) { overlay.classList.add('open'); return; }
            if (!drive.tokenClient) { silentConnect(); return; }
            updateDrivePill('connecting');
            drive.tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        // ── PASTE ──
        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) { toast('Presse-papier vide', 'err'); return; }
                textarea.value = text;
                charCount.textContent = text.length + ' car.';
                textarea.focus();
                toast('Collé ✓');
            } catch(e) {
                toast('Permission refusée', 'err');
            }
        }

        // ── LOAD FROM DRIVE ──
        async function handleLoadDrive() {
            if (!drive.connected) { handleDriveConnect(); return; }
            toast('Chargement…');
            try {
                const id = await findOrCreateFile(false);
                if (!id) { toast('Fichier introuvable', 'err'); return; }
                const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, {
                    headers: { 'Authorization': `Bearer ${drive.accessToken}` }
                });
                if (res.status === 401) { handleTokenExpired(handleLoadDrive); return; }
                const content = await res.text();
                state.lastContent = content;
                saveState();
                renderPreview();
                updateFileBanner();
                toast('Chargé ✓', 'ok');
            } catch(e) { toast('Erreur chargement', 'err'); }
        }

        // ── MAIN ACTION : INSERT & SAVE ──
        async function handleInsertAndSave() {
            const newText = textarea.value.trim();
            if (!newText) { toast('Zone de saisie vide', 'err'); return; }

            if (!drive.connected) {
                toast('Drive non connecté — clique sur le pill Drive', 'err');
                return;
            }

            setBtnState('loading');

            // Insérer en haut
            const sep     = '\n'.repeat(state.lineBreaks);
            const current = state.lastContent || '';
            state.lastContent = newText + sep + current;

            try {
                await pushToDrive(state.lastContent);
                textarea.value = '';
                charCount.textContent = '0 car.';
                saveState();
                renderPreview();
                setBtnState('success');
                toast('Inséré & sauvé sur Drive ✓', 'ok');
                setTimeout(() => setBtnState('idle'), 2500);
            } catch(e) {
                // Annuler l'insertion en mémoire si Drive a échoué
                state.lastContent = current;
                if (e.message === 'TOKEN_EXPIRED') {
                    handleTokenExpired(() => handleInsertAndSave());
                    setBtnState('idle');
                } else {
                    setBtnState('error');
                    toast('Erreur Drive — texte non perdu, réessaie', 'err');
                    setTimeout(() => setBtnState('idle'), 3000);
                }
            }
        }

        // ── SAUVER LOCAL (bouton dédié) ──
        function handleSaveLocal() {
            const content = state.lastContent;
            if (!content) { toast('Aucun contenu à sauvegarder', 'err'); return; }
            saveFallback(content, config.fileName);
            toast('Téléchargement local lancé ✓', 'ok');
        }

        function setBtnState(s) {
            btnMain.className = 'btn-main';
            if (s !== 'idle') btnMain.classList.add(s);
        }

        // ── DRIVE UPSERT ──
        async function findOrCreateFile(create = true) {
            // Si on connaît déjà le fileId (chargé précédemment), on l'utilise directement
            if (drive.fileId) return drive.fileId;

            // Sinon chercher par nom + dossier (comme avant, logique originale qui marchait)
            let q = `name = '${config.fileName}' and mimeType = 'text/plain' and trashed = false`;
            if (config.folderId) q += ` and '${config.folderId}' in parents`;

            const res = await fetch(
                `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&pageSize=1`,
                { headers: { 'Authorization': `Bearer ${drive.accessToken}` } }
            );
            if (res.status === 401) throw new Error('TOKEN_EXPIRED');
            const data = await res.json();

            if (data.files?.length > 0) {
                drive.fileId = data.files[0].id;
                saveState();
                updateFileBanner();
                return drive.fileId;
            }
            if (!create) return null;

            // Créer le fichier seulement si vraiment introuvable
            const meta = { name: config.fileName, mimeType: 'text/plain' };
            if (config.folderId) meta.parents = [config.folderId];
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
            form.append('file', new Blob([''], { type: 'text/plain' }));
            const cr = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${drive.accessToken}` },
                body: form
            });
            if (!cr.ok) throw new Error('CREATE_FAILED');
            const d = await cr.json();
            drive.fileId = d.id;
            saveState();
            updateFileBanner();
            return drive.fileId;
        }

        async function pushToDrive(content) {
            const id = drive.fileId || await findOrCreateFile(true);
            const blob = new Blob([content], { type: 'text/plain' });
            const res = await fetch(
                `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
                {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${drive.accessToken}`,
                        'Content-Type': 'text/plain'
                    },
                    body: blob
                }
            );
            if (res.status === 401) throw new Error('TOKEN_EXPIRED');
            if (!res.ok) throw new Error('PUSH_FAILED');
        }

        // ── TOKEN EXPIRED ──
        function handleTokenExpired(retry) {
            drive.connected = false; drive.accessToken = null;
            updateDrivePill('connecting');
            toast('Token expiré — reconnexion…');
            if (!drive.tokenClient) { silentConnect(); return; }
            drive.tokenClient.requestAccessToken({ prompt: '' });
            // Retry après reconnexion
            const orig = drive.tokenClient.callback;
            drive.tokenClient.callback = (resp) => {
                orig && orig(resp);
                if (!resp.error && retry) setTimeout(retry, 300);
            };
        }

        // ── FALLBACK LOCAL ──
        function saveFallback(content, fileName) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ── TOAST ──
        function toast(msg, type = '') {
            toastEl.textContent = msg;
            toastEl.className   = 'toast' + (type ? ' ' + type : '');
            toastEl.classList.add('show');
            clearTimeout(toastEl._t);
            toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2800);
        }

    })();
    </script>
</body>
