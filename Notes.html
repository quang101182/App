<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloc-Notes Express Mobile</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* ================= CSS MOBILE-FIRST ================= */
        :root {
            --bg-primary: #12141c;
            --bg-secondary: #1b1e2b;
            --bg-tertiary: #2a2e3f;
            --accent: #7c5cff;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --nav-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER COMPACT */
        .app-header {
            height: 50px; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border);
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px;
            flex-shrink: 0;
            z-index: 10;
        }
        .app-header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); }
        .version { font-size: 0.7rem; background: rgba(124, 92, 255, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        /* MAIN LAYOUT */
        .main-content { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            background: var(--bg-primary);
        }

        /* PANELS (TABS) */
        section { 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: var(--nav-height); 
            padding: 15px; 
            overflow-y: auto;
            display: none; 
            flex-direction: column;
        }
        
        section.active { display: flex; } 

        /* EDITOR STYLES */
        .editor-container { flex: 1; display: flex; flex-direction: column; gap: 10px; height: 100%; }
        
        textarea { 
            flex: 1; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border); 
            color: var(--text-primary); 
            padding: 15px; 
            border-radius: 8px; 
            resize: none; 
            font-size: 16px; 
            line-height: 1.6;
            outline: none;
            width: 100%;
        }
        textarea:focus { border-color: var(--accent); }

        /* TOOLS & BUTTONS */
        .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 5px; }
        .btn-action { 
            background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); 
            padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; white-space: nowrap; flex-shrink: 0;
        }

        .editor-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; }
        .number-input { display: flex; background: var(--bg-tertiary); border-radius: 6px; align-items: center; }
        .number-input button { width: 30px; height: 30px; background: none; border: none; color: white; font-size: 1.2rem; }
        .number-input span { width: 20px; text-align: center; }

        .btn-validate { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 20px; border-radius: 25px; 
            font-weight: 600; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(124, 92, 255, 0.3);
        }

        /* FILE PANEL STYLES */
        .file-panel h2 { margin-bottom: 15px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .file-name-input { 
            width: 100%; padding: 12px; background: var(--bg-secondary); 
            border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 20px;
        }

        .big-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-big { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            background: var(--bg-tertiary); border: 1px solid var(--border); color: white;
            padding: 20px; border-radius: 12px; font-size: 0.9rem; transition: transform 0.1s;
        }
        .btn-big:active { transform: scale(0.98); background: var(--bg-secondary); }
        .btn-big svg { width: 24px; height: 24px; stroke: var(--accent); }

        .btn-drive-connect { 
            width: 100%; padding: 15px; background: #4285F4; color: white; border: none; border-radius: 8px; font-weight: 600; margin-bottom: 15px;
        }

        /* MOBILE BOTTOM NAV */
        .mobile-nav {
            height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); background: none; border: none; width: 100%; height: 100%; gap: 4px;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; }
        .nav-item span { font-size: 0.7rem; }

        /* UTILS */
        .hidden { display: none !important; }
        .status-bar { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-secondary); width: 90%; padding: 20px; border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted); }
        .form-group input { width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border); color: white; border-radius: 6px; }
        
        .toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: var(--bg-tertiary); padding: 10px 20px; border-radius: 20px; 
            border: 1px solid var(--accent); z-index: 3000; transition: 0.3s; opacity: 0;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>Bloc-Notes <span class="version">Mobile</span></h1>
        <button id="btn-settings" style="background:none; border:none; color:white;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83-2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </header>

    <div class="main-content">
        <section id="tab-editor" class="active">
            <div class="editor-container">
                <div class="quick-actions">
                    <button id="btn-copy" class="btn-action">Copier Tout</button>
                    <button id="btn-cut" class="btn-action">Couper</button>
                    <button id="btn-clear" class="btn-action" style="color:var(--danger); border-color:var(--danger)">Effacer</button>
                </div>
                
                <textarea id="text-input" placeholder="Saisissez votre texte..."></textarea>
                
                <div class="editor-footer">
                    <div class="number-input">
                        <button id="btn-lb-minus">-</button>
                        <span id="lb-display">2</span>
                        <button id="btn-lb-plus">+</button>
                    </div>
                    <button id="btn-validate" class="btn-validate">
                        Insérer (Haut)
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-files">
            <h2>Gestion des Fichiers</h2>
            <input type="text" id="file-name" class="file-name-input" value="fichier.txt">

            <div class="big-buttons-grid">
                <button id="btn-local-open" class="btn-big">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    Ouvrir Local
                </button>
                <button id="btn-local-save" class="btn-big">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Sauver Local
                </button>
            </div>
            
            <input type="file" id="file-input-hidden" style="display:none" accept=".txt">

            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                <h2 style="color:#4285F4">Google Drive</h2>
                <button id="btn-drive-connect" class="btn-drive-connect">Connexion Google Drive</button>
                
                <div id="drive-controls" class="big-buttons-grid hidden">
                    <button id="btn-drive-open" class="btn-big" style="border-color:#4285F4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
                        Ouvrir Drive
                    </button>
                    <button id="btn-drive-save" class="btn-big" style="border-color:#4285F4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Sauver Drive
                    </button>
                </div>
                <div class="status-bar" id="status-text">Déconnecté</div>
            </div>

            <div style="margin-top:20px;">
                <h2>Aperçu du contenu actuel</h2>
                <pre id="file-content" style="background:var(--bg-secondary); padding:10px; border-radius:8px; font-size:0.8rem; overflow:auto; max-height:150px; color:var(--text-muted);"></pre>
                <button id="btn-clear-file" style="width:100%; padding:10px; margin-top:10px; background:none; border:1px solid var(--danger); color:var(--danger); border-radius:8px;">Vider le fichier</button>
            </div>
        </section>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h2 style="margin-bottom:20px;">Configuration</h2>
                <div class="form-group">
                    <label>Client ID</label>
                    <input type="text" id="input-client-id">
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="input-api-key">
                </div>
                <div class="form-group">
                    <label>ID Dossier Drive</label>
                    <input type="text" id="input-folder-id">
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button id="btn-close-settings" style="padding:10px; background:none; border:none; color:var(--text-muted);">Annuler</button>
                    <button id="btn-save-settings" style="padding:10px 20px; background:var(--accent); border:none; color:white; border-radius:6px;">Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>
    <nav class="mobile-nav">
        <button class="nav-item active" data-target="tab-editor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span>Éditeur</span>
        </button>
        <button class="nav-item" data-target="tab-files">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Fichiers</span>
        </button>
    </nav>

    <div id="toast" class="toast"></div>

    <script>
        // ================= JS LOGIC =================
        (function () {
            'use strict';

            let state = { text: '', fileName: 'fichier.txt', lineBreaks: 2, driveFileId: null, localFileHandle: null };
            let driveConfig = { clientId: '', apiKey: '', folderId: '' };
            let driveSession = { tokenClient: null, accessToken: null, isConnected: false };
            const SCOPES = 'https://www.googleapis.com/auth/drive.file';

            // NAVIGATION TABS LOGIC
            const tabs = document.querySelectorAll('.nav-item');
            const sections = document.querySelectorAll('section');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // UI Switch
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    // Section Switch
                    const targetId = tab.dataset.target;
                    sections.forEach(s => s.classList.remove('active'));
                    document.getElementById(targetId).classList.add('active');
                });
            });

            // DOM Elements
            const el = {
                input: document.getElementById('text-input'),
                content: document.getElementById('file-content'),
                fileName: document.getElementById('file-name'),
                lbDisplay: document.getElementById('lb-display'),
                btnDriveConnect: document.getElementById('btn-drive-connect'),
                driveControls: document.getElementById('drive-controls'),
                toast: document.getElementById('toast'),
                modal: document.getElementById('settings-modal'),
                inputClientId: document.getElementById('input-client-id'),
                inputApiKey: document.getElementById('input-api-key'),
                inputFolderId: document.getElementById('input-folder-id')
            };

            init();

            function init() {
                loadSettings();
                loadState();
                bindEvents();
                render();
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('bn_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        state.text = parsed.text || '';
                        state.fileName = parsed.fileName || 'fichier.txt';
                        state.lineBreaks = parsed.lineBreaks ?? 2;
                        state.driveFileId = parsed.driveFileId;
                    }
                } catch(e) {}
            }

            function saveState() {
                localStorage.setItem('bn_state', JSON.stringify({
                    text: state.text,
                    fileName: el.fileName.value,
                    lineBreaks: state.lineBreaks,
                    driveFileId: state.driveFileId
                }));
            }

            function loadSettings() {
                const saved = localStorage.getItem('bn_settings');
                if (saved) {
                    driveConfig = { ...driveConfig, ...JSON.parse(saved) };
                    el.inputClientId.value = driveConfig.clientId;
                    el.inputApiKey.value = driveConfig.apiKey;
                    el.inputFolderId.value = driveConfig.folderId;
                }
            }

            function bindEvents() {
                // Text manipulation
                document.getElementById('btn-validate').addEventListener('click', insertText);
                document.getElementById('btn-copy').addEventListener('click', () => { navigator.clipboard.writeText(el.input.value); showToast('Copié !'); });
                document.getElementById('btn-cut').addEventListener('click', () => { navigator.clipboard.writeText(el.input.value); el.input.value = ''; showToast('Coupé !'); });
                document.getElementById('btn-clear').addEventListener('click', () => el.input.value = '');
                
                // File Ops
                document.getElementById('btn-clear-file').addEventListener('click', () => { if(confirm('Vider le fichier ?')) { state.text=''; render(); saveState(); } });
                document.getElementById('btn-lb-minus').addEventListener('click', () => { state.lineBreaks = Math.max(0, state.lineBreaks-1); render(); saveState(); });
                document.getElementById('btn-lb-plus').addEventListener('click', () => { state.lineBreaks = Math.min(10, state.lineBreaks+1); render(); saveState(); });

                // Settings
                document.getElementById('btn-settings').addEventListener('click', () => el.modal.classList.remove('hidden'));
                document.getElementById('btn-close-settings').addEventListener('click', () => el.modal.classList.add('hidden'));
                document.getElementById('btn-save-settings').addEventListener('click', () => {
                    driveConfig.clientId = el.inputClientId.value.trim();
                    driveConfig.apiKey = el.inputApiKey.value.trim();
                    driveConfig.folderId = el.inputFolderId.value.trim();
                    localStorage.setItem('bn_settings', JSON.stringify(driveConfig));
                    el.modal.classList.add('hidden');
                    state.driveFileId = null; // Reset link on config change
                    showToast('Config sauvegardée');
                });

                // File System Events
                document.getElementById('btn-local-open').addEventListener('click', openLocalFile);
                document.getElementById('btn-local-save').addEventListener('click', saveLocalDisk);
                document.getElementById('file-input-hidden').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if(!file) return;
                    const r = new FileReader();
                    r.onload = (ev) => { state.text = ev.target.result; state.fileName = file.name; render(); saveState(); };
                    r.readAsText(file);
                });

                // Drive Events
                el.btnDriveConnect.addEventListener('click', initDriveConnection);
                document.getElementById('btn-drive-open').addEventListener('click', openFromDrive);
                document.getElementById('btn-drive-save').addEventListener('click', saveToDrive);
                
                el.fileName.addEventListener('input', () => saveState());
            }

            function render() {
                el.content.textContent = state.text || '(Vide)';
                el.lbDisplay.textContent = state.lineBreaks;
                el.fileName.value = state.fileName;
            }

            function insertText() {
                const newTxt = el.input.value.trim();
                if (!newTxt) return;
                state.text = newTxt + '\n'.repeat(state.lineBreaks) + state.text;
                el.input.value = '';
                render(); saveState();
                showToast('Texte inséré en haut');
            }

            function showToast(msg) {
                el.toast.textContent = msg;
                el.toast.classList.add('show');
                setTimeout(() => el.toast.classList.remove('show'), 2000);
            }

            // --- LOCAL FILE ---
            async function openLocalFile() {
                if ('showOpenFilePicker' in window) {
                    try {
                        const [handle] = await showOpenFilePicker({ types: [{ accept: { 'text/plain': ['.txt'] } }] });
                        state.localFileHandle = handle;
                        const file = await handle.getFile();
                        state.text = await file.text();
                        state.fileName = file.name;
                        render(); saveState();
                        // Switch to Editor tab automatically
                        tabs[0].click();
                        showToast('Fichier ouvert');
                    } catch(e) {}
                } else {
                    document.getElementById('file-input-hidden').click();
                }
            }

            async function saveLocalDisk() {
                if (state.localFileHandle) {
                    try {
                        const writable = await state.localFileHandle.createWritable();
                        await writable.write(state.text);
                        await writable.close();
                        showToast('Sauvegardé !');
                        return;
                    } catch(e) { state.localFileHandle = null; }
                }
                if ('showSaveFilePicker' in window) {
                    try {
                        const handle = await showSaveFilePicker({ suggestedName: el.fileName.value, types: [{ accept: { 'text/plain': ['.txt'] } }] });
                        state.localFileHandle = handle;
                        const writable = await handle.createWritable();
                        await writable.write(state.text);
                        await writable.close();
                        const f = await handle.getFile();
                        state.fileName = f.name;
                        render();
                        showToast('Sauvegardé !');
                    } catch(e) {}
                } else {
                    // Fallback
                    const blob = new Blob([state.text], {type:'text/plain'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = el.fileName.value;
                    a.click();
                }
            }

            // --- DRIVE ---
            function initDriveConnection() {
                if(!driveConfig.clientId || !driveConfig.apiKey) return showToast('Config manquante !');
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: driveConfig.apiKey, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                    driveSession.tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: driveConfig.clientId,
                        scope: SCOPES,
                        callback: (resp) => {
                            if(resp.error) return;
                            driveSession.accessToken = resp.access_token;
                            driveSession.isConnected = true;
                            el.btnDriveConnect.classList.add('hidden');
                            el.driveControls.classList.remove('hidden');
                            document.getElementById('status-text').textContent = 'Connecté à Drive';
                            document.getElementById('status-text').style.color = 'var(--success)';
                        }
                    });
                    driveSession.tokenClient.requestAccessToken({prompt: ''});
                });
            }

            async function openFromDrive() {
                if(!driveSession.isConnected) return driveSession.tokenClient.requestAccessToken();
                showToast('Recherche Drive...');
                try {
                    let q = `name = '${el.fileName.value}' and mimeType = 'text/plain' and trashed = false`;
                    if(driveConfig.folderId) q += ` and '${driveConfig.folderId}' in parents`;
                    
                    const res = await gapi.client.drive.files.list({ q, fields: 'files(id, name)', pageSize: 1 });
                    const files = res.result.files;
                    if(files && files.length > 0) {
                        state.driveFileId = files[0].id;
                        const content = await gapi.client.drive.files.get({ fileId: files[0].id, alt: 'media' });
                        state.text = content.body;
                        render(); saveState();
                        tabs[0].click(); // Switch to editor
                        showToast('Chargé depuis Drive');
                    } else {
                        showToast('Fichier introuvable');
                    }
                } catch(e) { console.error(e); showToast('Erreur Drive'); }
            }

            async function saveToDrive() {
                if(!driveSession.isConnected) return driveSession.tokenClient.requestAccessToken();
                showToast('Envoi vers Drive...');
                
                const blob = new Blob([state.text], { type: 'text/plain' });
                const meta = { name: el.fileName.value, mimeType: 'text/plain' };
                if(driveConfig.folderId) meta.parents = [driveConfig.folderId];

                try {
                    if(state.driveFileId) {
                        const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`, {
                            method: 'PATCH',
                            headers: { 'Authorization': `Bearer ${driveSession.accessToken}` },
                            body: blob
                        });
                        if(!r.ok) throw new Error();
                        showToast('Mis à jour (Drive)');
                    } else {
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                        form.append('file', blob);
                        const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${driveSession.accessToken}` },
                            body: form
                        });
                        if(!r.ok) { const err = await r.json(); throw new Error(err.error.message); }
                        const d = await r.json();
                        state.driveFileId = d.id;
                        saveState();
                        showToast('Créé sur Drive');
                    }
                } catch(e) { showToast('Erreur Sauvegarde: ' + e.message); }
            }

        })();
    </script>
</body>
</html>
