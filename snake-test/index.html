<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #fff; }
canvas { border: 2px solid #444; }
#score { margin-bottom: 12px; font-size: 18px; }
#msg { margin-top: 10px; font-size: 14px; color: #aaa; }
</style>
</head>
<body>
<div id="score">Score : 0</div>
<canvas id="c" width="300" height="300"></canvas>
<div id="msg">Flèches pour jouer</div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const S = 15, COLS = 20, ROWS = 20;
let snake, dir, food, score, loop;

function init() {
  snake = [{x:10, y:10}];
  dir = {x:1, y:0};
  score = 0;
  document.getElementById("score").textContent = "Score : 0";
  document.getElementById("msg").textContent = "Flèches pour jouer";
  placeFood();
  clearInterval(loop);
  loop = setInterval(tick, 120);
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * COLS),
    y: Math.floor(Math.random() * ROWS)
  };
}

function tick() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(loop);
    document.getElementById("msg").textContent = "Game Over — Appuie sur R";
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").textContent = "Score : " + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#0f0";
  snake.forEach(s => ctx.fillRect(s.x*S, s.y*S, S-1, S-1));
  ctx.fillStyle = "#f00";
  ctx.fillRect(food.x*S, food.y*S, S-1, S-1);
}

document.addEventListener("keydown", e => {
  if (e.key === "r" || e.key === "R") { init(); return; }
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0}
  };
  const d = map[e.key];
  if (d && !(d.x === -dir.x && d.y === -dir.y)) dir = d;
});

init();
</script>
</body>
</html>
