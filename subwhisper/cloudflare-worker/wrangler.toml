name = "subwhisper-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────
# R2 Bucket binding
# ─────────────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "subwhisper-uploads"

# ─────────────────────────────────────────────
# KV Namespace binding (job state, TTL 10 min)
# Create with: wrangler kv:namespace create "JOB_KV"
# Then paste the id below.
# ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "JOB_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# ─────────────────────────────────────────────
# Non-secret environment variables
# (R2 S3-compatible endpoint credentials for presigned URL generation)
# ─────────────────────────────────────────────
[vars]
R2_ACCOUNT_ID   = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
R2_BUCKET_NAME  = "subwhisper-uploads"
FLY_URL         = "https://subwhisper-ffmpeg.fly.dev"

# ─────────────────────────────────────────────
# Secrets (set via `wrangler secret put <NAME>`)
#   wrangler secret put WORKER_SECRET
#   wrangler secret put FLY_SECRET
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
#
# Do NOT commit real values here.
# Listed below for documentation only:
#   WORKER_SECRET       — shared secret with Fly.io for /job-done callback
#   FLY_SECRET          — Bearer token to call Fly.io /extract
#   R2_ACCESS_KEY_ID    — R2 API token (S3 access key)
#   R2_SECRET_ACCESS_KEY — R2 API token (S3 secret key)
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Routes (adjust to your workers.dev subdomain or custom domain)
# ─────────────────────────────────────────────
# routes = [
#   { pattern = "subwhisper-api.example.com/*", zone_name = "example.com" }
# ]
