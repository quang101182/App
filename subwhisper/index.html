<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>SubWhisper v2.01</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#222;--border2:#2a2a2a;--accent:#e8ff47;--accent2:#ff4757;--text:#f0f0f0;--muted:#555;--success:#47ffb2;--sbtn-fg:#000;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;transition:background .25s,color .25s}
body.light{--bg:#f0efe8;--surface:#ffffff;--surface2:#f5f4ee;--border:#d8d7cf;--border2:#c8c7be;--accent:#2a6500;--accent2:#cc2233;--text:#111111;--muted:#888888;--success:#1a6b45;--sbtn-fg:#ffffff}
body.light .tbtn:hover{background:rgba(42,101,0,.08)}
body.light .lb{background:rgba(42,101,0,.10);border-color:rgba(42,101,0,.2)}
body.light .hitem:hover{background:rgba(42,101,0,.04)}
body.light .dz:hover,body.light .dz.over{background:rgba(42,101,0,.03)}
body.light select option{background:#fff;color:#111}
header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:18px;font-weight:700}.logo span{color:var(--accent)}
.ver{font-size:11px;font-weight:400;color:var(--muted);margin-left:6px;vertical-align:middle}
.hdr-r{display:flex;align-items:center;gap:12px}
.thm-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;transition:opacity .2s;line-height:1}
.thm-btn:hover{opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.sdot.on{background:var(--success);box-shadow:0 0 8px var(--success)}.sdot.err{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.cfg{margin:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:10px}.crow:last-child{margin-bottom:0}
.clbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;width:70px;flex-shrink:0}
select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
select option{background:var(--surface)}
input[type=text],input[type=password]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
.irow{display:flex;align-items:center;gap:6px;flex:1}
.tbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;transition:color .2s}
.tbtn:hover{color:var(--accent)}
.opts{display:flex;gap:16px;flex-wrap:wrap}
.oitem{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.oitem input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.oitem span{font-family:var(--mono);font-size:11px;color:var(--muted)}
.dz{margin:0 20px;border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(232,255,71,.02)}
.dico,.dtit,.dsub{pointer-events:none}
.dico{font-size:48px;margin-bottom:12px;display:block}
.dtit{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:6px}
.dsub{font-size:12px;color:var(--muted)}
.fp{margin:12px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:none;align-items:center;gap:12px}
.fp.vis{display:flex}
.finfo{flex:1;overflow:hidden}
.fname{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsz{font-size:11px;color:var(--muted);margin-top:2px}
.frm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color .2s}
.frm:hover{color:var(--accent2)}
.pw{margin:20px;display:none}.pw.vis{display:block}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ppct{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;width:0%;position:relative}
.pfill::after{content:'';position:absolute;right:0;top:-2px;width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.plog{margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--muted);height:16px;overflow:hidden}
.sbtn{display:block;width:calc(100% - 40px);margin:16px 20px;padding:16px;background:var(--accent);border:none;border-radius:12px;color:var(--sbtn-fg);font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.sbtn:hover{filter:brightness(1.08);transform:translateY(-1px)}.sbtn:active{transform:translateY(0)}
.sbtn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;filter:none}
.cancbtn{display:none;width:calc(100% - 40px);margin:-8px 20px 16px;padding:10px;background:none;border:1px solid rgba(255,71,87,.3);border-radius:8px;color:var(--accent2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.cancbtn.vis{display:block}
.cancbtn:hover{background:rgba(255,71,87,.08);border-color:var(--accent2)}
.rw{margin:0 20px 20px;display:none}.rw.vis{display:block;animation:su .3s ease}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.rt{font-family:var(--mono);font-size:11px;color:var(--success);text-transform:uppercase;letter-spacing:1px}
.rac{display:flex;gap:8px;flex-wrap:wrap}
.ab{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 14px;cursor:pointer;transition:all .2s}
.ab:hover{border-color:var(--accent);color:var(--accent)}
.ab.pri{background:var(--accent);color:var(--sbtn-fg);border-color:var(--accent)}.ab.pri:hover{filter:brightness(1.08)}
.ab.sec{border-color:var(--success);color:var(--success)}.ab.sec:hover{background:rgba(71,255,178,.08)}
.sp{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text);max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;width:100%;resize:vertical;min-height:120px;outline:none}
.sp:focus{border-color:var(--accent)}
.sp::-webkit-scrollbar{width:4px}.sp::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ld{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lb{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.2);border-radius:4px;padding:2px 6px;color:var(--accent);font-size:10px}
.dir-info{margin-top:8px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
.dir-info.vis{display:flex}
.dir-name{font-family:var(--mono);font-size:10px;color:var(--success);background:rgba(71,255,178,.08);border:1px solid rgba(71,255,178,.2);border-radius:4px;padding:2px 8px}
.dir-chg{font-family:var(--mono);font-size:9px;color:var(--muted);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0}
.dir-chg:hover{color:var(--accent)}
.ew{margin:0 20px;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:10px;padding:14px;display:none;font-family:var(--mono);font-size:11px;color:var(--accent2);line-height:1.6;white-space:pre-wrap}
.ew.vis{display:block}
.hist-wrap{margin:0 20px 20px}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-ttl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.hist-arr{font-family:var(--mono);font-size:12px;color:var(--muted);transition:transform .25s;display:inline-block}
.hist-arr.open{transform:rotate(180deg)}
.hist-list{max-height:0;overflow:hidden;transition:max-height .35s ease}
.hist-list.open{max-height:600px}
.hitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s}
.hitem:hover{background:rgba(232,255,71,.03)}
.hitem:last-child{border-bottom:none}
.hico{font-size:20px;flex-shrink:0}
.hinfo{flex:1;overflow:hidden}
.hname{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hmeta{font-size:10px;color:var(--muted);margin-top:2px}
.hdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;transition:color .2s;flex-shrink:0}
.hdel:hover{color:var(--accent2)}
.hempty{font-family:var(--mono);font-size:11px;color:var(--muted);padding:16px 0;text-align:center}
footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ft{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo">Sub<span>Whisper</span> <span class="ver">v2.01</span></div>
  <div class="hdr-r">
    <button class="thm-btn" id="thmBtn" onclick="toggleTheme()" title="Changer le theme">&#127769;</button>
    <div class="sdot" id="sd"></div>
  </div>
</header>

<div class="cfg">
  <div class="crow">
    <span class="clbl">API KEY</span>
    <div class="irow">
      <input type="password" id="apiKey" placeholder="Cle AssemblyAI..." oninput="updateSbtn()">
      <button class="tbtn" onclick="toggleKey('apiKey','tkBtn1')" id="tkBtn1" title="Afficher">&#128065;</button>
    </div>
  </div>
  <div class="crow">
    <span class="clbl">API TRAD</span>
    <div class="irow">
      <input type="password" id="azureKey" placeholder="Cle Azure Translator (optionnel)">
      <button class="tbtn" onclick="toggleKey('azureKey','tkBtn2')" id="tkBtn2" title="Afficher">&#128065;</button>
    </div>
  </div>
  <div class="crow">
    <span class="clbl">PROXY</span>
    <input type="text" id="deeplxUrl" placeholder="URL DeepLX optionnel (ex: https://...workers.dev)">
  </div>
  <div class="crow">
    <span class="clbl">SOURCE</span>
    <select id="srcLang">
      <option value="">Auto-detect</option>
      <option value="fr">Francais</option>
      <option value="en">English</option>
      <option value="es">Espanol</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="pt">Portugues</option>
      <option value="ru">Russe</option>
      <option value="ja">Japonais</option>
      <option value="zh">Chinois</option>
      <option value="ar">Arabe</option>
      <option value="ko">Coreen</option>
      <option value="vi">Vietnamien</option>
      <option value="nl">Neerlandais</option>
      <option value="pl">Polonais</option>
      <option value="tr">Turc</option>
      <option value="hi">Hindi</option>
    </select>
  </div>
  <div class="crow">
    <span class="clbl">SORTIE</span>
    <select id="outLang">
      <option value="same">Meme langue</option>
      <option value="fr">Francais</option>
      <option value="en">English</option>
      <option value="es">Espanol</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="pt">Portugues</option>
      <option value="ru">Russe</option>
      <option value="ja">Japonais</option>
      <option value="zh">Chinois</option>
      <option value="ko">Coreen</option>
      <option value="nl">Neerlandais</option>
      <option value="hi">Hindi</option>
    </select>
  </div>
  <div class="crow">
    <span class="clbl">OPTIONS</span>
    <div class="opts">
      <label class="oitem">
        <input type="checkbox" id="optDiarize">
        <span>Diarisation</span>
      </label>
      <label class="oitem">
        <input type="checkbox" id="optPunct" checked>
        <span>Ponctuation</span>
      </label>
    </div>
  </div>
</div>

<div class="dz" id="dz">
  <span class="dico">&#128249;</span>
  <div class="dtit">Deposer ou selectionner</div>
  <div class="dsub">MP4 &middot; MKV &middot; MOV &middot; AVI &middot; MP3 &middot; WAV &mdash; jusqu'a 5 GB</div>
</div>
<input type="file" id="fi" accept="video/*,audio/*" style="display:none">

<div class="fp" id="fp">
  <span style="font-size:24px;flex-shrink:0">&#127916;</span>
  <div class="finfo">
    <div class="fname" id="fn">&#8212;</div>
    <div class="fsz" id="fs">&#8212;</div>
  </div>
  <button class="frm" onclick="clearFile()">&#x2715;</button>
</div>

<div class="pw" id="pw">
  <div class="ph">
    <span class="plbl" id="pl">Upload</span>
    <span class="ppct" id="pp">0%</span>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="plog" id="plog">Initialisation...</div>
</div>

<button class="sbtn" id="sb" onclick="transcribe()" disabled>TRANSCRIRE</button>
<button class="cancbtn" id="cb" onclick="cancelJob()">&#x2715; Annuler la transcription</button>

<div class="ew" id="ew"></div>

<div class="rw" id="rw">
  <div class="rh">
    <div class="rt" id="rtLbl">&#x2713; Transcription</div>
    <div class="rac">
      <button class="ab" onclick="copySRT()" id="copyBtn">COPIER</button>
      <button class="ab" onclick="dlTXT()">&#x2B07; TXT</button>
      <button class="ab" onclick="dlVTT()">&#x2B07; VTT</button>
      <button class="ab pri" onclick="dlSRT()" id="dlBtn">&#x2B07; SRT</button>
      <button class="ab sec" onclick="saveToDir()" id="saveDirBtn">&#x1F4BE; DOSSIER</button>
    </div>
  </div>
  <textarea class="sp" id="sp" spellcheck="false"></textarea>
  <div class="ld" id="ld"></div>
  <div class="dir-info" id="dirInfo">
    <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Dossier :</span>
    <span class="dir-name" id="dirName"></span>
    <button class="dir-chg" onclick="changeDir()">changer</button>
  </div>
</div>

<div class="hist-wrap">
  <div class="hist-hdr" onclick="toggleHist()">
    <span class="hist-ttl">Historique</span>
    <span class="hist-arr" id="histArr">&#x25BC;</span>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<footer>
  <span class="ft">SubWhisper v2.01 &middot; AssemblyAI &middot; Azure Translator</span>
  <span class="ft">Universal-3-pro &middot; 99 langues</span>
</footer>

<script>
'use strict';

var AAI_BASE = 'https://api.assemblyai.com/v2';
var TRANSLATE_LANGS = ['en','fr','de','es','it','pt','nl','hi','ja','zh','ko','ru'];
var AZURE_LANG = {'fr':'fr','en':'en','es':'es','de':'de','it':'it','pt':'pt-br','ru':'ru','ja':'ja','zh':'zh-Hans','ko':'ko','nl':'nl','hi':'hi'};

var selFile = null;
var srtTxt = '';
var origName = '';
var pollTimer = null;
var currentJobId = null;
var destDirHandle = null;

function init() {
  try { var sk = localStorage.getItem('sw_apikey'); if (sk) document.getElementById('apiKey').value = sk; } catch(e) {}
  document.getElementById('apiKey').addEventListener('change', function() { try { localStorage.setItem('sw_apikey', getApiKey()); } catch(e) {} });
  try { var ak = localStorage.getItem('sw_azurekey'); if (ak) document.getElementById('azureKey').value = ak; } catch(e) {}
  document.getElementById('azureKey').addEventListener('change', function() { try { localStorage.setItem('sw_azurekey', this.value.trim()); } catch(e) {} });
  try { var dlx = localStorage.getItem('sw_deeplxurl'); if (dlx) document.getElementById('deeplxUrl').value = dlx; } catch(e) {}
  document.getElementById('deeplxUrl').addEventListener('change', function() { try { localStorage.setItem('sw_deeplxurl', this.value.trim()); } catch(e) {} });
  try {
    var s = localStorage.getItem('sw_srcLang'); if (s !== null) document.getElementById('srcLang').value = s;
    var o = localStorage.getItem('sw_outLang'); if (o !== null) document.getElementById('outLang').value = o;
  } catch(e) {}
  document.getElementById('srcLang').addEventListener('change', function() { try { localStorage.setItem('sw_srcLang', document.getElementById('srcLang').value); } catch(e) {} });
  document.getElementById('outLang').addEventListener('change', function() { try { localStorage.setItem('sw_outLang', document.getElementById('outLang').value); } catch(e) {} });
  try {
    var th = localStorage.getItem('sw_theme');
    if (th === 'light') { document.body.classList.add('light'); document.getElementById('thmBtn').textContent = '\u2600\ufe0f'; }
  } catch(e) {}
  var dz = document.getElementById('dz');
  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault(); dz.classList.remove('over');
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  document.getElementById('fi').addEventListener('change', function() { if (this.files && this.files[0]) handleFile(this.files[0]); });
  dz.addEventListener('click', function() { openFilePicker(); });
  renderHistory();
}

function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function getAzureKey() { return document.getElementById('azureKey').value.trim(); }
function getDeeplxUrl() { return document.getElementById('deeplxUrl').value.trim(); }

function toggleKey(inputId, btnId) {
  var inp = document.getElementById(inputId);
  var visible = inp.type === 'password';
  inp.type = visible ? 'text' : 'password';
  var btn = document.getElementById(btnId);
  if (btn) btn.style.opacity = visible ? '1' : '.4';
}

function toggleTheme() {
  var isLight = document.body.classList.toggle('light');
  try { localStorage.setItem('sw_theme', isLight ? 'light' : 'dark'); } catch(e) {}
  document.getElementById('thmBtn').textContent = isLight ? '\u2600\ufe0f' : '\uD83C\uDF19';
}

function updateSbtn() { document.getElementById('sb').disabled = !selFile || !getApiKey(); }

function openFilePicker() {
  if ('showOpenFilePicker' in window) {
    window.showOpenFilePicker({
      types: [{ description: 'Video / Audio', accept: { 'video/*': ['.mp4','.mkv','.mov','.avi','.webm','.m4v'], 'audio/*': ['.mp3','.wav','.aac','.flac','.m4a','.ogg'] } }],
      multiple: false
    }).then(function(handles) {
      if (handles && handles[0]) handles[0].getFile().then(function(f) { handleFile(f); }).catch(function() { showErr('Impossible de lire le fichier selectionne.'); });
    }).catch(function(e) { if (e.name !== 'AbortError') document.getElementById('fi').click(); });
  } else { document.getElementById('fi').click(); }
}

function handleFile(f) {
  if (!f) return;
  selFile = f;
  origName = f.name.replace(/\.[^/.]+$/, '');
  document.getElementById('fn').textContent = f.name;
  var url = URL.createObjectURL(f);
  var media = document.createElement('video');
  media.preload = 'metadata';
  media.onloadedmetadata = function() {
    var dur = media.duration; URL.revokeObjectURL(url);
    var durStr = isFinite(dur) ? fmtDur(dur) : '';
    document.getElementById('fs').textContent = fmtSz(f.size) + (durStr ? ' \u00b7 ' + durStr : '');
  };
  media.onerror = function() { URL.revokeObjectURL(url); document.getElementById('fs').textContent = fmtSz(f.size); };
  media.src = url;
  document.getElementById('fp').classList.add('vis');
  hideErr(); hideRes(); updateSbtn();
}

function clearFile() {
  selFile = null; srtTxt = '';
  document.getElementById('fp').classList.remove('vis');
  document.getElementById('fi').value = '';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  hideRes(); hideErr(); updateSbtn();
}

async function transcribe() {
  var apiKey = getApiKey();
  if (!apiKey) { showErr('Cle API manquante. Entrez votre cle AssemblyAI.'); return; }
  if (!selFile) return;
  try { localStorage.setItem('sw_apikey', apiKey); } catch(e) {}
  hideErr(); hideRes(); setProg(true);
  document.getElementById('sb').disabled = true;
  document.getElementById('cb').classList.add('vis');
  setSt('');
  try {
    setLog('Upload en cours...'); setPct(5, 'Upload');
    var uploadRes = await fetch(AAI_BASE + '/upload', {
      method: 'POST',
      headers: { 'authorization': apiKey, 'content-type': 'application/octet-stream' },
      body: selFile
    });
    if (!uploadRes.ok) {
      var uploadErr = await uploadRes.json().catch(function() { return {}; });
      throw new Error('Upload echoue (' + uploadRes.status + ')' + (uploadErr.error ? ': ' + uploadErr.error : ''));
    }
    var uploadData = await uploadRes.json();
    var upload_url = uploadData.upload_url;
    setPct(40, 'Upload OK'); setLog('Fichier uploade - creation du job...');
    var srcLang = document.getElementById('srcLang').value;
    var outLang = document.getElementById('outLang').value;
    var body = { audio_url: upload_url, speech_models: ['universal-3-pro', 'universal-2'] };
    if (srcLang) { body.language_code = srcLang; } else { body.language_detection = true; }
    if (document.getElementById('optDiarize').checked) body.speaker_labels = true;
    if (!document.getElementById('optPunct').checked) body.punctuate = false;
    if (outLang !== 'same' && TRANSLATE_LANGS.includes(outLang)) {
      body.speech_understanding = { request: { translation: { target_languages: [outLang] } } };
    }
    var jobRes = await fetch(AAI_BASE + '/transcript', {
      method: 'POST',
      headers: { 'authorization': apiKey, 'content-type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!jobRes.ok) {
      var jobErr = await jobRes.json().catch(function() { return {}; });
      throw new Error('Erreur creation job (' + jobRes.status + ')' + (jobErr.error ? ': ' + jobErr.error : ''));
    }
    var job = await jobRes.json();
    currentJobId = job.id;
    setPct(50, 'En attente'); setLog('Job cree - polling...');
    startPoll(currentJobId, outLang);
  } catch(e) {
    setProg(false);
    document.getElementById('cb').classList.remove('vis');
    showErr(e.message || String(e));
    updateSbtn(); setSt('err');
  }
}

function startPoll(jobId, outLang) {
  pollTimer = setInterval(async function() {
    try {
      var statusRes = await fetch(AAI_BASE + '/transcript/' + jobId, { headers: { 'authorization': getApiKey() } });
      if (!statusRes.ok) return;
      var status = await statusRes.json();
      if (status.status === 'queued') {
        setPct(55, "File d'attente"); setLog("En attente GPU...");
      } else if (status.status === 'processing') {
        setPct(75, 'Transcription'); setLog('Transcription en cours...');
      } else if (status.status === 'completed') {
        clearInterval(pollTimer); pollTimer = null;
        document.getElementById('cb').classList.remove('vis');
        setPct(90, 'Generation SRT'); setLog('Recuperation SRT...');
        var srt = '';
        try {
          var srtRes = await fetch(AAI_BASE + '/transcript/' + jobId + '/srt', { headers: { 'authorization': getApiKey() } });
          if (!srtRes.ok) throw new Error('SRT fetch ' + srtRes.status);
          srt = await srtRes.text();
        } catch(e) {
          setProg(false); showErr('Transcription terminee mais SRT inaccessible : ' + e.message);
          updateSbtn(); return;
        }
        var finalSrt = srt;
        var wasTranslated = false;
        if (outLang !== 'same' && (getAzureKey() || getDeeplxUrl())) {
          try {
            setPct(91, 'Traduction');
            finalSrt = await translateSRT(srt, status.language_code, outLang);
            wasTranslated = (finalSrt !== srt);
          } catch(e) { setLog('Traduction echouee, SRT original conserve'); }
        }
        srtTxt = finalSrt;
        setPct(100, 'Termine'); setLog('Termine');
        var detectedLang = status.language_code || null;
        var tgtLang = (outLang !== 'same') ? outLang : null;
        setTimeout(function() {
          setProg(false);
          showRes(finalSrt, detectedLang, tgtLang, wasTranslated);
          saveHistory({ name: origName, srt: finalSrt, srcLang: detectedLang, tgtLang: tgtLang, wasTranslated: wasTranslated, ts: Date.now(), size: selFile ? selFile.size : 0 });
          updateSbtn();
        }, 400);
      } else if (status.status === 'error') {
        clearInterval(pollTimer); pollTimer = null;
        document.getElementById('cb').classList.remove('vis');
        setProg(false); showErr('Erreur AssemblyAI : ' + (status.error || 'inconnue'));
        setSt('err'); updateSbtn();
      }
    } catch(e) {}
  }, 3000);
}

function parseSRT(srtContent) {
  var blocks = [];
  var parts = srtContent.trim().split(/\r?\n\r?\n/);
  for (var i = 0; i < parts.length; i++) {
    var lines = parts[i].trim().split(/\r?\n/);
    if (lines.length < 3) continue;
    var id = lines[0].trim();
    var timestamp = lines[1].trim();
    var text = lines.slice(2).join('\n').trim();
    if (/^\d+$/.test(id) && /-->/.test(timestamp) && text) {
      blocks.push({ id: id, timestamp: timestamp, text: text });
    }
  }
  return blocks;
}

function buildSRT(blocks) {
  return blocks.map(function(b) { return b.id + '\n' + b.timestamp + '\n' + b.text; }).join('\n\n') + '\n';
}

async function translateSRT(origSrt, sourceLang, targetLang) {
  var azureKey = getAzureKey();
  var deeplxUrl = getDeeplxUrl();
  if (!azureKey && !deeplxUrl) return origSrt;
  var blocks = parseSRT(origSrt);
  if (!blocks.length) return origSrt;
  if (azureKey) {
    var azureLang = AZURE_LANG[targetLang] || targetLang;
    var translatedTexts = [];
    var BATCH = 50;
    for (var i = 0; i < blocks.length; i += BATCH) {
      var upTo = Math.min(i + BATCH, blocks.length);
      setLog('Traduction ' + upTo + '/' + blocks.length + '...');
      var batch = [];
      for (var j = i; j < upTo; j++) batch.push({ Text: blocks[j].text });
      var results = await azureTranslate(batch, azureLang, azureKey);
      for (var k = 0; k < results.length; k++) translatedTexts.push(results[k]);
    }
    var tBlocks = blocks.map(function(b, idx) { return { id: b.id, timestamp: b.timestamp, text: translatedTexts[idx] || b.text }; });
    return buildSRT(tBlocks);
  }
  if (deeplxUrl) {
    var srcUp = sourceLang ? sourceLang.toUpperCase() : 'auto';
    var tgtUp = targetLang.toUpperCase();
    var dlxBlocks = [];
    for (var i = 0; i < blocks.length; i++) {
      setLog('Traduction ' + (i + 1) + '/' + blocks.length + '...');
      var translated = await deeplxTranslate(blocks[i].text, srcUp, tgtUp, deeplxUrl);
      dlxBlocks.push({ id: blocks[i].id, timestamp: blocks[i].timestamp, text: translated || blocks[i].text });
      if (i < blocks.length - 1) await new Promise(function(r) { setTimeout(r, 60); });
    }
    return buildSRT(dlxBlocks);
  }
  return origSrt;
}

async function azureTranslate(bodyArr, targetLang, azureKey) {
  var url = 'https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&to=' + targetLang;
  var resp = await fetch(url, {
    method: 'POST',
    headers: { 'Ocp-Apim-Subscription-Key': azureKey, 'Content-Type': 'application/json' },
    body: JSON.stringify(bodyArr)
  });
  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error('Azure ' + resp.status + ': ' + (err.error ? err.error.message : resp.statusText));
  }
  var data = await resp.json();
  return data.map(function(item) { return item.translations[0].text; });
}

async function deeplxTranslate(text, srcLang, tgtLang, deeplxUrl) {
  var url = deeplxUrl.replace(/\/$/, '') + '/translate';
  var resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text, source_lang: srcLang, target_lang: tgtLang })
  });
  if (!resp.ok) throw new Error('DeepLX ' + resp.status);
  var data = await resp.json();
  return data.data || data.translation || text;
}

function cancelJob() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('cb').classList.remove('vis');
  if (currentJobId) {
    try { fetch(AAI_BASE + '/transcript/' + currentJobId, { method: 'DELETE', headers: { 'authorization': getApiKey() } }).catch(function() {}); } catch(e) {}
    currentJobId = null;
  }
  setProg(false); showErr('Annule'); setSt('err'); updateSbtn();
}

function setProg(v) {
  document.getElementById('pw').classList.toggle('vis', !!v);
  if (!v) { document.getElementById('pf').style.width = '0%'; document.getElementById('pp').textContent = '0%'; }
}
function setPct(p, l) {
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('pp').textContent = p + '%';
  if (l) document.getElementById('pl').textContent = l;
}
function setLog(m) { document.getElementById('plog').textContent = m; }
function setSt(s) { document.getElementById('sd').className = 'sdot' + (s ? ' ' + s : ''); }

function showRes(content, srcLang, tgtLang, wasTranslated) {
  document.getElementById('sp').value = content;
  document.getElementById('rw').classList.add('vis');
  setSt('on');
  document.getElementById('rtLbl').textContent = wasTranslated ? '\u2713 Traduction SRT' : '\u2713 Transcription';
  var html = '';
  if (srcLang) html += 'SOURCE <span class="lb">' + escHtml(srcLang.toUpperCase()) + '</span>';
  if (tgtLang && tgtLang !== 'same') {
    html += ' \u2192 <span class="lb">' + escHtml(tgtLang.toUpperCase()) + '</span>';
    if (!wasTranslated && (getAzureKey() || getDeeplxUrl())) {
      html += ' <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">traduction en cours...</span>';
    }
    if (!wasTranslated && !getAzureKey() && !getDeeplxUrl()) {
      html += ' <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">\u2014 entrez une cle Azure pour traduire</span>';
    }
  }
  document.getElementById('ld').innerHTML = html;
  updateDirInfo();
}

function hideRes() { document.getElementById('rw').classList.remove('vis'); document.getElementById('ld').innerHTML = ''; }
function showErr(m) { var e = document.getElementById('ew'); e.textContent = 'ERREUR: ' + m; e.classList.add('vis'); }
function hideErr() { document.getElementById('ew').classList.remove('vis'); }
function getCurrentSRT() { return document.getElementById('sp').value; }

async function dlSRT() {
  var content = getCurrentSRT();
  if (!content) return;
  var fname = (origName || 'subtitles') + '.srt';
  if ('showSaveFilePicker' in window) {
    try {
      var handle = await window.showSaveFilePicker({ suggestedName: fname, types: [{ description: 'Fichier SRT', accept: { 'text/srt': ['.srt'] } }] });
      var writable = await handle.createWritable();
      await writable.write(content); await writable.close();
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  dlBlob(content, '.srt', 'text/srt');
}

function dlVTT() {
  var content = getCurrentSRT();
  if (!content) return;
  var lines = content.split('\n');
  var vttLines = ['WEBVTT', ''];
  for (var i = 0; i < lines.length; i++) {
    if (/^\d{2}:\d{2}:\d{2},\d{3} --> \d{2}:\d{2}:\d{2},\d{3}/.test(lines[i])) {
      vttLines.push(lines[i].replace(/,/g, '.'));
    } else { vttLines.push(lines[i]); }
  }
  dlBlob(vttLines.join('\n'), '.vtt', 'text/vtt');
}

function dlTXT() {
  var content = getCurrentSRT();
  if (!content) return;
  var lines = content.split('\n');
  var textLines = [];
  for (var i = 0; i < lines.length; i++) {
    var trimmed = lines[i].trim();
    if (!trimmed || /^\d+$/.test(trimmed) || /^\d{2}:\d{2}:\d{2}[,.]\d{3} --> /.test(trimmed)) continue;
    textLines.push(trimmed);
  }
  dlBlob(textLines.join('\n'), '.txt', 'text/plain');
}

function dlBlob(content, ext, mime) {
  var fname = (origName || 'subtitles') + ext;
  var blob = new Blob([content], { type: mime + ';charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
}

async function saveToDir() {
  var content = getCurrentSRT();
  if (!content) return;
  if (!('showDirectoryPicker' in window)) { dlSRT(); return; }
  try {
    if (!destDirHandle) { destDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); updateDirInfo(); }
    var fname = (origName || 'subtitles') + '.srt';
    var fileHandle = await destDirHandle.getFileHandle(fname, { create: true });
    var writable = await fileHandle.createWritable();
    await writable.write(content); await writable.close();
    var btn = document.getElementById('saveDirBtn');
    var orig = btn.textContent;
    btn.textContent = 'Enregistre';
    setTimeout(function() { btn.textContent = orig; }, 2500);
  } catch(e) {
    if (e.name === 'AbortError') return;
    destDirHandle = null; updateDirInfo();
    showErr((e.name === 'NotAllowedError' || e.name === 'SecurityError') ? 'Permission refusee pour le dossier. Veuillez reselectionner.' : 'Erreur sauvegarde dossier : ' + e.message);
  }
}

function changeDir() { destDirHandle = null; updateDirInfo(); saveToDir(); }

function updateDirInfo() {
  var el = document.getElementById('dirInfo');
  if (destDirHandle) { document.getElementById('dirName').textContent = destDirHandle.name; el.classList.add('vis'); }
  else { el.classList.remove('vis'); }
}

function copySRT() {
  var content = getCurrentSRT();
  if (!content) return;
  navigator.clipboard.writeText(content).then(function() {
    var btn = document.getElementById('copyBtn');
    var orig = btn.textContent;
    btn.textContent = 'COPIE';
    setTimeout(function() { btn.textContent = orig; }, 2000);
  }).catch(function(e) { showErr('Impossible de copier : ' + e.message); });
}

function saveHistory(item) {
  try {
    var hist = [];
    var raw = localStorage.getItem('sw_history');
    if (raw) hist = JSON.parse(raw);
    hist = hist.filter(function(h) { return h.name !== item.name; });
    hist.unshift(item);
    if (hist.length > 10) hist = hist.slice(0, 10);
    localStorage.setItem('sw_history', JSON.stringify(hist));
    renderHistory();
  } catch(e) {}
}

function renderHistory() {
  var list = document.getElementById('histList');
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) { list.innerHTML = '<div class="hempty">Aucun historique</div>'; return; }
    var hist = JSON.parse(raw);
    if (!hist.length) { list.innerHTML = '<div class="hempty">Aucun historique</div>'; return; }
    list.innerHTML = hist.map(function(item, i) {
      var meta = fmtDate(item.ts) + (item.size ? ' \u00b7 ' + fmtSz(item.size) : '');
      if (item.srcLang) meta += ' \u00b7 ' + item.srcLang.toUpperCase();
      if (item.tgtLang) meta += ' \u2192 ' + item.tgtLang.toUpperCase();
      return '<div class="hitem" onclick="loadHistory(' + i + ')"><span class="hico">&#127916;</span>' +
        '<div class="hinfo"><div class="hname">' + escHtml(item.name || 'Inconnu') + '</div>' +
        '<div class="hmeta">' + escHtml(meta) + '</div></div>' +
        '<button class="hdel" onclick="delHistory(event,' + i + ')" title="Supprimer">&#x2715;</button></div>';
    }).join('');
  } catch(e) { list.innerHTML = '<div class="hempty">Erreur chargement historique</div>'; }
}

function loadHistory(i) {
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) return;
    var hist = JSON.parse(raw);
    var item = hist[i];
    if (!item) return;
    srtTxt = item.srt || '';
    origName = item.name || 'subtitles';
    showRes(srtTxt, item.srcLang || null, item.tgtLang || null, item.wasTranslated || false);
  } catch(e) { showErr("Impossible de charger l'historique."); }
}

function delHistory(event, i) {
  event.stopPropagation();
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) return;
    var hist = JSON.parse(raw);
    hist.splice(i, 1);
    localStorage.setItem('sw_history', JSON.stringify(hist));
    renderHistory();
  } catch(e) {}
}

function toggleHist() {
  document.getElementById('histList').classList.toggle('open');
  document.getElementById('histArr').classList.toggle('open');
}

function fmtSz(b) {
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}

function fmtDur(sec) {
  if (!isFinite(sec) || sec <= 0) return '';
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = Math.floor(sec % 60);
  if (h > 0) return h + 'h' + String(m).padStart(2, '0') + 'm';
  if (m > 0) return m + 'min' + String(s).padStart(2, '0') + 's';
  return s + 's';
}

function fmtDate(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch(e) { return ''; }
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
