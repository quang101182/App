<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>SubWhisper</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#242424;--border2:#2e2e2e;--accent:#e8ff47;--accent2:#ff4757;--text:#eeeeee;--muted:#606060;--success:#3dffc0;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;--sbtn-fg:#000;--r:12px;--r-sm:8px;--r-lg:16px}
body.light{--bg:#f0efe8;--surface:#ffffff;--surface2:#f5f4ee;--border:#d8d7cf;--border2:#c8c7be;--accent:#2a6500;--accent2:#cc2233;--text:#111111;--muted:#888888;--success:#1a6b45;--sbtn-fg:#ffffff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;transition:background .25s,color .25s}
header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:17px;font-weight:700;display:flex;align-items:baseline;gap:8px}
.logo span{color:var(--accent)}
.ver{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1.5px;border:1px solid var(--border);border-radius:4px;padding:1px 5px}
.hright{display:flex;align-items:center;gap:10px}
.thm-btn{background:none;border:1px solid var(--border2);border-radius:20px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s}
.thm-btn:hover{border-color:var(--accent);color:var(--accent)}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:.3s}
.sdot.on{background:var(--success);box-shadow:0 0 10px var(--success)}
.sdot.err{background:var(--accent2);box-shadow:0 0 10px var(--accent2)}
.cfg{margin:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.crow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.crow:last-child{border-bottom:none}
.clbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;width:72px;flex-shrink:0}
select,input[type=text],input[type=password]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--mono);font-size:12px;padding:9px 12px;outline:none;transition:border-color .2s}
select:focus,input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.irow{display:flex;align-items:center;gap:6px;flex:1}
.tbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 8px;transition:.2s;border-radius:6px}
.tbtn:hover{color:var(--accent);background:rgba(232,255,71,.08)}
body.light .tbtn:hover{background:rgba(42,101,0,.08)}
.opts{display:flex;gap:20px;flex-wrap:wrap}
.oitem{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.oitem input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.oitem span{font-family:var(--mono);font-size:11px;color:var(--muted)}
.dz{margin:0 16px 12px;border:2px dashed var(--border);border-radius:var(--r-lg);padding:28px 20px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(232,255,71,.03)}
body.light .dz:hover,body.light .dz.over{background:rgba(42,101,0,.04)}
.dico,.dtit,.dsub{pointer-events:none}
.dico{font-size:36px;margin-bottom:8px;display:block;opacity:.7}
.dtit{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:4px}
.dsub{font-family:var(--sans);font-size:11px;color:var(--muted);line-height:1.5}
.fp{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:none;align-items:center;gap:10px}
.fp.vis{display:flex}
.finfo{flex:1;overflow:hidden}
.fname{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsz{font-family:var(--sans);font-size:11px;color:var(--muted);margin-top:2px}
.frm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:6px;transition:.2s}
.frm:hover{color:var(--accent2);background:rgba(255,71,87,.08)}
.pw{margin:0 16px 12px;display:none}
.pw.vis{display:block}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ppct{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
.pbar{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;width:0%;position:relative}
.pfill::after{content:'';position:absolute;right:0;top:-2px;width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.plog{margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);height:15px;overflow:hidden}
.sbtn{display:block;width:calc(100% - 32px);margin:0 16px 10px;padding:15px;background:var(--accent);border:none;border-radius:var(--r);color:var(--sbtn-fg);font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.sbtn:hover{opacity:.9;transform:translateY(-1px)}
.sbtn:active{transform:translateY(0)}
.sbtn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.cancbtn{display:none;width:calc(100% - 32px);margin:-4px 16px 10px;padding:8px;background:none;border:1px solid rgba(255,71,87,.25);border-radius:var(--r-sm);color:var(--accent2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:.2s}
.cancbtn.vis{display:block}
.cancbtn:hover{background:rgba(255,71,87,.08);border-color:var(--accent2)}
.rw{margin:0 16px 12px;display:none}
.rw.vis{display:block;animation:su .3s ease}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.rt{font-family:var(--mono);font-size:10px;color:var(--success);text-transform:uppercase;letter-spacing:1.5px}
.rac{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ab{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--muted);font-family:var(--mono);font-size:10px;padding:7px 12px;cursor:pointer;transition:.2s}
.ab:hover{border-color:var(--text);color:var(--text)}
.ab.pri{background:var(--accent);color:var(--sbtn-fg);border-color:var(--accent);font-weight:700}
.ab.pri:hover{opacity:.9}
.ab.sec{border-color:var(--success);color:var(--success)}
.ab.sec:hover{background:rgba(61,255,192,.08)}
body.light .ab.sec:hover{background:rgba(26,107,69,.08)}
.sp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text);max-height:320px;min-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;resize:vertical;outline:none}
.sp:focus{border-color:var(--accent)}
.sp::-webkit-scrollbar{width:4px}
.sp::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ld{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lb{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.15);border-radius:4px;padding:2px 7px;color:var(--accent);font-size:10px}
body.light .lb{background:rgba(42,101,0,.12);border-color:rgba(42,101,0,.2)}
.dir-info{margin-top:8px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
.dir-info.vis{display:flex}
.dir-name{font-family:var(--mono);font-size:10px;color:var(--success);background:rgba(61,255,192,.08);border:1px solid rgba(61,255,192,.15);border-radius:4px;padding:2px 8px}
body.light .dir-name{background:rgba(26,107,69,.08);border-color:rgba(26,107,69,.2)}
.dir-chg{font-family:var(--mono);font-size:9px;color:var(--muted);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0}
.dir-chg:hover{color:var(--accent)}
.ew{margin:0 16px 10px;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:var(--r);padding:14px 16px;display:none;font-family:var(--mono);font-size:11px;color:var(--accent2);line-height:1.6;white-space:pre-wrap}
.ew.vis{display:block}
.hist-wrap{margin:0 16px 16px}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-ttl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.hist-cnt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:6px}
.hist-arr{font-family:var(--mono);font-size:11px;color:var(--muted);transition:transform .25s;display:inline-block}
.hist-arr.open{transform:rotate(180deg)}
.hist-list{max-height:0;overflow:hidden;transition:max-height .3s ease}
.hist-list.open{max-height:500px}
.hitem{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s;border-radius:6px}
.hitem:hover{background:rgba(232,255,71,.04);padding-left:8px}
body.light .hitem:hover{background:rgba(42,101,0,.04)}
.hitem:last-child{border-bottom:none}
.hico{font-size:18px;flex-shrink:0}
.hinfo{flex:1;overflow:hidden}
.hname{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hmeta{font-family:var(--sans);font-size:10px;color:var(--muted);margin-top:2px}
.hdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px 8px;transition:.2s;border-radius:4px;flex-shrink:0}
.hdel:hover{color:var(--accent2);background:rgba(255,71,87,.08)}
.hempty{font-family:var(--mono);font-size:11px;color:var(--muted);padding:14px 4px;text-align:center}
footer{margin-top:auto;padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ft{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite}
@media(max-width:480px){.cfg .crow{flex-wrap:wrap}.clbl{width:auto}.rac{gap:4px}.ab{font-size:9px;padding:6px 8px}}
</style>
</head>
<body>
<header>
  <div class="logo">Sub<span>Whisper</span><span class="ver">v2.01</span></div>
  <div class="hright">
    <button class="thm-btn" onclick="document.body.classList.toggle('light')" title="Basculer le thème">☀ / ☾</button>
    <div class="sdot" id="sd"></div>
  </div>
</header>

<div class="cfg">
  <div class="crow">
    <span class="clbl">API KEY</span>
    <div class="irow">
      <input type="password" id="apiKey" placeholder="Votre cle AssemblyAI..." oninput="updateSbtn()">
      <button class="tbtn" id="tkBtn" onclick="toggleKey()" title="Afficher/masquer">&#128065;</button>
    </div>
  </div>
  <div class="crow">
    <span class="clbl">SOURCE</span>
    <select id="srcLang">
      <option value="">Auto-detect</option>
      <option value="fr">Francais</option>
      <option value="en">English</option>
      <option value="es">Espanol</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="pt">Portugues</option>
      <option value="ru">Russe</option>
      <option value="ja">Japonais</option>
      <option value="zh">Chinois</option>
      <option value="ar">Arabe</option>
      <option value="ko">Coreen</option>
      <option value="vi">Vietnamien</option>
      <option value="nl">Neerlandais</option>
      <option value="pl">Polonais</option>
      <option value="tr">Turc</option>
      <option value="sv">Suedois</option>
      <option value="da">Danois</option>
      <option value="fi">Finnois</option>
      <option value="nb">Norvegien</option>
      <option value="hi">Hindi</option>
      <option value="th">Thaï</option>
      <option value="id">Indonesien</option>
    </select>
  </div>
  <div class="crow">
    <span class="clbl">SORTIE</span>
    <select id="outLang">
      <option value="same">Meme langue</option>
      <option value="fr">Francais</option>
      <option value="en">English</option>
      <option value="es">Espanol</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="pt">Portugues</option>
      <option value="ru">Russe</option>
      <option value="ja">Japonais</option>
      <option value="zh">Chinois</option>
      <option value="ko">Coreen</option>
      <option value="nl">Neerlandais</option>
      <option value="hi">Hindi</option>
    </select>
  </div>
  <div class="crow">
    <span class="clbl">OPTIONS</span>
    <div class="opts">
      <label class="oitem">
        <input type="checkbox" id="optDiarize">
        <span>Diarisation</span>
      </label>
      <label class="oitem">
        <input type="checkbox" id="optPunct" checked>
        <span>Ponctuation</span>
      </label>
    </div>
  </div>
</div>

<div class="dz" id="dz">
  <span class="dico">&#128249;</span>
  <div class="dtit">Deposer ou selectionner</div>
  <div class="dsub">MP4 · MKV · MOV · AVI · MP3 · WAV — jusqu'a 5 GB</div>
</div>
<input type="file" id="fi" accept="video/*,audio/*" style="display:none">

<div class="fp" id="fp">
  <span style="font-size:24px;flex-shrink:0">&#127916;</span>
  <div class="finfo">
    <div class="fname" id="fn">&#8212;</div>
    <div class="fsz" id="fs">&#8212;</div>
  </div>
  <button class="frm" onclick="clearFile()">&#x2715;</button>
</div>

<div class="pw" id="pw">
  <div class="ph">
    <span class="plbl" id="pl">Upload</span>
    <span class="ppct" id="pp">0%</span>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="plog" id="plog">Initialisation...</div>
</div>

<button class="sbtn" id="sb" onclick="transcribe()" disabled>TRANSCRIRE</button>
<button class="cancbtn" id="cb" onclick="cancelJob()">&#x2715; Annuler la transcription</button>

<div class="ew" id="ew"></div>

<div class="rw" id="rw">
  <div class="rh">
    <div class="rt" id="rtLbl">&#x2713; Transcription</div>
    <div class="rac">
      <button class="ab" onclick="copySRT()" id="copyBtn">COPIER</button>
      <button class="ab" onclick="dlTXT()">&#x2B07; TXT</button>
      <button class="ab" onclick="dlVTT()">&#x2B07; VTT</button>
      <button class="ab pri" onclick="dlSRT()" id="dlBtn">&#x2B07; SRT</button>
      <button class="ab sec" onclick="saveToDir()" id="saveDirBtn">&#x1F4BE; DOSSIER</button>
    </div>
  </div>
  <textarea class="sp" id="sp" spellcheck="false"></textarea>
  <div class="ld" id="ld"></div>
  <div class="dir-info" id="dirInfo">
    <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Dossier :</span>
    <span class="dir-name" id="dirName"></span>
    <button class="dir-chg" onclick="changeDir()">changer</button>
  </div>
</div>

<div class="hist-wrap">
  <div class="hist-hdr" onclick="toggleHist()">
    <span class="hist-ttl">Historique</span>
    <span class="hist-arr" id="histArr">&#x25BC;</span>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<footer>
  <span class="ft">SubWhisper · AssemblyAI · No cloud lock</span>
  <span class="ft">Universal-3-pro · Universal-2 · 99 langues</span>
</footer>

<script>
'use strict';

/* ─── CONSTANTES GLOBALES ─────────────────────────────────────────────────── */
const AAI_BASE = 'https://api.assemblyai.com/v2';
const TRANSLATE_LANGS = ['en','fr','de','es','it','pt','nl','hi','ja','zh','ko','ru'];

/* ─── ETAT GLOBAL ─────────────────────────────────────────────────────────── */
let selFile = null;
let srtTxt = '';
let translatedContent = '';
let origName = '';
let pollTimer = null;
let currentJobId = null;
let destDirHandle = null;

/* ═══════════════════════════════════════════════════════════════════════════
   1. INIT
═══════════════════════════════════════════════════════════════════════════ */
function init() {
  /* Charger API key */
  try {
    var savedKey = localStorage.getItem('sw_apikey');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
  } catch (e) {}

  /* Sauvegarder la cle API au changement */
  document.getElementById('apiKey').addEventListener('change', function () {
    try { localStorage.setItem('sw_apikey', getApiKey()); } catch (e) {}
  });

  /* Charger langues */
  try {
    var s = localStorage.getItem('sw_srcLang');
    if (s !== null) document.getElementById('srcLang').value = s;
    var o = localStorage.getItem('sw_outLang');
    if (o !== null) document.getElementById('outLang').value = o;
  } catch (e) {}

  /* Sauvegarder langues au changement */
  document.getElementById('srcLang').addEventListener('change', function () {
    try { localStorage.setItem('sw_srcLang', document.getElementById('srcLang').value); } catch (e) {}
  });
  document.getElementById('outLang').addEventListener('change', function () {
    try { localStorage.setItem('sw_outLang', document.getElementById('outLang').value); } catch (e) {}
  });

  /* Drop zone */
  var dz = document.getElementById('dz');
  dz.addEventListener('dragover', function (e) {
    e.preventDefault();
    dz.classList.add('over');
  });
  dz.addEventListener('dragleave', function () {
    dz.classList.remove('over');
  });
  dz.addEventListener('drop', function (e) {
    e.preventDefault();
    dz.classList.remove('over');
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
      handleFile(e.dataTransfer.files[0]);
    }
  });

  /* File input fallback */
  document.getElementById('fi').addEventListener('change', function () {
    if (this.files && this.files[0]) handleFile(this.files[0]);
  });

  /* Click drop zone -> ouvrir picker */
  dz.addEventListener('click', function () {
    openFilePicker();
  });

  /* Rendu historique */
  renderHistory();
}

/* ═══════════════════════════════════════════════════════════════════════════
   2. CLE API
═══════════════════════════════════════════════════════════════════════════ */
function getApiKey() {
  return document.getElementById('apiKey').value.trim();
}

function toggleKey() {
  var inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

/* ═══════════════════════════════════════════════════════════════════════════
   3. BOUTON TRANSCRIRE
═══════════════════════════════════════════════════════════════════════════ */
function updateSbtn() {
  document.getElementById('sb').disabled = !selFile || !getApiKey();
}

/* ═══════════════════════════════════════════════════════════════════════════
   4. SELECTION FICHIER
═══════════════════════════════════════════════════════════════════════════ */
function openFilePicker() {
  if ('showOpenFilePicker' in window) {
    window.showOpenFilePicker({
      types: [{
        description: 'Video / Audio',
        accept: {
          'video/*': ['.mp4', '.mkv', '.mov', '.avi', '.webm', '.m4v'],
          'audio/*': ['.mp3', '.wav', '.aac', '.flac', '.m4a', '.ogg']
        }
      }],
      multiple: false
    }).then(function (handles) {
      if (handles && handles[0]) {
        handles[0].getFile().then(function (file) {
          handleFile(file);
        }).catch(function (e) {
          showErr('Impossible de lire le fichier selectionne.');
        });
      }
    }).catch(function (e) {
      if (e.name !== 'AbortError') {
        document.getElementById('fi').click();
      }
    });
  } else {
    document.getElementById('fi').click();
  }
}

function handleFile(f) {
  if (!f) return;
  selFile = f;
  origName = f.name.replace(/\.[^/.]+$/, '');
  document.getElementById('fn').textContent = f.name;

  /* Calculer duree via HTMLMediaElement */
  var url = URL.createObjectURL(f);
  var media = document.createElement('video');
  media.preload = 'metadata';
  media.onloadedmetadata = function () {
    var dur = media.duration;
    URL.revokeObjectURL(url);
    var durStr = isFinite(dur) ? fmtDur(dur) : '';
    document.getElementById('fs').textContent = fmtSz(f.size) + (durStr ? ' · ' + durStr : '');
  };
  media.onerror = function () {
    URL.revokeObjectURL(url);
    document.getElementById('fs').textContent = fmtSz(f.size);
  };
  media.src = url;

  document.getElementById('fp').classList.add('vis');
  hideErr();
  hideRes();
  updateSbtn();
}

function clearFile() {
  selFile = null;
  translatedContent = '';
  document.getElementById('fp').classList.remove('vis');
  document.getElementById('fi').value = '';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  hideRes();
  hideErr();
  updateSbtn();
}

/* ═══════════════════════════════════════════════════════════════════════════
   5. TRANSCRIPTION
═══════════════════════════════════════════════════════════════════════════ */
async function transcribe() {
  var apiKey = getApiKey();
  if (!apiKey) { showErr('Cle API manquante. Entrez votre cle AssemblyAI.'); return; }
  if (!selFile) return;

  try { localStorage.setItem('sw_apikey', apiKey); } catch (e) {}

  hideErr();
  hideRes();
  setProg(true);
  document.getElementById('sb').disabled = true;
  document.getElementById('cb').classList.add('vis');
  setSt('');

  try {
    /* Etape 1 : Upload */
    setLog('Upload en cours...');
    setPct(5, 'Upload');

    var uploadRes = await fetch(AAI_BASE + '/upload', {
      method: 'POST',
      headers: {
        'authorization': apiKey,
        'content-type': 'application/octet-stream'
      },
      body: selFile
    });

    if (!uploadRes.ok) {
      var uploadErr = await uploadRes.json().catch(function () { return {}; });
      throw new Error('Upload echoue (' + uploadRes.status + ')' + (uploadErr.error ? ': ' + uploadErr.error : ''));
    }

    var uploadData = await uploadRes.json();
    var upload_url = uploadData.upload_url;
    setPct(40, 'Upload OK');
    setLog('Fichier uploade - creation du job...');

    /* Etape 2 : Creer le job */
    var srcLang = document.getElementById('srcLang').value;
    var outLang = document.getElementById('outLang').value;

    var body = {
      audio_url: upload_url,
      speech_models: ['universal-3-pro', 'universal-2']
    };

    if (srcLang) {
      body.language_code = srcLang;
    } else {
      body.language_detection = true;
    }

    if (document.getElementById('optDiarize').checked) {
      body.speaker_labels = true;
    }

    if (!document.getElementById('optPunct').checked) {
      body.punctuate = false;
    }

    if (outLang !== 'same' && TRANSLATE_LANGS.includes(outLang)) {
      body.speech_understanding = {
        request: {
          translation: {
            target_languages: [outLang]
          }
        }
      };
    }

    var jobRes = await fetch(AAI_BASE + '/transcript', {
      method: 'POST',
      headers: {
        'authorization': apiKey,
        'content-type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!jobRes.ok) {
      var jobErr = await jobRes.json().catch(function () { return {}; });
      throw new Error('Erreur creation job (' + jobRes.status + ')' + (jobErr.error ? ': ' + jobErr.error : ''));
    }

    var job = await jobRes.json();
    currentJobId = job.id;

    setPct(50, 'En attente');
    setLog('Job cree - polling...');

    startPoll(currentJobId, outLang);

  } catch (e) {
    setProg(false);
    document.getElementById('cb').classList.remove('vis');
    showErr(e.message || String(e));
    updateSbtn();
    setSt('err');
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   6. POLLING
═══════════════════════════════════════════════════════════════════════════ */
function startPoll(jobId, outLang) {
  pollTimer = setInterval(async function () {
    try {
      var apiKey = getApiKey();
      var statusRes = await fetch(AAI_BASE + '/transcript/' + jobId, {
        headers: { 'authorization': apiKey }
      });

      if (!statusRes.ok) return;

      var status = await statusRes.json();

      if (status.status === 'queued') {
        setPct(55, "File d'attente");
        setLog("En attente GPU...");

      } else if (status.status === 'processing') {
        setPct(75, 'Transcription');
        setLog('Transcription en cours...');

      } else if (status.status === 'completed') {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('cb').classList.remove('vis');
        setPct(90, 'Generation SRT');
        setLog('Recuperation SRT...');

        /* Recuperer SRT */
        var srt = '';
        try {
          var srtRes = await fetch(AAI_BASE + '/transcript/' + jobId + '/srt', {
            headers: { 'authorization': getApiKey() }
          });
          if (!srtRes.ok) throw new Error('SRT fetch ' + srtRes.status);
          srt = await srtRes.text();
        } catch (e) {
          setProg(false);
          showErr('Transcription terminee mais SRT inaccessible : ' + e.message);
          updateSbtn();
          return;
        }

        /* Traduction : récupérer le texte traduit si demandé */
        translatedContent = '';
        try {
          var su = status.speech_understanding;
          if (su && su.translation && su.translation.results && su.translation.results.length > 0) {
            translatedContent = su.translation.results
              .map(function(r) { return r.text || ''; })
              .join(' ')
              .trim();
          }
        } catch (e) { /* Pas de traduction */ }

        srtTxt = srt;
        setPct(100, 'Termine');
        setLog('Termine');

        /* Si traduction dispo : afficher le texte traduit, sinon le SRT original */
        var displayContent = (translatedContent && outLang !== 'same') ? translatedContent : srt;
        var hasTranslation = !!(translatedContent && outLang !== 'same');

        setTimeout(function () {
          setProg(false);
          var detectedLang = status.language_code || null;
          var tgtLang = (outLang !== 'same') ? outLang : null;
          showRes(displayContent, detectedLang, tgtLang, hasTranslation);

          saveHistory({
            name: origName,
            srt: srt,
            translated: translatedContent || '',
            srcLang: detectedLang,
            tgtLang: tgtLang,
            ts: Date.now(),
            size: selFile ? selFile.size : 0
          });

          updateSbtn();
        }, 400);

      } else if (status.status === 'error') {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('cb').classList.remove('vis');
        setProg(false);
        showErr('Erreur AssemblyAI : ' + (status.error || 'inconnue'));
        setSt('err');
        updateSbtn();
      }

    } catch (e) {
      /* Erreur reseau transitoire : on continue le polling silencieusement */
    }
  }, 3000);
}

/* ═══════════════════════════════════════════════════════════════════════════
   7. ANNULATION
═══════════════════════════════════════════════════════════════════════════ */
function cancelJob() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('cb').classList.remove('vis');

  if (currentJobId) {
    try {
      fetch(AAI_BASE + '/transcript/' + currentJobId, {
        method: 'DELETE',
        headers: { 'authorization': getApiKey() }
      }).catch(function () {});
    } catch (e) {}
    currentJobId = null;
  }

  setProg(false);
  showErr('Annule');
  setSt('err');
  updateSbtn();
}

/* ═══════════════════════════════════════════════════════════════════════════
   8. PROGRESSION UI
═══════════════════════════════════════════════════════════════════════════ */
function setProg(v) {
  document.getElementById('pw').classList.toggle('vis', !!v);
  if (!v) {
    document.getElementById('pf').style.width = '0%';
    document.getElementById('pp').textContent = '0%';
  }
}

function setPct(p, l) {
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('pp').textContent = p + '%';
  if (l) document.getElementById('pl').textContent = l;
}

function setLog(m) {
  document.getElementById('plog').textContent = m;
}

function setSt(s) {
  document.getElementById('sd').className = 'sdot' + (s ? ' ' + s : '');
}

/* ═══════════════════════════════════════════════════════════════════════════
   9. AFFICHAGE RESULTATS
═══════════════════════════════════════════════════════════════════════════ */
function showRes(content, srcLang, tgtLang, hasTranslation) {
  document.getElementById('sp').value = content;
  document.getElementById('rw').classList.add('vis');
  setSt('on');

  document.getElementById('rtLbl').textContent = hasTranslation ? '\u2713 Traduction' : '\u2713 Transcription';

  var html = '';
  if (srcLang) html += 'SOURCE <span class="lb">' + escHtml(srcLang.toUpperCase()) + '</span> ';
  if (tgtLang && tgtLang !== 'same') {
    html += '&rarr; <span class="lb">' + escHtml(tgtLang.toUpperCase()) + '</span>';
    if (hasTranslation) {
      html += ' &nbsp;<span style="font-family:var(--mono);font-size:9px;color:var(--muted)">SRT horodaté = langue source</span>';
    }
  }
  document.getElementById('ld').innerHTML = html;
  updateDirInfo();
}

function hideRes() {
  document.getElementById('rw').classList.remove('vis');
  document.getElementById('ld').innerHTML = '';
}

function showErr(m) {
  var e = document.getElementById('ew');
  e.textContent = 'ERREUR: ' + m;
  e.classList.add('vis');
}

function hideErr() {
  document.getElementById('ew').classList.remove('vis');
}

/* ═══════════════════════════════════════════════════════════════════════════
   10. ACCES AU SRT EDITABLE
═══════════════════════════════════════════════════════════════════════════ */
function getCurrentSRT() {
  return document.getElementById('sp').value;
}

/* ═══════════════════════════════════════════════════════════════════════════
   11. TELECHARGEMENTS
═══════════════════════════════════════════════════════════════════════════ */
async function dlSRT() {
  var content = getCurrentSRT();
  if (!content) return;
  var fname = (origName || 'subtitles') + '.srt';

  if ('showSaveFilePicker' in window) {
    try {
      var handle = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{
          description: 'Fichier SRT',
          accept: { 'text/srt': ['.srt'] }
        }]
      });
      var writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      /* Fallback blob */
    }
  }

  dlBlob(content, '.srt', 'text/srt');
}

function dlVTT() {
  var content = getCurrentSRT();
  if (!content) return;

  /* Convertir SRT en VTT */
  var lines = content.split('\n');
  var vttLines = ['WEBVTT', ''];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    /* Remplacer virgule decimale des timestamps : 00:00:01,500 --> 00:00:01.500 */
    if (/^\d{2}:\d{2}:\d{2},\d{3} --> \d{2}:\d{2}:\d{2},\d{3}/.test(line)) {
      vttLines.push(line.replace(/,/g, '.'));
    } else {
      vttLines.push(line);
    }
  }
  var vtt = vttLines.join('\n');
  dlBlob(vtt, '.vtt', 'text/vtt');
}

function dlTXT() {
  /* Si traduction disponible : télécharger le texte traduit directement */
  if (translatedContent) {
    dlBlob(translatedContent, '.txt', 'text/plain');
    return;
  }

  /* Sinon : extraire le texte du SRT (sans numéros ni timestamps) */
  var content = getCurrentSRT();
  if (!content) return;

  var lines = content.split('\n');
  var textLines = [];
  for (var i = 0; i < lines.length; i++) {
    var trimmed = lines[i].trim();
    if (!trimmed) continue;
    if (/^\d+$/.test(trimmed)) continue;
    if (/^\d{2}:\d{2}:\d{2}[,.]\d{3} --> /.test(trimmed)) continue;
    textLines.push(trimmed);
  }

  dlBlob(textLines.join('\n'), '.txt', 'text/plain');
}

function dlBlob(content, ext, mime) {
  var fname = (origName || 'subtitles') + ext;
  var blob = new Blob([content], { type: mime + ';charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
}

/* ═══════════════════════════════════════════════════════════════════════════
   12. SAUVEGARDE DOSSIER (File System Access API)
═══════════════════════════════════════════════════════════════════════════ */
async function saveToDir() {
  var content = getCurrentSRT();
  if (!content) return;

  if (!('showDirectoryPicker' in window)) {
    dlSRT();
    return;
  }

  try {
    if (!destDirHandle) {
      destDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      updateDirInfo();
    }

    var fname = (origName || 'subtitles') + '.srt';
    var fileHandle = await destDirHandle.getFileHandle(fname, { create: true });
    var writable = await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();

    /* Flash confirmation */
    var btn = document.getElementById('saveDirBtn');
    var orig = btn.textContent;
    btn.textContent = 'Enregistre';
    setTimeout(function () { btn.textContent = orig; }, 2500);

  } catch (e) {
    if (e.name === 'AbortError') return;

    if (e.name === 'NotAllowedError' || e.name === 'SecurityError') {
      destDirHandle = null;
      updateDirInfo();
      showErr('Permission refusee pour le dossier. Veuillez reselectionner.');
    } else {
      destDirHandle = null;
      updateDirInfo();
      showErr('Erreur sauvegarde dossier : ' + e.message);
    }
  }
}

function changeDir() {
  destDirHandle = null;
  updateDirInfo();
  saveToDir();
}

function updateDirInfo() {
  var el = document.getElementById('dirInfo');
  if (destDirHandle) {
    document.getElementById('dirName').textContent = destDirHandle.name;
    el.classList.add('vis');
  } else {
    el.classList.remove('vis');
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   13. COPIE PRESSE-PAPIER
═══════════════════════════════════════════════════════════════════════════ */
function copySRT() {
  var content = getCurrentSRT();
  if (!content) return;

  navigator.clipboard.writeText(content).then(function () {
    var btn = document.getElementById('copyBtn');
    var orig = btn.textContent;
    btn.textContent = 'COPIE';
    setTimeout(function () { btn.textContent = orig; }, 2000);
  }).catch(function (e) {
    showErr('Impossible de copier : ' + e.message);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   14. HISTORIQUE
═══════════════════════════════════════════════════════════════════════════ */
function saveHistory(item) {
  try {
    var hist = [];
    var raw = localStorage.getItem('sw_history');
    if (raw) hist = JSON.parse(raw);
    /* Dedupliquer par nom */
    hist = hist.filter(function (h) { return h.name !== item.name; });
    hist.unshift(item);
    if (hist.length > 10) hist = hist.slice(0, 10);
    localStorage.setItem('sw_history', JSON.stringify(hist));
    renderHistory();
  } catch (e) {}
}

function renderHistory() {
  var list = document.getElementById('histList');
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) { list.innerHTML = '<div class="hempty">Aucun historique</div>'; return; }
    var hist = JSON.parse(raw);
    if (!hist.length) { list.innerHTML = '<div class="hempty">Aucun historique</div>'; return; }

    list.innerHTML = hist.map(function (item, i) {
      var meta = fmtDate(item.ts) + (item.size ? ' · ' + fmtSz(item.size) : '');
      return '<div class="hitem" onclick="loadHistory(' + i + ')">' +
        '<span class="hico">&#127916;</span>' +
        '<div class="hinfo">' +
          '<div class="hname">' + escHtml(item.name || 'Inconnu') + '</div>' +
          '<div class="hmeta">' + escHtml(meta) + '</div>' +
        '</div>' +
        '<button class="hdel" onclick="delHistory(event,' + i + ')" title="Supprimer">&#x2715;</button>' +
      '</div>';
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="hempty">Erreur chargement historique</div>';
  }
}

function loadHistory(i) {
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) return;
    var hist = JSON.parse(raw);
    var item = hist[i];
    if (!item) return;
    srtTxt = item.srt || '';
    translatedContent = item.translated || '';
    origName = item.name || 'subtitles';
    var hasTranslation = !!(translatedContent && item.tgtLang);
    var displayContent = hasTranslation ? translatedContent : srtTxt;
    showRes(displayContent, item.srcLang || null, item.tgtLang || null, hasTranslation);
  } catch (e) {
    showErr("Impossible de charger l'historique.");
  }
}

function delHistory(event, i) {
  event.stopPropagation();
  try {
    var raw = localStorage.getItem('sw_history');
    if (!raw) return;
    var hist = JSON.parse(raw);
    hist.splice(i, 1);
    localStorage.setItem('sw_history', JSON.stringify(hist));
    renderHistory();
  } catch (e) {}
}

function toggleHist() {
  document.getElementById('histList').classList.toggle('open');
  document.getElementById('histArr').classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════════════════════════
   15. UTILITAIRES
═══════════════════════════════════════════════════════════════════════════ */
function fmtSz(b) {
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}

function fmtDur(sec) {
  if (!isFinite(sec) || sec <= 0) return '';
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = Math.floor(sec % 60);
  if (h > 0) return h + 'h' + String(m).padStart(2, '0') + 'm';
  if (m > 0) return m + 'min' + String(s).padStart(2, '0') + 's';
  return s + 's';
}

function fmtDate(ts) {
  if (!ts) return '';
  try {
    return new Date(ts).toLocaleDateString('fr-FR', {
      day: '2-digit', month: '2-digit', year: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (e) {
    return '';
  }
}

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
