<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>SubWhisper</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--border:#222;--accent:#e8ff47;--accent2:#ff4757;--text:#f0f0f0;--muted:#555;--success:#47ffb2;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:18px;font-weight:700}.logo span{color:var(--accent)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.sdot.on{background:var(--success);box-shadow:0 0 8px var(--success)}.sdot.err{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.cfg{margin:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:10px}.crow:last-child{margin-bottom:0}
.clbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;width:60px;flex-shrink:0}
input[type=text],select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none;transition:border-color .2s}
input[type=text]:focus,select:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.tbtn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:10px 14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.dz{margin:0 20px;border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(232,255,71,.02)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dico{font-size:48px;margin-bottom:12px;display:block}
.dtit{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:6px}
.dsub{font-size:12px;color:var(--muted)}
.fp{margin:12px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:none;align-items:center;gap:12px}
.fp.vis{display:flex}
.finfo{flex:1;overflow:hidden}
.fname{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsz{font-size:11px;color:var(--muted);margin-top:2px}
.frm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color .2s}
.frm:hover{color:var(--accent2)}
.pw{margin:20px;display:none}.pw.vis{display:block}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ppct{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%;position:relative}
.pfill::after{content:'';position:absolute;right:0;top:-2px;width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.plog{margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--muted);height:16px;overflow:hidden}
.sbtn{display:block;width:calc(100% - 40px);margin:16px 20px;padding:16px;background:var(--accent);border:none;border-radius:12px;color:#000;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.sbtn:hover{background:#d4eb30;transform:translateY(-1px)}.sbtn:active{transform:translateY(0)}
.sbtn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.rw{margin:0 20px 20px;display:none}.rw.vis{display:block;animation:su .3s ease}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rt{font-family:var(--mono);font-size:11px;color:var(--success);text-transform:uppercase;letter-spacing:1px}
.rac{display:flex;gap:8px}
.ab{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 14px;cursor:pointer;transition:all .2s}
.ab:hover{border-color:var(--accent);color:var(--accent)}
.ab.pri{background:var(--accent);color:#000;border-color:var(--accent)}.ab.pri:hover{background:#d4eb30}
.sprev{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text);max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.sprev::-webkit-scrollbar{width:4px}.sprev::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ld{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.lb{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.2);border-radius:4px;padding:2px 6px;color:var(--accent);font-size:10px}
.ew{margin:0 20px;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:10px;padding:14px;display:none;font-family:var(--mono);font-size:11px;color:var(--accent2);line-height:1.6;white-space:pre-wrap}
.ew.vis{display:block}
footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ft{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <div class="logo">Sub<span>Whisper</span></div>
  <div class="sdot" id="sd"></div>
</header>
<div class="cfg">
  <div class="crow">
    <span class="clbl">API</span>
    <input type="text" id="apiUrl" placeholder="http://[IP-Tailscale]:8000">
    <button class="tbtn" onclick="testConn()">TEST</button>
  </div>
  <div class="crow">
    <span class="clbl">LANG</span>
    <select id="lg">
      <option value="">Auto-detect</option>
      <option value="fr">Français</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="pt">Português</option>
      <option value="ru">Русский</option>
      <option value="ja">日本語</option>
      <option value="zh">中文</option>
      <option value="ar">العربية</option>
      <option value="ko">한국어</option>
      <option value="vi">Tiếng Việt</option>
    </select>
  </div>
</div>
<div class="dz" id="dz">
  <input type="file" id="fi" accept="video/*,audio/*" onchange="handleFile(this.files[0])">
  <span class="dico">📹</span>
  <div class="dtit">Déposer ou sélectionner</div>
  <div class="dsub">MP4 · MKV · MOV · AVI · MP3 · WAV</div>
</div>
<div class="fp" id="fp">
  <span style="font-size:24px;flex-shrink:0">🎬</span>
  <div class="finfo">
    <div class="fname" id="fn">—</div>
    <div class="fsz" id="fs">—</div>
  </div>
  <button class="frm" onclick="clearFile()">✕</button>
</div>
<div class="pw" id="pw">
  <div class="ph">
    <span class="plbl" id="pl">Upload</span>
    <span class="ppct" id="pp">0%</span>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="plog" id="plog">Initialisation...</div>
</div>
<button class="sbtn" id="sb" onclick="transcribe()" disabled>TRANSCRIRE</button>
<div class="ew" id="ew"></div>
<div class="rw" id="rw">
  <div class="rh">
    <div class="rt">✓ Transcription</div>
    <div class="rac">
      <button class="ab" onclick="copySRT()">COPIER</button>
      <button class="ab pri" onclick="dlSRT()">⬇ SRT</button>
    </div>
  </div>
  <div class="sprev" id="sp"></div>
  <div class="ld" id="ld"></div>
</div>
<footer>
  <span class="ft">SubWhisper · Local · No cloud</span>
  <span class="ft">faster-whisper large-v3</span>
</footer>
<script>
let selFile=null,srtTxt='',origName='';
try{const s=localStorage.getItem('sw_url');if(s)document.getElementById('apiUrl').value=s;}catch(e){}
document.getElementById('apiUrl').addEventListener('change',()=>{try{localStorage.setItem('sw_url',document.getElementById('apiUrl').value.trim());}catch(e){}});
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
function handleFile(f){if(!f)return;selFile=f;origName=f.name.replace(/\.[^/.]+$/,'');document.getElementById('fn').textContent=f.name;document.getElementById('fs').textContent=fmtSz(f.size);document.getElementById('fp').classList.add('vis');document.getElementById('sb').disabled=false;hideErr();hideRes();}
function clearFile(){selFile=null;document.getElementById('fp').classList.remove('vis');document.getElementById('sb').disabled=true;document.getElementById('fi').value='';hideRes();hideErr();}
function fmtSz(b){return b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
async function testConn(){const u=getUrl();if(!u){showErr('URL API manquante');return;}setSt('');try{const r=await fetch(u+'/health',{signal:AbortSignal.timeout(5000)});setSt(r.ok?'on':'err');if(r.ok)hideErr();else showErr('API répond mais /health retourne '+r.status);}catch(e){setSt('err');showErr('Impossible de joindre '+u+'\n→ Vérifier IP Tailscale et que le serveur tourne');}}
async function transcribe(){
  if(!selFile)return;const u=getUrl();if(!u){showErr('URL API manquante');return;}
  const lang=document.getElementById('lg').value;
  hideErr();hideRes();setProg(true);setLog('Envoi du fichier...');document.getElementById('sb').disabled=true;
  const fd=new FormData();fd.append('file',selFile);if(lang)fd.append('language',lang);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable){const p=Math.round((e.loaded/e.total)*50);setPct(p,'Upload');setLog('Upload '+fmtSz(e.loaded)+' / '+fmtSz(e.total));}};
  xhr.upload.onloadend=()=>{let p=50;const iv=setInterval(()=>{p=Math.min(p+Math.random()*3,95);setPct(Math.round(p),'Transcription');setLog('Faster-Whisper large-v3 en cours...');if(xhr.readyState===4)clearInterval(iv);},800);};
  xhr.onload=()=>{
    if(xhr.status===200){try{const d=JSON.parse(xhr.responseText);srtTxt=d.srt||'';setPct(100,'Terminé');setLog('Transcription complète');setTimeout(()=>{setProg(false);showRes(srtTxt,d.language);},500);}catch(e){setProg(false);showErr('Réponse API invalide:\n'+xhr.responseText.substring(0,200));}}
    else{setProg(false);try{const er=JSON.parse(xhr.responseText);showErr('Erreur '+xhr.status+': '+(er.detail||er.message||xhr.responseText));}catch{showErr('Erreur HTTP '+xhr.status+'\n'+xhr.responseText.substring(0,200));}}
    document.getElementById('sb').disabled=false;
  };
  xhr.onerror=()=>{setProg(false);showErr('Erreur réseau. Vérifier Tailscale et le serveur.');document.getElementById('sb').disabled=false;};
  xhr.open('POST',u+'/transcribe');xhr.send(fd);
}
function getUrl(){return document.getElementById('apiUrl').value.trim().replace(/\/$/,'');}
function setSt(s){document.getElementById('sd').className='sdot'+(s?' '+s:'');}
function setProg(v){document.getElementById('pw').classList.toggle('vis',v);if(!v){document.getElementById('pf').style.width='0%';document.getElementById('pp').textContent='0%';}}
function setPct(p,l){document.getElementById('pf').style.width=p+'%';document.getElementById('pp').textContent=p+'%';if(l)document.getElementById('pl').textContent=l;}
function setLog(m){document.getElementById('plog').textContent=m;}
function showRes(srt,lang){document.getElementById('sp').textContent=srt.substring(0,2000)+(srt.length>2000?'\n...':'');document.getElementById('rw').classList.add('vis');setSt('on');if(lang)document.getElementById('ld').innerHTML='LANGUE DÉTECTÉE <span class="lb">'+lang.toUpperCase()+'</span>';}
function hideRes(){document.getElementById('rw').classList.remove('vis');document.getElementById('ld').innerHTML='';}
function showErr(m){const e=document.getElementById('ew');e.textContent='⚠ '+m;e.classList.add('vis');}
function hideErr(){document.getElementById('ew').classList.remove('vis');}
function dlSRT(){if(!srtTxt)return;const b=new Blob([srtTxt],{type:'text/srt'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(origName||'subtitles')+'.srt';a.click();URL.revokeObjectURL(u);}
function copySRT(){if(!srtTxt)return;navigator.clipboard.writeText(srtTxt).then(()=>{const b=document.querySelector('.ab:not(.pri)');b.textContent='✓ COPIÉ';setTimeout(()=>b.textContent='COPIER',2000);});}
</script>
</body>
</html>
