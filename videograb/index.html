<!-- VideoGrab v1.0 — Téléchargeur vidéo universel — Single-file HTML -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoGrab v1.0</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--card:rgba(255,255,255,0.05);--card-border:rgba(255,255,255,0.08);
  --text:#e4e4e7;--text-dim:#71717a;--accent1:#7c6af7;--accent2:#4facfe;
  --radius:16px;--blur:20px;
}
html{scrollbar-width:thin;scrollbar-color:#27272a #0a0a0f}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a0f}
::-webkit-scrollbar-thumb{background:#27272a;border-radius:3px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:12px;font-size:.875rem;backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);animation:toastIn .3s ease;max-width:380px;display:flex;align-items:center;gap:10px;cursor:pointer}
.toast.hide{animation:toastOut .3s ease forwards}
.toast-success{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#4ade80}
.toast-error{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#f87171}
.toast-warning{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.3);color:#facc15}
.toast-info{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:#60a5fa}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(60px)}}

/* Layout */
.app{max-width:780px;margin:0 auto;padding:24px 16px 60px}
header{text-align:center;margin-bottom:32px}
header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
header .ver{font-family:monospace;font-size:.7rem;color:var(--text-dim);margin-top:2px}
.top-btns{position:absolute;top:20px;right:20px;display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;display:grid;place-items:center;font-size:1.1rem;transition:.2s}
.icon-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}

/* Card */
.card{background:var(--card);backdrop-filter:blur(var(--blur));border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;margin-bottom:20px}

/* Input row */
.input-row{display:flex;gap:10px}
.input-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--accent1)}
.input-row input::placeholder{color:var(--text-dim)}
.btn-paste,.btn-clear{background:rgba(255,255,255,.08);border:1px solid var(--card-border);border-radius:12px;padding:0 14px;color:var(--text-dim);cursor:pointer;font-size:1rem;transition:.2s}
.btn-paste:hover,.btn-clear:hover{background:rgba(255,255,255,.14);color:var(--text)}

/* Platform badge */
.platform-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-family:monospace;font-size:.8rem;font-weight:600;margin-top:12px;animation:badgePulse .6s ease;border:1px solid transparent}
@keyframes badgePulse{0%{opacity:0;transform:scale(.8)}50%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.badge-youtube{background:rgba(255,0,0,.12);color:#ff4444;border-color:rgba(255,0,0,.25)}
.badge-twitter{background:rgba(29,161,242,.12);color:#1da1f2;border-color:rgba(29,161,242,.25)}
.badge-tiktok{background:rgba(254,44,85,.12);color:#fe2c55;border-color:rgba(254,44,85,.25)}
.badge-instagram{background:rgba(225,48,108,.12);color:#e1306c;border-color:rgba(225,48,108,.25)}
.badge-reddit{background:rgba(255,69,0,.12);color:#ff4500;border-color:rgba(255,69,0,.25)}
.badge-facebook{background:rgba(24,119,242,.12);color:#1877f2;border-color:rgba(24,119,242,.25)}
.badge-vimeo{background:rgba(26,183,234,.12);color:#1ab7ea;border-color:rgba(26,183,234,.25)}
.badge-dailymotion{background:rgba(0,128,255,.12);color:#0080ff;border-color:rgba(0,128,255,.25)}
.badge-twitch{background:rgba(145,70,255,.12);color:#9146ff;border-color:rgba(145,70,255,.25)}
.badge-bilibili{background:rgba(0,174,236,.12);color:#00a1d6;border-color:rgba(0,174,236,.25)}
.badge-soundcloud{background:rgba(255,85,0,.12);color:#ff5500;border-color:rgba(255,85,0,.25)}
.badge-pinterest{background:rgba(230,0,35,.12);color:#e60023;border-color:rgba(230,0,35,.25)}
.badge-direct{background:rgba(124,106,247,.12);color:#7c6af7;border-color:rgba(124,106,247,.25)}

/* Quality + Mode */
.options-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;align-items:center}
.opt-label{font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.q-btn{padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;font-family:monospace;font-size:.8rem;transition:.2s}
.q-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.q-btn.active{background:linear-gradient(135deg,rgba(124,106,247,.25),rgba(79,172,254,.25));border-color:var(--accent1);color:#fff}
.mode-btn{padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;font-size:.8rem;transition:.2s}
.mode-btn.active{background:linear-gradient(135deg,rgba(124,106,247,.25),rgba(79,172,254,.25));border-color:var(--accent1);color:#fff}

/* Analyze button */
.btn-analyze{width:100%;margin-top:18px;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.btn-analyze:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,106,247,.35)}
.btn-analyze:active:not(:disabled){transform:translateY(0)}
.btn-analyze:disabled{opacity:.55;cursor:not-allowed}
.btn-analyze .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
.btn-analyze.loading .spinner{display:inline-block}
.btn-analyze.loading .btn-text{opacity:.8}
@keyframes spin{to{transform:rotate(360deg)}}

/* Player */
.player-card{animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}
.video-wrap video,.video-wrap audio{width:100%;height:100%;object-fit:contain}
.video-wrap audio{height:60px;position:absolute;bottom:0}

/* Download area */
.dl-section{margin-top:16px}
.dl-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-dl{flex:1;min-width:140px;padding:12px 16px;border-radius:12px;border:1px solid var(--card-border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s;text-align:center}
.btn-dl:hover{background:rgba(124,106,247,.18);border-color:var(--accent1)}
.btn-dl.primary{background:linear-gradient(135deg,rgba(124,106,247,.25),rgba(79,172,254,.25));border-color:var(--accent1)}

/* Progress */
.progress-wrap{margin-top:14px;display:none}
.progress-wrap.active{display:block}
.progress-bar-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:3px;width:0%;transition:width .2s}
.progress-info{display:flex;justify-content:space-between;margin-top:6px;font-size:.75rem;color:var(--text-dim);font-family:monospace}

/* Picker grid */
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:16px}
.picker-item{background:rgba(255,255,255,.04);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s}
.picker-item:hover{border-color:var(--accent1);transform:translateY(-2px)}
.picker-item img{width:100%;aspect-ratio:16/9;object-fit:cover}
.picker-item .pi-info{padding:10px;font-size:.8rem;color:var(--text-dim)}

/* History panel */
.history-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;visibility:hidden;transition:.3s}
.history-overlay.open{opacity:1;visibility:visible}
.history-panel{position:fixed;top:0;right:0;width:340px;max-width:90vw;height:100vh;background:#111118;border-left:1px solid var(--card-border);z-index:101;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.history-panel.open{transform:translateX(0)}
.hp-header{padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--card-border)}
.hp-header h3{font-size:1rem}
.hp-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer}
.hp-list{flex:1;overflow-y:auto;padding:12px}
.hp-item{padding:12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--card-border);margin-bottom:8px;cursor:pointer;transition:.2s}
.hp-item:hover{background:rgba(255,255,255,.06)}
.hp-item .hp-url{font-size:.8rem;color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hp-item .hp-meta{font-size:.7rem;color:var(--text-dim);margin-top:4px;display:flex;justify-content:space-between}
.hp-empty{text-align:center;color:var(--text-dim);padding:40px 20px;font-size:.85rem}
.hp-clear{width:100%;padding:14px;border:none;background:rgba(239,68,68,.1);color:#f87171;cursor:pointer;font-size:.85rem;font-weight:600}
.hp-clear:hover{background:rgba(239,68,68,.18)}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;place-items:center}
.modal-overlay.open{display:grid}
.modal{background:#16161e;border:1px solid var(--card-border);border-radius:var(--radius);padding:28px;width:420px;max-width:90vw;animation:fadeUp .3s ease}
.modal h3{margin-bottom:20px;font-size:1.1rem}
.modal label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:6px;margin-top:14px}
.modal input,.modal select{width:100%;padding:11px 14px;background:rgba(255,255,255,.06);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:.85rem;outline:none}
.modal input:focus{border-color:var(--accent1)}
.modal-btns{display:flex;gap:10px;margin-top:24px}
.modal-btns button{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:.85rem}
.modal-btns .btn-save{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.modal-btns .btn-cancel{background:rgba(255,255,255,.08);color:var(--text-dim)}

/* Rate limit */
.rate-limit-msg{text-align:center;padding:20px;color:#facc15;font-size:.9rem}
.rate-limit-msg .countdown{font-family:monospace;font-size:1.4rem;font-weight:700;color:#facc15;margin-top:8px}

/* CORS help */
.cors-help{padding:16px;background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.15);border-radius:12px;margin-top:14px;font-size:.82rem;color:var(--text-dim);line-height:1.6}
.cors-help strong{color:#facc15}
.cors-help a{color:var(--accent2)}

/* Responsive */
@media(max-width:600px){
  .input-row{flex-direction:column}
  .btn-paste,.btn-clear{padding:12px}
  .top-btns{top:12px;right:12px}
  .dl-row{flex-direction:column}
  .picker-grid{grid-template-columns:1fr 1fr}
  .history-panel{width:100%}
}
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- Top buttons -->
<div class="top-btns">
  <button class="icon-btn" onclick="toggleHistory()" title="Historique">&#128337;</button>
  <button class="icon-btn" onclick="openSettings()" title="Paramètres">&#9881;</button>
</div>

<!-- History panel -->
<div class="history-overlay" id="histOverlay" onclick="toggleHistory()"></div>
<div class="history-panel" id="histPanel">
  <div class="hp-header"><h3>Historique</h3><button class="hp-close" onclick="toggleHistory()">&times;</button></div>
  <div class="hp-list" id="histList"></div>
  <button class="hp-clear" onclick="clearHistory()">Effacer l'historique</button>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>Paramètres</h3>
    <label>URL Cobalt API</label>
    <input id="setCobaltUrl" placeholder="https://api.cobalt.tools/">
    <label>URL Proxy CORS</label>
    <input id="setProxyUrl" placeholder="https://corsproxy.io/?">
    <label>Qualité par défaut</label>
    <select id="setDefaultQuality">
      <option value="360">360p</option>
      <option value="480">480p</option>
      <option value="720">720p</option>
      <option value="1080" selected>1080p</option>
      <option value="2160">4K</option>
      <option value="max">Best</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSettings()">Annuler</button>
      <button class="btn-save" onclick="saveSettings()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Main app -->
<div class="app">
  <header>
    <h1>VideoGrab</h1>
    <div class="ver">v1.0</div>
  </header>

  <!-- Input card -->
  <div class="card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Coller une URL vidéo..." autocomplete="off" spellcheck="false">
      <button class="btn-paste" onclick="pasteUrl()" title="Coller">&#128203;</button>
      <button class="btn-clear" onclick="clearInput()" title="Effacer">&times;</button>
    </div>
    <div id="badgeWrap"></div>
    <div class="options-row">
      <span class="opt-label">Qualité</span>
      <button class="q-btn" data-q="360">360p</button>
      <button class="q-btn" data-q="480">480p</button>
      <button class="q-btn" data-q="720">720p</button>
      <button class="q-btn active" data-q="1080">1080p</button>
      <button class="q-btn" data-q="2160">4K</button>
      <button class="q-btn" data-q="max">Best</button>
    </div>
    <div class="options-row">
      <span class="opt-label">Mode</span>
      <button class="mode-btn active" data-m="auto" onclick="setMode('auto',this)">Video</button>
      <button class="mode-btn" data-m="audio" onclick="setMode('audio',this)">Audio</button>
    </div>
    <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">
      <span class="spinner"></span><span class="btn-text">Analyser</span>
    </button>
  </div>

  <!-- Result area -->
  <div id="resultArea"></div>
</div>

<script>
// === State ===
let currentQuality = '1080';
let currentMode = 'auto';
let currentStreamUrl = null;
let currentFilename = null;
let hlsInstance = null;
let rateLimitEnd = 0;

// === Settings ===
function getSettings() {
  const d = { cobaltUrl: 'https://api.cobalt.tools/', proxyUrl: 'https://corsproxy.io/?', defaultQuality: '1080' };
  try { return Object.assign(d, JSON.parse(localStorage.getItem('vg_settings') || '{}')); } catch { return d; }
}
function loadSettings() {
  const s = getSettings();
  document.getElementById('setCobaltUrl').value = s.cobaltUrl;
  document.getElementById('setProxyUrl').value = s.proxyUrl;
  document.getElementById('setDefaultQuality').value = s.defaultQuality;
  currentQuality = s.defaultQuality;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.toggle('active', b.dataset.q === currentQuality));
}
function openSettings() { loadSettings(); document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings() {
  const s = {
    cobaltUrl: document.getElementById('setCobaltUrl').value.trim() || 'https://api.cobalt.tools/',
    proxyUrl: document.getElementById('setProxyUrl').value.trim() || 'https://corsproxy.io/?',
    defaultQuality: document.getElementById('setDefaultQuality').value
  };
  localStorage.setItem('vg_settings', JSON.stringify(s));
  currentQuality = s.defaultQuality;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.toggle('active', b.dataset.q === currentQuality));
  closeSettings();
  toast('Paramètres enregistrés', 'success');
}

// === Toast ===
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  el.onclick = () => { el.classList.add('hide'); setTimeout(() => el.remove(), 300); };
  c.appendChild(el);
  setTimeout(() => { if (el.parentNode) { el.classList.add('hide'); setTimeout(() => el.remove(), 300); } }, 4000);
}

// === Platform detection ===
const PLATFORMS = [
  { id:'youtube', name:'YouTube', re:/(?:youtube\.com|youtu\.be|youtube-nocookie\.com)/i },
  { id:'twitter', name:'Twitter / X', re:/(?:twitter\.com|x\.com|t\.co)/i },
  { id:'tiktok', name:'TikTok', re:/(?:tiktok\.com|vm\.tiktok\.com)/i },
  { id:'instagram', name:'Instagram', re:/instagram\.com/i },
  { id:'reddit', name:'Reddit', re:/(?:reddit\.com|redd\.it)/i },
  { id:'facebook', name:'Facebook', re:/(?:facebook\.com|fb\.watch|fb\.com)/i },
  { id:'vimeo', name:'Vimeo', re:/vimeo\.com/i },
  { id:'dailymotion', name:'Dailymotion', re:/(?:dailymotion\.com|dai\.ly)/i },
  { id:'twitch', name:'Twitch', re:/twitch\.tv/i },
  { id:'bilibili', name:'Bilibili', re:/bilibili\.com/i },
  { id:'soundcloud', name:'SoundCloud', re:/soundcloud\.com/i },
  { id:'pinterest', name:'Pinterest', re:/pinterest\./i },
];
const DIRECT_EXT = /\.(mp4|webm|ogg|mov|avi|mkv|m3u8|flv)(\?.*)?$/i;

function detectPlatform(url) {
  if (!url) return null;
  if (DIRECT_EXT.test(url)) return { id: 'direct', name: 'URL directe' };
  for (const p of PLATFORMS) { if (p.re.test(url)) return p; }
  return null;
}

function showBadge(platform) {
  const w = document.getElementById('badgeWrap');
  if (!platform) { w.innerHTML = ''; return; }
  w.innerHTML = `<span class="platform-badge badge-${platform.id}">${platform.name}</span>`;
}

// === Input ===
const urlInput = document.getElementById('urlInput');
urlInput.addEventListener('input', () => showBadge(detectPlatform(urlInput.value.trim())));
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

async function pasteUrl() {
  try {
    const text = await navigator.clipboard.readText();
    urlInput.value = text;
    urlInput.dispatchEvent(new Event('input'));
    toast('URL collée', 'info');
  } catch { toast('Impossible de lire le presse-papiers', 'warning'); }
}
function clearInput() { urlInput.value = ''; showBadge(null); document.getElementById('resultArea').innerHTML = ''; destroyHls(); }

// === Quality & Mode ===
document.querySelectorAll('.q-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.q-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentQuality = b.dataset.q;
  });
});
function setMode(m, el) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

// === HLS ===
function destroyHls() { if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; } }

function setupPlayer(url, isAudio) {
  destroyHls();
  const area = document.getElementById('resultArea');
  const isHls = /\.m3u8/i.test(url);
  const tag = isAudio ? 'audio' : 'video';
  let html = `<div class="card player-card"><div class="video-wrap">`;
  html += `<${tag} id="mediaPlayer" controls playsinline crossorigin="anonymous"></${tag}>`;
  html += `</div><div class="dl-section"><div class="dl-row">`;
  html += `<button class="btn-dl primary" onclick="downloadMedia()">Telecharger</button>`;
  html += `</div><div class="progress-wrap" id="progressWrap"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div><div class="progress-info"><span id="progressPct">0%</span><span id="progressSpeed">--</span><span id="progressEta">--</span></div></div></div></div>`;
  area.innerHTML = html;

  const player = document.getElementById('mediaPlayer');
  if (isHls && Hls.isSupported()) {
    hlsInstance = new Hls();
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(player);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(()=>{}));
  } else {
    player.src = url;
    player.play().catch(()=>{});
  }
  currentStreamUrl = url;
}

// === Cobalt API call with CORS cascade ===
async function callCobalt(url) {
  const s = getSettings();
  const body = JSON.stringify({
    url,
    videoQuality: currentQuality === 'max' ? '4320' : currentQuality,
    downloadMode: currentMode,
    youtubeVideoCodec: 'h264',
    filenameStyle: 'pretty'
  });
  const headers = { 'Accept': 'application/json', 'Content-Type': 'application/json' };

  // Level 1: direct
  try {
    const r = await fetch(s.cobaltUrl, { method: 'POST', headers, body });
    if (r.ok) return await r.json();
    const err = await r.json().catch(() => null);
    if (r.status === 429) throw { rateLimit: true };
    if (err && err.error) throw { cobaltError: err.error.code || err.error };
    throw new Error('HTTP ' + r.status);
  } catch (e) {
    if (e.rateLimit || e.cobaltError) throw e;
    // Level 2: corsproxy
    try {
      const proxyUrl = s.proxyUrl + encodeURIComponent(s.cobaltUrl);
      const r2 = await fetch(proxyUrl, { method: 'POST', headers, body });
      if (r2.ok) return await r2.json();
      const err2 = await r2.json().catch(() => null);
      if (r2.status === 429) throw { rateLimit: true };
      if (err2 && err2.error) throw { cobaltError: err2.error.code || err2.error };
      throw new Error('proxy failed');
    } catch (e2) {
      if (e2.rateLimit || e2.cobaltError) throw e2;
      throw { corsBlocked: true };
    }
  }
}

// === Analyze ===
async function analyze() {
  const url = urlInput.value.trim();
  if (!url) { toast('Veuillez entrer une URL', 'warning'); return; }
  try { new URL(url); } catch { toast('URL invalide', 'warning'); return; }

  // Rate limit check
  if (Date.now() < rateLimitEnd) {
    const sec = Math.ceil((rateLimitEnd - Date.now()) / 1000);
    toast(`Rate limit actif, attendez ${sec}s`, 'warning');
    return;
  }

  const btn = document.getElementById('btnAnalyze');
  btn.classList.add('loading');
  btn.disabled = true;
  const area = document.getElementById('resultArea');
  area.innerHTML = '';
  destroyHls();

  const platform = detectPlatform(url);

  try {
    // Direct URL
    if (platform && platform.id === 'direct') {
      const isAudio = /\.(ogg|mp3|wav|flac|aac)(\?.*)?$/i.test(url);
      const ext = url.match(/\.(\w+)(\?.*)?$/);
      currentFilename = 'video.' + (ext ? ext[1] : 'mp4');
      setupPlayer(url, isAudio);
      addHistory(url, platform.name);
      toast('Lecture directe', 'success');
      return;
    }

    // Cobalt API
    const data = await callCobalt(url);
    handleCobaltResponse(data, url, platform);

  } catch (e) {
    if (e.rateLimit) {
      rateLimitEnd = Date.now() + 30000;
      showRateLimit(area);
    } else if (e.cobaltError) {
      const msg = translateCobaltError(e.cobaltError);
      toast(msg, 'error');
    } else if (e.corsBlocked) {
      showCorsHelp(area);
    } else {
      toast('Erreur: ' + (e.message || 'inconnue'), 'error');
    }
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function handleCobaltResponse(data, url, platform) {
  const status = data.status;
  if (status === 'error') {
    toast(translateCobaltError(data.error?.code || data.error || 'Erreur inconnue'), 'error');
    return;
  }
  if (status === 'tunnel' || status === 'redirect' || status === 'stream') {
    const streamUrl = data.url;
    currentFilename = data.filename || 'video.mp4';
    const isAudio = currentMode === 'audio' || /\.(mp3|ogg|wav|opus|m4a)$/i.test(currentFilename);
    setupPlayer(streamUrl, isAudio);
    addHistory(url, platform ? platform.name : 'Inconnu');
    toast('Vidéo prête', 'success');
    return;
  }
  if (status === 'picker') {
    showPicker(data.picker || data.audio ? [].concat(data.picker || [], data.audio ? [{ url: data.audio, type: 'audio' }] : []) : [], url, platform);
    return;
  }
  // Fallback: if there is a url field
  if (data.url) {
    currentFilename = data.filename || 'video.mp4';
    setupPlayer(data.url, currentMode === 'audio');
    addHistory(url, platform ? platform.name : 'Inconnu');
    toast('Vidéo prête', 'success');
    return;
  }
  toast('Réponse inattendue du serveur', 'error');
}

function showPicker(items, origUrl, platform) {
  const area = document.getElementById('resultArea');
  let html = '<div class="card"><h3 style="margin-bottom:12px;font-size:.95rem;">Choisissez un média</h3><div class="picker-grid">';
  items.forEach((item, i) => {
    const thumb = item.thumb || '';
    const label = item.type || (item.url && item.url.includes('audio') ? 'Audio' : `Option ${i+1}`);
    html += `<div class="picker-item" onclick="pickItem('${escHtml(item.url)}','${escHtml(origUrl)}','${platform?platform.name:''}')">`;
    if (thumb) html += `<img src="${escHtml(thumb)}" alt="" loading="lazy">`;
    html += `<div class="pi-info">${escHtml(label)}</div></div>`;
  });
  html += '</div></div>';
  area.innerHTML = html;
}

function pickItem(streamUrl, origUrl, platformName) {
  currentFilename = 'video.mp4';
  const isAudio = currentMode === 'audio' || /audio/i.test(streamUrl);
  setupPlayer(streamUrl, isAudio);
  addHistory(origUrl, platformName);
  toast('Média sélectionné', 'success');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

// === Rate limit countdown ===
function showRateLimit(area) {
  area.innerHTML = `<div class="card"><div class="rate-limit-msg">Limite de requêtes atteinte. Veuillez patienter.<div class="countdown" id="rlCountdown">30s</div></div></div>`;
  const el = document.getElementById('rlCountdown');
  const iv = setInterval(() => {
    const sec = Math.ceil((rateLimitEnd - Date.now()) / 1000);
    if (sec <= 0) { clearInterval(iv); el.textContent = 'Prêt !'; toast('Vous pouvez réessayer', 'info'); return; }
    el.textContent = sec + 's';
  }, 1000);
}

// === CORS help ===
function showCorsHelp(area) {
  area.innerHTML = `<div class="cors-help">
    <strong>Accès bloqué par CORS</strong><br><br>
    Le serveur Cobalt n'autorise pas les requêtes depuis un navigateur. Solutions :<br><br>
    1. Installez l'extension <a href="https://chromewebstore.google.com/detail/cors-unblock/lfhmikememgdcahcdlaciloancbhjino" target="_blank">CORS Unblock</a> pour Chrome<br>
    2. Utilisez directement le site <a href="https://cobalt.tools" target="_blank">cobalt.tools</a><br>
    3. Modifiez l'URL Cobalt API dans les paramètres pour pointer vers une instance auto-hébergée<br>
    4. Lancez Chrome avec <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px">--disable-web-security</code> (dev uniquement)
  </div>`;
  toast('CORS bloqué — voir les suggestions ci-dessous', 'warning');
}

// === Translate cobalt errors ===
function translateCobaltError(code) {
  const map = {
    'error.api.link.invalid': 'URL invalide ou non supportée',
    'error.api.rate_exceeded': 'Trop de requêtes, réessayez plus tard',
    'error.api.link.unsupported': 'Cette plateforme n\'est pas supportée',
    'error.api.fetch.fail': 'Impossible de récupérer la vidéo (privée ou indisponible)',
    'error.api.fetch.rate': 'Rate limit de la plateforme atteint',
    'error.api.content.video.unavailable': 'Vidéo indisponible ou privée',
    'error.api.content.video.live': 'Les lives en cours ne sont pas supportés',
    'error.api.content.video.age': 'Vidéo avec restriction d\'âge, connexion requise',
    'error.api.content.post.unavailable': 'Publication indisponible ou supprimée',
    'error.api.youtube.decipher': 'Impossible de déchiffrer la vidéo YouTube',
    'error.api.youtube.login': 'Cette vidéo nécessite une connexion YouTube',
  };
  if (typeof code === 'string' && map[code]) return map[code];
  if (typeof code === 'string') return code.replace(/^error\.api\./, '').replace(/\./g, ' ');
  return 'Erreur du serveur';
}

// === Download with progress ===
async function downloadMedia() {
  if (!currentStreamUrl) { toast('Aucun média à télécharger', 'warning'); return; }
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const pct = document.getElementById('progressPct');
  const speed = document.getElementById('progressSpeed');
  const eta = document.getElementById('progressEta');
  wrap.classList.add('active');
  fill.style.width = '0%';
  pct.textContent = '0%';
  speed.textContent = '--';
  eta.textContent = '--';

  try {
    const resp = await fetch(currentStreamUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const contentLength = resp.headers.get('content-length');
    const total = contentLength ? parseInt(contentLength) : 0;
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    const startTime = Date.now();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      const elapsed = (Date.now() - startTime) / 1000;
      const bps = received / elapsed;

      if (total) {
        const p = Math.min(100, Math.round((received / total) * 100));
        fill.style.width = p + '%';
        pct.textContent = p + '%';
        const remaining = (total - received) / bps;
        eta.textContent = formatTime(remaining);
      } else {
        pct.textContent = formatSize(received);
        eta.textContent = '--';
      }
      speed.textContent = formatSize(bps) + '/s';
    }

    fill.style.width = '100%';
    pct.textContent = '100%';
    eta.textContent = 'Terminé';

    const blob = new Blob(chunks);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentFilename || 'video.mp4';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    toast('Téléchargement terminé', 'success');
  } catch (e) {
    // Fallback: open in new tab
    toast('Téléchargement blob échoué, ouverture directe...', 'warning');
    const a = document.createElement('a');
    a.href = currentStreamUrl;
    a.download = currentFilename || 'video.mp4';
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    a.remove();
  } finally {
    setTimeout(() => wrap.classList.remove('active'), 3000);
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}
function formatTime(sec) {
  if (!isFinite(sec) || sec < 0) return '--';
  if (sec < 60) return Math.ceil(sec) + 's';
  return Math.floor(sec / 60) + 'm ' + Math.ceil(sec % 60) + 's';
}

// === History ===
function getHistory() { try { return JSON.parse(localStorage.getItem('vg_history') || '[]'); } catch { return []; } }
function saveHistory(h) { localStorage.setItem('vg_history', JSON.stringify(h.slice(0, 50))); }
function addHistory(url, platform) {
  const h = getHistory();
  h.unshift({ url, platform, date: new Date().toISOString() });
  saveHistory(h);
}
function toggleHistory() {
  const panel = document.getElementById('histPanel');
  const overlay = document.getElementById('histOverlay');
  const isOpen = panel.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  if (isOpen) renderHistory();
}
function renderHistory() {
  const list = document.getElementById('histList');
  const h = getHistory();
  if (!h.length) { list.innerHTML = '<div class="hp-empty">Aucun historique</div>'; return; }
  list.innerHTML = h.map(item => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="hp-item" onclick="loadFromHistory('${escHtml(item.url)}')">
      <div class="hp-url">${escHtml(item.url)}</div>
      <div class="hp-meta"><span>${escHtml(item.platform)}</span><span>${dateStr}</span></div>
    </div>`;
  }).join('');
}
function loadFromHistory(url) {
  urlInput.value = url;
  urlInput.dispatchEvent(new Event('input'));
  toggleHistory();
  analyze();
}
function clearHistory() {
  localStorage.removeItem('vg_history');
  renderHistory();
  toast('Historique effacé', 'info');
}

// === Init ===
loadSettings();
