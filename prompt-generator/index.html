<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptForge AI v2</title>
<style>
:root {
  --font-display: 'Courier New', monospace;
  --font-body: Georgia, serif;
  --font-mono: 'Courier New', monospace;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
  --radius-sm:2px;--radius-md:4px;--radius-lg:8px;
  --transition:200ms cubic-bezier(.4,0,.2,1);
  --transition-slow:400ms cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg-base:#0a0a0f;--bg-surface:#111118;--bg-raised:#1a1a24;--bg-overlay:#22222e;
  --border:#2a2a3a;--border-accent:#3d3d55;
  --text-primary:#e8e8f0;--text-secondary:#8888aa;--text-muted:#555570;
  --accent:#00d4aa;--accent-dim:#00d4aa22;--accent-hover:#00ffcc;
  --warn:#ff6b6b;--warn-dim:#ff6b6b22;--gold:#ffd700;--gold-dim:#ffd70022;
  --diff-add:#00d4aa33;--diff-del:#ff6b6b33;--diff-add-text:#00d4aa;--diff-del-text:#ff6b6b;
  --score-low:#ff4444;--score-mid:#ff9944;--score-high:#44dd88;
  --shadow-md:0 4px 16px #00000088;--shadow-lg:0 8px 32px #000000aa;
  --shadow-accent:0 0 24px #00d4aa33;--shadow-glow:0 0 8px #00d4aa55;
}
[data-theme="light"] {
  --bg-base:#f4f3ef;--bg-surface:#faf9f6;--bg-raised:#ffffff;--bg-overlay:#f0ede6;
  --border:#ddd8ce;--border-accent:#c4bdb0;
  --text-primary:#1a1714;--text-secondary:#6b6358;--text-muted:#a89f94;
  --accent:#1a6b5a;--accent-dim:#1a6b5a18;--accent-hover:#0d4d40;
  --warn:#c0392b;--warn-dim:#c0392b18;--gold:#b8860b;--gold-dim:#b8860b18;
  --diff-add:#1a6b5a22;--diff-del:#c0392b22;--diff-add-text:#1a6b5a;--diff-del-text:#c0392b;
  --score-low:#c0392b;--score-mid:#d4680a;--score-high:#1a7a3e;
  --shadow-md:0 4px 16px #00000022;--shadow-lg:0 8px 32px #00000033;
  --shadow-accent:0 0 24px #1a6b5a22;--shadow-glow:0 0 8px #1a6b5a44;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;line-height:1.6;transition:background var(--transition-slow),color var(--transition-slow);overflow-x:hidden}
::selection{background:var(--accent);color:var(--bg-base)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3}
.app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:var(--sp-6) var(--sp-4);display:grid;gap:var(--sp-6)}
.header{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-4) 0;border-bottom:1px solid var(--border)}
.logo{font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.logo span{color:var(--text-muted);font-weight:400}
.logo .ai-badge{display:inline-block;font-size:.5rem;padding:2px 6px;border:1px solid var(--accent);border-radius:var(--radius-sm);color:var(--accent);margin-left:8px;vertical-align:middle;letter-spacing:.15em}
.header-controls{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap}
.lang-toggle{display:inline-flex;align-items:center;gap:2px;font-family:var(--font-display);font-size:.6rem;letter-spacing:.1em;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;background:transparent}
.lang-btn{padding:3px 8px;cursor:pointer;background:transparent;border:none;color:var(--text-muted);font-family:var(--font-display);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;transition:all var(--transition)}
.lang-btn.active{background:var(--accent-dim);color:var(--accent)}
.lang-btn:not(.active):hover{color:var(--text-secondary)}
.btn-api-key{display:inline-flex;align-items:center;gap:var(--sp-2);font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-2) var(--sp-3);border:1px solid var(--border-accent);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all var(--transition)}
.btn-api-key:hover,.btn-api-key.has-key{border-color:var(--accent);color:var(--accent)}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background var(--transition)}
.api-dot.active{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.theme-toggle{background:var(--bg-overlay);border:1px solid var(--border);border-radius:20px;padding:var(--sp-1) var(--sp-2);cursor:pointer;display:flex;align-items:center;gap:var(--sp-2);font-family:var(--font-display);font-size:.7rem;color:var(--text-secondary);letter-spacing:.05em;transition:all var(--transition)}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:#00000088;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:var(--sp-4)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-surface);border:1px solid var(--border-accent);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:var(--sp-6);width:100%;max-width:540px;display:grid;gap:var(--sp-4);animation:slideIn .2s ease;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font-display);font-size:.8rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:var(--sp-3)}
.modal-nav{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:var(--sp-2)}
.modal-nav-btn{font-family:var(--font-display);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-2) var(--sp-4);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);transition:all var(--transition);margin-bottom:-1px}
.modal-nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-nav-btn:not(.active):hover{color:var(--text-secondary)}
.modal-tab-panel{display:none}
.modal-tab-panel.active{display:grid;gap:var(--sp-4)}
.provider-tabs{display:flex;gap:var(--sp-2)}
.provider-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:var(--sp-3);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;background:transparent;transition:all var(--transition);min-height:44px}
.provider-tab:hover{border-color:var(--border-accent);color:var(--text-secondary)}
.provider-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.provider-icon{font-size:1.2rem}
.modal-label{font-family:var(--font-display);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:var(--sp-2)}
.modal-input{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);color:var(--text-primary);font-family:var(--font-mono);font-size:.8rem;transition:border-color var(--transition);outline:none;min-height:44px}
.modal-input:focus{border-color:var(--accent)}
.modal-hint{font-family:var(--font-display);font-size:.55rem;color:var(--text-muted);letter-spacing:.05em;margin-top:var(--sp-1)}
.model-select{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);color:var(--text-primary);font-family:var(--font-mono);font-size:.8rem;outline:none;cursor:pointer;transition:border-color var(--transition);min-height:44px}
.model-select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:var(--sp-3);justify-content:flex-end}
.modal-save{font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:var(--sp-3) var(--sp-5);border-radius:var(--radius-md);cursor:pointer;background:var(--accent);border:1px solid var(--accent);color:var(--bg-base);transition:all var(--transition);min-height:44px}
.modal-save:hover{background:var(--accent-hover)}
.modal-cancel{font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:var(--sp-3) var(--sp-5);border-radius:var(--radius-md);cursor:pointer;background:transparent;border:1px solid var(--border-accent);color:var(--text-secondary);transition:all var(--transition);min-height:44px}
.modal-cancel:hover{border-color:var(--border-accent);color:var(--text-primary);background:var(--bg-overlay)}
/* TEMPLATE TAB */
.tpl-provider-tabs{display:flex;gap:var(--sp-2);flex-wrap:wrap}
.tpl-tab{flex:1;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:var(--sp-2) var(--sp-3);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-display);font-size:.55rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;background:transparent;transition:all var(--transition)}
.tpl-tab:hover{border-color:var(--border-accent);color:var(--text-secondary)}
.tpl-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.tpl-tab .tpl-custom-badge{font-size:.45rem;color:var(--gold)}
.tpl-textarea{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3);color:var(--text-primary);font-family:var(--font-mono);font-size:.75rem;line-height:1.6;outline:none;resize:vertical;min-height:200px;transition:border-color var(--transition)}
.tpl-textarea:focus{border-color:var(--accent)}
.tpl-meta{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);flex-wrap:wrap}
.tpl-version{font-family:var(--font-display);font-size:.55rem;color:var(--text-muted);letter-spacing:.08em}
.tpl-version span{color:var(--accent)}
.tpl-actions{display:flex;gap:var(--sp-2);align-items:center;flex-wrap:wrap}
.btn-tpl{font-family:var(--font-display);font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-2) var(--sp-3);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);min-height:32px}
.btn-tpl-save{background:var(--accent);border:1px solid var(--accent);color:var(--bg-base)}
.btn-tpl-save:hover{background:var(--accent-hover)}
.btn-tpl-reset{background:transparent;border:1px solid var(--border-accent);color:var(--text-muted)}
.btn-tpl-reset:hover{border-color:var(--warn);color:var(--warn)}
.btn-tpl-fetch{background:#6644ff22;border:1px solid #6644ff;color:#aa88ff}
.btn-tpl-fetch:hover{background:#6644ff44}
.btn-tpl-fetch:disabled{opacity:.4;cursor:not-allowed}
.tpl-fetch-status{font-family:var(--font-display);font-size:.55rem;color:var(--text-muted);letter-spacing:.05em;min-height:16px}
.tpl-source-link{font-family:var(--font-display);font-size:.5rem;color:var(--text-muted);letter-spacing:.05em}
.tpl-source-link a{color:var(--accent);text-decoration:none}
.tpl-source-link a:hover{text-decoration:underline}
/* TARGET ROW */
.target-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-2) var(--sp-4);background:var(--bg-overlay);border-bottom:1px solid var(--border);gap:var(--sp-3);flex-wrap:wrap}
.target-label{font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.target-switch{display:flex;gap:var(--sp-1);flex-wrap:wrap}
.target-btn{font-family:var(--font-display);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:3px var(--sp-3);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-muted);transition:all var(--transition)}
.target-btn.active{background:#6644ff22;border-color:#6644ff;color:#aa88ff}
.target-btn:not(.active):hover{border-color:var(--border-accent);color:var(--text-secondary)}
/* MODE ROW */
.mode-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-2) var(--sp-4);background:var(--bg-overlay);border-bottom:1px solid var(--border);gap:var(--sp-3)}
.mode-label{font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.mode-switch{display:flex;gap:var(--sp-1)}
.mode-btn{font-family:var(--font-display);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:3px var(--sp-3);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-muted);transition:all var(--transition)}
.mode-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.mode-btn:not(.active):hover{border-color:var(--border-accent);color:var(--text-secondary)}
/* WORKSPACE */
.workspace{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);align-items:start}
@media(max-width:720px){.workspace{grid-template-columns:1fr}}
.panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden;transition:border-color var(--transition),box-shadow var(--transition)}
.panel:focus-within{border-color:var(--accent);box-shadow:var(--shadow-accent)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-4);background:var(--bg-raised);border-bottom:1px solid var(--border)}
.panel-title{font-family:var(--font-display);font-size:.65rem;font-weight:700;color:var(--text-secondary);letter-spacing:.15em;text-transform:uppercase}
.panel-badge{font-family:var(--font-display);font-size:.6rem;padding:2px var(--sp-2);border-radius:var(--radius-sm);letter-spacing:.1em;text-transform:uppercase}
.badge-input{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);opacity:.7}
.badge-output{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.badge-ai{background:#6644ff22;color:#aa88ff;border:1px solid #6644ff}
.score-row{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);background:var(--bg-overlay);border-bottom:1px solid var(--border)}
.score-label{font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;min-width:60px}
.score-bar-wrap{flex:1;height:4px;background:var(--bg-base);border-radius:2px;overflow:hidden}
.score-bar{height:100%;border-radius:2px;transition:width var(--transition-slow),background var(--transition-slow);width:0%}
.score-val{font-family:var(--font-display);font-size:.7rem;font-weight:700;min-width:32px;text-align:right}
.score-bar.low,.score-val.low{background:var(--score-low);color:var(--score-low)}
.score-bar.mid,.score-val.mid{background:var(--score-mid);color:var(--score-mid)}
.score-bar.high,.score-val.high{background:var(--score-high);color:var(--score-high)}
.textarea{width:100%;min-height:220px;padding:var(--sp-4);background:transparent;color:var(--text-primary);border:none;outline:none;resize:vertical;font-family:var(--font-mono);font-size:.875rem;line-height:1.7;display:block}
.textarea::placeholder{color:var(--text-muted);font-style:italic}
.output-area{min-height:220px;padding:var(--sp-4);font-family:var(--font-mono);font-size:.875rem;line-height:1.7;color:var(--text-primary);white-space:pre-wrap;word-break:break-word}
.output-area.empty{color:var(--text-muted);font-style:italic}
.out-section{display:block;margin-bottom:var(--sp-4)}
.out-tag{font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--accent-dim);padding-bottom:2px;margin-bottom:var(--sp-2);display:block}
.out-highlight{background:var(--accent-dim);border-left:2px solid var(--accent);padding:var(--sp-2) var(--sp-3);border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:var(--sp-2);display:block}
.out-content{color:var(--text-primary)}
.out-ai-raw{font-family:var(--font-mono);font-size:.85rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--text-primary);padding:var(--sp-4);background:#6644ff11;border-left:2px solid #6644ff;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.diff-add{background:var(--diff-add);color:var(--diff-add-text);border-radius:2px;padding:0 2px}
.diff-del{background:var(--diff-del);color:var(--diff-del-text);border-radius:2px;padding:0 2px;text-decoration:line-through}
.output-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.output-tab{font-family:var(--font-display);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-2) var(--sp-4);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);transition:all var(--transition);margin-bottom:-1px}
.output-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.output-tab:not(.active):hover{color:var(--text-secondary)}
.panel-footer{padding:var(--sp-2) var(--sp-4);background:var(--bg-overlay);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:40px}
.char-count{font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.08em}
.char-count.warn{color:var(--warn)}
.btn-iterate{font-family:var(--font-display);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-2) var(--sp-3);border:1px solid var(--border-accent);border-radius:var(--radius-sm);cursor:pointer;background:transparent;color:var(--text-secondary);transition:all var(--transition);min-height:32px;min-width:80px}
.btn-iterate:not(:disabled):hover{border-color:#aa88ff;color:#aa88ff;background:#6644ff11}
.btn-iterate:disabled{opacity:.3;cursor:not-allowed}
.actions{display:flex;gap:var(--sp-3);flex-wrap:wrap;align-items:center;justify-content:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:var(--sp-3) var(--sp-5);border:1px solid;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition);white-space:nowrap;user-select:none;min-height:44px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:not(:disabled):hover{transform:translateY(-1px)}
.btn:not(:disabled):active{transform:translateY(0)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--bg-base);box-shadow:var(--shadow-glow);font-size:.8rem;padding:var(--sp-4) var(--sp-8)}
.btn-primary:not(:disabled):hover{background:var(--accent-hover);border-color:var(--accent-hover);box-shadow:var(--shadow-accent)}
.btn-secondary{background:transparent;border-color:var(--border-accent);color:var(--text-secondary)}
.btn-secondary:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
.btn-export{background:transparent;border-color:var(--border);color:var(--text-muted)}
.btn-export:not(:disabled):hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:transparent;border-color:var(--warn);color:var(--warn)}
.btn-danger:not(:disabled):hover{background:var(--warn-dim);border-color:var(--warn)}
.btn-share{background:transparent;border-color:#6644ff;color:#aa88ff}
.btn-share:not(:disabled):hover{background:#6644ff22;border-color:#aa88ff}
.btn-txt{background:transparent;border-color:var(--border-accent);color:var(--text-secondary)}
.btn-txt:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
.btn-import{background:transparent;border-color:var(--border);color:var(--text-muted)}
.btn-import:hover{border-color:var(--gold);color:var(--gold)}
.btn-icon{font-size:1rem;line-height:1}
.spinner{display:none;width:14px;height:14px;border:2px solid var(--bg-base);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.loading .spinner{display:block}
.loading .btn-label{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.improvements-row{padding:var(--sp-2) var(--sp-4);display:flex;flex-wrap:wrap;gap:var(--sp-1);border-top:1px solid var(--border);background:var(--bg-overlay);min-height:36px;align-items:center}
.chip{font-family:var(--font-display);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:2px var(--sp-2);border-radius:20px;border:1px solid;animation:fadeIn .2s ease}
.chip-added{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.chip-mod{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.chip-warn{background:var(--warn-dim);color:var(--warn);border-color:var(--warn)}
.chip-ai{background:#6644ff22;color:#aa88ff;border-color:#6644ff}
.chip-target{background:#ff880022;color:#ff8800;border-color:#ff8800}
.history-section{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-4);background:var(--bg-raised);border-bottom:1px solid var(--border)}
.history-title{font-family:var(--font-display);font-size:.65rem;font-weight:700;color:var(--text-secondary);letter-spacing:.15em;text-transform:uppercase}
.history-count{font-family:var(--font-display);font-size:.6rem;color:var(--text-muted)}
.history-list{list-style:none;max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-accent) transparent}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}
.history-item{position:relative;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--transition)}
.history-item:last-child{border-bottom:none}
.history-item:hover{background:var(--bg-raised)}
.history-item.removing{opacity:0;max-height:0;overflow:hidden;padding:0;transition:opacity .2s ease,max-height .3s ease}
.history-item-inner{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);user-select:none}
.history-delete-btn{flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid var(--warn);background:var(--warn-dim);color:var(--warn);font-size:.8rem;cursor:pointer;transition:all var(--transition);line-height:1;padding:0}
.history-delete-btn:hover{background:var(--warn);color:#fff}
.history-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.history-date{font-family:var(--font-display);font-size:.55rem;color:var(--text-muted)}
.history-preview{font-size:.8rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-score{font-family:var(--font-display);font-size:.65rem;font-weight:700;min-width:28px;text-align:right}
.history-mode{font-family:var(--font-display);font-size:.5rem;color:#aa88ff;letter-spacing:.08em;text-transform:uppercase;margin-left:4px}
.history-target{font-family:var(--font-display);font-size:.5rem;color:#ff8800;letter-spacing:.08em;text-transform:uppercase;margin-left:4px}
.history-empty{padding:var(--sp-8) var(--sp-4);text-align:center;font-family:var(--font-display);font-size:.65rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
#toast-container{position:fixed;bottom:var(--sp-6);right:var(--sp-6);z-index:9999;display:flex;flex-direction:column;gap:var(--sp-2);pointer-events:none}
.toast{font-family:var(--font-display);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:var(--sp-3) var(--sp-4);border-radius:var(--radius-md);border:1px solid;box-shadow:var(--shadow-lg);animation:toastIn .25s ease,toastOut .25s ease 2s forwards;pointer-events:none}
.toast-success{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.toast-error{background:var(--warn-dim);border-color:var(--warn);color:var(--warn)}
.toast-info{background:var(--bg-overlay);border-color:var(--border-accent);color:var(--text-secondary)}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.status-line{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);background:var(--bg-raised);border-top:1px solid var(--border);font-family:var(--font-display);font-size:.6rem;color:var(--text-muted);letter-spacing:.08em}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background var(--transition)}
.status-dot.active{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.status-dot.error{background:var(--warn)}
.status-dot.ai{background:#aa88ff;box-shadow:0 0 6px #6644ff}
.copy-success .btn-icon{color:var(--accent)}
@media(max-width:480px){
  .app{padding:var(--sp-4) var(--sp-3)}
  .actions{flex-direction:column;align-items:stretch}
  .btn{justify-content:center}
  .btn-primary{font-size:.85rem}
  .btn-secondary,.btn-export,.btn-danger{font-size:.65rem;padding:var(--sp-3) var(--sp-4)}
  #toast-container{bottom:var(--sp-3);right:var(--sp-3);left:var(--sp-3)}
  .history-item-inner{padding:var(--sp-3)}
  .mode-btn{padding:5px var(--sp-3);font-size:.6rem}
}
</style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-title">⚙ Configuration</div>
    <nav class="modal-nav">
      <button class="modal-nav-btn active" data-modal-tab="api">🔑 API</button>
      <button class="modal-nav-btn" data-modal-tab="templates">📐 Templates</button>
    </nav>

    <!-- TAB API -->
    <div class="modal-tab-panel active" id="modal-tab-api">
      <div>
        <span class="modal-label">Provider</span>
        <div class="provider-tabs" id="provider-tabs">
          <button class="provider-tab active" data-provider="claude"><span class="provider-icon">⚡</span>Claude</button>
          <button class="provider-tab" data-provider="openai"><span class="provider-icon">🟢</span>OpenAI</button>
          <button class="provider-tab" data-provider="gemini"><span class="provider-icon">💎</span>Gemini</button>
        </div>
      </div>
      <div>
        <span class="modal-label">Clé API <span id="provider-label">Anthropic</span></span>
        <input type="password" class="modal-input" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
        <div class="modal-hint" id="key-hint">Stockée localement.</div>
      </div>
      <div>
        <span class="modal-label">Modèle</span>
        <select class="model-select" id="model-select"></select>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modal-cancel">Annuler</button>
        <button class="modal-save" id="modal-save">Enregistrer</button>
      </div>
    </div>

    <!-- TAB TEMPLATES -->
    <div class="modal-tab-panel" id="modal-tab-templates">
      <div>
        <span class="modal-label">Provider cible</span>
        <div class="tpl-provider-tabs" id="tpl-provider-tabs">
          <button class="tpl-tab active" data-tpl="universal"><span>🌐</span><span>Universel</span><span class="tpl-custom-badge" id="tpl-badge-universal"></span></button>
          <button class="tpl-tab" data-tpl="claude"><span>⚡</span><span>Claude</span><span class="tpl-custom-badge" id="tpl-badge-claude"></span></button>
          <button class="tpl-tab" data-tpl="openai"><span>🟢</span><span>OpenAI</span><span class="tpl-custom-badge" id="tpl-badge-openai"></span></button>
          <button class="tpl-tab" data-tpl="gemini"><span>💎</span><span>Gemini</span><span class="tpl-custom-badge" id="tpl-badge-gemini"></span></button>
        </div>
      </div>
      <div>
        <div class="tpl-meta">
          <span class="tpl-version">v<span id="tpl-version-label">—</span> · <span id="tpl-custom-indicator">défaut</span></span>
          <div class="tpl-actions">
            <button class="btn-tpl btn-tpl-fetch" id="btn-tpl-fetch">⚡ Fetch IA</button>
            <button class="btn-tpl btn-tpl-reset" id="btn-tpl-reset">↺ Reset</button>
            <button class="btn-tpl btn-tpl-save" id="btn-tpl-save">Sauvegarder</button>
          </div>
        </div>
        <div class="tpl-fetch-status" id="tpl-fetch-status"></div>
      </div>
      <div>
        <span class="modal-label">System prompt template</span>
        <textarea class="tpl-textarea" id="tpl-textarea" spellcheck="false"></textarea>
      </div>
      <div class="tpl-source-link" id="tpl-source-link"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modal-cancel-tpl">Fermer</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" role="main">
  <header class="header">
    <div class="logo">PROMPT<span>FORGE</span><span class="ai-badge">AI v2</span></div>
    <div class="header-controls">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="btn-api-key" id="btn-api-key">
        <span class="api-dot" id="api-dot"></span>
        <span id="api-key-label">API</span>
      </button>
      <button class="theme-toggle" id="theme-toggle">
        <span id="theme-icon">☽</span>
        <span id="theme-label">DARK</span>
      </button>
    </div>
  </header>

  <section class="workspace">
    <article class="panel">
      <div class="panel-header">
        <span class="panel-title">Prompt original</span>
        <span class="panel-badge badge-input">BRUT</span>
      </div>
      <div class="mode-row">
        <span class="mode-label">Mode</span>
        <div class="mode-switch">
          <button class="mode-btn" id="mode-local">Local</button>
          <button class="mode-btn" id="mode-ai">IA</button>
        </div>
      </div>
      <div class="score-row">
        <span class="score-label">Score</span>
        <div class="score-bar-wrap" id="score-in-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="score-bar" id="score-in-bar"></div>
        </div>
        <span class="score-val" id="score-in-val">—</span>
      </div>
      <textarea class="textarea" id="input-prompt" placeholder="Saisissez votre prompt ici…&#10;&#10;Ex: Résume ce texte en bullet points" maxlength="8000" autocomplete="off" spellcheck="true"></textarea>
      <div class="panel-footer">
        <span class="char-count" id="char-count-in">0 / 8000</span>
      </div>
    </article>

    <article class="panel">
      <div class="panel-header">
        <span class="panel-title">Prompt amélioré</span>
        <span class="panel-badge badge-output" id="output-badge">FORGE</span>
      </div>
      <div class="target-row">
        <span class="target-label">🎯 Cible</span>
        <div class="target-switch" id="target-switch">
          <button class="target-btn active" data-target="universal">Universel</button>
          <button class="target-btn" data-target="claude">Claude</button>
          <button class="target-btn" data-target="openai">OpenAI</button>
          <button class="target-btn" data-target="gemini">Gemini</button>
        </div>
      </div>
      <div class="output-tabs">
        <button class="output-tab active" id="tab-result">Résultat</button>
        <button class="output-tab" id="tab-diff">Diff</button>
      </div>
      <div class="score-row">
        <span class="score-label">Score</span>
        <div class="score-bar-wrap" id="score-out-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="score-bar" id="score-out-bar"></div>
        </div>
        <span class="score-val" id="score-out-val">—</span>
      </div>
      <div class="output-area empty" id="output-area" tabindex="0">Résultat affiché ici…</div>
      <div class="improvements-row" id="chips-row"></div>
      <div class="panel-footer">
        <span class="char-count" id="char-count-out"></span>
        <button class="btn-iterate" id="btn-iterate" disabled title="Re-forger l'output via IA">↻ Itérer</button>
      </div>
    </article>
  </section>

  <input type="file" id="file-import" accept=".json" style="display:none">
  <div class="actions">
    <button class="btn btn-primary" id="btn-forge">
      <span class="spinner"></span>
      <span class="btn-icon">⚡</span>
      <span class="btn-label">Forger le prompt</span>
    </button>
    <button class="btn btn-secondary" id="btn-copy" disabled>
      <span class="btn-icon" id="copy-icon">⎘</span>
      <span class="btn-label">Copier</span>
    </button>
    <button class="btn btn-share" id="btn-share" disabled title="Partager le prompt (natif mobile)">
      <span class="btn-icon">↗</span>
      <span class="btn-label">Partager</span>
    </button>
    <button class="btn btn-txt" id="btn-txt" disabled title="Télécharger le prompt en .txt">
      <span class="btn-icon">⬇</span>
      <span class="btn-label">TXT</span>
    </button>
    <button class="btn btn-export" id="btn-export" disabled title="Exporter l'historique JSON">
      <span class="btn-icon">📦</span>
      <span class="btn-label">Export JSON</span>
    </button>
    <button class="btn btn-import" id="btn-import" title="Importer un historique JSON">
      <span class="btn-icon">⬆</span>
      <span class="btn-label">Import JSON</span>
    </button>
    <button class="btn btn-danger" id="btn-clear">
      <span class="btn-icon">✕</span>
      <span class="btn-label">Effacer</span>
    </button>
  </div>

  <div class="status-line">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Prêt</span>
  </div>

  <section class="history-section">
    <div class="history-header">
      <span class="history-title">Historique</span>
      <span class="history-count" id="history-count">0 / 20</span>
    </div>
    <ul class="history-list" id="history-list">
      <li class="history-empty">Aucun historique</li>
    </ul>
  </section>
</div>

<div id="toast-container"></div>

<script>
'use strict';

const State = (() => {
  const s = { theme:'dark', mode:'local', lang:'fr', activeProvider:'claude', targetProvider:'universal', inputValue:'', outputRaw:'', outputSections:null, scoreIn:0, scoreOut:0, chips:[], loading:false, history:[], outputTab:'result' };
  const ls = new Set();
  return {
    get(){ return {...s} },
    set(p){ Object.assign(s,p); ls.forEach(fn=>fn(s)) },
    subscribe(fn){ ls.add(fn) }
  };
})();

const Store = (() => {
  const P='promptforge_';
  return {
    read(k,fb=null){ try{ const r=localStorage.getItem(P+k); return r!==null?JSON.parse(r):fb }catch{ return fb } },
    write(k,v){ try{ localStorage.setItem(P+k,JSON.stringify(v)) }catch(e){ if(e.name==='QuotaExceededError') Toast.show('Stockage saturé','error') } }
  };
})();

const ApiKeys = (() => {
  const PROV = {
    claude:{ label:'Anthropic', placeholder:'sk-ant-...', hint:'console.anthropic.com', models:[
      {value:'claude-opus-4-6',label:'claude-opus-4-6 (meilleur)'},
      {value:'claude-sonnet-4-6',label:'claude-sonnet-4-6 (équilibré)',default:true},
      {value:'claude-haiku-4-5-20251001',label:'claude-haiku-4-5 (rapide)'},
    ]},
    openai:{ label:'OpenAI', placeholder:'sk-...', hint:'platform.openai.com', models:[
      {value:'gpt-4o',label:'gpt-4o (meilleur)'},
      {value:'gpt-4o-mini',label:'gpt-4o-mini (rapide)',default:true},
      {value:'o1-mini',label:'o1-mini (raisonnement)'},
    ]},
    gemini:{ label:'Google', placeholder:'AIza...', hint:'aistudio.google.com', models:[
      {value:'gemini-2.0-flash',label:'gemini-2.0-flash',default:true},
      {value:'gemini-2.0-pro',label:'gemini-2.0-pro (meilleur)'},
      {value:'gemini-1.5-flash',label:'gemini-1.5-flash (rapide)'},
    ]},
  };
  return {
    getKey(p){ return Store.read(`apikey_${p}`,'') },
    getModel(p){ const s=Store.read(`model_${p}`,''); if(s) return s; const d=PROV[p].models.find(m=>m.default); return d?d.value:PROV[p].models[0].value },
    save(p,k,m){ Store.write(`apikey_${p}`,k); Store.write(`model_${p}`,m) },
    hasKey(p){ return !!this.getKey(p) },
    hasAnyKey(){ return Object.keys(PROV).some(p=>this.hasKey(p)) },
    firstKeyProvider(){ return Object.keys(PROV).find(p=>this.hasKey(p))||null },
    getProviders(){ return PROV },
  };
})();

/* ── TEMPLATE ENGINE ── */
const TemplateEngine = (() => {
  // Versioned default templates per target provider
  // Update version + system fn on major model releases
  // Sources: see meta.source per provider
  const DEFAULTS = {
    universal: {
      version: '1.0',
      meta: { label:'Universel', source:null, notes:'Markdown structuré, compatible tous modèles' },
      system: (lang) => {
        const isFr=lang==='fr';
        const rl=isFr?'RÔLE':'ROLE',cl=isFr?'CONTEXTE':'CONTEXT',ml='MISSION',col=isFr?'CONTRAINTES':'CONSTRAINTS',fl=isFr?'FORMAT DE SORTIE':'OUTPUT FORMAT';
        const li=isFr?"Réponds en français. Les sections et le contenu du prompt amélioré doivent être en français.":"Respond in English. All sections and content of the improved prompt must be in English.";
        return `You are an expert prompt engineer. ${li}\n\nTransform the user's raw prompt into a structured optimized prompt with these 5 sections:\n\n# ${rl}\n[Precise expert persona adapted to the domain]\n\n# ${cl}\n[Context, domain, target audience, required level]\n\n# ${ml}\n[Precise task with strong action verb]\n\n# ${col}\n[Limits, exclusions, quality criteria, tone]\n\n# ${fl}\n[Expected format, length, structure]\n\nRespond ONLY with the improved structured prompt starting with "# ${rl}". No preamble, no explanation, no commentary.`;
      }
    },
    claude: {
      version: '2.1',
      meta: {
        label:'Claude (Anthropic)',
        source:'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview',
        notes:'Claude 3/4 — XML tags recommended by Anthropic. Direct, specific instructions. No over-politeness.'
      },
      system: (lang) => {
        const li=lang==='fr'?"Réponds en français. Génère le prompt amélioré entièrement en français.":"Respond in English. Generate the improved prompt entirely in English.";
        return `You are an expert prompt engineer specializing in Anthropic Claude models. ${li}\n\nTransform the user's raw prompt into an optimized Claude prompt using XML tags as recommended by Anthropic.\n\nOutput format:\n<role>\n[Precise expert persona — Claude responds well to clear, specific roles]\n</role>\n\n<context>\n[Background, domain, constraints, target audience — Claude leverages context extensively]\n</context>\n\n<instructions>\n[Step-by-step task breakdown — use numbered steps for complex tasks, direct imperative verbs]\n</instructions>\n\n<constraints>\n[Explicit limits, tone, exclusions, quality criteria]\n</constraints>\n\n<output_format>\n[Expected format, length, structure — Claude follows explicit format instructions precisely]\n</output_format>\n\nGuidelines applied:\n- Use XML tags to separate concerns (Claude parses these natively)\n- Be direct and specific — Claude does not need polite framing\n- Avoid vague qualifiers (good, nice, appropriate)\n- Chain-of-thought: add "Think step by step" only if reasoning is needed\n- No system/user split needed — include all context in the prompt\n\nRespond ONLY with the improved Claude prompt starting with <role>. No preamble, no explanation.`;
      }
    },
    openai: {
      version: '2.0',
      meta: {
        label:'OpenAI (GPT-4o / o1)',
        source:'https://platform.openai.com/docs/guides/prompt-engineering',
        notes:'GPT-4o: system/user separation + Markdown. o1/o3: no system prompt, consolidate in user turn.'
      },
      system: (lang) => {
        const li=lang==='fr'?"Réponds en français. Génère le prompt amélioré entièrement en français.":"Respond in English. Generate the improved prompt entirely in English.";
        return `You are an expert prompt engineer specializing in OpenAI GPT models. ${li}\n\nTransform the user's raw prompt into an optimized OpenAI prompt following OpenAI's prompt engineering guidelines.\n\nOutput format (include both blocks):\n\n--- SYSTEM ---\n[Role, expertise, tone, persistent instructions — what the model should always do]\n\n--- USER ---\n[Task, context, specific request, examples if needed]\n\nGuidelines applied:\n- GPT-4o: separate system and user clearly — system sets persona, user sets task\n- o1/o3 models: consolidate everything in USER block only (no system prompt for reasoning models)\n- Use Markdown structure (##, bullet points) — GPT-4o renders and follows it well\n- Be specific and concrete — avoid abstract or vague phrasing\n- Include output format specification in the user turn\n- Add few-shot examples inline if the task requires specific output patterns\n- JSON output: add "Respond with valid JSON only" at the end of user turn\n\nRespond ONLY with the improved OpenAI prompt starting with "--- SYSTEM ---". No preamble, no explanation.`;
      }
    },
    gemini: {
      version: '1.5',
      meta: {
        label:'Google Gemini',
        source:'https://ai.google.dev/gemini-api/docs/prompting-strategies',
        notes:'Gemini 2.0 — Natural prose preferred over XML. Leverage long context window. Multimodal-ready.'
      },
      system: (lang) => {
        const li=lang==='fr'?"Réponds en français. Génère le prompt amélioré entièrement en français.":"Respond in English. Generate the improved prompt entirely in English.";
        return `You are an expert prompt engineer specializing in Google Gemini models. ${li}\n\nTransform the user's raw prompt into an optimized Gemini prompt following Google's prompting strategies.\n\nOutput format:\n\nCONTEXT: [Background, role, domain — write naturally, Gemini handles prose context well]\n\nTASK: [Clear, direct task description — natural imperative sentences, not XML tags]\n\nDETAILS: [Specific requirements, constraints, audience, tone — explicit but natural]\n\nOUTPUT: [Expected format, length, structure]\n\nGuidelines applied:\n- Gemini prefers natural language over XML tags or heavy markdown structure\n- Leverage Gemini's long context window: include relevant examples inline\n- Be direct — Gemini infers context well from natural prose\n- Multimodal tasks: specify input types explicitly (image, audio, document)\n- Structured output: ask for JSON directly with schema description\n- Avoid over-structuring — Gemini 2.0 handles natural instructions efficiently\n- Chain-of-thought: write "Think through this step by step" in natural prose\n\nRespond ONLY with the improved Gemini prompt starting with "CONTEXT:". No preamble, no explanation.`;
      }
    }
  };

  function getCustom(t){ return Store.read(`tpl_custom_${t}`,null) }
  function saveCustom(t,text){ Store.write(`tpl_custom_${t}`,text) }
  function resetCustom(t){ localStorage.removeItem(`promptforge_tpl_custom_${t}`) }
  function hasCustom(t){ return getCustom(t)!==null }

  function get(target,lang='fr'){
    const custom=getCustom(target);
    if(custom) return custom;
    const def=DEFAULTS[target]||DEFAULTS.universal;
    return def.system(lang);
  }
  function getVersion(t){ return (DEFAULTS[t]||DEFAULTS.universal).version }
  function getMeta(t){ return (DEFAULTS[t]||DEFAULTS.universal).meta }
  function getSource(t){ return getMeta(t).source||null }

  function buildFetchPrompt(target,lang){
    const labels={universal:'any LLM',claude:'Anthropic Claude (latest version)',openai:'OpenAI GPT-4o and o1/o3',gemini:'Google Gemini 2.0'};
    const tl=labels[target]||target;
    if(lang==='fr'){
      return `Tu es un expert en prompt engineering. Génère un system prompt optimisé pour transformer un prompt brut en prompt structuré, destiné à être utilisé avec ${tl}.\n\nCe system prompt doit :\n1. Suivre les meilleures pratiques actuelles recommandées par le fournisseur\n2. Spécifier le format de sortie attendu avec des sections claires\n3. Inclure les guidelines spécifiques au modèle (balises XML pour Claude, séparation system/user pour OpenAI, prose naturelle pour Gemini)\n4. Être opérationnel immédiatement\n\nRéponds UNIQUEMENT avec le system prompt, sans introduction ni commentaire.`;

  }

  return{get,getVersion,getMeta,getSource,getCustom,saveCustom,resetCustom,hasCustom,buildFetchPrompt,DEFAULTS};

const Scorer = (() => {
  const W={hasRole:20,hasContext:15,hasMission:15,hasConstraints:10,hasFormat:10,hasLength:5,complexity:10,noVague:10,hasExamples:5};
  const RP=[/tu es (un|une|le|la|l')/i,/agis (en tant que|comme)/i,/en tant qu['e]/i,/you are (a|an|the)/i,/act as/i,/expert/i,/spécialiste/i];
  const CP=[/contexte/i,/situation/i,/cadre/i,/objectif/i,/background/i,/pour (un|une|mon|ma|notre)/i];
  const MV=[/^(génère|crée|écris|analyse|résume|explique|liste|compare|traduis|rédige|identifie|développe|propose|décris)/im,/(génère|crée|écris|analyse|résume|explique|liste|compare|traduis|rédige)/i];
  const CoP=[/sans /i,/ne pas/i,/évite/i,/uniquement/i,/seulement/i,/maximum/i,/minimum/i,/do not/i,/avoid/i,/only/i];
  const FP=[/en (liste|tableau|json|markdown|html|bullet|points|format)/i,/format(te)?/i,/structure/i,/bullet points/i,/numéroté/i,/csv/i,/xml/i];
  const LP=[/\d+ (mots?|lignes?|paragraphes?|pages?)/i,/court|bref|concis|détaillé|exhaustif/i];
  const VT=[/\b(bien|bon|bonne|correct|juste|intéressant|pertinent|approprié|possible|éventuellement|peut-être|etc\.?)\b/gi,/\b(good|nice|appropriate|decent|suitable|maybe|perhaps|etc\.?)\b/gi];
  const EP=[/par exemple/i,/exemple/i,/e\.g\./i,/for example/i,/such as/i];
  function score(t){
    if(!t||!t.trim()) return 0;
    let tot=0;
    if(RP.some(p=>p.test(t))) tot+=W.hasRole;
    if(CP.some(p=>p.test(t))) tot+=W.hasContext;
    if(MV.some(p=>p.test(t))) tot+=W.hasMission;
    if(CoP.some(p=>p.test(t))) tot+=W.hasConstraints;
    if(FP.some(p=>p.test(t))) tot+=W.hasFormat;
    if(LP.some(p=>p.test(t))) tot+=W.hasLength;
    const w=t.split(/\s+/).length;
    tot+=(w>=20)?W.complexity:Math.round(W.complexity*(w/20));
    const vm=VT.reduce((a,p)=>a+(t.match(p)||[]).length,0);
    tot+=(vm===0)?W.noVague:(vm===1)?Math.round(W.noVague*.5):0;
    if(EP.some(p=>p.test(t))) tot+=W.hasExamples;
    return Math.min(100,tot);
  }
  function getClass(s){ return s>=65?'high':s>=35?'mid':'low' }
  return{score,getClass};
})();

const Differ = (() => {
  function tokenize(str){ return str.split(/(\s+)/); }
  function lcs(a,b){
    const m=a.length,n=b.length;
    const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=(a[i-1]===b[j-1])?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    const res=[];let i=m,j=n;
    while(i>0&&j>0){
      if(a[i-1]===b[j-1]){res.unshift({type:'same',val:a[i-1]});i--;j--;}
      else if(dp[i-1][j]>=dp[i][j-1]){res.unshift({type:'del',val:a[i-1]});i--;}
      else{res.unshift({type:'add',val:b[j-1]});j--;}
    }
    while(i>0){res.unshift({type:'del',val:a[i-1]});i--;}
    while(j>0){res.unshift({type:'add',val:b[j-1]});j--;}
    return res;
  }
  function diff(oldStr,newStr){
    const a=tokenize(oldStr||''),b=tokenize(newStr||'');
    if(a.length>400||b.length>400){const al=oldStr.split('\n'),bl=newStr.split('\n');return lcs(al,bl).map(t=>({...t,val:t.val+'\n'}))}
    return lcs(a,b);
  }
  function toHtml(tokens){
    return tokens.map(t=>{
      const esc=t.val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      if(t.type==='add') return `<span class="diff-add">${esc}</span>`;
      if(t.type==='del') return `<span class="diff-del">${esc}</span>`;
      return esc;
    }).join('');
  }
  return{diff,toHtml};
})();

const LocalEngine = (() => {
  function hasRole(t){return /tu es (un|une|le|la|l')|agis (en tant que|comme)|en tant qu'|you are (a|an|the)|act as|expert|spécialiste/i.test(t)}
  function hasMission(t){return /(génère|crée|écris|analyse|résume|explique|liste|compare|traduis|rédige|identifie|développe|propose|décris|generate|create|write|analyze|summarize|explain|list|translate)/i.test(t)}
  function hasContext(t){return /contexte|situation|cadre|objectif|background|pour (un|une|mon|ma|notre)|dans le cadre/i.test(t)}
  function hasFormat(t){return /format|liste|tableau|json|markdown|html|bullet|structure|numéroté|csv|xml|yaml/i.test(t)}
  function hasConstraints(t){return /sans |ne pas|évite|uniquement|seulement|maximum|minimum|do not|avoid|only|must not/i.test(t)}
  function hasLength(t){return /\d+ (mots?|lignes?|paragraphes?|pages?)|court|bref|concis|détaillé|exhaustif|\d+ words?/i.test(t)}
  const DOMAINS=[
    {p:/code|programm|python|javascript|java|sql|api|debug|fonction|class|script|développ|software/i,l:'développement logiciel',r:"un ingénieur logiciel senior avec 10+ ans d'expérience"},
    {p:/rédige|article|blog|texte|contenu|email|lettre|message|marketing|copywriting/i,l:'rédaction et communication',r:"un expert en copywriting et communication professionnelle"},
    {p:/analyse|données|dataset|statistiques?|rapport|bilan|métriques?|kpi|business|stratégie/i,l:'analyse et stratégie business',r:"un consultant stratégique senior"},
    {p:/image|photo|design|graphique|visuel|illustration|couleur|logo|ui|ux|maquette/i,l:'design et création visuelle',r:"un designer créatif senior avec expertise UI/UX"},
    {p:/traduis|traduction|langue|english|french|espagnol|allemand/i,l:'traduction et linguistique',r:"un traducteur professionnel expert en linguistique"},
    {p:/résume|résumé|synthèse|document|pdf|lecture|compréhension/i,l:"synthèse de contenu",r:"un analyste documentaire et expert en synthèse"},
    {p:/formation|apprentissage|cours|tutoriel|explique|enseigne|pédagogie/i,l:'formation et pédagogie',r:"un formateur expert avec expertise pédagogique"},
  ];
  function inferDomain(t){return DOMAINS.find(d=>d.p.test(t))||{l:'assistance généraliste',r:'un assistant IA expert et polyvalent'}}
  function extractMission(t){return t.trim().replace(/[.!?]+$/,'').split(/[.!?\n]/)[0].trim()}
  function getVagueTerms(t){return['bien','bon','bonne','correct','juste','intéressant','pertinent','approprié','possible','éventuellement','peut-être','good','nice','appropriate','suitable','maybe','perhaps'].filter(v=>new RegExp('\\b'+v+'\\b','i').test(t))}

  function transform(raw,lang='fr',targetProvider='universal'){
    const t=raw.trim();if(!t) return null;
    const chips=[],domain=inferDomain(t);
    const sections={};

    if(!hasRole(t)){sections.role=`Tu es ${domain.r}.`;chips.push({text:'+ Rôle ajouté',type:'added'})}
    else{sections.role=t.split(/\n/)[0].trim();if(!sections.role.toLowerCase().startsWith('tu ')&&!sections.role.toLowerCase().startsWith('you ')&&!sections.role.toLowerCase().startsWith('agis')){sections.role=`Tu es ${domain.r}.`;chips.push({text:'+ Rôle précisé',type:'mod'})}}

    if(!hasContext(t)){sections.context=`Domaine : ${domain.l}. Adapte ton niveau d'expertise à un professionnel averti.`;chips.push({text:'+ Contexte inféré',type:'added'})}
    else{sections.context=`Domaine : ${domain.l}. ${extractMission(t)}`}

    const mission=extractMission(t);
    if(!hasMission(t)){sections.mission=mission+'. Traite cette demande avec précision et rigueur.';chips.push({text:"⚠ Verbe d'action ajouté",type:'warn'})}
    else sections.mission=mission;

    const constr=[];
    if(!hasConstraints(t)){constr.push('Fournis uniquement des informations vérifiables et pertinentes.');constr.push('Évite toute redondance et remplissage textuel inutile.');chips.push({text:'+ Contraintes ajoutées',type:'added'})}
    else constr.push('Respecte strictement les contraintes mentionnées ci-dessus.');
    const vagueFound=getVagueTerms(t);
    if(vagueFound.length>0){constr.push(`Remplace les formulations vagues (${vagueFound.slice(0,3).join(', ')}) par des critères précis et mesurables.`);chips.push({text:`⚠ ${vagueFound.length} terme(s) vague(s)`,type:'warn'})}
    sections.constraints=constr.join('\n');

    if(!hasFormat(t)){sections.format='Réponds en Markdown structuré avec des sections claires. Utilise des listes à puces pour les éléments énumératifs. Sois direct et factuel.';chips.push({text:'+ Format spécifié',type:'added'})}
    else sections.format='Respecte le format demandé. Structure ta réponse de façon claire et lisible.';
    if(!hasLength(t)){sections.format+='\nLongueur : adaptée à la complexité de la demande.';chips.push({text:'+ Longueur précisée',type:'added'})}

    if(targetProvider&&targetProvider!=='universal') chips.push({text:`🎯 Format ${targetProvider}`,type:'target'});

    let raw_out;
    if(targetProvider==='claude'){
      raw_out=`<role>\n${sections.role}\n</role>\n\n<context>\n${sections.context}\n</context>\n\n<instructions>\n${sections.mission}\n</instructions>\n\n<constraints>\n${sections.constraints}\n</constraints>\n\n<output_format>\n${sections.format}\n</output_format>`;
    } else if(targetProvider==='openai'){
      raw_out=`--- SYSTEM ---\n${sections.role}\n\n--- USER ---\nContexte : ${sections.context}\n\nTâche : ${sections.mission}\n\nContraintes :\n${sections.constraints}\n\nFormat attendu :\n${sections.format}`;
    } else if(targetProvider==='gemini'){
      raw_out=`CONTEXT: ${sections.role} ${sections.context}\n\nTASK: ${sections.mission}\n\nDETAILS: ${sections.constraints}\n\nOUTPUT: ${sections.format}`;
    } else {
      raw_out=['# RÔLE\n'+sections.role,'# CONTEXTE\n'+sections.context,'# MISSION\n'+sections.mission,'# CONTRAINTES\n'+sections.constraints,'# FORMAT DE SORTIE\n'+sections.format].join('\n\n');
    }
    return{sections,chips,raw:raw_out};
  }
  return{transform};
})();

const AiEngine = (() => {
  async function callClaude(prompt,sys,model,key){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:2048,system:sys,messages:[{role:'user',content:`Améliore ce prompt :\n\n${prompt}`}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`)}
    const d=await r.json();return d.content[0].text;
  }
  async function callOpenAI(prompt,sys,model,key){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model,max_tokens:2048,messages:[{role:'system',content:sys},{role:'user',content:`Améliore ce prompt :\n\n${prompt}`}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`)}
    const d=await r.json();return d.choices[0].message.content;
  }
  async function callGemini(prompt,sys,model,key){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`${sys}\n\nAméliore ce prompt :\n\n${prompt}`}]}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`)}
    const d=await r.json();return d.candidates[0].content.parts[0].text;
  }

  function parseAiOutput(text){
    const sections={};
    // Try Markdown sections (#)
    const keyMap={'rôle':'role','role':'role','contexte':'context','context':'context','mission':'mission','contraintes':'constraints','constraints':'constraints','format de sortie':'format','output format':'format'};
    const parts=text.split(/^#\s+/m).filter(Boolean);
    for(const part of parts){const fl=part.split('\n')[0].trim().toLowerCase();const mk=Object.keys(keyMap).find(k=>fl.startsWith(k));if(mk){sections[keyMap[mk]]=part.replace(/^[^\n]+\n/,'').trim()}}
    if(Object.keys(sections).length>0) return{sections,raw:text};
    // Try XML tags (Claude format)
    const xmlMap={role:/^<role>([\s\S]*?)<\/role>/m,context:/<context>([\s\S]*?)<\/context>/m,mission:/(?:<instructions>|<mission>)([\s\S]*?)(?:<\/instructions>|<\/mission>)/m,constraints:/<constraints>([\s\S]*?)<\/constraints>/m,format:/<output_format>([\s\S]*?)<\/output_format>/m};
    let xc=0;for(const[k,rx] of Object.entries(xmlMap)){const m=text.match(rx);if(m){sections[k]=m[1].trim();xc++}}
    if(xc>0) return{sections,raw:text};
    // Try OpenAI system/user blocks
    const sm=text.match(/---\s*SYSTEM\s*---\s*([\s\S]*?)(?:---\s*USER\s*---)/i);
    const um=text.match(/---\s*USER\s*---\s*([\s\S]*?)$/i);
    if(sm&&um){sections.role=sm[1].trim();sections.mission=um[1].trim();return{sections,raw:text}}
    return{sections:null,raw:text};
  }

  async function transform(prompt,provider,lang='fr',targetProvider='universal'){
    const apiKey=ApiKeys.getKey(provider),model=ApiKeys.getModel(provider);
    if(!apiKey) throw new Error(`Clé API ${provider} manquante`);
    const sys=TemplateEngine.get(targetProvider,lang);
    let text;
    if(provider==='claude') text=await callClaude(prompt,sys,model,apiKey);
    else if(provider==='openai') text=await callOpenAI(prompt,sys,model,apiKey);
    else if(provider==='gemini') text=await callGemini(prompt,sys,model,apiKey);
    else throw new Error('Provider inconnu');
    return{...parseAiOutput(text),provider,model,targetProvider};
  }

  async function fetchTemplateGuidelines(targetProvider,lang){
    const provider=State.get().activeProvider;
    if(!ApiKeys.hasKey(provider)) throw new Error(`Clé API ${provider} manquante`);
    const apiKey=ApiKeys.getKey(provider),model=ApiKeys.getModel(provider);
    const fetchPrompt=TemplateEngine.buildFetchPrompt(targetProvider,lang);
    const universalSys=TemplateEngine.DEFAULTS.universal.system(lang);
    let text;
    if(provider==='claude') text=await callClaude(fetchPrompt,universalSys,model,apiKey);
    else if(provider==='openai') text=await callOpenAI(fetchPrompt,universalSys,model,apiKey);
    else if(provider==='gemini') text=await callGemini(fetchPrompt,universalSys,model,apiKey);
    return text;
  }

  return{transform,fetchTemplateGuidelines};
})();

const Renderer = (() => {
  const $=id=>document.getElementById(id);
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function setScore(barEl,valEl,wrapEl,score,label){
    const cls=Scorer.getClass(score);
    barEl.style.width=score+'%';barEl.className=`score-bar ${cls}`;
    valEl.textContent=score>0?score:'—';valEl.className=`score-val ${score>0?cls:''}`;
    if(wrapEl){wrapEl.setAttribute('aria-valuenow',score);wrapEl.setAttribute('aria-label',`Score ${label} : ${score}/100`)}
  }
  function renderSections(sections){

    return defs.map(({key,label})=>{
      const content=sections[key]||'';if(!content) return '';
