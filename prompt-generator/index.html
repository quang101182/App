const HistoryData = (() => {
  const MAX=20;
  function load(){return Store.read('history',[])}
  function save(h){Store.write('history',h)}
  function add(raw,scoreIn,scoreOut,sections,aiMode,targetProvider,outputRaw){
    const h=load();
    h.unshift({id:Date.now(),date:new Date().toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}),preview:raw.replace(/\s+/g,' ').trim().slice(0,80),raw,outputRaw:outputRaw||'',sections,scoreIn,scoreOut,aiMode:!!aiMode,targetProvider:targetProvider||'universal'});
    if(h.length>MAX) h.length=MAX;
    save(h);return h;
  }
  function remove(index){const h=load();h.splice(index,1);save(h);return h}
  function getAll(){return load()}
  function exportJson(){
    const h=load();
    const encoded='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(h,null,2));
    const a=document.createElement('a');
    a.href=encoded;
    a.download=`promptforge-history-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  return{add,remove,getAll,exportJson};
})();

const HistoryGestures = (() => {
  function removeEntry(index){
    const item=document.querySelector(`.history-item[data-index="${index}"]`);if(!item) return;
    item.classList.add('removing');
    setTimeout(()=>{
      const h=HistoryData.remove(index);State.set({history:h});Renderer.renderHistory(h);
      if(!h.length) document.getElementById('btn-export').disabled=true;
      Toast.show('Entrée supprimée','info');
    },300);
  }
  return{removeEntry};
})();

const Theme = (() => {
  function apply(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-icon').textContent=t==='dark'?'☽':'☀';document.getElementById('theme-label').textContent=t==='dark'?'DARK':'LIGHT';Store.write('theme',t)}
  function toggle(){apply(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}
  function init(){apply(Store.read('theme','dark'))}
  return{init,toggle};
})();

const TemplateModal = (() => {
  let curTarget='universal';

  function updateBadges(){
    ['universal','claude','openai','gemini'].forEach(t=>{
      const el=document.getElementById(`tpl-badge-${t}`);
      if(el) el.textContent=TemplateEngine.hasCustom(t)?'★':'';
    });
  }

  function loadTarget(target){
    curTarget=target;
    document.querySelectorAll('.tpl-tab').forEach(b=>b.classList.toggle('active',b.dataset.tpl===target));
    const custom=TemplateEngine.getCustom(target);
    const lang=State.get().lang;
    const def=TemplateEngine.DEFAULTS[target];
    document.getElementById('tpl-textarea').value=custom||(def?def.system(lang):'');
    document.getElementById('tpl-version-label').textContent=TemplateEngine.getVersion(target);
    const ind=document.getElementById('tpl-custom-indicator');
    ind.textContent=custom?'★ custom':'défaut';
    ind.style.color=custom?'var(--gold)':'var(--text-muted)';
    const source=TemplateEngine.getSource(target);
    document.getElementById('tpl-source-link').innerHTML=source?`Source : <a href="${source}" target="_blank" rel="noopener">${source}</a>`:'';
    document.getElementById('tpl-fetch-status').textContent='';
  }

  function init(){
    document.getElementById('btn-tpl-save').addEventListener('click',()=>{
      const text=document.getElementById('tpl-textarea').value.trim();
      if(!text){Toast.show('Template vide','error');return}
      TemplateEngine.saveCustom(curTarget,text);
      const ind=document.getElementById('tpl-custom-indicator');
      ind.textContent='★ custom';ind.style.color='var(--gold)';
      updateBadges();Toast.show(`Template ${curTarget} sauvegardé`,'success');
    });

    document.getElementById('btn-tpl-reset').addEventListener('click',()=>{
      TemplateEngine.resetCustom(curTarget);loadTarget(curTarget);updateBadges();
      Toast.show(`Template ${curTarget} réinitialisé`,'info');
    });

    document.getElementById('btn-tpl-fetch').addEventListener('click',async()=>{
      const btn=document.getElementById('btn-tpl-fetch'),status=document.getElementById('tpl-fetch-status');
      if(!ApiKeys.hasAnyKey()){Toast.show('Configurez une clé API d\'abord','error');return}
      btn.disabled=true;status.textContent='⏳ Interrogation de l\'IA…';status.style.color='#aa88ff';
      try{
        const result=await AiEngine.fetchTemplateGuidelines(curTarget,State.get().lang);
        document.getElementById('tpl-textarea').value=result;
        status.textContent='✓ Résultat reçu — vérifiez avant de sauvegarder';status.style.color='var(--accent)';
        Toast.show('Guidelines récupérées — validez avant sauvegarde','info');
      }catch(err){
        status.textContent=`✗ ${err.message.slice(0,60)}`;status.style.color='var(--warn)';
        Toast.show('Erreur : '+err.message.slice(0,40),'error');
      }finally{btn.disabled=false}
    });

    document.getElementById('modal-cancel-tpl').addEventListener('click',()=>{
      document.getElementById('modal-overlay').classList.remove('open');
    });

    document.getElementById('tpl-provider-tabs').addEventListener('click',e=>{
      const tab=e.target.closest('.tpl-tab');if(!tab) return;
      loadTarget(tab.dataset.tpl);
    });
  }

  function open(){updateBadges();loadTarget(curTarget)}
  return{init,open,updateBadges,loadTarget};
})();

const ApiModal = (() => {
  let cur='claude';

  function updateModels(p){
    const sel=document.getElementById('model-select');
    const models=ApiKeys.getProviders()[p].models,saved=ApiKeys.getModel(p);
    sel.innerHTML=models.map(m=>`<option value="${m.value}"${m.value===saved?' selected':''}>${m.label}</option>`).join('');
  }

  function switchModalTab(tab){
    document.querySelectorAll('.modal-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.modalTab===tab));
    document.getElementById('modal-tab-api').classList.toggle('active',tab==='api');
    document.getElementById('modal-tab-templates').classList.toggle('active',tab==='templates');
    if(tab==='templates') TemplateModal.open();
  }

  function open(tab='api'){
    cur=State.get().activeProvider;
    document.querySelectorAll('.provider-tab').forEach(t=>t.classList.toggle('active',t.dataset.provider===cur));
    document.getElementById('api-key-input').value=ApiKeys.getKey(cur);
    const prov=ApiKeys.getProviders()[cur];
    document.getElementById('provider-label').textContent=prov.label;
    document.getElementById('api-key-input').placeholder=prov.placeholder;
    document.getElementById('key-hint').textContent=prov.hint;
    updateModels(cur);
    document.getElementById('modal-overlay').classList.add('open');
    switchModalTab(tab);
    if(tab==='api') setTimeout(()=>document.getElementById('api-key-input').focus(),100);
  }

  function close(){document.getElementById('modal-overlay').classList.remove('open')}

  function save(){
    const key=document.getElementById('api-key-input').value.trim();
    const model=document.getElementById('model-select').value;
    ApiKeys.save(cur,key,model);State.set({activeProvider:cur});
    Renderer.updateApiButton(cur);close();
    Toast.show(key?`Clé ${cur} sauvegardée`:`Clé ${cur} effacée`,key?'success':'info');
    if(key&&State.get().mode==='local') Controller.setMode('ai');
  }

  function init(){
    TemplateModal.init();
    document.getElementById('btn-api-key').addEventListener('click',()=>open('api'));
    document.getElementById('modal-cancel').addEventListener('click',close);
    document.getElementById('modal-save').addEventListener('click',save);
    document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)close()});
    document.querySelectorAll('.modal-nav-btn').forEach(b=>b.addEventListener('click',()=>switchModalTab(b.dataset.modalTab)));
    document.getElementById('provider-tabs').addEventListener('click',e=>{
      const tab=e.target.closest('.provider-tab');if(!tab) return;
      cur=tab.dataset.provider;
      document.querySelectorAll('.provider-tab').forEach(t=>t.classList.toggle('active',t.dataset.provider===cur));
      const prov=ApiKeys.getProviders()[cur];
      document.getElementById('provider-label').textContent=prov.label;
      document.getElementById('api-key-input').value=ApiKeys.getKey(cur);
      document.getElementById('api-key-input').placeholder=prov.placeholder;
      document.getElementById('key-hint').textContent=prov.hint;
      updateModels(cur);
    });
    document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')close()});
  }
  return{init,open};
})();

const Controller = (() => {
  let _debounce=null;

  async function runForge(promptText){
    const mode=State.get().mode,lang=State.get().lang,targetProvider=State.get().targetProvider;
    const scoreIn=Scorer.score(promptText);
    State.set({loading:true});Renderer.setLoading(true);

    if(mode==='ai'){
      const provider=State.get().activeProvider;
      if(!ApiKeys.hasKey(provider)){Toast.show(`Clé API ${provider} manquante`,'error');Renderer.setStatus('Clé API manquante','error');Renderer.setLoading(false);State.set({loading:false});return}
      Renderer.setStatus(`Amélioration via ${provider} → cible ${targetProvider}…`,'ai');
      try{
        const aiResult=await AiEngine.transform(promptText,provider,lang,targetProvider);
        const scoreOut=Scorer.score(aiResult.raw);
        const targetChip=targetProvider!=='universal'?[{text:`🎯 ${targetProvider}`,type:'target'}]:[];
        const chips=[...targetChip,{text:`⚡ ${provider} / ${aiResult.model?.split('/').pop()||aiResult.model}`,type:'ai'},{text:'+ Optimisé par LLM',type:'added'}];
        const sections=aiResult.sections||null;
        const history=HistoryData.add(promptText,scoreIn,scoreOut,sections,true,targetProvider,aiResult.raw);
        State.set({inputValue:promptText,outputRaw:aiResult.raw,outputSections:sections,scoreIn,scoreOut,chips,loading:false,history});
        _applyResults(scoreIn,scoreOut,sections,aiResult.raw,chips,promptText,true);
        Renderer.setStatus(`IA (${provider}) → ${targetProvider} — score : ${scoreIn} → ${scoreOut}`,'ai');
        Toast.show(`IA — Score : ${scoreIn} → ${scoreOut}`,'success');
      }catch(err){
        Renderer.setLoading(false);Renderer.setStatus(`Erreur : ${err.message.slice(0,60)}`,'error');
        Toast.show('Erreur API : '+err.message.slice(0,60),'error');State.set({loading:false});
      }
    }else{
      Renderer.setStatus('Analyse locale…','active');
      await new Promise(r=>setTimeout(r,350));
      const result=LocalEngine.transform(promptText,lang,targetProvider);
      const scoreOut=result?Scorer.score(result.raw):0;
      const history=HistoryData.add(promptText,scoreIn,scoreOut,result?result.sections:null,false,targetProvider,result?result.raw:'');
      State.set({inputValue:promptText,outputRaw:result?result.raw:'',outputSections:result?result.sections:null,scoreIn,scoreOut,chips:result?result.chips:[],loading:false,history});
      _applyResults(scoreIn,scoreOut,result?result.sections:null,result?result.raw:null,result?result.chips:[],promptText,false);
      Renderer.setStatus(`Local → ${targetProvider} — score : ${scoreIn} → ${scoreOut}`,'active');
      Toast.show(`Score : ${scoreIn} → ${scoreOut} (+${scoreOut-scoreIn})`,'success');
    }
  }

  function _applyResults(scoreIn,scoreOut,sections,outputRaw,chips,inputRaw,aiMode){
    Renderer.setScore(document.getElementById('score-in-bar'),document.getElementById('score-in-val'),document.getElementById('score-in-bar-wrap'),scoreIn,'original');
    Renderer.setScore(document.getElementById('score-out-bar'),document.getElementById('score-out-val'),document.getElementById('score-out-bar-wrap'),scoreOut,'amélioré');
    const tab=State.get().outputTab;
    Renderer.renderOutput(sections,sections?null:outputRaw,tab,inputRaw,outputRaw);
    Renderer.renderChips(chips);Renderer.renderHistory(State.get().history);Renderer.setLoading(false);
    Renderer.updateOutCharCount(outputRaw);
    document.getElementById('btn-copy').disabled=!outputRaw;
    document.getElementById('btn-share').disabled=!outputRaw;
    document.getElementById('btn-txt').disabled=!outputRaw;
    document.getElementById('btn-export').disabled=!State.get().history.length;
    document.getElementById('btn-iterate').disabled=!outputRaw;
  }

  async function forge(){
    const raw=document.getElementById('input-prompt').value;
    if(!raw.trim()){Toast.show('Saisissez un prompt','error');Renderer.setStatus('Erreur : prompt vide','error');return}
    await runForge(raw);
  }

  async function iterate(){
    const outputRaw=State.get().outputRaw;if(!outputRaw) return;
    const mode=State.get().mode;
    if(mode!=='ai'||!ApiKeys.hasKey(State.get().activeProvider)){Toast.show('Itération disponible en mode IA uniquement','error');return}
    document.getElementById('input-prompt').value=outputRaw;Renderer.updateCharCount(outputRaw.length);
    await runForge(outputRaw);
  }

  async function copy(){
    const raw=State.get().outputRaw;if(!raw) return;
    try{
      if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(raw);
      else{const ta=document.createElement('textarea');ta.value=raw;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta)}
      Renderer.setCopyState(true);Toast.show('Copié dans le presse-papier','success');
    }catch{Toast.show('Échec copie','error')}
  }

  async function sharePrompt(){
    const raw=State.get().outputRaw;if(!raw) return;
    if(navigator.share){
      try{
        await navigator.share({title:'Prompt optimisé',text:raw});
        Toast.show('Partagé','success');
      }catch(e){
        if(e.name!=='AbortError') Toast.show('Erreur partage : '+e.message.slice(0,40),'error');
      }
    } else {
      // Fallback clipboard
      try{
        if(navigator.clipboard&&window.isSecureContext) await navigator.clipboard.writeText(raw);
        else{const ta=document.createElement('textarea');ta.value=raw;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta)}
        Toast.show('Partage non supporté — copié dans le presse-papier','info');
      }catch{Toast.show('Échec','error')}
    }
  }

  function exportTxt(){
    const raw=State.get().outputRaw;if(!raw) return;
    const encoded='data:text/plain;charset=utf-8,'+encodeURIComponent(raw);
    const a=document.createElement('a');
    a.href=encoded;
    a.download=`prompt-${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    Toast.show('Fichier TXT téléchargé','success');
  }

  function importJson(){
    document.getElementById('file-import').click();
  }

  function handleImport(e){
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error('Format invalide');
        // Validate entries have required fields
        const valid=data.filter(entry=>entry.raw&&entry.date&&typeof entry.scoreOut==='number');
        if(!valid.length) throw new Error('Aucune entrée valide');
        Store.write('history',valid.slice(0,20));
        const history=HistoryData.getAll();
        State.set({history});Renderer.renderHistory(history);
        document.getElementById('btn-export').disabled=!history.length;
        Toast.show(`${valid.length} entrée(s) importée(s)`,'success');
      }catch(err){
        Toast.show('Import échoué : '+err.message.slice(0,40),'error');
      }finally{
        e.target.value=''; // reset input for re-import
      }
    };
    reader.readAsText(file);
  }

  function clear(){
    document.getElementById('input-prompt').value='';
    Renderer.setScore(document.getElementById('score-in-bar'),document.getElementById('score-in-val'),document.getElementById('score-in-bar-wrap'),0,'original');
    Renderer.setScore(document.getElementById('score-out-bar'),document.getElementById('score-out-val'),document.getElementById('score-out-bar-wrap'),0,'amélioré');
    Renderer.renderOutput(null,null,'result',null,null);Renderer.renderChips([]);
    Renderer.updateCharCount(0);Renderer.updateOutCharCount(null);Renderer.setStatus('Prêt');
    document.getElementById('btn-copy').disabled=true;document.getElementById('btn-share').disabled=true;document.getElementById('btn-txt').disabled=true;document.getElementById('btn-iterate').disabled=true;
    State.set({inputValue:'',outputRaw:'',outputSections:null,scoreIn:0,scoreOut:0,chips:[]});
  }

  function loadHistoryEntry(index){
    const h=State.get().history;if(index<0||index>=h.length) return;
    const entry=h[index];
    document.getElementById('input-prompt').value=entry.raw;Renderer.updateCharCount(entry.raw.length);
    const scoreIn=entry.scoreIn||Scorer.score(entry.raw);
    Renderer.setScore(document.getElementById('score-in-bar'),document.getElementById('score-in-val'),document.getElementById('score-in-bar-wrap'),scoreIn,'original');
    Renderer.setScore(document.getElementById('score-out-bar'),document.getElementById('score-out-val'),document.getElementById('score-out-bar-wrap'),entry.scoreOut,'amélioré');
    const tab=State.get().outputTab;
    const entryOutput=(entry.outputRaw!==undefined&&entry.outputRaw!=='')?entry.outputRaw:null;
    if(entry.sections||entryOutput){
      Renderer.renderOutput(entry.sections,entry.sections?null:(entryOutput||''),tab,entry.raw,entryOutput||'');
      State.set({inputValue:entry.raw,outputRaw:entryOutput||'',outputSections:entry.sections,scoreIn,scoreOut:entry.scoreOut});
      const hasOutput=!!(entryOutput);
      document.getElementById('btn-copy').disabled=!hasOutput;
      document.getElementById('btn-share').disabled=!hasOutput;
      document.getElementById('btn-txt').disabled=!hasOutput;
      document.getElementById('btn-iterate').disabled=false;
      Renderer.updateOutCharCount(entryOutput||'');
    }
    if(entry.targetProvider){State.set({targetProvider:entry.targetProvider});Renderer.updateTargetUI(entry.targetProvider)}
    Renderer.setStatus(`Historique chargé — ${entry.date}${entry.aiMode?' (IA)':''}${entry.targetProvider&&entry.targetProvider!=='universal'?' → '+entry.targetProvider:''}`);
    Toast.show('Entrée chargée','info');
  }

  function setMode(mode){State.set({mode});Renderer.updateModeUI(mode);if(mode==='ai'&&!ApiKeys.hasAnyKey()) Toast.show('Configurez une clé API via le bouton API','info')}
  function setLang(lang){State.set({lang});Renderer.updateLangUI(lang);Store.write('lang',lang)}
  function setOutputTab(tab){State.set({outputTab:tab});Renderer.updateOutputTab(tab);const s=State.get();Renderer.renderOutput(s.outputSections,s.outputSections?null:s.outputRaw,tab,s.inputValue,s.outputRaw)}
  function setTarget(target){State.set({targetProvider:target});Renderer.updateTargetUI(target);Store.write('targetProvider',target)}

  function init(){
    Theme.init();ApiModal.init();

    const savedLang=Store.read('lang','fr');State.set({lang:savedLang});Renderer.updateLangUI(savedLang);
    const savedTarget=Store.read('targetProvider','universal');State.set({targetProvider:savedTarget});Renderer.updateTargetUI(savedTarget);

    const history=HistoryData.getAll();State.set({history});Renderer.renderHistory(history);
    document.getElementById('btn-export').disabled=!history.length;

    if(ApiKeys.hasAnyKey()){const p=ApiKeys.firstKeyProvider();State.set({activeProvider:p,mode:'ai'});Renderer.updateModeUI('ai');Renderer.updateApiButton(p)}
    else{Renderer.updateModeUI('local');Renderer.updateApiButton()}

    document.getElementById('btn-forge').addEventListener('click',forge);
    document.getElementById('btn-copy').addEventListener('click',copy);
    document.getElementById('btn-share').addEventListener('click',sharePrompt);
    document.getElementById('btn-txt').addEventListener('click',exportTxt);
    document.getElementById('btn-clear').addEventListener('click',clear);
    document.getElementById('btn-export').addEventListener('click',HistoryData.exportJson);
    document.getElementById('btn-import').addEventListener('click',importJson);
    document.getElementById('file-import').addEventListener('change',handleImport);
    document.getElementById('btn-iterate').addEventListener('click',iterate);
    document.getElementById('theme-toggle').addEventListener('click',Theme.toggle);
    document.getElementById('mode-local').addEventListener('click',()=>setMode('local'));
    document.getElementById('mode-ai').addEventListener('click',()=>setMode('ai'));
    document.getElementById('tab-result').addEventListener('click',()=>setOutputTab('result'));
    document.getElementById('tab-diff').addEventListener('click',()=>setOutputTab('diff'));
    document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
    document.getElementById('target-switch').addEventListener('click',e=>{const btn=e.target.closest('.target-btn');if(!btn) return;setTarget(btn.dataset.target)});

    document.getElementById('input-prompt').addEventListener('input',e=>{
      const v=e.target.value;Renderer.updateCharCount(v.length);
      clearTimeout(_debounce);
      _debounce=setTimeout(()=>{if(v.trim().length>3){const s=Scorer.score(v);Renderer.setScore(document.getElementById('score-in-bar'),document.getElementById('score-in-val'),document.getElementById('score-in-bar-wrap'),s,'original')}},250);
    });
    document.getElementById('input-prompt').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();forge()}});
  }

  return{init,loadHistoryEntry,setMode};
})();

document.addEventListener('DOMContentLoaded',Controller.init);
</script>
