<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptForge — AI Prompt Engineering</title>
<meta name="description" content="Analyse et améliore vos prompts IA en temps réel">

<!-- ============================================================
  STYLES — Variables + Reset + Layout + Components + Responsive
  ============================================================ -->
<style>
/* ── 1. CUSTOM PROPERTIES ── */
:root {
  /* Typography */
  --font-display: 'Courier New', 'Courier', monospace;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-mono: 'Courier New', monospace;

  /* Scale 4px/8px */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px;

  --radius-sm: 2px; --radius-md: 4px; --radius-lg: 8px;
  --transition: 200ms cubic-bezier(.4,0,.2,1);
  --transition-slow: 400ms cubic-bezier(.4,0,.2,1);
}

/* ── DARK THEME (default) ── */
[data-theme="dark"] {
  --bg-base:    #0a0a0f;
  --bg-surface: #111118;
  --bg-raised:  #1a1a24;
  --bg-overlay: #22222e;
  --border:     #2a2a3a;
  --border-accent: #3d3d55;

  --text-primary:   #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted:     #555570;

  --accent:       #00d4aa;
  --accent-dim:   #00d4aa22;
  --accent-hover: #00ffcc;
  --warn:         #ff6b6b;
  --warn-dim:     #ff6b6b22;
  --gold:         #ffd700;
  --gold-dim:     #ffd70022;

  --score-low:  #ff4444;
  --score-mid:  #ff9944;
  --score-high: #44dd88;

  --shadow-sm: 0 1px 3px #00000066;
  --shadow-md: 0 4px 16px #00000088;
  --shadow-lg: 0 8px 32px #000000aa;
  --shadow-accent: 0 0 24px #00d4aa33;
  --shadow-glow:   0 0 8px #00d4aa55;
}

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg-base:    #f4f3ef;
  --bg-surface: #faf9f6;
  --bg-raised:  #ffffff;
  --bg-overlay: #f0ede6;
  --border:     #ddd8ce;
  --border-accent: #c4bdb0;

  --text-primary:   #1a1714;
  --text-secondary: #6b6358;
  --text-muted:     #a89f94;

  --accent:       #1a6b5a;
  --accent-dim:   #1a6b5a18;
  --accent-hover: #0d4d40;
  --warn:         #c0392b;
  --warn-dim:     #c0392b18;
  --gold:         #b8860b;
  --gold-dim:     #b8860b18;

  --score-low:  #c0392b;
  --score-mid:  #d4680a;
  --score-high: #1a7a3e;

  --shadow-sm: 0 1px 3px #0000001a;
  --shadow-md: 0 4px 16px #00000022;
  --shadow-lg: 0 8px 32px #00000033;
  --shadow-accent: 0 0 24px #1a6b5a22;
  --shadow-glow:   0 0 8px #1a6b5a44;
}

/* ── 2. RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  transition: background var(--transition-slow), color var(--transition-slow);
  overflow-x: hidden;
}
::selection { background: var(--accent); color: var(--bg-base); }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ── 3. GRID TEXTURE BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
  transition: opacity var(--transition-slow);
}

/* ── 4. LAYOUT ── */
.app {
  position: relative; z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: var(--sp-6) var(--sp-4);
  display: grid;
  gap: var(--sp-6);
}

/* ── 5. HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) 0 var(--sp-4);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.logo span { color: var(--text-muted); font-weight: 400; }
.header-controls { display: flex; align-items: center; gap: var(--sp-3); }

/* ── 6. THEME TOGGLE ── */
.theme-toggle {
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: var(--sp-1) var(--sp-2);
  cursor: pointer;
  display: flex; align-items: center; gap: var(--sp-2);
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  transition: all var(--transition);
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
.theme-toggle .toggle-icon { font-size: 1rem; }

/* ── 7. MAIN GRID ── */
.workspace {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4);
  align-items: start;
}
@media (max-width: 720px) { .workspace { grid-template-columns: 1fr; } }

/* ── 8. PANELS ── */
.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.panel:focus-within { border-color: var(--accent); box-shadow: var(--shadow-accent); }

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.panel-badge {
  font-family: var(--font-display);
  font-size: 0.6rem;
  padding: 2px var(--sp-2);
  border-radius: var(--radius-sm);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.badge-input  { background: var(--gold-dim);   color: var(--gold); border: 1px solid var(--gold); opacity: 0.7; }
.badge-output { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }

/* ── 9. SCORE DISPLAY ── */
.score-row {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  background: var(--bg-overlay);
  border-bottom: 1px solid var(--border);
}
.score-label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  min-width: 60px;
}
.score-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--bg-base);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar {
  height: 100%;
  border-radius: 2px;
  transition: width var(--transition-slow), background var(--transition-slow);
  width: 0%;
}
.score-val {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  min-width: 32px;
  text-align: right;
}

/* Score color helpers set via JS */
.score-bar.low, .score-val.low { background: var(--score-low); color: var(--score-low); }
.score-bar.mid, .score-val.mid { background: var(--score-mid); color: var(--score-mid); }
.score-bar.high,.score-val.high{ background: var(--score-high); color: var(--score-high); }

/* ── 10. TEXTAREA ── */
.textarea {
  width: 100%;
  min-height: 220px;
  padding: var(--sp-4);
  background: transparent;
  color: var(--text-primary);
  border: none;
  outline: none;
  resize: vertical;
  font-family: var(--font-mono);
  font-size: 0.875rem;
  line-height: 1.7;
  display: block;
}
.textarea::placeholder { color: var(--text-muted); font-style: italic; }
.output-area {
  min-height: 220px;
  padding: var(--sp-4);
  font-family: var(--font-mono);
  font-size: 0.875rem;
  line-height: 1.7;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
}
.output-area.empty { color: var(--text-muted); font-style: italic; }

/* Output formatting */
.out-section {
  display: block;
  margin-bottom: var(--sp-4);
}
.out-tag {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--accent-dim);
  padding-bottom: 2px;
  margin-bottom: var(--sp-2);
  display: block;
}
.out-content { color: var(--text-primary); }
.out-highlight {
  background: var(--accent-dim);
  border-left: 2px solid var(--accent);
  padding: var(--sp-2) var(--sp-3);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-top: var(--sp-2);
  display: block;
}
.improvement-tag {
  display: inline-block;
  font-family: var(--font-display);
  font-size: 0.55rem;
  padding: 1px var(--sp-2);
  border-radius: var(--radius-sm);
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: var(--sp-1);
  vertical-align: middle;
}

/* ── 11. PANEL FOOTER / CHAR COUNT ── */
.panel-footer {
  padding: var(--sp-2) var(--sp-4);
  background: var(--bg-overlay);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.char-count {
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
.char-count.warn { color: var(--warn); }

/* ── 12. ACTIONS ROW ── */
.actions {
  display: flex;
  gap: var(--sp-3);
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
}

/* ── 13. BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: var(--sp-3) var(--sp-5);
  border: 1px solid;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  user-select: none;
}
.btn:disabled {
  opacity: 0.4; cursor: not-allowed;
  transform: none !important; box-shadow: none !important;
}
.btn:not(:disabled):hover { transform: translateY(-1px); }
.btn:not(:disabled):active { transform: translateY(0); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg-base);
  box-shadow: var(--shadow-glow);
}
.btn-primary:not(:disabled):hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
  box-shadow: var(--shadow-accent);
}

.btn-secondary {
  background: transparent;
  border-color: var(--border-accent);
  color: var(--text-secondary);
}
.btn-secondary:not(:disabled):hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-ghost:not(:disabled):hover {
  border-color: var(--border-accent);
  color: var(--text-secondary);
}

/* Btn icon */
.btn-icon { font-size: 1rem; line-height: 1; }

/* ── 14. SPINNER ── */
.spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid var(--bg-base);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.loading .spinner { display: block; }
.loading .btn-label { opacity: 0.7; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── 15. IMPROVEMENTS CHIPS ── */
.improvements-row {
  padding: var(--sp-2) var(--sp-4);
  display: flex; flex-wrap: wrap; gap: var(--sp-1);
  border-top: 1px solid var(--border);
  background: var(--bg-overlay);
  min-height: 36px;
  align-items: center;
}
.chip {
  font-family: var(--font-display);
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px var(--sp-2);
  border-radius: 20px;
  border: 1px solid;
  animation: fadeIn 0.2s ease;
}
.chip-added  { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.chip-mod    { background: var(--gold-dim);   color: var(--gold);   border-color: var(--gold); }
.chip-warn   { background: var(--warn-dim);   color: var(--warn);   border-color: var(--warn); }

/* ── 16. HISTORY PANEL ── */
.history-section {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.history-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.history-count {
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--text-muted);
}
.history-list {
  list-style: none;
  max-height: 260px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-accent) transparent;
}
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 2px; }
.history-item {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  animation: slideIn 0.2s ease;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--bg-raised); }
.history-meta {
  display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
}
.history-date {
  font-family: var(--font-display);
  font-size: 0.55rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.history-preview {
  font-size: 0.8rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-score {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  min-width: 28px;
  text-align: right;
}
.history-empty {
  padding: var(--sp-8) var(--sp-4);
  text-align: center;
  font-family: var(--font-display);
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── 17. TOAST ── */
#toast-container {
  position: fixed;
  bottom: var(--sp-6);
  right: var(--sp-6);
  z-index: 9999;
  display: flex; flex-direction: column; gap: var(--sp-2);
  pointer-events: none;
}
.toast {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--radius-md);
  border: 1px solid;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.25s ease, toastOut 0.25s ease 2s forwards;
  pointer-events: none;
  backdrop-filter: blur(8px);
}
.toast-success { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.toast-error   { background: var(--warn-dim);   border-color: var(--warn);   color: var(--warn); }
.toast-info    { background: var(--bg-overlay);  border-color: var(--border-accent); color: var(--text-secondary); }

@keyframes toastIn  { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes slideIn  { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

/* ── 18. COPY BTN FEEDBACK ── */
.copy-success .btn-icon::after { content: '✓'; }
.copy-success .btn-icon { color: var(--accent); }

/* ── 19. STATUS LINE ── */
.status-line {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  transition: background var(--transition);
}
.status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.error  { background: var(--warn); }

/* ── 20. RESPONSIVE ── */
@media (max-width: 480px) {
  .app { padding: var(--sp-4) var(--sp-3); }
  .actions { flex-direction: column; align-items: stretch; }
  .btn { justify-content: center; }
  #toast-container { bottom: var(--sp-3); right: var(--sp-3); left: var(--sp-3); }
}
</style>
</head>
<body>

<!-- ============================================================
  MARKUP — Header + Workspace + History + Toast
  ============================================================ -->
<div class="app" role="main">

  <!-- ── HEADER ── -->
  <header class="header" role="banner">
    <div class="logo" aria-label="PromptForge">
      PROMPT<span>FORGE</span>
    </div>
    <div class="header-controls">
      <button
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Basculer thème clair/sombre"
        title="Basculer thème"
      >
        <span class="toggle-icon" aria-hidden="true" id="theme-icon">☽</span>
        <span id="theme-label">DARK</span>
      </button>
    </div>
  </header>

  <!-- ── WORKSPACE ── -->
  <section class="workspace" aria-label="Éditeur de prompts">

    <!-- INPUT PANEL -->
    <article class="panel" aria-labelledby="input-title">
      <div class="panel-header">
        <span class="panel-title" id="input-title">Prompt original</span>
        <span class="panel-badge badge-input" aria-hidden="true">BRUT</span>
      </div>
      <div class="score-row" aria-live="polite" aria-label="Score du prompt original">
        <span class="score-label">Score</span>
        <div class="score-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="score-in-bar-wrap">
          <div class="score-bar" id="score-in-bar"></div>
        </div>
        <span class="score-val" id="score-in-val">—</span>
      </div>
      <textarea
        class="textarea"
        id="input-prompt"
        placeholder="Saisissez votre prompt ici…&#10;&#10;Ex: Résume ce texte en bullet points"
        aria-label="Prompt original à améliorer"
        aria-describedby="char-count-in"
        maxlength="8000"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <div class="panel-footer">
        <span class="char-count" id="char-count-in" aria-live="polite">0 / 8000</span>
      </div>
    </article>

    <!-- OUTPUT PANEL -->
    <article class="panel" aria-labelledby="output-title">
      <div class="panel-header">
        <span class="panel-title" id="output-title">Prompt amélioré</span>
        <span class="panel-badge badge-output" aria-hidden="true">FORGE</span>
      </div>
      <div class="score-row" aria-live="polite" aria-label="Score du prompt amélioré">
        <span class="score-label">Score</span>
        <div class="score-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="score-out-bar-wrap">
          <div class="score-bar" id="score-out-bar"></div>
        </div>
        <span class="score-val" id="score-out-val">—</span>
      </div>
      <div
        class="output-area empty"
        id="output-area"
        role="region"
        aria-label="Résultat du prompt amélioré"
        aria-live="polite"
        tabindex="0"
      >Résultat affiché ici…</div>
      <div class="improvements-row" id="chips-row" aria-label="Améliorations appliquées"></div>
    </article>
  </section>

  <!-- ── ACTIONS ── -->
  <div class="actions" role="toolbar" aria-label="Actions principales">
    <button class="btn btn-primary" id="btn-forge" aria-describedby="status-text">
      <span class="spinner" aria-hidden="true"></span>
      <span class="btn-icon" aria-hidden="true">⚡</span>
      <span class="btn-label">Forger le prompt</span>
    </button>
    <button class="btn btn-secondary" id="btn-copy" disabled aria-label="Copier le prompt amélioré">
      <span class="btn-icon" id="copy-icon" aria-hidden="true">⎘</span>
      <span class="btn-label">Copier</span>
    </button>
    <button class="btn btn-ghost" id="btn-clear" aria-label="Effacer les champs">
      <span class="btn-icon" aria-hidden="true">✕</span>
      <span class="btn-label">Effacer</span>
    </button>
  </div>

  <!-- STATUS LINE -->
  <div class="status-line" role="status" aria-live="polite">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Prêt</span>
  </div>

  <!-- ── HISTORY ── -->
  <section class="history-section" aria-labelledby="history-title">
    <div class="history-header">
      <span class="history-title" id="history-title">Historique</span>
      <span class="history-count" id="history-count" aria-live="polite">0 / 20</span>
    </div>
    <ul class="history-list" id="history-list" aria-label="Historique des prompts améliorés">
      <li class="history-empty" id="history-empty">Aucun historique</li>
    </ul>
  </section>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container" role="status" aria-live="assertive" aria-atomic="true"></div>

<!-- ============================================================
  JAVASCRIPT — State + Engine + Renderer + UI + Events
  ============================================================ -->
<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   1. STATE MODULE
   Single source of truth, never mutate directly outside setState
   ══════════════════════════════════════════════════════════════ */
const State = (() => {
  const _state = {
    theme: 'dark',
    inputValue: '',
    outputRaw: '',
    outputSections: null,
    scoreIn: 0,
    scoreOut: 0,
    chips: [],
    loading: false,
    history: [],
    copyTimeout: null,
  };

  const _listeners = new Set();

  function get() { return { ..._state }; }

  function set(partial) {
    Object.assign(_state, partial);
    _listeners.forEach(fn => fn(_state));
  }

  function subscribe(fn) { _listeners.add(fn); }

  return { get, set, subscribe };
})();

/* ══════════════════════════════════════════════════════════════
   2. STORAGE MODULE
   LocalStorage wrapper with error handling and size guard
   ══════════════════════════════════════════════════════════════ */
const Store = (() => {
  const PREFIX = 'promptforge_';

  function read(key, fallback = null) {
    try {
      const raw = localStorage.getItem(PREFIX + key);
      return raw !== null ? JSON.parse(raw) : fallback;
    } catch { return fallback; }
  }

  function write(key, value) {
    try {
      localStorage.setItem(PREFIX + key, JSON.stringify(value));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        Toast.show('Stockage local saturé — historique non sauvegardé', 'error');
      }
    }
  }

  return { read, write };
})();

/* ══════════════════════════════════════════════════════════════
   3. PROMPT SCORING ENGINE
   Returns 0-100 score based on structural & semantic criteria
   ══════════════════════════════════════════════════════════════ */
const Scorer = (() => {
  const WEIGHTS = {
    hasRole:        20,  // Persona/rôle explicite
    hasContext:     15,  // Contexte ou situation
    hasMission:     15,  // Verbe d'action clair
    hasConstraints: 10,  // Contraintes / limites
    hasFormat:      10,  // Format de sortie demandé
    hasLength:       5,  // Indication de longueur
    complexity:     10,  // Longueur / richesse
    noVague:        10,  // Absence de termes vagues
    hasExamples:     5,  // Présence d'exemples
  };

  const ROLE_PATTERNS = [
    /tu es (un|une|le|la|l')/i,
    /agis (en tant que|comme)/i,
    /en tant qu['e]/i,
    /you are (a|an|the)/i,
    /act as/i,
    /je suis/i,
    /persona/i,
    /expert/i,
    /spécialiste/i,
  ];

  const CONTEXT_PATTERNS = [
    /contexte/i, /situation/i, /cadre/i, /contextuellement/i,
    /dans le cadre/i, /pour (un|une|mon|ma|notre)/i,
    /j'ai besoin/i, /objectif/i, /but /i, /background/i,
  ];

  const MISSION_VERBS = [
    /^(génère|génerer|crée|créer|écris|écrire|analyse|analyser|résume|résumer|explique|expliquer|liste|lister|compare|comparer|traduis|traduire|rédige|rédiger|produis|produire|fournis|fournir|identifie|identifier|développe|développer|propose|proposer|décris|décrire)/im,
    /(génère|crée|écris|analyse|résume|explique|liste|compare|traduis|rédige|identifie|développe|propose|décris)/i,
  ];

  const CONSTRAINT_PATTERNS = [
    /sans /i, /ne pas/i, /évite/i, /exclure/i, /uniquement/i,
    /seulement/i, /maximum/i, /minimum/i, /limité/i, /contraint/i,
    /do not/i, /avoid/i, /only/i, /must not/i, /except/i,
  ];

  const FORMAT_PATTERNS = [
    /en (liste|tableau|json|markdown|html|bullet|points|format)/i,
    /format(te)?/i, /structure/i, /template/i, /mise en forme/i,
    /bullet points/i, /numéroté/i, /csv/i, /xml/i, /yaml/i,
  ];

  const LENGTH_PATTERNS = [
    /\d+ (mots?|lignes?|paragraphes?|pages?|caractères?)/i,
    /court|bref|concis|détaillé|exhaustif|complet/i,
    /\d+ words?|\d+ lines?/i,
  ];

  const VAGUE_TERMS = [
    /\b(bien|bon|bonne|correct|correcte|juste|intéressant|pertinent|approprié|adéquat|possible|éventuellement|peut-être|etc\.?|et ainsi de suite)\b/gi,
    /\b(good|nice|appropriate|decent|suitable|somewhat|maybe|perhaps|etc\.?)\b/gi,
  ];

  const EXAMPLE_PATTERNS = [
    /par exemple/i, /exemple/i, /comme/i, /tel que/i, /e\.g\./i,
    /for example/i, /such as/i, /for instance/i,
  ];

  function score(text) {
    if (!text || !text.trim()) return 0;
    const t = text.trim();
    let total = 0;

    // hasRole
    if (ROLE_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasRole;

    // hasContext
    if (CONTEXT_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasContext;

    // hasMission
    if (MISSION_VERBS.some(p => p.test(t))) total += WEIGHTS.hasMission;

    // hasConstraints
    if (CONSTRAINT_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasConstraints;

    // hasFormat
    if (FORMAT_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasFormat;

    // hasLength
    if (LENGTH_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasLength;

    // complexity: len bonus
    const words = t.split(/\s+/).length;
    if (words >= 20) total += WEIGHTS.complexity;
    else if (words >= 10) total += Math.round(WEIGHTS.complexity * (words / 20));

    // noVague
    const vagueMatches = VAGUE_TERMS.reduce((acc, p) => acc + (t.match(p) || []).length, 0);
    if (vagueMatches === 0) total += WEIGHTS.noVague;
    else if (vagueMatches === 1) total += Math.round(WEIGHTS.noVague * 0.5);

    // hasExamples
    if (EXAMPLE_PATTERNS.some(p => p.test(t))) total += WEIGHTS.hasExamples;

    return Math.min(100, total);
  }

  function getClass(score) {
    if (score >= 65) return 'high';
    if (score >= 35) return 'mid';
    return 'low';
  }

  return { score, getClass };
})();

/* ══════════════════════════════════════════════════════════════
   4. PROMPT IMPROVEMENT ENGINE
   Rule-based transformer, returns { sections, chips, raw }
   ══════════════════════════════════════════════════════════════ */
const Engine = (() => {

  // ── Détection helpers ──
  function hasRole(t) {
    return /tu es (un|une|le|la|l')|agis (en tant que|comme)|en tant qu'|you are (a|an|the)|act as|expert|spécialiste/i.test(t);
  }
  function hasMission(t) {
    return /(génère|crée|écris|analyse|résume|explique|liste|compare|traduis|rédige|identifie|développe|propose|décris|generate|create|write|analyze|summarize|explain|list|compare|translate)/i.test(t);
  }
  function hasContext(t) {
    return /contexte|situation|cadre|objectif|background|pour (un|une|mon|ma|notre)|dans le cadre/i.test(t);
  }
  function hasFormat(t) {
    return /format|liste|tableau|json|markdown|html|bullet|structure|numéroté|csv|xml|yaml/i.test(t);
  }
  function hasConstraints(t) {
    return /sans |ne pas|évite|uniquement|seulement|maximum|minimum|limité|do not|avoid|only|must not|except/i.test(t);
  }
  function hasLength(t) {
    return /\d+ (mots?|lignes?|paragraphes?|pages?|caractères?)|court|bref|concis|détaillé|exhaustif|\d+ words?/i.test(t);
  }

  // ── Infer domain from text ──
  function inferDomain(t) {
    const domains = [
      { pattern: /code|programm|python|javascript|java|sql|api|debug|fonction|class|script|développ|software/i, label: 'développement logiciel' },
      { pattern: /rédige|article|blog|texte|contenu|email|lettre|message|marketing|copywriting|communication/i, label: 'rédaction et communication' },
      { pattern: /analyse|données|dataset|statistiques?|rapport|bilan|métriques?|kpi|business|stratégie/i, label: 'analyse et stratégie business' },
      { pattern: /image|photo|design|graphique|visuel|illustration|couleur|logo|ui|ux|maquette/i, label: 'design et création visuelle' },
      { pattern: /traduis|traduction|langue|english|french|espagnol|allemand|japonais/i, label: 'traduction et linguistique' },
      { pattern: /résume|résumé|synthèse|document|pdf|texte|lecture|compréhension/i, label: 'synthèse de contenu' },
      { pattern: /formation|apprentissage|cours|tutoriel|explique|enseigne|pédagogie/i, label: 'formation et pédagogie' },
      { pattern: /recherche|scientifique|étude|publication|academic|paper|rapport/i, label: 'recherche académique' },
    ];
    for (const d of domains) {
      if (d.pattern.test(t)) return d.label;
    }
    return 'assistance généraliste';
  }

  // ── Infer role from domain ──
  function inferRole(domain) {
    const map = {
      'développement logiciel': 'un ingénieur logiciel senior avec 10+ ans d\'expérience',
      'rédaction et communication': 'un expert en copywriting et communication professionnelle',
      'analyse et stratégie business': 'un consultant stratégique senior spécialisé en analyse business',
      'design et création visuelle': 'un designer créatif senior avec expertise UI/UX',
      'traduction et linguistique': 'un traducteur professionnel expert en linguistique',
      'synthèse de contenu': 'un analyste documentaire et expert en synthèse d\'information',
      'formation et pédagogie': 'un formateur expert avec expertise pédagogique avancée',
      'recherche académique': 'un chercheur académique senior avec expertise en méthodologie',
      'assistance généraliste': 'un assistant IA expert et polyvalent',
    };
    return map[domain] || 'un expert qualifié';
  }

  // ── Extract core mission ──
  function extractMission(t) {
    const cleaned = t.trim().replace(/[.!?]+$/, '');
    // Shorten to first sentence if multi-sentence
    const firstSentence = cleaned.split(/[.!?\n]/)[0].trim();
    return firstSentence || cleaned;
  }

  // ── Detect vague terms ──
  function getVagueTerms(t) {
    const vague = ['bien', 'bon', 'bonne', 'correct', 'juste', 'intéressant',
      'pertinent', 'approprié', 'possible', 'éventuellement', 'peut-être',
      'good', 'nice', 'appropriate', 'suitable', 'maybe', 'perhaps', 'decent'];
    return vague.filter(v => new RegExp('\\b' + v + '\\b', 'i').test(t));
  }

  // ── Main transform function ──
  function transform(raw) {
    const t = raw.trim();
    if (!t) return null;

    const chips = [];
    const domain = inferDomain(t);
    const roleLabel = inferRole(domain);

    const sections = {};

    // ── ROLE ──
    if (!hasRole(t)) {
      sections.role = `Tu es ${roleLabel}.`;
      chips.push({ text: '+ Rôle ajouté', type: 'added' });
    } else {
      // Extract existing role mention
      sections.role = t.split(/\n/)[0].trim();
      if (!sections.role.toLowerCase().startsWith('tu ') &&
          !sections.role.toLowerCase().startsWith('you ') &&
          !sections.role.toLowerCase().startsWith('agis')) {
        sections.role = `Tu es ${roleLabel}.`;
        chips.push({ text: '+ Rôle précisé', type: 'mod' });
      }
    }

    // ── CONTEXT ──
    if (!hasContext(t)) {
      sections.context = `Domaine de compétence : ${domain}. Adapte ton niveau d'expertise à un professionnel averti.`;
      chips.push({ text: '+ Contexte inféré', type: 'added' });
    } else {
      // Extract context from original
      sections.context = `Domaine : ${domain}. ${extractMission(t)}`;
    }

    // ── MISSION ──
    const mission = extractMission(t);
    if (!hasMission(t)) {
      sections.mission = mission + '. Traite cette demande avec précision et rigueur.';
      chips.push({ text: '⚠ Verbe d\'action ajouté', type: 'warn' });
    } else {
      sections.mission = mission;
    }

    // ── CONTRAINTES ──
    const constraints = [];
    if (!hasConstraints(t)) {
      constraints.push('Fournis uniquement des informations vérifiables et pertinentes.');
      constraints.push('Évite toute redondance et remplissage textuel inutile.');
      chips.push({ text: '+ Contraintes ajoutées', type: 'added' });
    } else {
      constraints.push('Respecte strictement les contraintes mentionnées ci-dessus.');
    }

    // Vague term handling
    const vagueFound = getVagueTerms(t);
    if (vagueFound.length > 0) {
      constraints.push(`Remplace les formulations vagues (${vagueFound.slice(0,3).join(', ')}) par des critères précis et mesurables.`);
      chips.push({ text: `⚠ ${vagueFound.length} terme(s) vague(s)`, type: 'warn' });
    }

    sections.constraints = constraints.join('\n');

    // ── FORMAT ──
    if (!hasFormat(t)) {
      sections.format = 'Réponds en Markdown structuré avec des sections claires. Utilise des listes à puces pour les éléments énumératifs, du code formaté si applicable. Sois direct et factuel.';
      chips.push({ text: '+ Format spécifié', type: 'added' });
    } else {
      sections.format = 'Respecte le format demandé. Structure ta réponse de façon claire et lisible.';
    }

    // ── LENGTH ──
    if (!hasLength(t)) {
      sections.format += '\nLongueur : adaptée à la complexité de la demande, ni trop courte ni superflue.';
      chips.push({ text: '+ Longueur précisée', type: 'added' });
    }

    // Build raw string for clipboard
    const raw_out = [
      `# RÔLE\n${sections.role}`,
      `# CONTEXTE\n${sections.context}`,
      `# MISSION\n${sections.mission}`,
      `# CONTRAINTES\n${sections.constraints}`,
      `# FORMAT DE SORTIE\n${sections.format}`,
    ].join('\n\n');

    return { sections, chips, raw: raw_out };
  }

  return { transform };
})();

/* ══════════════════════════════════════════════════════════════
   5. RENDERER — DOM updates, score bars, chips, history
   ══════════════════════════════════════════════════════════════ */
const Renderer = (() => {

  const $ = id => document.getElementById(id);

  function setScore(barEl, valEl, wrapEl, score, label) {
    const cls = Scorer.getClass(score);
    barEl.style.width = score + '%';
    barEl.className = `score-bar ${cls}`;
    valEl.textContent = score > 0 ? score : '—';
    valEl.className = `score-val ${score > 0 ? cls : ''}`;
    if (wrapEl) {
      wrapEl.setAttribute('aria-valuenow', score);
      wrapEl.setAttribute('aria-label', `Score ${label} : ${score}/100`);
    }
  }

  function renderOutput(sections) {
    const area = $('output-area');
    if (!sections) {
      area.innerHTML = 'Résultat affiché ici…';
      area.classList.add('empty');
      return;
    }

    area.classList.remove('empty');

    const sectionDefs = [
      { key: 'role',        label: '01 — RÔLE' },
      { key: 'context',     label: '02 — CONTEXTE' },
      { key: 'mission',     label: '03 — MISSION' },
      { key: 'constraints', label: '04 — CONTRAINTES' },
      { key: 'format',      label: '05 — FORMAT DE SORTIE' },
    ];

    area.innerHTML = sectionDefs.map(({ key, label }) => {
      const content = sections[key] || '';
      const lines = content.split('\n').filter(Boolean);
      const contentHtml = lines.map(line =>
        `<span class="out-content">${escapeHtml(line)}</span>`
      ).join('<br>');

      return `<span class="out-section">
  <span class="out-tag">${label}</span>
  <span class="out-highlight">${contentHtml}</span>
</span>`;
    }).join('');
  }

  function renderChips(chips) {
    const row = $('chips-row');
    row.innerHTML = '';
    chips.forEach(({ text, type }) => {
      const el = document.createElement('span');
      el.className = `chip chip-${type === 'added' ? 'added' : type === 'mod' ? 'mod' : 'warn'}`;
      el.textContent = text;
      row.appendChild(el);
    });
  }

  function renderHistory(history) {
    const list = $('history-list');
    const empty = $('history-empty');
    const count = $('history-count');

    count.textContent = `${history.length} / 20`;

    if (!history.length) {
      if (!empty) {
        list.innerHTML = '<li class="history-empty" id="history-empty">Aucun historique</li>';
      }
      return;
    }

    list.innerHTML = history.map((entry, i) => {
      const cls = Scorer.getClass(entry.scoreOut);
      return `<li class="history-item" role="button" tabindex="0"
          data-index="${i}"
          aria-label="Charger l'entrée du ${entry.date} — score ${entry.scoreOut}">
        <div class="history-meta">
          <span class="history-date">${entry.date}</span>
          <span class="history-preview">${escapeHtml(entry.preview)}</span>
        </div>
        <span class="history-score ${cls}">${entry.scoreOut}</span>
      </li>`;
    }).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setLoading(on) {
    const btn = $('btn-forge');
    if (on) {
      btn.classList.add('loading');
      btn.disabled = true;
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function setStatus(text, type = 'idle') {
    const dot = $('status-dot');
    const label = $('status-text');
    label.textContent = text;
    dot.className = `status-dot${type === 'active' ? ' active' : type === 'error' ? ' error' : ''}`;
  }

  function setCopyState(success) {
    const btn = $('btn-copy');
    const icon = $('copy-icon');
    if (success) {
      btn.classList.add('copy-success');
      icon.textContent = '✓';
      setTimeout(() => {
        btn.classList.remove('copy-success');
        icon.textContent = '⎘';
      }, 2000);
    }
  }

  function updateCharCount(len) {
    const el = $('char-count-in');
    el.textContent = `${len} / 8000`;
    el.classList.toggle('warn', len > 7000);
  }

  return {
    setScore, renderOutput, renderChips, renderHistory,
    setLoading, setStatus, setCopyState, updateCharCount,
  };
})();

/* ══════════════════════════════════════════════════════════════
   6. TOAST MODULE
   ══════════════════════════════════════════════════════════════ */
const Toast = (() => {
  const container = document.getElementById('toast-container');

  function show(message, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = message;
    el.setAttribute('role', 'alert');
    container.appendChild(el);
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 2500);
  }

  return { show };
})();

/* ══════════════════════════════════════════════════════════════
   7. HISTORY MODULE
   Max 20 entries, localStorage backed
   ══════════════════════════════════════════════════════════════ */
const History = (() => {
  const MAX = 20;

  function load() {
    return Store.read('history', []);
  }

  function add(raw, scoreIn, scoreOut, sections) {
    const history = load();
    const entry = {
      id: Date.now(),
      date: new Date().toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' }),
      preview: raw.replace(/\s+/g,' ').trim().slice(0, 80),
      raw,
      sections,
      scoreIn,
      scoreOut,
    };
    history.unshift(entry);
    if (history.length > MAX) history.length = MAX;
    Store.write('history', history);
    return history;
  }

  function getAll() { return load(); }

  return { add, getAll };
})();

/* ══════════════════════════════════════════════════════════════
   8. THEME MODULE
   ══════════════════════════════════════════════════════════════ */
const Theme = (() => {
  function apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');
    if (theme === 'dark') {
      icon.textContent = '☽';
      label.textContent = 'DARK';
    } else {
      icon.textContent = '☀';
      label.textContent = 'LIGHT';
    }
    Store.write('theme', theme);
  }

  function toggle() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    apply(next);
    return next;
  }

  function init() {
    const saved = Store.read('theme', 'dark');
    apply(saved);
  }

  return { init, toggle, apply };
})();

/* ══════════════════════════════════════════════════════════════
   9. CONTROLLER — orchestrates state + events
   ══════════════════════════════════════════════════════════════ */
const Controller = (() => {
  let _debounceTimer = null;

  // ── forge: main action ──
  function forge() {
    const raw = document.getElementById('input-prompt').value;

    if (!raw.trim()) {
      Toast.show('Saisissez un prompt', 'error');
      Renderer.setStatus('Erreur : prompt vide', 'error');
      return;
    }

    // Set loading
    State.set({ loading: true });
    Renderer.setLoading(true);
    Renderer.setStatus('Analyse en cours…', 'active');

    // Simulate async processing for UX realism
    setTimeout(() => {
      try {
        const scoreIn  = Scorer.score(raw);
        const result   = Engine.transform(raw);
        const scoreOut = result ? Scorer.score(result.raw) : 0;

        // Update history
        const history = History.add(raw, scoreIn, scoreOut, result ? result.sections : null);

        // Update state
        State.set({
          inputValue: raw,
          outputRaw: result ? result.raw : '',
          outputSections: result ? result.sections : null,
          scoreIn,
          scoreOut,
          chips: result ? result.chips : [],
          loading: false,
          history,
        });

        // Render
        Renderer.setScore(
          document.getElementById('score-in-bar'),
          document.getElementById('score-in-val'),
          document.getElementById('score-in-bar-wrap'),
          scoreIn, 'original'
        );
        Renderer.setScore(
          document.getElementById('score-out-bar'),
          document.getElementById('score-out-val'),
          document.getElementById('score-out-bar-wrap'),
          scoreOut, 'amélioré'
        );
        Renderer.renderOutput(result ? result.sections : null);
        Renderer.renderChips(result ? result.chips : []);
        Renderer.renderHistory(history);
        Renderer.setLoading(false);
        Renderer.setStatus(`Terminé — score : ${scoreIn} → ${scoreOut}`, 'active');

        // Enable copy
        document.getElementById('btn-copy').disabled = !result;

        Toast.show(`Score : ${scoreIn} → ${scoreOut} (+${scoreOut - scoreIn})`, 'success');

      } catch (err) {
        Renderer.setLoading(false);
        Renderer.setStatus('Erreur de traitement', 'error');
        Toast.show('Erreur interne', 'error');
        console.error('[PromptForge] Error:', err);
        State.set({ loading: false });
      }
    }, 600); // Deliberate UX delay for spinner visibility
  }

  // ── copy output ──
  async function copy() {
    const raw = State.get().outputRaw;
    if (!raw) return;

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(raw);
      } else {
        // Fallback for older browsers / non-HTTPS
        const ta = document.createElement('textarea');
        ta.value = raw;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      Renderer.setCopyState(true);
      Toast.show('Copié dans le presse-papier', 'success');
    } catch {
      Toast.show('Échec de la copie', 'error');
    }
  }

  // ── clear ──
  function clear() {
    document.getElementById('input-prompt').value = '';
    Renderer.setScore(
      document.getElementById('score-in-bar'),
      document.getElementById('score-in-val'),
      document.getElementById('score-in-bar-wrap'),
      0, 'original'
    );
    Renderer.setScore(
      document.getElementById('score-out-bar'),
      document.getElementById('score-out-val'),
      document.getElementById('score-out-bar-wrap'),
      0, 'amélioré'
    );
    Renderer.renderOutput(null);
    Renderer.renderChips([]);
    Renderer.updateCharCount(0);
    Renderer.setStatus('Prêt');
    document.getElementById('btn-copy').disabled = true;

    State.set({
      inputValue: '',
      outputRaw: '',
      outputSections: null,
      scoreIn: 0,
      scoreOut: 0,
      chips: [],
    });
  }

  // ── load history entry ──
  function loadHistoryEntry(index) {
    const history = State.get().history;
    if (index < 0 || index >= history.length) return;
    const entry = history[index];

    document.getElementById('input-prompt').value = entry.raw;
    Renderer.updateCharCount(entry.raw.length);

    const scoreIn = entry.scoreIn || Scorer.score(entry.raw);
    Renderer.setScore(
      document.getElementById('score-in-bar'),
      document.getElementById('score-in-val'),
      document.getElementById('score-in-bar-wrap'),
      scoreIn, 'original'
    );
    Renderer.setScore(
      document.getElementById('score-out-bar'),
      document.getElementById('score-out-val'),
      document.getElementById('score-out-bar-wrap'),
      entry.scoreOut, 'amélioré'
    );

    if (entry.sections) {
      Renderer.renderOutput(entry.sections);
      State.set({ outputRaw: entry.raw, outputSections: entry.sections, scoreIn, scoreOut: entry.scoreOut });
      document.getElementById('btn-copy').disabled = false;
    }

    Renderer.setStatus(`Historique chargé — ${entry.date}`);
    Toast.show('Entrée chargée', 'info');
  }

  // ── init ──
  function init() {
    Theme.init();

    // Load history
    const history = History.getAll();
    State.set({ history });
    Renderer.renderHistory(history);

    // ── Event bindings ──
    document.getElementById('btn-forge').addEventListener('click', forge);
    document.getElementById('btn-copy').addEventListener('click', copy);
    document.getElementById('btn-clear').addEventListener('click', clear);
    document.getElementById('theme-toggle').addEventListener('click', Theme.toggle);

    // Textarea: score preview + char count (debounced)
    document.getElementById('input-prompt').addEventListener('input', (e) => {
      const val = e.target.value;
      Renderer.updateCharCount(val.length);

      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(() => {
        if (val.trim().length > 3) {
          const s = Scorer.score(val);
          Renderer.setScore(
            document.getElementById('score-in-bar'),
            document.getElementById('score-in-val'),
            document.getElementById('score-in-bar-wrap'),
            s, 'original'
          );
        }
      }, 250);
    });

    // Keyboard: Ctrl+Enter to forge
    document.getElementById('input-prompt').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        forge();
      }
    });

    // History click + keyboard
    document.getElementById('history-list').addEventListener('click', (e) => {
      const item = e.target.closest('[data-index]');
      if (item) loadHistoryEntry(parseInt(item.dataset.index, 10));
    });
    document.getElementById('history-list').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const item = e.target.closest('[data-index]');
        if (item) { e.preventDefault(); loadHistoryEntry(parseInt(item.dataset.index, 10)); }
      }
    });
  }

  return { init };
})();

/* ══════════════════════════════════════════════════════════════
   10. BOOTSTRAP
   ══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', Controller.init);
</script>
