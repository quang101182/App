app = "promoclip-ffmpeg"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  MAX_CONCURRENT_JOBS = "2"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# NOTE: aucun [mounts] — PromoClip n'a pas besoin de volume persistant,
# toutes les videos sont streamees en reponse et les tmpDirs sont locaux.

[[vm]]
  memory = "2gb"
  cpu_kind = "performance"
  cpus = 1
