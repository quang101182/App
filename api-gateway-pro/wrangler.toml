# ─────────────────────────────────────────────────────────────────────────────
# api-gateway-pro — Cloudflare Worker (SubWhisper Pro)
# URL : https://api-pro.quang101182.workers.dev
# ─────────────────────────────────────────────────────────────────────────────
name               = "api-gateway-pro"
main               = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────────────────────────
# KV Namespace — pro keys, usage tracking, API keys
# Created with: wrangler kv namespace create "PRO_KV"
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "PRO_KV"
id         = "8addefeaf97040daa0c1b72d19b3ee3f"
preview_id = "8addefeaf97040daa0c1b72d19b3ee3f"

# ─────────────────────────────────────────────────────────────────────────────
# Secrets (wrangler secret put):
#   ADMIN_TOKEN  — admin routes for key management
#
# API keys stored in KV via /admin/keys/set:
#   GEMINI_KEY, GROQ_KEY, ASSEMBLYAI_KEY, DEEPSEEK_KEY, AZURE_KEY
# ─────────────────────────────────────────────────────────────────────────────
