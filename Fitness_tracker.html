<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --bg-main-1: #020617; --bg-main-2: #0f172a; --bg-main-3: #130b2a; --bg-main-4: #1e293b;
            --text-main: #e2e8f0; --text-secondary: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2); 
            --glow-app-title: #facc15; --glow-exo-title: #22d3ee; --glow-drive: #3b82f6;
            --bg-card-start: #1e293b; --bg-card-end: #0f172a;
            --bg-secondary: rgba(15, 23, 42, 0.7);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, var(--bg-main-1), var(--bg-main-2), var(--bg-main-3), var(--bg-main-4)); background-size: 400% 400%; animation: bg-pan 25s ease infinite; color: var(--text-main); padding-bottom: 80px; }
        @keyframes bg-pan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        header { background-color: var(--bg-secondary); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); }
        .bg-card { background: linear-gradient(145deg, var(--bg-card-start), var(--bg-card-end)); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .input-bg { background-color: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); color: white; }
        
        .icon-btn { transition: transform 0.1s; } .icon-btn:active { transform: scale(0.9); }
        .exercise-card { transition: all 0.3s ease; }
        .exercise-title { color: var(--glow-exo-title); font-weight: bold; font-size: 1.1rem; }
        .has-today-perf { box-shadow: 0 0 10px rgba(45, 212, 191, 0.3); border-color: rgba(45, 212, 191, 0.5); }
        
        .modal-container { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal-container.visible { opacity: 1; pointer-events: auto; }
        .collapsible-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 2000px; }
        .collapsible-content.hidden { max-height: 0; }
        
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--glow-drive); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Boutons Drive spécifiques */
        button[data-action="drive-config"] { color: #94a3b8; }
        button[data-action="drive-upload"] { color: #60a5fa; }
        button[data-action="drive-download"] { color: #4ade80; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="shadow-md p-3 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-dumbbell text-yellow-400 text-xl"></i>
                <h1 class="text-lg font-bold tracking-wide">Fitness Tracker</h1>
            </div>
            
            <select id="program-select" class="input-bg text-sm rounded-lg p-2 max-w-[150px]"></select>
            
            <div class="flex items-center gap-1">
                <button data-action="drive-config" class="p-2 rounded-full icon-btn"><i class="fa-brands fa-google-drive"></i></button>
                <button data-action="drive-upload" class="p-2 rounded-full icon-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                <button data-action="drive-download" class="p-2 rounded-full icon-btn"><i class="fa-solid fa-cloud-arrow-down"></i></button>
                <button id="global-stats-btn" class="p-2 rounded-full icon-btn text-cyan-400"><i class="fa-solid fa-chart-pie"></i></button>
                <button data-action="header-backup" class="p-2 rounded-full icon-btn text-green-400"><i class="fa-solid fa-download"></i></button>
                <button data-action="header-import" class="p-2 rounded-full icon-btn text-purple-400"><i class="fa-solid fa-upload"></i></button>
                <button id="manage-programs-btn" class="p-2 rounded-full icon-btn text-yellow-400"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>
        <p id="active-backup-name" class="text-xs text-gray-500 text-center mt-1 hidden"></p>
    </header>
        <main class="flex-grow p-4 max-w-4xl mx-auto w-full">
        <div id="exercise-list" class="space-y-4"></div>
    </main>

    <button id="add-exercise-btn" class="fixed bottom-6 right-6 bg-green-600 text-white rounded-full w-14 h-14 shadow-lg z-40 text-xl flex items-center justify-center hover:scale-110 transition"><i class="fa-solid fa-plus"></i></button>

    <div id="toast" class="fixed top-20 right-4 bg-slate-800 text-white px-4 py-3 rounded shadow-xl transform translate-x-full transition-transform duration-300 z-[60] flex items-center gap-2 border-l-4 border-blue-500">
        <i id="toast-icon" class="fa-solid fa-info-circle"></i><span id="toast-text">Info</span>
    </div>

    <div id="timer-display" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/90 text-white py-6 px-10 rounded-xl z-[70] hidden flex-col items-center border-2 border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.5)]">
        <span id="timer-text" class="text-5xl font-mono font-bold">00:00</span>
        <button id="timer-close-btn" class="mt-4 text-red-400 border border-red-400 px-4 py-1 rounded hover:bg-red-900">Arrêter</button>
    </div>

    <div id="program-modal" class="modal-container fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden"></div>
    <div id="history-modal" class="modal-container fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden"></div>
    <div id="global-stats-modal" class="modal-container fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden"></div>

    <div id="modal-drive-config" class="modal-container fixed inset-0 z-[60] flex items-center justify-center bg-black/90 hidden">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-11/12 max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-blue-400">Configuration Drive</h3>
            <div class="space-y-3">
                <input type="text" id="driveClientId" class="w-full bg-slate-800 p-2 rounded text-white border border-slate-600" placeholder="Client ID">
                <input type="text" id="driveApiKey" class="w-full bg-slate-800 p-2 rounded text-white border border-slate-600" placeholder="API Key">
                <input type="text" id="driveFolderId" class="w-full bg-slate-800 p-2 rounded text-white border border-slate-600" placeholder="Folder ID">
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button data-action="close-drive-config" class="px-4 py-2 text-gray-400">Annuler</button>
                <button data-action="save-drive-config" class="px-4 py-2 bg-blue-600 rounded text-white">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="modal-drive-picker" class="modal-container fixed inset-0 z-[60] flex items-center justify-center bg-black/90 hidden">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-11/12 max-w-md h-3/4 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-green-400">Backups Drive</h3><button data-action="close-drive-picker" class="text-white">&times;</button></div>
            <div id="driveFileList" class="flex-grow overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".json" multiple>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- VARIABLES GLOBALES ---
        const app = document.getElementById('app');
        const exerciseList = document.getElementById('exercise-list');
        const programSelect = document.getElementById('program-select');
        const toast = document.getElementById('toast');
        
        // Modales
        const modalDriveConfig = document.getElementById('modal-drive-config');
        const modalDrivePicker = document.getElementById('modal-drive-picker');
        const programModalContainer = document.getElementById('program-modal');
        const historyModalContainer = document.getElementById('history-modal');
        const globalStatsModalContainer = document.getElementById('global-stats-modal');

        // State
        let state = { currentProgram: null, programOrder: [], programs: {}, performance: {}, activeFileName: null, isDirty: false };
        let driveConfig = { clientId: '', apiKey: '', folderId: '' };
        let tokenClient, gapiInited = false, gisInited = false;
        let timerInterval, audioCtx, chartInstances = {};
        let backupDirectoryHandle = null;

        // --- GOOGLE DRIVE LOGIC ---
        function loadDriveConfig() { const s = localStorage.getItem('FITNESS_DRIVE_CFG'); if(s) driveConfig = JSON.parse(s); }
        
        function checkGoogleLibs() {
            if(driveConfig.apiKey && driveConfig.clientId) {
                if(typeof gapi !== 'undefined') gapi.load('client', initGapi);
                if(typeof google !== 'undefined') { tokenClient = google.accounts.oauth2.initTokenClient({client_id: driveConfig.clientId, scope: 'https://www.googleapis.com/auth/drive.file', callback: ''}); gisInited = true; }
            }
        }
        async function initGapi() { await gapi.client.init({apiKey: driveConfig.apiKey, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']}); gapiInited = true; }

        async function handleDriveUpload() {
            if(!gapiInited || !gisInited) { showToast("Config Drive requise", true); openDriveConfig(); return; }
            tokenClient.callback = async (r) => { if(r.error) throw r; await performUpload(); };
            if(gapi.client.getToken() === null) tokenClient.requestAccessToken({prompt: 'consent'}); else await performUpload();
        }

        async function performUpload() {
            showToast("Upload en cours..."); cleanupData();
            const content = JSON.stringify(state, null, 2); const date = new Date().toISOString().slice(0,10);
            try {
                await uploadFile(`backup_fitness_${date}.json`, content);
                await uploadFile(`last_backup.json`, content);
                showToast("✅ Sauvegarde Drive OK"); state.isDirty = false; renderHeader();
            } catch(e) { console.error(e); showToast("Erreur Upload", true); }
        }

        async function uploadFile(name, content) {
            let id = null; const q = `name = '${name}' and '${driveConfig.folderId}' in parents and trashed = false`;
            const r = await gapi.client.drive.files.list({'q': q, 'fields': 'files(id)', 'spaces': 'drive'});
            if(r.result.files.length > 0) id = r.result.files[0].id;
            const blob = new Blob([content], {type: 'application/json'});
            if(id) await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {method: 'PATCH', headers: {'Authorization': `Bearer ${gapi.client.getToken().access_token}`}, body: blob});
            else {
                const form = new FormData(); form.append('metadata', new Blob([JSON.stringify({name: name, parents: [driveConfig.folderId]})], {type: 'application/json'})); form.append('file', blob);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {method: 'POST', headers: {'Authorization': `Bearer ${gapi.client.getToken().access_token}`}, body: form});
            }
        }

        async function listDriveFiles() {
            if(!gapiInited) { showToast("Config requise", true); openDriveConfig(); return; }
            modalDrivePicker.classList.remove('hidden'); const list = document.getElementById('driveFileList'); list.innerHTML = 'Chargement...';
            try {
                const token = gapi.client.getToken(); if(!token) { tokenClient.requestAccessToken({prompt: ''}); return; }
                const r = await gapi.client.drive.files.list({'q': `'${driveConfig.folderId}' in parents and mimeType = 'application/json' and trashed = false`, 'fields': 'files(id, name, modifiedTime)', 'orderBy': 'modifiedTime desc'});
                list.innerHTML = '';
                r.result.files.forEach(f => {
                    const div = document.createElement('div'); div.className = "p-3 bg-slate-800 border border-slate-700 rounded mb-2 flex justify-between items-center cursor-pointer hover:bg-slate-700";
                    div.innerHTML = `<div><div class="font-bold text-blue-300">${f.name}</div><div class="text-xs text-gray-400">${new Date(f.modifiedTime).toLocaleDateString()}</div></div><i class="fa-solid fa-download"></i>`;
                    div.onclick = () => loadDriveFile(f.id, f.name);
                    list.appendChild(div);
                });
            } catch(e) { list.innerHTML = "Erreur listing"; }
        }

        async function loadDriveFile(id, name) {
            showToast(`Chargement ${name}...`); modalDrivePicker.classList.add('hidden');
            try {
                const r = await gapi.client.drive.files.get({fileId: id, alt: 'media'});
                state = r.result; state.activeFileName = name; saveState(); refreshUI(); showToast("Chargé !");
            } catch(e) { showToast("Erreur chargement", true); }
        }
        
        function openDriveConfig() {
            document.getElementById('driveClientId').value = driveConfig.clientId; document.getElementById('driveApiKey').value = driveConfig.apiKey; document.getElementById('driveFolderId').value = driveConfig.folderId;
            modalDriveConfig.classList.remove('hidden');
        }
                // --- LOGIQUE METIER ---
        function saveState() { cleanupData(); localStorage.setItem('FITNESS_STATE', JSON.stringify(state)); renderHeader(); }
        function loadState() { const s = localStorage.getItem('FITNESS_STATE'); if(s) state = JSON.parse(s); state.programs = state.programs || {}; state.performance = state.performance || {}; state.programOrder = state.programOrder || Object.keys(state.programs); if(!state.currentProgram) state.currentProgram = state.programOrder[0]; }
        
        function cleanupData() {
            const today = new Date().toISOString().split('T')[0];
            for(const p in state.performance) {
                for(const e in state.performance[p]) {
                    state.performance[p][e] = state.performance[p][e].filter(x => x.date === today || (x.sets||[]).some(s => s.poids || s.reps));
                    if(state.performance[p][e].length === 0) delete state.performance[p][e];
                }
            }
        }

        function refreshUI() {
            programSelect.innerHTML = '';
            state.programOrder.forEach(p => { const o = document.createElement('option'); o.value = p; o.text = p; programSelect.appendChild(o); });
            if(state.currentProgram) { programSelect.value = state.currentProgram; renderProgram(); }
            renderHeader();
        }

        function renderHeader() { 
            const el = document.getElementById('active-backup-name'); 
            if(state.activeFileName) { el.textContent = `Fichier: ${state.activeFileName}`; el.classList.remove('hidden'); } else el.classList.add('hidden');
        }

        function renderProgram() {
            exerciseList.innerHTML = '';
            const prog = state.programs[state.currentProgram];
            if(!prog || !prog.exercises) return;

            prog.exercises.forEach((ex, idx) => {
                const card = document.createElement('div');
                card.className = "bg-card rounded-xl p-4 relative exercise-card fade-in";
                card.dataset.index = idx;

                const today = new Date().toISOString().split('T')[0];
                const hist = state.performance[state.currentProgram]?.[ex.Exercice] || [];
                let todayEntry = hist.find(x => x.date === today);
                const lastEntry = hist.filter(x => x.date < today).pop();
                
                // Si pas d'entrée auj, on prépare les slots vides ou copiés
                const displaySets = todayEntry ? todayEntry.sets : (lastEntry ? lastEntry.sets.map(()=>({})) : [{},{},{},{}]);
                const isToday = !!todayEntry;
                if(isToday && todayEntry.sets.some(s=>s.poids||s.reps)) card.classList.add('has-today-perf');

                let setsHTML = '<div class="grid grid-cols-4 gap-2 mt-2">';
                displaySets.forEach((s, i) => {
                    setsHTML += `<div class="input-bg p-1 rounded text-center relative">
                        <div class="text-[10px] text-gray-400 mb-1">Série ${i+1}</div>
                        <div class="flex gap-1">
                            <input class="w-1/2 bg-transparent text-center border-b border-gray-600 focus:border-blue-400 editable-perf" placeholder="kg" value="${s.poids||''}" data-idx="${i}" data-field="poids" data-ex="${ex.Exercice}">
                            <input class="w-1/2 bg-transparent text-center border-b border-gray-600 focus:border-blue-400 editable-perf" placeholder="reps" value="${s.reps||''}" data-idx="${i}" data-field="reps" data-ex="${ex.Exercice}">
                        </div>
                    </div>`;
                });
                setsHTML += '</div>';

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="exercise-title" contenteditable="true" onblur="updateExName(${idx}, this)">${ex.Exercice}</div>
                            <div class="text-xs text-orange-400" contenteditable="true" onblur="updateExGroup(${idx}, this)">${ex.Groupe||'Groupe'}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyLast('${ex.Exercice}')" class="icon-btn text-xs text-blue-400"><i class="fa-solid fa-copy"></i> Hist</button>
                            <button onclick="deleteEx(${idx})" class="icon-btn text-red-400"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="mt-2 flex justify-between text-sm text-gray-400">
                        <span>Repos: <span contenteditable="true" onblur="updateRest(${idx}, this)">${ex.Repos||'90'}</span>s <i class="fa-solid fa-stopwatch cursor-pointer" onclick="startTimer(${ex.Repos||90})"></i></span>
                        <i class="fa-solid fa-chevron-down cursor-pointer" onclick="toggleCollapse(this)"></i>
                    </div>
                    <div class="collapsible-content">
                        ${setsHTML}
                        <div class="mt-2 grid grid-cols-2 gap-2 text-xs">
                            <div class="input-bg p-2 rounded" contenteditable="true" data-placeholder="Notes">${ex["Notes d'exécution"]||''}</div>
                            <div class="input-bg p-2 rounded" contenteditable="true" data-placeholder="Objectif">${ex["Objectif charge/reps"]||''}</div>
                        </div>
                        <div class="mt-2 flex justify-end gap-2">
                             <button onclick="addSet('${ex.Exercice}')" class="text-xs bg-slate-700 px-2 py-1 rounded">+ Série</button>
                             <button onclick="showHistory('${ex.Exercice}')" class="text-xs bg-blue-900 px-2 py-1 rounded">Historique</button>
                        </div>
                    </div>
                `;
                exerciseList.appendChild(card);
            });
        }
                // --- GESTION PROGRAMMES (Le code qui manquait !) ---
        window.renderProgramEditor = function() {
            const html = `
                <div class="bg-card w-full max-w-md p-6 rounded-xl relative shadow-2xl border border-slate-600">
                    <h2 class="text-xl font-bold mb-4">Gérer les Programmes</h2>
                    <button onclick="closeModals()" class="absolute top-4 right-4 text-2xl">&times;</button>
                    
                    <div class="mb-4 flex gap-2">
                        <input id="new-prog-input" class="flex-grow bg-slate-800 p-2 rounded border border-slate-600" placeholder="Nouveau programme">
                        <button onclick="addProgram()" class="bg-green-600 px-4 rounded text-white font-bold">+</button>
                    </div>
                    
                    <div class="max-h-60 overflow-y-auto space-y-2">
                        ${state.programOrder.map((p, i) => `
                            <div class="flex justify-between items-center bg-slate-800 p-2 rounded">
                                <span contenteditable="true" onblur="renameProg('${p}', this)" class="font-bold text-blue-300">${p}</span>
                                <div>
                                    <button onclick="moveProg(${i}, -1)" class="text-gray-400 hover:text-white px-1">⬆️</button>
                                    <button onclick="moveProg(${i}, 1)" class="text-gray-400 hover:text-white px-1">⬇️</button>
                                    <button onclick="deleteProg('${p}')" class="text-red-500 hover:text-red-400 px-1">🗑️</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            programModalContainer.innerHTML = html;
            programModalContainer.classList.remove('hidden');
            programModalContainer.classList.add('flex');
        }

        window.renderHistoryModal = function(exName) {
            const hist = state.performance[state.currentProgram]?.[exName] || [];
            const labels = hist.map(h => new Date(h.date).toLocaleDateString().slice(0,5));
            const data = hist.map(h => (h.sets||[]).reduce((acc, s) => acc + (parseFloat(s.poids||0) * parseFloat(s.reps||0)), 0));

            const listHtml = hist.slice().reverse().map(h => `
                <div class="flex justify-between text-sm border-b border-gray-700 py-2">
                    <span class="text-blue-300">${new Date(h.date).toLocaleDateString()}</span>
                    <span>${(h.sets||[]).map(s=>`${s.poids}x${s.reps}`).join(', ')}</span>
                    <button onclick="deleteEntry('${exName}', '${h.date}')" class="text-red-500">&times;</button>
                </div>
            `).join('');

            const html = `
                <div class="bg-card w-full max-w-lg p-4 rounded-xl relative h-[80vh] flex flex-col">
                    <div class="flex justify-between mb-2">
                        <h2 class="font-bold text-lg">${exName}</h2>
                        <button onclick="closeModals()" class="text-2xl">&times;</button>
                    </div>
                    <div class="h-48 bg-slate-800 rounded mb-2"><canvas id="histChart"></canvas></div>
                    <div class="flex-grow overflow-y-auto">${listHtml}</div>
                </div>`;
            
            historyModalContainer.innerHTML = html;
            historyModalContainer.classList.remove('hidden');
            historyModalContainer.classList.add('flex');

            new Chart(document.getElementById('histChart'), {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Volume (kg)', data: data, borderColor: '#22d3ee', tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        window.renderGlobalStats = function() {
            // Calcul simple pour démo
            let totalSets = 0, totalVol = 0;
            Object.values(state.performance).forEach(prog => {
                Object.values(prog).forEach(hist => {
                    hist.forEach(sess => {
                        if(sess.sets) {
                            totalSets += sess.sets.length;
                            sess.sets.forEach(s => totalVol += (parseFloat(s.poids)||0)*(parseFloat(s.reps)||0));
                        }
                    });
                });
            });

            const html = `
                <div class="bg-card w-11/12 max-w-md p-6 rounded-xl relative text-center">
                    <h2 class="text-xl font-bold mb-6 text-purple-400">Statistiques Globales</h2>
                    <button onclick="closeModals()" class="absolute top-4 right-4 text-2xl">&times;</button>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 p-4 rounded-lg">
                            <div class="text-3xl font-bold text-white">${totalSets}</div>
                            <div class="text-xs text-gray-400">Séries Totales</div>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-lg">
                            <div class="text-3xl font-bold text-white">${(totalVol/1000).toFixed(1)}t</div>
                            <div class="text-xs text-gray-400">Volume Total</div>
                        </div>
                    </div>
                </div>`;
            globalStatsModalContainer.innerHTML = html;
            globalStatsModalContainer.classList.remove('hidden');
            globalStatsModalContainer.classList.add('flex');
        }
                // --- EVENTS GLOBAUX ---
        // Gestion Saisie Poids/Reps
        app.addEventListener('input', (e) => {
            if(e.target.classList.contains('editable-perf')) {
                const exName = e.target.dataset.ex;
                const idx = e.target.dataset.idx;
                const field = e.target.dataset.field;
                const prog = state.currentProgram;
                
                let hist = state.performance[prog][exName];
                if(!hist) { hist = []; state.performance[prog][exName] = hist; }
                
                const today = new Date().toISOString().split('T')[0];
                let entry = hist.find(x => x.date === today);
                if(!entry) { entry = { date: today, sets: [] }; hist.push(entry); }
                
                if(!entry.sets[idx]) entry.sets[idx] = {};
                entry.sets[idx][field] = e.target.value;
                
                e.target.closest('.exercise-card').classList.add('has-today-perf');
                state.isDirty = true;
                renderHeader(); // Affiche l'étoile *
            }
        });

        // Helpers globaux (attachés à window pour onclick HTML)
        window.updateExName = (i, el) => { state.programs[state.currentProgram].exercises[i].Exercice = el.innerText; saveState(); }
        window.updateExGroup = (i, el) => { state.programs[state.currentProgram].exercises[i].Groupe = el.innerText; saveState(); }
        window.updateRest = (i, el) => { state.programs[state.currentProgram].exercises[i].Repos = el.innerText; saveState(); }
        window.deleteEx = (i) => { if(confirm('Supprimer ?')) { state.programs[state.currentProgram].exercises.splice(i,1); saveState(); renderProgram(); } }
        window.addSet = (ex) => { 
            const today = new Date().toISOString().split('T')[0];
            const hist = state.performance[state.currentProgram][ex];
            let entry = hist.find(x => x.date === today);
            if(!entry) { entry = {date:today, sets:[]}; hist.push(entry); }
            entry.sets.push({}); saveState(); renderProgram();
        }
        window.copyLast = (ex) => {
            const hist = state.performance[state.currentProgram][ex] || [];
            const last = hist.filter(x => x.date < new Date().toISOString().split('T')[0]).pop();
            if(last) {
                const today = new Date().toISOString().split('T')[0];
                let entry = hist.find(x => x.date === today);
                if(!entry) { entry = {date:today, sets:[]}; hist.push(entry); }
                entry.sets = JSON.parse(JSON.stringify(last.sets));
                saveState(); renderProgram(); showToast("Copié !");
            } else showToast("Pas d'historique", true);
        }
        window.toggleCollapse = (el) => { el.parentElement.nextElementSibling.classList.toggle('hidden'); }
        window.showHistory = (ex) => renderHistoryModal(ex);
        window.deleteEntry = (ex, date) => { 
            const hist = state.performance[state.currentProgram][ex];
            const idx = hist.findIndex(x => x.date === date);
            if(idx > -1) { hist.splice(idx, 1); saveState(); renderHistoryModal(ex); }
        }
        
        // Gestionnaire Programmes
        window.addProgram = () => {
            const name = document.getElementById('new-prog-input').value.trim();
            if(name && !state.programs[name]) {
                state.programs[name] = { exercises: [] };
                state.programOrder.push(name);
                state.currentProgram = name;
                saveState(); refreshUI(); renderProgramEditor();
            }
        }
        window.renameProg = (oldName, el) => {
            const newName = el.innerText.trim();
            if(newName && newName !== oldName) {
                state.programs[newName] = state.programs[oldName];
                delete state.programs[oldName];
                state.programOrder[state.programOrder.indexOf(oldName)] = newName;
                if(state.performance[oldName]) { state.performance[newName] = state.performance[oldName]; delete state.performance[oldName]; }
                state.currentProgram = newName;
                saveState(); refreshUI(); renderProgramEditor();
            }
        }
        window.deleteProg = (name) => {
            if(confirm('Supprimer ' + name + '?')) {
                delete state.programs[name];
                state.programOrder = state.programOrder.filter(n => n !== name);
                state.currentProgram = state.programOrder[0] || null;
                saveState(); refreshUI(); renderProgramEditor();
            }
        }
        window.moveProg = (idx, dir) => {
            if(idx+dir >= 0 && idx+dir < state.programOrder.length) {
                const temp = state.programOrder[idx];
                state.programOrder[idx] = state.programOrder[idx+dir];
                state.programOrder[idx+dir] = temp;
                saveState(); renderProgramEditor(); refreshUI();
            }
        }
        
        window.closeModals = () => {
            document.querySelectorAll('.modal-container').forEach(m => {
                m.classList.add('hidden'); m.classList.remove('flex');
            });
        }

        // Timer
        window.startTimer = (sec) => {
            clearInterval(timerInterval);
            let rem = sec;
            const disp = document.getElementById('timer-display');
            const txt = document.getElementById('timer-text');
            disp.classList.remove('hidden'); disp.classList.add('flex');
            timerInterval = setInterval(() => {
                rem--;
                txt.textContent = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                if(rem <= 0) { clearInterval(timerInterval); playSound(); }
            }, 1000);
        }
        document.getElementById('timer-close-btn').onclick = () => { 
            clearInterval(timerInterval); document.getElementById('timer-display').classList.add('hidden'); 
        };
        function playSound() { 
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
            o.start(); setTimeout(() => o.stop(), 500);
        }

        // Listeners Boutons Header
        document.getElementById('manage-programs-btn').onclick = renderProgramEditor;
        document.getElementById('global-stats-btn').onclick = renderGlobalStats;
        document.querySelector('[data-action="drive-config"]').onclick = openDriveConfig;
        document.querySelector('[data-action="drive-upload"]').onclick = handleDriveUpload;
        document.querySelector('[data-action="drive-download"]').onclick = () => { tokenClient.callback = listDriveFiles; tokenClient.requestAccessToken({prompt: ''}); };
        document.querySelector('[data-action="close-drive-config"]').onclick = closeModals;
        document.querySelector('[data-action="save-drive-config"]').onclick = () => {
             driveConfig.clientId = document.getElementById('driveClientId').value;
             driveConfig.apiKey = document.getElementById('driveApiKey').value;
             driveConfig.folderId = document.getElementById('driveFolderId').value;
             localStorage.setItem('FITNESS_DRIVE_CFG', JSON.stringify(driveConfig));
             closeModals(); location.reload();
        };
        document.querySelector('[data-action="close-drive-picker"]').onclick = closeModals;
        document.querySelector('[data-action="header-backup"]').onclick = () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
            a.download = `backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        };
        document.querySelector('[data-action="header-import"]').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => { state = JSON.parse(ev.target.result); saveState(); refreshUI(); showToast("Importé"); };
            r.readAsText(e.target.files[0]);
        };
        document.getElementById('add-exercise-btn').onclick = () => {
            if(!state.currentProgram) return showToast("Créer un programme d'abord", true);
            state.programs[state.currentProgram].exercises.push({Exercice: "Nouvel Exo", Series: "4", Reps: "10", Repos: "90"});
            saveState(); renderProgram();
        };
        programSelect.onchange = (e) => { state.currentProgram = e.target.value; saveState(); renderProgram(); };

        // Toast Helper
        function showToast(msg, err=false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.className = `fixed top-20 right-4 px-4 py-3 rounded shadow-xl transition-transform duration-300 z-[60] flex items-center gap-2 border-l-4 ${err?'bg-red-900 border-red-500':'bg-slate-800 border-blue-500'} text-white`;
            t.style.transform = "translateX(0)";
            setTimeout(() => t.style.transform = "translateX(120%)", 3000);
        }

        // BOOTSTRAP
        loadState(); loadDriveConfig(); checkGoogleLibs(); refreshUI();
    });
</script>
</body>
</html>
