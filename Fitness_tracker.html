        const getOrCreateTodayEntry = (programName, exerciseName) => {
            const today = new Date().toISOString().split('T')[0];
            if (!state.performance[programName]) state.performance[programName] = {};
            let perfHistory = state.performance[programName][exerciseName];
            if (!perfHistory) {
                perfHistory = [];
                state.performance[programName][exerciseName] = perfHistory;
            }
            let todayEntry = perfHistory.find(e => e.date === today);
            if (!todayEntry) {
                todayEntry = { date: today, sets: [{}, {}, {}, {}] };
                perfHistory.push(todayEntry);
                perfHistory.sort((a,b) => new Date(a.date) - new Date(b.date));
            }
            return todayEntry;
        };

        const updateStateFromInput = (e) => {
            const target = e.target;
            const programName = state.currentProgram;
            if (target.classList.contains('editable')) {
                const card = target.closest('.exercise-card');
                const index = parseInt(card.dataset.index, 10);
                const field = target.dataset.field;
                const value = target.tagName.toLowerCase() === 'input' ? target.value : target.innerText;
                const exercises = state.programs[programName]?.exercises;
                if (exercises && exercises[index]) {
                    exercises[index][field] = value;
                }
            } else if (target.classList.contains('editable-perf')) {
                const exerciseName = target.dataset.exercise;
                const value = target.value;
                
                const isFirstEditOfToday = !state.performance[programName]?.[exerciseName]?.find(e => e.date === new Date().toISOString().split('T')[0]);
                const todayEntry = getOrCreateTodayEntry(programName, exerciseName);
                
                if(isFirstEditOfToday) {
                    renderProgram();
                    const newTarget = document.querySelector(`[data-exercise="${exerciseName}"][data-set-index="${target.dataset.setIndex}"][data-sub-field="${target.dataset.subField}"]`);
                    if(newTarget) {
                       newTarget.focus();
                       newTarget.setSelectionRange(newTarget.value.length, newTarget.value.length);
                    }
                }

                const setIndex = parseInt(target.dataset.setIndex, 10);
                const subField = target.dataset.subField;
                while (todayEntry.sets.length <= setIndex) todayEntry.sets.push({});
                if (!todayEntry.sets[setIndex]) todayEntry.sets[setIndex] = {};
                todayEntry.sets[setIndex][subField] = value;

                const fieldElement = target.closest('.input-bg');
                if((todayEntry.sets[setIndex].poids && todayEntry.sets[setIndex].poids.trim() !== '') && 
                   (todayEntry.sets[setIndex].reps && todayEntry.sets[setIndex].reps.trim() !== '')) {
                   fieldElement.classList.remove('pending-input');
                }

                const card = target.closest('.exercise-card');
                if (card && !card.classList.contains('has-today-perf')) {
                    card.classList.add('has-today-perf');
                }
            }
        };

        const handleBlur = (e) => {
            const target = e.target;
            const field = target.dataset.field;

            if (field === 'Exercice' && originalExerciseName && originalExerciseName.trim() !== target.innerText.trim()) {
                const newName = target.innerText.trim();
                const programName = state.currentProgram;
                const index = parseInt(target.closest('.exercise-card').dataset.index, 10);

                const isDuplicate = state.programs[programName].exercises.some(
                    (ex, idx) => ex.Exercice.trim() === newName && idx !== index
                );

                if (isDuplicate) {
                    showToast("Ce nom d'exercice est déjà utilisé.", true);
                    target.innerText = originalExerciseName;
                    state.programs[programName].exercises[index].Exercice = originalExerciseName;
                } else {
                    if (state.performance[programName] && state.performance[programName][originalExerciseName]) {
                        state.performance[programName][newName] = state.performance[programName][originalExerciseName];
                        delete state.performance[programName][originalExerciseName];
                        showToast('Exercice renommé et données transférées.', false);
                    }
                }
            }
            originalExerciseName = null;
            saveState();
            
            if (field === 'Exercice') {
                renderProgram();
            }
        };

        async function promptAndSetDirectory() {
            try {
                const handle = await window.showDirectoryPicker();
                await saveDirectoryHandle(handle);
                backupDirectoryHandle = handle;
                showToast("Dossier de sauvegarde sélectionné !");
                return handle;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error("Erreur lors de la sélection du dossier:", err);
                    showToast("Impossible de sélectionner ce dossier.", true);
                }
                return null;
            }
        }

        async function verifyPermission(handle) {
            if (!handle) return false;
            const options = { mode: 'readwrite' };
            if (await handle.queryPermission(options) === 'granted') return true;
            if (await handle.requestPermission(options) === 'granted') return true;
            showToast("La permission d'accès au dossier a été refusée.", true);
            return false;
        }

        // Backup local — uniquement le fichier daté (sans last_backup.json)
        const handleBackup = async () => {
            cleanupEmptyPerformances();
            const dateString = new Date().toISOString().slice(0, 10);
            const filename = `backup_fitness_${dateString}.json`;
            const backupState = { ...state, isDirty: false };
            const jsonContent = JSON.stringify(backupState, null, 2);

            // Tenter File System Access API (Chrome desktop/Android)
            // Si indisponible OU bloqué (GitHub Pages, Safari), fallback téléchargement
            if (isFileSystemAccessAPISupported) {
                try {
                    let handle = backupDirectoryHandle;
                    if (!handle) handle = await promptAndSetDirectory();
                    if (!handle) { throw new Error('no-handle'); }
                    if (!(await verifyPermission(handle))) { throw new Error('no-permission'); }
                    backupDirectoryHandle = handle;

                    const fileHandle = await handle.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(jsonContent);
                    await writable.close();

                    state.isDirty = false;
                    state.activeFileName = filename;
                    saveState();
                    renderHeader();
                    showToast(`💾 Backup local : ${filename}`);
                    return;
                } catch (err) {
                    if (err.message === 'no-handle' || err.message === 'no-permission') return;
                    // Autre erreur (API bloquée sur GitHub Pages) → fallback
                    console.warn('File System API indisponible, fallback téléchargement :', err);
                }
            }

            // Fallback téléchargement (GitHub Pages, Safari, Firefox)
            const a = document.createElement('a');
            const blob = new Blob([jsonContent], { type: 'application/json' });
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
            state.isDirty = false;
            state.activeFileName = filename;
            saveState();
            renderHeader();
            showToast(`💾 Téléchargement : ${filename}`);
        };

        const handleImport = async (isMerge = false) => {
            if (isFileSystemAccessAPISupported) {
                try {
                    const pickerOpts = {
                        types: [{ description: 'Fichiers JSON', accept: { 'application/json': ['.json'] } }],
                        multiple: isMerge,
                        startIn: backupDirectoryHandle || 'downloads'
                    };
                    const fileHandles = await window.showOpenFilePicker(pickerOpts);
                    await processFiles(fileHandles, isMerge, true);
                    return;
                } catch (err) {
                    if (err.name === 'AbortError') return; // Annulé par l'utilisateur
                    // API bloquée (GitHub Pages, Safari) → fallback input[file]
                    console.warn('showOpenFilePicker indisponible, fallback input[file] :', err);
                }
            }
            // Fallback universel (GitHub Pages, Firefox, Safari)
            fileInput.multiple = isMerge;
            fileInput.dataset.isMerge = isMerge;
            fileInput.click();
        };

        async function processFiles(files, isMerge, areHandles = false) {
           try {
                if (isMerge) {
                    let mergedCount = 0;
                    for (const fileOrHandle of files) {
                        const file = areHandles ? await fileOrHandle.getFile() : fileOrHandle;
                        const content = await file.text();
                        const importedState = JSON.parse(content);
                        if (importedState.performance) {
                            Object.keys(importedState.performance).forEach(progName => {
                                if (!state.performance[progName]) state.performance[progName] = {};
                                Object.keys(importedState.performance[progName]).forEach(exoName => {
                                    if (!state.performance[progName][exoName]) state.performance[progName][exoName] = [];
                                    const existingDates = new Set(state.performance[progName][exoName].map(e => e.date));
                                    const newEntries = importedState.performance[progName][exoName].filter(e => e && e.date && !existingDates.has(e.date));
                                    if (newEntries.length > 0) {
                                        state.performance[progName][exoName].push(...newEntries);
                                    }
                                });
                            });
                        }
                        mergedCount++;
                    }
                    Object.values(state.performance).forEach(prog => {
                        Object.values(prog).forEach(exoHistory => exoHistory.sort((a,b) => new Date(a.date) - new Date(b.date)));
                    });
                    if(mergedCount > 0) {
                        saveState(); refreshAll();
                        showToast(`${mergedCount} fichier(s) fusionné(s) !`);
                    }
                } else {
                    const file = areHandles ? await files[0].getFile() : files[0];
                    const content = await file.text();
                    const importedState = JSON.parse(content);
                    if (importedState.programs && importedState.performance) {
                        state = importedState;
                        state.activeFileName = file.name; state.isDirty = false;
                        saveState(); refreshAll();
                        showToast('Backup importé avec succès !');
                    } else { throw new Error("Format de fichier invalide."); }
                }
            } catch (err) {
                 console.error("Erreur de traitement du fichier :", err);
                 showToast(err.message || "Erreur lors de l'importation.", true);
            }
        }

        function handleSwipe() {
            if (!state.programOrder || state.programOrder.length < 2) return;
            const deltaX = touchEndX - touchStartX;
            const minSwipeDistance = 100;
            const currentIndex = state.programOrder.indexOf(state.currentProgram);
            if (currentIndex === -1) return;
            let newIndex = currentIndex;
            if (deltaX < -minSwipeDistance) {
                newIndex = (currentIndex + 1) % state.programOrder.length;
            } else if (deltaX > minSwipeDistance) {
                newIndex = (currentIndex - 1 + state.programOrder.length) % state.programOrder.length;
            }
            if (newIndex !== currentIndex) {
                state.currentProgram = state.programOrder[newIndex];
                saveState();
                refreshAll();
            }
        }

        mainContent.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        mainContent.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, false);

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            const isMerge = e.target.dataset.isMerge === 'true';
            processFiles(files, isMerge, false);
            e.target.value = '';
        });

        const refreshAll = () => { applyTheme(); renderHeader(); populateSelector(); renderProgram(); };
        programSelect.addEventListener('change', (e) => {

        const toggleAllExercises = (shouldCollapse) => {

        addExerciseBtn.addEventListener('click', () => {
            const programName = state.currentProgram;
            if (!programName) { showToast("Veuillez d'abord sélectionner ou créer un programme.", true); return; }
            const newExercise = { "Groupe": "", "Exercice": "", "Séries": "4", "Répétitions": "10", "Repos": "60", "Notes d'exécution": "", "Objectif charge/reps": "" };
            if (!state.programs[programName].exercises) state.programs[programName].exercises = [];

            renderProgram({ newlyAddedIndex: state.programs[programName].exercises.length - 1 });
            setTimeout(() => {

                    newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => newCard.classList.remove('newly-added'), 1500);
                }
            }, 50);
        });

        clearAllPerfBtn.addEventListener('click', () => {
            const programName = state.currentProgram;
            if (!programName || !state.programs[programName]) { showToast("Aucun programme à effacer.", true); return; }
            const program = state.programs[programName];
            if (!program.exercises) { return; }

            if (confirm(`Voulez-vous créer une séance vide pour aujourd'hui pour tous les exercices de "${programName}" ?`)) {
                program.exercises.forEach(exercise => {
                    if (exercise.Exercice) {
                        const todayEntry = getOrCreateTodayEntry(programName, exercise.Exercice);
                        todayEntry.sets = [{}, {}, {}, {}];
                    }
                });
                saveState();
                renderProgram();
                showToast('Séances du jour créées et réinitialisées.');

        exerciseList.addEventListener('focusin', (e) => {
            const target = e.target;
            if (target.dataset.field === 'Exercice') {
                originalExerciseName = target.innerText.trim();
            }
        });

        app.addEventListener('click', (e) => {
            const target = e.target.closest('[data-action]');
            if (!target) return;

            if (!target.isContentEditable) { e.preventDefault(); }
            
            const action = target.dataset.action;
            const programName = state.currentProgram;
            switch (action) {
                case 'header-backup':
                    handleBackup();
                    break;
                case 'header-import':
                    handleImport(false);
                    break;
                case 'header-drive-save':
                    handleDriveSave();
                    break;
                case 'header-drive-load':
                    handleDriveLoad();
                    break;
                case 'merge-import':
                    handleImport(true);
                    programModalContainer.style.display = 'none';
                    break;
                case 'close-drive-modal': {
                    driveModalContainer.classList.remove('visible');
                    setTimeout(() => { driveModalContainer.style.display = 'none'; }, 200);
                    break;
                }
                case 'copy-last-perf':
                case 'copy-last-weights':
                case 'copy-last-reps': {
                    const exerciseName = target.dataset.exerciseName;
                    const card = target.closest('.exercise-card');
                    const today = new Date().toISOString().split('T')[0];

                    if (!state.performance[programName]) state.performance[programName] = {};
                    let perfHistory = state.performance[programName][exerciseName];
                    if (!perfHistory) {
                        perfHistory = [];
                        state.performance[programName][exerciseName] = perfHistory;
                    }

                    const previousPerfs = perfHistory.filter(p => p.date < today);
                    const latestPerf = previousPerfs.length > 0 ? previousPerfs[previousPerfs.length - 1] : null;

                    if (latestPerf) {
                        const lastSets = JSON.parse(JSON.stringify(latestPerf.sets || []));
                        let todayEntry = perfHistory.find(e => e.date === today);

                        if (!todayEntry) {
                            todayEntry = { date: today, sets: [] };
                            perfHistory.push(todayEntry);
                            perfHistory.sort((a,b) => new Date(a.date) - new Date(b.date));

                            if (action === 'copy-last-perf') {
                                todayEntry.sets = lastSets;
                            } else {
                                todayEntry.sets = lastSets.map(lastSet => {
                                    const newSet = {};
                                    if (action === 'copy-last-weights') newSet.poids = lastSet.poids || '';
                                    if (action === 'copy-last-reps') newSet.reps = lastSet.reps || '';
                                    return newSet;
                                });
                            }
                        } else {
                            todayEntry.sets.forEach((set, i) => {
                                if (!lastSets[i]) return;
                                if (action === 'copy-last-perf') {
                                    set.poids = lastSets[i].poids || '';
                                    set.reps = lastSets[i].reps || '';
                                } else if (action === 'copy-last-weights') {
                                    set.poids = lastSets[i].poids || '';
                                } else if (action === 'copy-last-reps') {
                                    set.reps = lastSets[i].reps || '';
                                }
                            });
                        }

                        saveState();
                        renderProgram();
                        
                        setTimeout(() => {
                            const updatedCard = document.querySelector(`[data-index="${card.dataset.index}"]`);
                            if(updatedCard) {
                                updatedCard.querySelectorAll('.editable-perf').forEach(input => {
                                    const setIndex = parseInt(input.dataset.setIndex, 10);
                                    if(!lastSets[setIndex]) return;
                                    if(action === 'copy-last-perf' || 
                                       (action === 'copy-last-weights' && lastSets[setIndex].poids) ||
                                       (action === 'copy-last-reps' && lastSets[setIndex].reps)
                                    ) {
                                        const inputBg = input.closest('.input-bg');
                                        if (inputBg) {
                                            inputBg.classList.add('flash-animation');
                                            setTimeout(() => inputBg.classList.remove('flash-animation'), 1200);
                                        }
                                    }
                                });
                            }
                        }, 50);

                    } else {
                        showToast("Aucune performance antérieure à copier.", true);
                    }
                    break;
                }
                case 'delete-exercise': {
                    const card = target.closest('.exercise-card');
                    const index = parseInt(card.dataset.index, 10);
                    if (confirm('Voulez-vous vraiment supprimer cet exercice ?')) {
                        card.classList.add('deleting');
                        setTimeout(() => {
                            const exerciseNameToDelete = state.programs[programName].exercises[index].Exercice;
                            state.programs[programName].exercises.splice(index, 1);
                            if (exerciseNameToDelete && state.performance[programName]?.[exerciseNameToDelete]) {
                                delete state.performance[programName][exerciseNameToDelete];
                                showToast('Exercice et statistiques associées supprimés.', false);
                            }
                            saveState();
                            renderProgram();
                        }, 400); 
                    }
                    break;
                }
                case 'duplicate-exercise': {
                    const card = target.closest('.exercise-card');
                    const index = parseInt(card.dataset.index, 10);
                    const exercises = state.programs[programName].exercises;
                    const exerciseToDuplicate = exercises[index];
                    let newName = `${exerciseToDuplicate.Exercice} (copie)`;
                    let i = 2;
                    while (exercises.some(ex => ex.Exercice === newName)) {
                        newName = `${exerciseToDuplicate.Exercice} (copie ${i++})`;
                    }
                    const newExercise = JSON.parse(JSON.stringify(exerciseToDuplicate));
                    newExercise.Exercice = newName;
                    const newIndex = index + 1;
                    exercises.splice(newIndex, 0, newExercise);
                    saveState();
                    renderProgram({ newlyAddedIndex: newIndex });
                    showToast('Exercice dupliqué.');
                    setTimeout(() => {
                        const newCard = document.querySelector('.newly-added');
                        if (newCard) { setTimeout(() => newCard.classList.remove('newly-added'), 1500); }
                    }, 50);
                    break;
                }
                case 'move-exercise': {
                    const card = target.closest('.exercise-card');
                    const index = parseInt(card.dataset.index, 10);
                    const direction = target.dataset.direction;
                    const exercises = state.programs[programName].exercises;
                    if ((direction === 'up' && index > 0) || (direction === 'down' && index < exercises.length - 1)) {
                        const newIndex = direction === 'up' ? index - 1 : index + 1;
                        const tempId = `glow-${Date.now()}`;
                        [exercises[index], exercises[newIndex]] = [exercises[newIndex], exercises[index]];
                        exercises[newIndex].tempId = tempId;
                        saveState();
                        renderProgram();
                        setTimeout(() => {
                            const cardToGlow = document.getElementById(tempId);
                            if (cardToGlow) {
                                cardToGlow.classList.add('card-glow-animation');
                                setTimeout(() => cardToGlow.classList.remove('card-glow-animation'), 1500);
                            }
                        }, 50);
                    }
                    break;
                }
                case 'toggle-collapse': {
                    const card = target.closest('.exercise-card');
                    const index = parseInt(card.dataset.index, 10);
                    const exercise = state.programs[programName].exercises[index];
                    const tempId = `glow-${Date.now()}`;
                    exercise.tempId = tempId;
                    exercise.isCollapsed = !exercise.isCollapsed;
                    saveState();
                    renderProgram();
                    setTimeout(() => {
                        const cardToGlow = document.getElementById(tempId);
                        if (cardToGlow) {
                            cardToGlow.classList.add('card-glow-animation');
                            setTimeout(() => cardToGlow.classList.remove('card-glow-animation'), 1500);
                        }
                    }, 50);
                    break;

                case 'add-set': {
                    const exerciseName = target.dataset.exerciseName;
                    const todayEntry = getOrCreateTodayEntry(programName, exerciseName);
                    todayEntry.sets.push({});
                    saveState();
                    renderProgram();
                    break;
                }
                case 'delete-set': {
                    const { exerciseName, setIndex } = target.dataset;
                    const todayEntry = getOrCreateTodayEntry(programName, exerciseName);
                    if (todayEntry.sets.length > 1) {
                       todayEntry.sets.splice(parseInt(setIndex, 10), 1);
                       saveState();
                       renderProgram();
                    } else {
                       showToast("Vous ne pouvez pas supprimer la dernière série.", true);
                    }
                    break;
                }
                case 'clear-performance': {
                    const exerciseName = target.dataset.exerciseName;
                    const todayEntry = getOrCreateTodayEntry(programName, exerciseName);
                    todayEntry.sets = [{}, {}, {}, {}];
                    saveState();
                    renderProgram();
                    break;
                }
                case 'view-history': {
                    renderHistoryModal(target.dataset.exerciseName);
                    historyModalContainer.style.display = 'flex';
                    setTimeout(() => historyModalContainer.classList.add('visible'), 10);
                    break;
                }
                case 'filter-history': {
                    renderHistoryModal(target.dataset.exerciseName, target.dataset.period);
                    break;
                }
                case 'filter-stats': {
                    renderGlobalStatsModal(target.dataset.period);
                    break;
                }
                case 'delete-perf-entry': {
                    const { date, exerciseName } = target.dataset;
                    if (confirm(`Voulez-vous vraiment supprimer la séance du ${new Date(date).toLocaleDateString('fr-FR')} pour "${exerciseName}" ?`)) {
                        const perfHistory = state.performance[programName]?.[exerciseName];
                        if (perfHistory) {
                            const entryIndex = perfHistory.findIndex(e => e.date === date);
                            if (entryIndex > -1) {
                                perfHistory.splice(entryIndex, 1);
                                saveState();
                                showToast('Entrée supprimée.');
                                renderHistoryModal(exerciseName, document.querySelector('#history-modal .filter-btn.active')?.dataset.period || '3m');
                            }
                        }
                    }
                    break;
                }
                case 'close-modal': {
                    const modals = [programModalContainer, historyModalContainer, globalStatsModalContainer];
                    modals.forEach(modal => {
                        if(modal.classList.contains('visible')) {
                            modal.classList.remove('visible');
                            setTimeout(() => { modal.style.display = 'none'; }, 200);
                        }
                    });
                    break;
                }
                case 'start-timer': {
                    const card = target.closest('.exercise-card');
                    const index = parseInt(card.dataset.index, 10);
                    const exercise = state.programs[programName].exercises[index];
                    const duration = parseInt(exercise.Repos, 10) || 0;
                    if (duration > 0) {
                        startTimer(duration);
                    } else {
                        showToast("Aucun temps de repos valide défini.", true);
                    }
                    break;
                }
                case 'copy-text': {
                    const card = target.closest('.exercise-card');
                    const fieldName = target.dataset.targetField;
                    const textField = card.querySelector(`[data-field="${fieldName}"]`);
                    if (textField && textField.innerText) {
                        navigator.clipboard.writeText(textField.innerText).then(() => {
                            showToast('Texte copié !');
                        }, () => {
                            showToast('Erreur de copie', true);
                        });
                    } else {
                        showToast('Le champ est vide.', true);
                    }
                    break;
                }
                case 'delete-program': {
                    const name = target.dataset.name;
                    if (confirm(`Voulez-vous vraiment supprimer le programme "${name}" ?`)) {
                        delete state.programs[name];
                        delete state.performance[name];
                        const index = state.programOrder.indexOf(name);
                        if (index > -1) state.programOrder.splice(index, 1);
                        if (state.currentProgram === name) {
                            state.currentProgram = state.programOrder[0] || null;
                        }
                        saveState();
                        renderProgramEditor();
                        refreshAll();
                    }
                    break;
                }
                case 'duplicate-program': {
                    const name = target.dataset.name;
                    let newName = `${name} (copie)`;
                    let i = 2;
                    while (state.programs[newName]) {
                        newName = `${name} (copie ${i++})`;
                    }
                    state.programs[newName] = JSON.parse(JSON.stringify(state.programs[name]));
                    const index = state.programOrder.indexOf(name);
                    state.programOrder.splice(index + 1, 0, newName);
                    saveState();
                    renderProgramEditor();
                    populateSelector();
                    showToast('Programme dupliqué.');
                    break;
                }
                case 'set-pdc': {
                    const targetId = target.dataset.targetId;
                    const weightInput = document.getElementById(targetId);
                    if (weightInput) {
                        weightInput.value = "PDC";
                        const event = new Event('input', { bubbles: true, cancelable: true });
                        weightInput.dispatchEvent(event);
                        const inputBg = weightInput.closest('.input-bg');
                        if(inputBg) {
                            inputBg.classList.add('flash-animation');
                            setTimeout(() => inputBg.classList.remove('flash-animation'), 1200);
                        }
                        weightInput.focus();
                    }
                    break;
                }
                case 'move-program': {
                    const index = parseInt(target.dataset.index, 10);
                    const direction = target.dataset.direction;
                    if (direction === 'up' && index > 0) {
                        [state.programOrder[index], state.programOrder[index - 1]] = [state.programOrder[index - 1], state.programOrder[index]];
                    } else if (direction === 'down' && index < state.programOrder.length - 1) {
                        [state.programOrder[index], state.programOrder[index + 1]] = [state.programOrder[index + 1], state.programOrder[index]];
                    }
                    saveState();
                    renderProgramEditor();
                    populateSelector();
                    break;
                }
            }
        });

        programModalContainer.addEventListener('click', (e) => {
            const target = e.target.closest('button');
            if (!target) return;
            if (target.id === 'remap-backup-path-btn') { promptAndSetDirectory(); }
            if (target.id === 'add-program-btn') {
                const newName = programModalContainer.querySelector('#new-program-name').value.trim();
                if (newName && !state.programs[newName]) {
                    state.programs[newName] = { exercises: [] };
                    state.programOrder.push(newName);
                    if (!state.currentProgram) state.currentProgram = newName;
                    programModalContainer.querySelector('#new-program-name').value = '';
                    saveState();
                    renderProgramEditor();
                    refreshAll();
                    showToast('Programme ajouté !');
                } else {
                    showToast('Nom invalide ou déjà existant.', true);
                }
            }
        });

        programModalContainer.addEventListener('change', (e) => {
             if (e.target.classList.contains('program-name-input')) {
                const input = e.target;
                const oldName = input.dataset.oldName;
                const newName = input.value.trim();
                if (newName && newName !== oldName && !state.programs[newName]) {
                    const programData = state.programs[oldName];
                    delete state.programs[oldName];
                    state.programs[newName] = programData;

                    if (state.performance[oldName]) {
                        const perfData = state.performance[oldName];
                        delete state.performance[oldName];
                        state.performance[newName] = perfData;
                    }
                    const index = state.programOrder.indexOf(oldName);
                    if(index > -1) state.programOrder[index] = newName;
                    if (state.currentProgram === oldName) state.currentProgram = newName;
                    if(state.programs[newName].name) { state.programs[newName].name = newName; }
                    input.dataset.oldName = newName;
                    saveState();
                    populateSelector();
                    showToast('Programme renommé.');
                } else if (newName !== oldName) {
                    input.value = oldName;
                    showToast('Nom invalide ou déjà existant.', true);
                }
            }
        });

        async function init() {
            loadDriveConfig();
            loadState();
            refreshAll();
            if (isFileSystemAccessAPISupported) {
                dbRequest.onsuccess = async () => {
                    backupDirectoryHandle = await getDirectoryHandle();
                    if (backupDirectoryHandle) console.log("Un dossier de backup a été trouvé en mémoire.");
                    else showToast("Pensez à choisir un dossier pour les backups via les réglages.");
                };
                dbRequest.onerror = () => showToast("Impossible d'utiliser la base de données locale.", true);
            } else {
                showToast("Le mode de sauvegarde avancé n'est pas supporté par ce navigateur.", true);
            }
        }

        init();
    });
</script>
</body>
</html>
