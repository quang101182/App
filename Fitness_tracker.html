<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Tracker V10 - Drive Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text-main: #e2e8f0;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #toast.error { background-color: #ef4444; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        /* Loader */
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid var(--accent); width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-2 md:p-4 pb-20">

    <header class="glass-panel sticky top-0 z-50 rounded-xl p-3 mb-4 flex flex-wrap justify-between items-center gap-2">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-dumbbell text-blue-500 text-xl"></i>
            <h1 class="font-bold text-lg tracking-wide">FITNESS V10</h1>
        </div>
        
        <div class="flex gap-2">
            <button onclick="openDriveConfig()" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition text-gray-300" title="Config Drive">
                <i class="fa-solid fa-gear"></i> <i class="fa-brands fa-google-drive"></i>
            </button>
            <button onclick="handleDriveUpload()" class="p-2 rounded-lg bg-blue-900/50 hover:bg-blue-800 border border-blue-500/30 text-blue-300 transition" title="Sauver sur Drive">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </button>
            <button onclick="handleDriveDownloadSelector()" class="p-2 rounded-lg bg-green-900/50 hover:bg-green-800 border border-green-500/30 text-green-300 transition" title="Charger depuis Drive">
                <i class="fa-solid fa-cloud-arrow-down"></i>
            </button>
            <button onclick="handleLocalDownload()" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition" title="Backup Local (Fichier)">
                <i class="fa-solid fa-download"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow space-y-4 max-w-4xl mx-auto w-full">
        
        <div class="glass-panel p-4 rounded-xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Programme Actif</h2>
                <button onclick="openProgramManager()" class="text-xs text-blue-400 hover:text-blue-300">Gérer</button>
            </div>
            <select id="programSelector" onchange="switchProgram(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded p-3 text-white focus:outline-none focus:border-blue-500 transition">
                </select>
        </div>

        <div class="glass-panel p-4 rounded-xl border-l-4 border-blue-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white"><i class="fa-solid fa-pen-to-square mr-2"></i>Saisie Séance</h2>
                <input type="date" id="sessionDate" class="bg-slate-800 border border-slate-700 rounded p-1 text-sm text-gray-300">
            </div>
            
            <div id="exerciseInputs" class="space-y-4">
                </div>

            <button onclick="saveSession()" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-white shadow-lg shadow-blue-900/20 transition active:scale-95">
                VALIDER LA SÉANCE
            </button>
        </div>

        <div class="glass-panel p-4 rounded-xl">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Progression</h2>
            <div class="h-64">
                <canvas id="progressionChart"></canvas>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-xl">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Dernières Séances</h2>
            <div id="historyList" class="space-y-2 text-sm">
                </div>
        </div>
    </main>
        <div id="toast">Notification</div>

    <div id="modalDriveConfig" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[60]">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-11/12 max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-blue-400"><i class="fa-brands fa-google-drive mr-2"></i>Configuration Drive</h3>
            <p class="text-xs text-gray-400 mb-4">Entrez vos identifiants Google Cloud Project (OAuth2). Stockés localement.</p>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Client ID</label>
                    <input type="text" id="driveClientId" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-sm text-white" placeholder="xxx.apps.googleusercontent.com">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">API Key</label>
                    <input type="text" id="driveApiKey" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-sm text-white" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Folder ID (Dossier Cible)</label>
                    <input type="text" id="driveFolderId" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-sm text-white" placeholder="1A2B3C...">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal('modalDriveConfig')" class="px-4 py-2 rounded text-gray-400 hover:text-white">Annuler</button>
                <button onclick="saveDriveConfig()" class="px-4 py-2 bg-blue-600 rounded text-white font-bold">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="modalDrivePicker" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[60]">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-11/12 max-w-md shadow-2xl h-3/4 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-green-400"><i class="fa-solid fa-cloud-arrow-down mr-2"></i>Charger un Backup</h3>
                <button onclick="closeModal('modalDrivePicker')" class="text-gray-400 hover:text-white"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div id="driveFileList" class="flex-grow overflow-y-auto space-y-2 pr-2">
                <div class="text-center text-gray-500 py-10"><span class="spinner"></span> Chargement...</div>
            </div>
        </div>
    </div>

    <div id="modalProgramManager" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[60]">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-11/12 max-w-lg shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Gestion des Programmes</h3>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Créer nouveau</label>
                    <div class="flex gap-2">
                        <input type="text" id="newProgramName" class="flex-grow bg-slate-800 border border-slate-700 rounded p-2 text-white" placeholder="Nom (ex: Jambes)">
                        <button onclick="createProgram()" class="px-3 bg-green-600 rounded text-white"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                
                <div class="border-t border-slate-700 pt-4">
                    <label class="block text-xs text-gray-500 mb-2">Renommer / Supprimer existants</label>
                    <div id="programListManager" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
            </div>

            <div class="flex justify-end">
                <button onclick="closeModal('modalProgramManager')" class="px-4 py-2 bg-gray-700 rounded text-white">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. STATE & CONFIG
         */
        let state = {
            currentProgram: "PPL Push",
            programs: {
                "PPL Push": { exercises: ["Développé Couché", "Développé Militaire", "Dips"], history: [] }
            },
            activeFileName: "fitness_data.json"
        };

        let driveConfig = { clientId: '', apiKey: '', folderId: '' };
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let chartInstance = null;

        /**
         * 2. INITIALISATION
         */
        window.onload = function() {
            loadLocalState();
            loadDriveConfig();
            setupDateInput();
            if(driveConfig.apiKey && driveConfig.clientId) loadGoogleLibs();
        };

        function loadGoogleLibs() {
            if(typeof gapi !== 'undefined') gapi.load('client', initializeGapiClient);
            if(typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: driveConfig.clientId,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: '',
                });
                gisInited = true;
            }
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: driveConfig.apiKey,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            gapiInited = true;
            console.log("GAPI Initialisé");
        }

        function openDriveConfig() {
            document.getElementById('driveClientId').value = driveConfig.clientId || '';
            document.getElementById('driveApiKey').value = driveConfig.apiKey || '';
            document.getElementById('driveFolderId').value = driveConfig.folderId || '';
            openModal('modalDriveConfig');
        }

        function saveDriveConfig() {
            driveConfig.clientId = document.getElementById('driveClientId').value.trim();
            driveConfig.apiKey = document.getElementById('driveApiKey').value.trim();
            driveConfig.folderId = document.getElementById('driveFolderId').value.trim();
            localStorage.setItem('FITNESS_DRIVE_CFG', JSON.stringify(driveConfig));
            showToast("Configuration Drive sauvegardée");
            closeModal('modalDriveConfig');
            setTimeout(() => location.reload(), 1000); 
        }

        function loadDriveConfig() {
            const saved = localStorage.getItem('FITNESS_DRIVE_CFG');
            if(saved) driveConfig = JSON.parse(saved);
        }
                /**
         * 3. DRIVE LOGIC & UI
         */
        async function handleDriveUpload() {
            if(!gapiInited || !gisInited) { showToast("Vérifiez la config Drive.", true); openDriveConfig(); return; }
            tokenClient.callback = async (resp) => { if (resp.error) throw resp; await performDriveUpload(); };
            if (gapi.client.getToken() === null) tokenClient.requestAccessToken({prompt: 'consent'});
            else await performDriveUpload();
        }

        async function performDriveUpload() {
            showToast("Sauvegarde Drive en cours...", false);
            const dateString = new Date().toISOString().slice(0, 10);
            const content = JSON.stringify(state, null, 2);
            try {
                await saveFileToDrive(`backup_fitness_${dateString}.json`, content);
                await saveFileToDrive(`last_backup.json`, content);
                showToast("✅ Sauvegarde Drive réussie");
            } catch (err) { console.error(err); showToast("❌ Erreur Sauvegarde Drive", true); }
        }

        async function saveFileToDrive(fileName, content) {
            let fileId = null;
            const q = `name = '${fileName}' and '${driveConfig.folderId}' in parents and trashed = false`;
            const response = await gapi.client.drive.files.list({ 'q': q, 'fields': 'files(id, name)', 'spaces': 'drive' });
            if (response.result.files && response.result.files.length > 0) fileId = response.result.files[0].id;

            const blob = new Blob([content], {type: 'application/json'});
            if (fileId) {
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                    method: 'PATCH', headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, body: blob
                });
            } else {
                const metadata = { name: fileName, parents: [driveConfig.folderId], mimeType: 'application/json' };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, body: form
                });
            }
        }

        function handleDriveDownloadSelector() {
             if(!gapiInited || !gisInited) { showToast("Configurez Drive d'abord", true); openDriveConfig(); return; }
            tokenClient.callback = async (resp) => { if (resp.error) throw resp; await listDriveFiles(); };
            if (gapi.client.getToken() === null) tokenClient.requestAccessToken({prompt: ''});
            else listDriveFiles();
        }

        async function listDriveFiles() {
            openModal('modalDrivePicker');
            const listContainer = document.getElementById('driveFileList');
            listContainer.innerHTML = '<div class="text-center py-4"><span class="spinner"></span> Recherche...</div>';
            try {
                const response = await gapi.client.drive.files.list({
                    'q': `'${driveConfig.folderId}' in parents and mimeType = 'application/json' and trashed = false`,
                    'fields': 'files(id, name, modifiedTime)', 'orderBy': 'modifiedTime desc', 'pageSize': 20
                });
                const files = response.result.files;
                listContainer.innerHTML = '';
                if (files && files.length > 0) {
                    files.forEach(file => {
                        const date = new Date(file.modifiedTime).toLocaleString();
                        const isLast = file.name === 'last_backup.json';
                        const el = document.createElement('div');
                        el.className = `p-3 rounded bg-slate-800 hover:bg-slate-700 cursor-pointer border border-slate-700 flex justify-between items-center transition ${isLast ? 'border-green-500/50' : ''}`;
                        el.onclick = () => loadFileContent(file.id, file.name);
                        el.innerHTML = `<div><div class="font-bold text-sm ${isLast ? 'text-green-400' : 'text-blue-200'}">${file.name}</div><div class="text-xs text-gray-500">${date}</div></div><i class="fa-solid fa-cloud-arrow-down text-gray-400"></i>`;
                        listContainer.appendChild(el);
                    });
                } else listContainer.innerHTML = '<div class="text-center text-gray-500">Aucun fichier trouvé.</div>';
            } catch (err) { console.error(err); listContainer.innerHTML = '<div class="text-red-400 text-center">Erreur lors du listing.</div>'; }
        }

        async function loadFileContent(fileId, fileName) {
            showToast(`Chargement de ${fileName}...`);
            closeModal('modalDrivePicker');
            try {
                const response = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                const json = response.result;
                if(!json.programs) throw new Error("Format invalide");
                state = json; state.activeFileName = fileName;
                saveLocalState(); populateSelector(); switchProgram(state.currentProgram);
                showToast("✅ Données chargées avec succès !");
            } catch (err) { console.error(err); showToast("Erreur lors du chargement", true); }
        }

        function handleLocalDownload() {
            const dateString = new Date().toISOString().slice(0, 10);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'}));
            a.download = `backup_fitness_${dateString}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            showToast("Backup local téléchargé");
        }

        // --- UI & LOGIC ---
        function saveSession() {
            const date = document.getElementById('sessionDate').value;
            const program = state.programs[state.currentProgram];
            let sessionData = { date: date, exercises: {} }, hasData = false;

            program.exercises.forEach(exo => {
                const perf = document.getElementById(`input-${exo}`).value;
                if(perf.trim()) { sessionData.exercises[exo] = perf; hasData = true; }
            });
            if(!hasData) return showToast("Saisie vide !", true);

            const existingIndex = program.history.findIndex(h => h.date === date);
            if(existingIndex >= 0) { if(confirm("Écraser la séance existante ?")) program.history[existingIndex] = sessionData; else return; } 
            else { program.history.push(sessionData); program.history.sort((a, b) => new Date(a.date) - new Date(b.date)); }
            saveLocalState(); refreshUI(); showToast("Séance enregistrée !");
        }

        function refreshUI() { renderHistory(); updateChart(); }
        
        function switchProgram(name) {
            state.currentProgram = name; saveLocalState();
            const container = document.getElementById('exerciseInputs'); container.innerHTML = '';
            if(state.programs[name]) {
                state.programs[name].exercises.forEach(exo => {
                    const div = document.createElement('div');
                    div.innerHTML = `<label class="block text-xs text-blue-300 mb-1">${exo}</label><input type="text" id="input-${exo}" placeholder="ex: 4x10 @ 80kg" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-white focus:border-blue-500 transition">`;
                    container.appendChild(div);
                });
                refreshUI();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            state.programs[state.currentProgram].history.slice().reverse().slice(0, 5).forEach(h => {
                let details = '';
                for(const [exo, perf] of Object.entries(h.exercises)) details += `<span class="mr-2 px-2 py-0.5 rounded bg-slate-800 text-xs text-gray-300 border border-slate-700">${exo}: ${perf}</span>`;
                const item = document.createElement('div');
                item.className = 'p-3 bg-slate-800/50 rounded border border-slate-700 hover:bg-slate-700 transition';
                item.innerHTML = `<div class="flex justify-between items-center mb-2"><span class="text-blue-400 font-bold">${new Date(h.date).toLocaleDateString()}</span><button onclick="deleteSession('${h.date}')" class="text-red-400 hover:text-red-300 text-xs"><i class="fa-solid fa-trash"></i></button></div><div class="flex flex-wrap gap-1">${details}</div>`;
                list.appendChild(item);
            });
        }

        function updateChart() {
            const ctx = document.getElementById('progressionChart').getContext('2d');
            const history = state.programs[state.currentProgram].history;
            const exercises = state.programs[state.currentProgram].exercises;
            if(chartInstance) chartInstance.destroy();
            const datasets = exercises.map((exo, index) => {
                const dataPoints = history.map(h => {
                    if(!h.exercises[exo]) return null;
                    const val = h.exercises[exo].match(/(\d+([.,]\d+)?)/);
                    return val ? { x: h.date, y: parseFloat(val[1].replace(',', '.')) } : null;
                }).filter(p => p !== null);
                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
                return { label: exo, data: dataPoints, borderColor: colors[index % colors.length], backgroundColor: colors[index % colors.length], tension: 0.3, pointRadius: 4 };
            });
            chartInstance = new Chart(ctx, { type: 'line', data: { datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { type: 'time', time: { unit: 'day' }, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } } } } });
        }

        function deleteSession(dateStr) { if(confirm("Supprimer cette séance ?")) { const p = state.programs[state.currentProgram]; p.history = p.history.filter(h => h.date !== dateStr); saveLocalState(); refreshUI(); } }

        function populateSelector() {
            const sel = document.getElementById('programSelector'); sel.innerHTML = '';
            Object.keys(state.programs).forEach(key => { const opt = document.createElement('option'); opt.value = key; opt.text = key; if(key === state.currentProgram) opt.selected = true; sel.appendChild(opt); });
            renderProgramManagerList();
        }

        function renderProgramManagerList() {
            const div = document.getElementById('programListManager'); div.innerHTML = '';
            Object.keys(state.programs).forEach(key => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700";
                row.innerHTML = `<span class="text-sm">${key}</span><button onclick="deleteProgram('${key}')" class="text-red-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>`;
                div.appendChild(row);
            });
        }

        function createProgram() {
            const name = document.getElementById('newProgramName').value.trim();
            if(!name || state.programs[name]) return;
            state.programs[name] = { exercises: ["Exercice 1"], history: [] }; state.currentProgram = name;
            document.getElementById('newProgramName').value = ''; saveLocalState(); populateSelector(); switchProgram(name); showToast("Programme créé");
        }

        function deleteProgram(name) {
            if(Object.keys(state.programs).length <= 1) return showToast("Impossible de supprimer le dernier", true);
            if(confirm(`Supprimer ${name} ?`)) { delete state.programs[name]; state.currentProgram = Object.keys(state.programs)[0]; saveLocalState(); populateSelector(); switchProgram(state.currentProgram); }
        }

        function loadLocalState() {
            const saved = localStorage.getItem('FITNESS_V10_DATA');
            if(saved) { state = JSON.parse(saved); populateSelector(); switchProgram(state.currentProgram); } 
            else { populateSelector(); switchProgram("PPL Push"); }
        }

        function saveLocalState() { localStorage.setItem('FITNESS_V10_DATA', JSON.stringify(state)); }
        function setupDateInput() { document.getElementById('sessionDate').valueAsDate = new Date(); }
        function showToast(msg, isError = false) { const t = document.getElementById('toast'); t.textContent = msg; t.className = isError ? 'error show' : 'show'; setTimeout(() => t.className = t.className.replace('show', ''), 3000); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function openProgramManager() { renderProgramManagerList(); openModal('modalProgramManager'); }

    </script>
</body>
</html>
