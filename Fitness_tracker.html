<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Google Drive API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            /* Palette Générale */
            --bg-main-1: #020617; --bg-main-2: #0f172a; --bg-main-3: #130b2a; --bg-main-4: #1e293b;
            --text-main: #e2e8f0; --text-secondary: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2); --border-hover: rgba(165, 180, 252, 0.5);

            /* Couleurs d'accent et lueurs */
            --glow-app-title: #facc15;
            --glow-exo-title: #22d3ee;
            --glow-orange: #f97316;
            --glow-magenta: #ec4899;
            --glow-teal: #2dd4bf;
            --glow-yellow: #facc15;
            --glow-violet: #8b5cf6;
            --glow-red: #ef4444;
            --glow-green: #22c55e;

            /* --- STYLES SPÉCIFIQUES --- */
            --bg-card-start: #1e293b; --bg-card-end: #0f172a;
            --card-border-top: rgba(203, 213, 225, 0.2); --card-border-bottom: rgba(2, 6, 23, 0.4);
            --bg-secondary: rgba(15, 23, 42, 0.7);

            /* Boutons */
            --btn-backup-start: var(--glow-exo-title); --btn-backup-end: var(--glow-violet);
            --btn-import-start: var(--glow-violet); --btn-import-end: var(--glow-magenta);
            --btn-merge-start: var(--glow-teal); --btn-merge-end: var(--glow-exo-title);
            --btn-add-start: #22c55e; --btn-add-end: #16a34a;

            /* Icônes */
            --icon-color: #a5b4fc;
            --icon-delete-color: var(--glow-magenta);
            --icon-timer-color: var(--glow-violet);
            --icon-history-color: var(--glow-teal);
            --icon-stats-color: var(--glow-teal);
            --icon-backup-color: var(--glow-green);
            --icon-import-color: var(--glow-violet);
            --icon-drive-save-color: #4285F4;
            --icon-drive-load-color: #34A853;
        }

        html:not(.dark) {
            --bg-main-1: #f1f5f9; --bg-main-2: #e2e8f0; --bg-main-3: #f0f3ff; --bg-main-4: #e5eaf9;
            --text-main: #1e293b; --text-secondary: #475569;
            --border-color: rgba(71, 85, 105, 0.2); --border-hover: rgba(99, 102, 241, 0.6);
            --glow-app-title: #ca8a04;
            --glow-exo-title: #0891b2;
            --glow-orange: #ea580c;
            --glow-magenta: #be185d;
            --glow-teal: #0d9488;
            --glow-yellow: #ca8a04;
            --glow-violet: #7c3aed;
            --glow-red: #dc2626;
            --glow-green: #16a34a;
            --bg-card-start: #ffffff; --bg-card-end: #eef2ff;
            --card-border-top: rgba(255, 255, 255, 0.9); --card-border-bottom: rgba(203, 213, 225, 0.8);
            --bg-secondary: rgba(248, 250, 252, 0.7);
            --btn-add-start: #22c55e; --btn-add-end: #15803d;
            --icon-color: #4f46e5;
            --icon-backup-color: var(--glow-green);
            --icon-import-color: var(--glow-violet);
            --icon-drive-save-color: #1a73e8;
            --icon-drive-load-color: #188038;
        }

        @keyframes background-pan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes title-glow { 0% { text-shadow: 0 0 8px var(--glow-app-title), 0 0 10px #fff; } 70% { text-shadow: 0 0 15px var(--glow-app-title), 0 0 25px #fff; } 100% { text-shadow: 0 0 8px var(--glow-app-title), 0 0 10px #fff; } }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0px var(--glow-red), 0 0 15px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4), 0 0 30px rgba(0,0,0,0.7); } 100% { box-shadow: 0 0 0 0px var(--glow-red), 0 0 15px rgba(0,0,0,0.5); } }
        @keyframes number-glow { 0%, 100% { text-shadow: 0 0 6px var(--program-color, var(--glow-green)), 0 0 10px #fff, 0 0 14px #fff; } 50% { text-shadow: 0 0 12px var(--program-color, var(--glow-green)), 0 0 20px #fff, 0 0 28px #fff; } }
        @keyframes icon-glow-pulse { 0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 8px var(--glow-violet), 0 0 10px #fff, 0 0 15px #fff; } 50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 16px var(--glow-violet), 0 0 20px #fff, 0 0 35px #fff; } 90% { opacity: 1; transform: scale(1); } 95% { opacity: 0; transform: scale(0.9); } }
        
        /* --- Final Animation Polish --- */
        .icon-btn, #add-exercise-btn, .footer-btn, button[data-action="set-pdc"] { transition: transform 0.1s ease; }
        .icon-btn:active, #add-exercise-btn:active, .footer-btn:active, button[data-action="set-pdc"]:active { transform: scale(0.95); }

        .modal-container { transition: opacity 0.2s ease, transform 0.2s ease; opacity: 0; transform: scale(0.98); pointer-events: none; }
        .modal-container.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        
        #exercise-list { transition: opacity 0.2s ease-in-out; }

        .collapse-icon { transition: transform 0.3s ease; }
        .is-collapsed { transform: rotate(-180deg); }
        
        @keyframes flash-success-triple {
            0%, 100% { background-color: transparent; }
            15%, 45%, 75% { background-color: rgba(34, 197, 94, 0.5); }
            30%, 60%, 90% { background-color: transparent; }
        }
        .input-bg { position: relative; }
        .flash-animation::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: 0.375rem;
            animation: flash-success-triple 1.2s ease-in-out;
            pointer-events: none;
        }

        @keyframes border-glow-green-triple {
             0%, 100% { box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); }
             15%, 45%, 75% { box-shadow: inset 0 0 10px 3px var(--glow-green), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); }
             30%, 60%, 90% { box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); }
        }
        .card-glow-animation {
            animation: border-glow-green-triple 1.5s ease-in-out !important;
        }
        
        .newly-added {
            animation: fade-in-up 0.4s ease-out, border-glow-green-triple 1.5s ease-in-out;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 8px rgba(45, 212, 191, 0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 50% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 18px rgba(45, 212, 191, 0.6), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 8px rgba(45, 212, 191, 0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } }
        @keyframes slide-out-left { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
        .exercise-card.deleting { animation: slide-out-left 0.4s ease-out forwards; }
        
        .program-editor-item:focus-within { background-color: var(--border-hover); }

        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, var(--bg-main-1), var(--bg-main-2), var(--bg-main-3), var(--bg-main-4)); background-size: 400% 400%; animation: background-pan 25s ease infinite; color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        header { background-color: var(--bg-secondary); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); }
        .bg-card { background: linear-gradient(145deg, var(--bg-card-start), var(--bg-card-end)); border: 1px solid var(--card-border-top); box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .exercise-card {
            box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom);
        }
        .exercise-card:not(.newly-added) {
             animation: fade-in-up 0.5s ease-out forwards;
        }
        .bg-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 12px 25px rgba(0,0,0,0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); }
        .exercise-card:hover {
            box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 12px 25px rgba(0,0,0,0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom);
        }
        .has-today-perf, .has-today-perf:hover {
            animation: pulse-glow 3s infinite ease-in-out;
            box-shadow: inset 0 0 0 2px var(--glow-teal), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom);
        }
        .input-bg, select, .filter-btn { background-color: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); transition: border-color 0.3s, background-color 0.3s; }
        select:focus, input:focus { border-color: var(--glow-exo-title); }
        #program-select {
            border: 2px solid var(--program-color, var(--border-color));
            box-shadow: 0 0 12px -2px var(--program-color, transparent);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .filter-btn.active { border-color: var(--glow-exo-title); background-color: rgba(34, 211, 238, 0.2); }
        #app-title-container { display: flex; align-items: center; gap: 0.75rem; }
        #app-title { color: var(--glow-app-title); animation: title-glow 4s ease-in-out infinite; font-weight: 700; }
        #app-icon { color: var(--glow-violet); animation: icon-glow-pulse 6s ease-in-out infinite; }
        .exercise-title { color: var(--glow-exo-title); }
        .subtitle-color { color: var(--glow-orange); }
        .label-color { color: var(--text-secondary); }
        .exercise-number { font-weight: 700; font-size: 1.75rem; background: linear-gradient(45deg, var(--program-color, var(--glow-green)), #ffffff); -webkit-background-clip: text; background-clip: text; color: transparent; animation: number-glow 3s ease-in-out infinite; filter: saturate(1.5); }
        .pending-input { border: 1px solid var(--glow-red) !important; background-color: color-mix(in srgb, var(--glow-red) 15%, transparent) !important; }
        #clear-all-perf-btn, button[data-action="clear-performance"] { color: var(--glow-magenta); }
        #manage-programs-btn { color: var(--glow-yellow); }
        #global-stats-btn { color: var(--icon-stats-color); }
        #theme-toggle-btn { color: var(--icon-color); }
        button[data-action="header-backup"] { color: var(--icon-backup-color); transition: color 0.3s, text-shadow 0.3s; }
        button[data-action="header-backup"].is-dirty { color: var(--glow-orange); animation: dirty-pulse 2s ease-in-out infinite; }
        @keyframes dirty-pulse {
            0%, 100% { text-shadow: 0 0 4px var(--glow-orange); }
            50% { text-shadow: 0 0 12px var(--glow-orange), 0 0 20px var(--glow-orange); }
        }
        button[data-action="header-import"] { color: var(--icon-import-color); }
        button[data-action="header-drive-save"] { color: var(--icon-drive-save-color); transition: color 0.3s, text-shadow 0.3s; }
        button[data-action="header-drive-save"].is-dirty { color: var(--glow-orange); animation: dirty-pulse 2s ease-in-out infinite; }
        button[data-action="header-drive-load"] { color: var(--icon-drive-load-color); }
        button[data-action="delete-exercise"], button[data-action="delete-perf-entry"] { color: var(--icon-delete-color); }
        button[data-action="start-timer"] { color: var(--icon-timer-color); }
        button[data-action="view-history"] { color: var(--icon-history-color); }
        button[data-action="duplicate-exercise"] { color: var(--glow-yellow); }
        button[data-action="delete-set"] { color: var(--glow-red); background-color: rgba(15, 23, 42, 0.8); border-radius: 9999px; width: 1rem; height: 1rem; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; position: absolute; top: -0.25rem; right: -0.25rem; }
        #remap-backup-path-btn { color: var(--glow-exo-title); }
        .footer-btn { color: white; font-weight: bold; padding: 0.75rem 1rem; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: none; text-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: transform 0.3s, box-shadow 0.3s, background 0.3s; }
        .footer-btn:hover { transform: scale(1.05); }
        #add-exercise-btn { background: linear-gradient(45deg, var(--btn-add-start), var(--btn-add-end)); border: none; box-shadow: 0 0 20px var(--btn-add-start); transition: transform 0.3s, box-shadow 0.3s; }
        #add-exercise-btn:hover { box-shadow: 0 0 30px var(--btn-add-end); }
        #timer-display { background: radial-gradient(circle, rgba(40,10,10,0.95) 0%, rgba(15,2,2,0.98) 100%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 2px solid var(--glow-red); animation: pulse-border 2s ease-in-out infinite; }
        #timer-text { text-shadow: 0 0 10px var(--glow-red), 0 0 20px #fff; }
        .icon-btn { transition: transform 0.2s, color 0.2s, text-shadow 0.2s; }
        .icon-btn:hover { transform: scale(1.2); color: var(--glow-exo-title); text-shadow: 0 0 10px var(--glow-exo-title); }
        .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; text-shadow: none; color: var(--text-secondary); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
        [contenteditable]:empty:before { content: attr(placeholder); pointer-events: none; display: block; color: var(--text-secondary); opacity: 0.6; }
        [contenteditable="true"] { border: 1px solid transparent; border-radius: 4px; padding: 2px 6px; min-height: 1.5em; cursor: text; transition: all 0.2s ease-in-out; }
        [contenteditable="true"]:hover { background-color: rgba(148, 163, 184, 0.1); border-color: var(--border-hover); }
        [contenteditable="false"] { cursor: default; }
        span[contenteditable="true"] { display: inline-block; min-width: 25px; text-align: center; }
        [contenteditable="true"]:focus, [contenteditable="true"]:focus-visible { outline: none; border-color: var(--glow-exo-title); background-color: rgba(15, 23, 42, 0.5); box-shadow: 0 0 8px var(--glow-exo-title); }
        .modal-backdrop { background-color: rgba(10, 5, 20, 0.8); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .toast-success { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .toast-error { background: linear-gradient(135deg, #db2777, #ef4444); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .collapsible-content { transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out, transform 0.5s ease-in-out; max-height: 2000px; opacity: 1; transform: translateY(0); overflow: hidden; }
        .collapsible-content.hidden { max-height: 0; opacity: 0; transform: translateY(-10px); }
        :is(button, a, select, [contenteditable="true"]):focus-visible { outline: 3px solid var(--glow-exo-title); outline-offset: 2px; box-shadow: 0 0 15px var(--glow-exo-title); }
        #stats-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { text-align: center; padding: 4px; border-radius: 4px; background-color: rgba(255,255,255,0.05); }
        .calendar-day-header { font-weight: bold; color: var(--text-secondary); }
        .calendar-day.active-day { background-color: var(--glow-teal); color: var(--bg-main-1); font-weight: bold; }
        .calendar-day.empty { background-color: transparent; }

        /* Drive file list modal */
        .drive-file-item { cursor: pointer; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-color); transition: background 0.2s, border-color 0.2s; display: flex; align-items: center; gap: 10px; }
        .drive-file-item:hover { background-color: rgba(34,211,238,0.1); border-color: var(--glow-exo-title); }
        .drive-file-item i { color: var(--glow-exo-title); flex-shrink: 0; }

        /* Drive connected indicator */
        #drive-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--glow-red); display: inline-block; margin-right: 4px; transition: background 0.3s; }
        #drive-status-dot.connected { background: var(--glow-green); }

        @media print { body { background: none; color: #000; } header, footer, #add-exercise-btn, .icon-btn, button[data-action] { display: none; } main { padding-top: 0; } .bg-card { box-shadow: none; border: 1px solid #ccc; margin-bottom: 1rem; page-break-inside: avoid; } .collapsible-content { display: block !important; max-height: none !important; opacity: 1 !important; transform: none !important; } [contenteditable="true"] { border: none; } #app-title { color: #000; text-shadow: none; animation: none; } .exercise-title, .subtitle-color { color: #333; } }
    </style>
</head>
<body class="antialiased">

    <div id="app" class="flex flex-col min-h-screen">
        <header class="shadow-md px-3 pt-2 pb-1 sticky top-0 z-20 border-b">
            <div class="max-w-4xl mx-auto space-y-1">
                <!-- Ligne 1 : titre + icônes utilitaires -->
                <div class="flex items-center justify-between">
                    <div id="app-title-container">
                        <h1 id="app-title" class="text-base font-bold leading-tight">Fitness Tracker</h1>
                        <span id="app-icon" class="text-base"><i class="fa-solid fa-dumbbell"></i></span>
                    </div>
                    <div class="flex items-center gap-0.5">
                        <button id="collapse-all-btn" class="p-1.5 rounded-full icon-btn" title="Tout replier"><i class="fa-solid fa-compress fa-fw text-sm"></i></button>
                        <button id="expand-all-btn" class="p-1.5 rounded-full icon-btn" title="Tout déplier"><i class="fa-solid fa-expand fa-fw text-sm"></i></button>
                        <button id="clear-all-perf-btn" class="p-1.5 rounded-full icon-btn" title="Effacer les réalisations du jour"><i class="fa-solid fa-eraser fa-fw text-sm"></i></button>
                        <button id="global-stats-btn" class="p-1.5 rounded-full icon-btn" title="Statistiques Globales"><i class="fa-solid fa-chart-pie fa-fw text-sm"></i></button>
                        <button id="manage-programs-btn" class="p-1.5 rounded-full icon-btn" title="Gérer les programmes"><i class="fa-solid fa-cogs fa-fw text-sm"></i></button>
                        <button id="theme-toggle-btn" class="p-1.5 rounded-full icon-btn" title="Changer de thème"><i id="theme-icon" class="fa-solid fa-sun fa-fw text-sm"></i></button>
                    </div>
                </div>
                <!-- Ligne 2 : sélecteur programme pleine largeur -->
                <select id="program-select" class="input-bg border-border-color text-main text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 w-full p-2"></select>
                <!-- Ligne 3 : boutons backup/drive + bannière -->
                <div class="flex items-center justify-between border-t border-border-color pt-1">
                    <div class="flex items-center gap-0.5">
                        <button data-action="header-backup" class="p-1.5 rounded-full icon-btn" title="Backup local"><i class="fa-solid fa-cloud-arrow-up fa-fw text-sm"></i></button>
                        <button data-action="header-import" class="p-1.5 rounded-full icon-btn" title="Importer local"><i class="fa-solid fa-cloud-arrow-down fa-fw text-sm"></i></button>
                        <span class="mx-1 opacity-30 text-xs">|</span>
                        <button data-action="header-drive-save" class="p-1.5 rounded-full icon-btn" title="Sauvegarder Drive"><i class="fa-brands fa-google-drive fa-fw text-sm"></i></button>
                        <button data-action="header-drive-load" class="p-1.5 rounded-full icon-btn" title="Charger Drive"><i class="fa-solid fa-folder-open fa-fw text-sm"></i></button>
                    </div>
                    <p id="active-backup-name" class="text-xs text-secondary hidden italic min-w-0 overflow-hidden" style="text-overflow:ellipsis; white-space:nowrap; max-width:calc(100% - 160px);"></p>
                </div>
            </div>
        </header>

        <main class="flex-grow px-4 md:px-6 max-w-4xl mx-auto w-full pb-24 pt-4">
            <div id="exercise-list" class="space-y-4"></div>
        </main>

        <button id="add-exercise-btn" class="fixed bottom-5 right-5 text-white rounded-full p-4 shadow-lg z-30 transition-transform transform hover:scale-110"><i class="fa-solid fa-plus"></i></button>

        <div id="toast" class="fixed top-5 right-4 py-2 px-5 rounded-lg shadow-xl opacity-0 transform -translate-y-4 transition-all duration-300 z-50 flex items-center space-x-2">
            <i id="toast-icon" class="fas"></i><span id="toast-text"></span>
        </div>

        <div id="timer-display" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white py-4 px-8 rounded-lg z-50 hidden items-center gap-4 font-mono">
            <span id="timer-text" class="text-4xl"></span>
            <button id="timer-close-btn" class="text-2xl font-bold">&times;</button>
        </div>

        <div id="program-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <div id="history-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <div id="global-stats-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <!-- Modale Drive -->
        <div id="drive-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <input type="file" id="file-input" class="hidden" accept=".json" multiple>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const app = document.getElementById('app');
        const mainContent = document.querySelector('main');
        const programSelect = document.getElementById('program-select');
        const exerciseList = document.getElementById('exercise-list');
        const collapseAllBtn = document.getElementById('collapse-all-btn');
        const expandAllBtn = document.getElementById('expand-all-btn');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toast-icon');
        const toastText = document.getElementById('toast-text');
        const manageProgramsBtn = document.getElementById('manage-programs-btn');
        const globalStatsBtn = document.getElementById('global-stats-btn');
        const programModalContainer = document.getElementById('program-modal');
        const historyModalContainer = document.getElementById('history-modal');
        const globalStatsModalContainer = document.getElementById('global-stats-modal');
        const driveModalContainer = document.getElementById('drive-modal');
        const addExerciseBtn = document.getElementById('add-exercise-btn');
        const clearAllPerfBtn = document.getElementById('clear-all-perf-btn');
        const activeBackupNameDisplay = document.getElementById('active-backup-name');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const timerDisplay = document.getElementById('timer-display');
        const timerText = document.getElementById('timer-text');
        const timerCloseBtn = document.getElementById('timer-close-btn');
        const fileInput = document.getElementById('file-input');

        let state = {
            currentProgram: null, programOrder: [], programs: {},
            performance: {}, activeFileName: null, isDirty: false, theme: 'dark'
        };
        let timerInterval = null;
        let audioCtx;
        let backupDirectoryHandle = null;
        let chartInstances = {};
        let originalExerciseName = null;
        const isFileSystemAccessAPISupported = 'showDirectoryPicker' in window;
        let touchStartX = 0;
        let touchEndX = 0;

        // =============================================
        // GOOGLE DRIVE — Variables et configuration
        // =============================================
        let driveConfig = { clientId: '', apiKey: '', folderId: '' };
        let driveSession = { tokenClient: null, accessToken: null, isConnected: false };

        function loadDriveConfig() {
            const saved = localStorage.getItem('fitnessDriveConfig');
            if (saved) {
                try { driveConfig = { ...driveConfig, ...JSON.parse(saved) }; } catch(e) {}
            }
        }

        function saveDriveConfig() {
            localStorage.setItem('fitnessDriveConfig', JSON.stringify(driveConfig));
        }

        function updateDriveStatusDot() {
            const dot = document.getElementById('drive-status-dot');
            if (dot) dot.classList.toggle('connected', driveSession.isConnected);
        }

        function initDriveConnection(callback) {
            if (!driveConfig.clientId || !driveConfig.apiKey) {
                showToast('Config Drive manquante ! Ouvrez les réglages.', true);
                return;
            }
            gapi.load('client', async () => {
                await gapi.client.init({
                    apiKey: driveConfig.apiKey,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
                });
                driveSession.tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: driveConfig.clientId,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (resp) => {
                        if (resp.error) {
                            showToast('Erreur d\'authentification Google.', true);
                            return;
                        }
                        driveSession.accessToken = resp.access_token;
                        driveSession.isConnected = true;
                        updateDriveStatusDot();
                        showToast('Connecté à Google Drive');
                        if (typeof callback === 'function') callback();
                    }
                });
                driveSession.tokenClient.requestAccessToken({ prompt: '' });
            });
        }

        function ensureDriveConnected(callback) {
            if (driveSession.isConnected && driveSession.accessToken) {
                callback();
            } else {
                initDriveConnection(callback);
            }
        }

        // Réinitialise la session expirée et relance l'auth, puis rappelle le callback
        function refreshDriveToken(callback) {
            console.warn('Token Drive expiré (401) — reconnexion automatique...');
            driveSession.isConnected = false;
            driveSession.accessToken = null;
            updateDriveStatusDot();
            initDriveConnection(callback);
        }

        // Sauvegarde Google Drive — écrase ou crée le fichier, détecte le 401
        async function driveUpsertFile(filename, content) {
            const blob = new Blob([content], { type: 'application/json' });
            let q = `name = '${filename}' and mimeType = 'application/json' and trashed = false`;
            if (driveConfig.folderId) q += ` and '${driveConfig.folderId}' in parents`;
            const searchRes = await gapi.client.drive.files.list({ q, fields: 'files(id)', pageSize: 1 });
            if (searchRes.status === 401) throw new Error('TOKEN_EXPIRED');
            const existingId = searchRes.result.files?.[0]?.id;

            let response;
            if (existingId) {
                response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${driveSession.accessToken}`, 'Content-Type': 'application/json' },
                    body: blob
                });
            } else {
                const meta = { name: filename, mimeType: 'application/json' };
                if (driveConfig.folderId) meta.parents = [driveConfig.folderId];
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', blob);
                response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${driveSession.accessToken}` },
                    body: form
                });
            }
            if (response && response.status === 401) throw new Error('TOKEN_EXPIRED');
            if (response && !response.ok) throw new Error(`Erreur Drive HTTP ${response.status}`);
        }

        const handleDriveSave = (isRetry = false) => {
            ensureDriveConnected(async () => {
                showToast('Envoi vers Drive...');
                cleanupEmptyPerformances();
                try {
                    const backupState = { ...state, isDirty: false };
                    const jsonContent = JSON.stringify(backupState, null, 2);
                    const dateString = new Date().toISOString().slice(0, 10);
                    const dailyFilename = `backup_fitness_${dateString}.json`;
                    const lastFilename = 'fitness_last_backup.json';

                    await driveUpsertFile(dailyFilename, jsonContent);
                    await driveUpsertFile(lastFilename, jsonContent);

                    state.isDirty = false;
                    state.activeFileName = dailyFilename;
                    saveState();
                    renderHeader(`☁️ ${dailyFilename.replace('backup_fitness_','').replace('.json','')} ✓`);
                    showToast(`☁️ Drive : ${dailyFilename} + last_backup ✓`);
                } catch(e) {
                    if (e.message === 'TOKEN_EXPIRED' && !isRetry) {
                        refreshDriveToken(() => handleDriveSave(true));
                    } else {
                        console.error('Erreur Drive save:', e);
                        showToast('Erreur sauvegarde Drive.', true);
                    }
                }
            });
        };

        const handleDriveLoad = (isRetry = false) => {
            ensureDriveConnected(async () => {
                showToast('Récupération des fichiers...');
                try {
                    let q = `mimeType = 'application/json' and trashed = false`;
                    if (driveConfig.folderId) q += ` and '${driveConfig.folderId}' in parents`;
                    const res = await gapi.client.drive.files.list({
                        q,
                        fields: 'files(id, name, modifiedTime)',
                        orderBy: 'modifiedTime desc',
                        pageSize: 50
                    });
                    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
                    const files = res.result.files || [];
                    renderDriveLoadModal(files);
                } catch(e) {
                    if (e.message === 'TOKEN_EXPIRED' && !isRetry) {
                        refreshDriveToken(() => handleDriveLoad(true));
                    } else {
                        console.error('Erreur Drive list:', e);
                        showToast('Erreur lecture Drive.', true);
                    }
                }
            });
        };

        function renderDriveLoadModal(files) {
            let filesHTML = '';
            if (files.length === 0) {
                filesHTML = `<p class="text-secondary text-center py-6">Aucun fichier JSON trouvé dans ce dossier.</p>`;
            } else {
                filesHTML = files.map(f => {
                    const date = new Date(f.modifiedTime).toLocaleString('fr-FR');
                    return `<div class="drive-file-item" data-file-id="${f.id}" data-file-name="${f.name}">
                        <i class="fa-solid fa-file-code"></i>
                        <div class="flex-grow min-w-0">
                            <p class="font-semibold truncate">${f.name}</p>
                            <p class="text-xs text-secondary">${date}</p>
                        </div>
                        <i class="fa-solid fa-download text-secondary"></i>
                    </div>`;
                }).join('');
            }

            driveModalContainer.innerHTML = `
                <div class="modal-backdrop absolute inset-0" data-action="close-drive-modal"></div>
                <div class="bg-card rounded-lg shadow-xl w-full max-w-md m-4 p-6 relative flex flex-col max-h-[80vh] border border-border-hover">
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-border-color">
                        <h2 class="text-xl font-bold exercise-title">
                            <i class="fa-brands fa-google-drive mr-2"></i>Charger depuis Drive
                        </h2>
                        <button data-action="close-drive-modal" class="p-1 text-2xl icon-btn">&times;</button>
                    </div>
                    <p class="text-xs text-secondary mb-3">Sélectionnez un fichier à importer (remplace les données actuelles) :</p>
                    <div class="flex-grow overflow-y-auto space-y-2 pr-1" id="drive-file-list">
                        ${filesHTML}
                    </div>
                </div>`;
            driveModalContainer.style.display = 'flex';
            setTimeout(() => driveModalContainer.classList.add('visible'), 10);

            // Événements de sélection de fichier avec gestion 401 + retry
            document.getElementById('drive-file-list')?.addEventListener('click', async (e) => {
                const item = e.target.closest('.drive-file-item');
                if (!item) return;
                const fileId = item.dataset.fileId;
                const fileName = item.dataset.fileName;

                const doLoad = async (isRetry = false) => {
                    showToast(`Chargement de ${fileName}...`);
                    try {
                        const res = await gapi.client.drive.files.get({ fileId, alt: 'media' });
                        if (res.status === 401) throw new Error('TOKEN_EXPIRED');
                        const importedState = JSON.parse(res.body);
                        if (importedState.programs && importedState.performance) {
                            state = importedState;
                            state.activeFileName = fileName;
                            state.isDirty = false;
                            saveState();
                            refreshAll();
                            renderHeader(`☁️ ${fileName.replace('backup_fitness_','').replace('.json','')}`);
                            driveModalContainer.classList.remove('visible');
                            setTimeout(() => { driveModalContainer.style.display = 'none'; }, 200);
                            showToast(`☁️ ${fileName} chargé avec succès !`);
                        } else {
                            throw new Error('Format de fichier invalide.');
                        }
                    } catch(e) {
                        if (e.message === 'TOKEN_EXPIRED' && !isRetry) {
                            refreshDriveToken(() => doLoad(true));
                        } else {
                            console.error('Erreur Drive load file:', e);
                            showToast(e.message || 'Erreur lors du chargement.', true);
                        }
                    }
                };
                doLoad();
            });
        }

        // =============================================
        // FIN GOOGLE DRIVE
        // =============================================

        const dbRequest = indexedDB.open('FitnessTrackerDB', 1);
        dbRequest.onupgradeneeded = event => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('settings')) {
                db.createObjectStore('settings', { keyPath: 'key' });
            }
        };

        function saveDirectoryHandle(handle) {
            return new Promise((resolve, reject) => {
                const db = dbRequest.result;
                const transaction = db.transaction(['settings'], 'readwrite');
                const store = transaction.objectStore('settings');
                store.put({ key: 'backupDirectory', handle: handle });
                transaction.oncomplete = () => resolve();
                transaction.onerror = event => reject(event.target.error);
            });
        }

        function getDirectoryHandle() {
            return new Promise((resolve, reject) => {
                if (!dbRequest.result || !dbRequest.result.objectStoreNames.contains('settings')) {
                    return resolve(null);
                }
                const transaction = dbRequest.result.transaction(['settings'], 'readonly');
                const store = transaction.objectStore('settings');
                const request = store.get('backupDirectory');
                request.onsuccess = event => resolve(event.target.result ? event.target.result.handle : null);
                request.onerror = event => reject(event.target.error);
            });
        }

        function playSound() {
            if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { console.error("Web Audio API is not supported"); return; } }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        function startTimer(durationInSeconds) {
            clearInterval(timerInterval);
            let remaining = durationInSeconds;
            timerDisplay.classList.remove('hidden');
            timerDisplay.classList.add('flex');
            const update = () => {
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                timerText.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                if (remaining <= 0) { clearInterval(timerInterval); playSound(); }
                remaining--;
            };
            update();
            timerInterval = setInterval(update, 1000);
        }

        timerCloseBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timerDisplay.classList.add('hidden');
            timerDisplay.classList.remove('flex');
        });

        const applyTheme = () => {
            document.documentElement.classList.toggle('dark', state.theme === 'dark');
            themeIcon.className = state.theme === 'dark' ? 'fa-solid fa-sun fa-fw' : 'fa-solid fa-moon fa-fw';
        };
        themeToggleBtn.addEventListener('click', () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; applyTheme(); saveState(); });

        const showToast = (message, isError = false) => {
            toastText.textContent = message;
            toast.className = `fixed top-5 right-4 py-2 px-5 rounded-lg shadow-xl opacity-0 transform -translate-y-4 transition-all duration-300 z-50 flex items-center space-x-2 ${isError ? 'toast-error' : 'toast-success'}`;
            toastIcon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.classList.remove('opacity-0', '-translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', '-translate-y-4'), 3000);
        };

        const cleanupEmptyPerformances = () => {
            const today = new Date().toISOString().split('T')[0];
            for (const progName in state.performance) {
                for (const exoName in state.performance[progName]) {
                    const cleanedHistory = state.performance[progName][exoName].filter(entry => {
                        if (entry.date === today) { return true; }
                        return (entry.sets || []).some(set =>
                            (set.poids && set.poids.toString().trim() !== '') ||
                            (set.reps && set.reps.toString().trim() !== '')
                        );
                    });
                    if (cleanedHistory.length === 0) {
                        delete state.performance[progName][exoName];
                    } else {
                        state.performance[progName][exoName] = cleanedHistory;
                    }
                }
            }
        };
        
        const cleanupOrphanedData = () => {
            console.log("Lancement du nettoyage des données orphelines...");
            const existingPrograms = new Set(Object.keys(state.programs));
            const validExercises = new Set();
            for (const progName of existingPrograms) {
                (state.programs[progName].exercises || []).forEach(exo => {
                    if (exo.Exercice) validExercises.add(`${progName}|${exo.Exercice.trim()}`);
                });
            }
            for (const progName in state.performance) {
                if (!existingPrograms.has(progName)) {
                    console.log(`Programme orphelin trouvé et supprimé : ${progName}`);
                    delete state.performance[progName];
                    continue;
                }
                for (const exoName in state.performance[progName]) {
                    if (!validExercises.has(`${progName}|${exoName.trim()}`)) {
                        console.log(`Exercice orphelin trouvé et supprimé : ${progName} > ${exoName}`);
                        delete state.performance[progName][exoName];
                    }
                }
            }
            console.log("Nettoyage terminé.");
        };
        
        const saveState = () => {
            try {
                if (!state.isDirty) { state.isDirty = true; renderHeader(); }
                cleanupEmptyPerformances();
                localStorage.setItem('fitnessTrackerState', JSON.stringify(state));
            } catch (e) { console.error("Error saving state to localStorage:", e); showToast("Erreur: Impossible de sauvegarder les données.", true); }
        };

        const loadState = () => {
            const savedState = localStorage.getItem('fitnessTrackerState');
            if (savedState) { state = JSON.parse(savedState); }
            state.programs = state.programs || {};
            state.performance = state.performance || {};
            state.programOrder = state.programOrder || Object.keys(state.programs);
            state.activeFileName = state.activeFileName || null;
            state.isDirty = state.isDirty || false;
            state.theme = state.theme || 'dark';
            if (!state.currentProgram || !state.programs[state.currentProgram]) {
                state.currentProgram = state.programOrder[0] || null;
            }
        };

        const renderHeader = (overrideLabel = null) => {
            // Indicateur isDirty sur les boutons backup local et Drive save
            const backupBtn = document.querySelector('button[data-action="header-backup"]');
            const driveSaveBtn = document.querySelector('button[data-action="header-drive-save"]');
            if (backupBtn) backupBtn.classList.toggle('is-dirty', !!state.isDirty);
            if (driveSaveBtn) driveSaveBtn.classList.toggle('is-dirty', !!state.isDirty);

            if (overrideLabel) {
                activeBackupNameDisplay.textContent = overrideLabel;
                activeBackupNameDisplay.classList.remove('hidden');
            } else if (state.activeFileName) {
                const shortName = state.activeFileName
                    .replace('backup_fitness_', '')
                    .replace('.json', '');
                const dirty = state.isDirty ? ' *' : ' ✓';
                activeBackupNameDisplay.textContent = `💾 ${shortName}${dirty}`;
                activeBackupNameDisplay.classList.remove('hidden');
            } else {
                activeBackupNameDisplay.classList.add('hidden');
            }
        };

        const renderProgram = (options = {}) => {
            const programName = state.currentProgram;
            let programColor = 'transparent';
            if (programName) {
                let hue = 0;
                for (let i = 0; i < programName.length; i++) {
                    hue = (hue + programName.charCodeAt(i) * 37) % 360;
                }
                programColor = `hsl(${hue}, 85%, 65%)`;
            }
            document.documentElement.style.setProperty('--program-color', programColor);
            exerciseList.innerHTML = '';
            const program = programName ? state.programs[programName] : null;
            const exercises = program ? program.exercises || [] : [];
            const areExercisesPresent = exercises.length > 0;
            collapseAllBtn.style.display = areExercisesPresent ? 'inline-block' : 'none';
            expandAllBtn.style.display = areExercisesPresent ? 'inline-block' : 'none';
            if (!areExercisesPresent) {
                exerciseList.innerHTML = `<div class="text-center text-secondary mt-8 p-8 bg-card rounded-lg shadow-lg"><i class="fa-solid fa-rocket text-4xl text-cyan-400 mb-4"></i><h3 class="font-bold text-xl mb-2">Bienvenue !</h3><p>${programName ? 'Ce programme est vide.' : 'Aucun programme sélectionné.'}</p><p class="mt-2">Créez un programme ou ajoutez des exercices.</p><button id="create-first-program" class="mt-4 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-4 rounded-lg">Gérer les programmes</button></div>`;
                document.getElementById('create-first-program')?.addEventListener('click', () => manageProgramsBtn.click());
                return;
            }

            exercises.forEach((exercise, index) => {
                const card = document.createElement('div');
                if (exercise.tempId) {
                    card.id = exercise.tempId;
                    delete exercise.tempId;
                }
                card.className = "bg-card rounded-xl p-4 relative exercise-card";
                card.dataset.index = index;
                if (options.newlyAddedIndex === index) { card.classList.add("newly-added"); } else { card.classList.add("fade-in-up"); }
                
                const today = new Date().toISOString().split('T')[0];
                const perfHistory = state.performance[programName]?.[exercise.Exercice] || [];
                const todayPerfEntry = perfHistory.find(e => e.date === today);
                const hasTodayData = todayPerfEntry && (todayPerfEntry.sets || []).some(s => (s.poids && s.poids.toString().trim() !== '') || (s.reps && s.reps.toString().trim() !== ''));

                if (hasTodayData) { card.classList.add('has-today-perf'); }
                
                const previousPerfs = perfHistory.filter(p => p.date < today);
                const latestPerf = previousPerfs.length > 0 ? previousPerfs[previousPerfs.length - 1] : null;
                const showCopyButton = !todayPerfEntry && latestPerf && (latestPerf.sets || []).some(s => s.poids || s.reps);
                const displayPerf = todayPerfEntry || latestPerf;

                let performanceDateHTML = '';
                if (displayPerf && displayPerf.date) {
                    const formattedDate = new Date(displayPerf.date).toLocaleDateString('fr-FR');
                    performanceDateHTML = `<span class="flex items-center text-xs text-secondary font-normal"><i class="fa-solid fa-calendar-day mr-2"></i>${formattedDate}</span>`;
                }
                
                const realisationData = (todayPerfEntry?.sets) || (latestPerf?.sets) || [{}, {}, {}, {}];
                const isEditable = !!todayPerfEntry;

                let setsHTML = '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-1">';
                realisationData.forEach((set, i) => {
                    const isComplete = set.poids && set.poids.toString().trim() !== '' && set.reps && set.reps.toString().trim() !== '';
                    const isPending = isEditable && !isComplete;
                    const containerClasses = isPending ? 'pending-input' : '';
                    const safeExoName = exercise.Exercice.replace(/[^a-zA-Z0-9]/g, '');
                    const poidsInputId = `poids-${i}-${safeExoName}`;
                    setsHTML += `<div class="input-bg p-2 rounded-lg relative ${containerClasses}">
                        ${isEditable ? `<button data-action="delete-set" data-exercise-name="${exercise.Exercice}" data-set-index="${i}" class="icon-btn" title="Supprimer la série">&times;</button>` : ''}
                        <div class="flex justify-between items-center mb-1 pr-4">
                            <label class="text-xs font-medium text-secondary">Série ${i + 1}</label>
                            ${isEditable ? `<button data-action="set-pdc" data-target-id="${poidsInputId}" class="text-xs font-bold text-cyan-400 border border-cyan-400 rounded px-1 py-0.5 hover:bg-cyan-900 transition-colors leading-none" title="Remplir Poids du Corps">PDC</button>`: ''}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" inputmode="decimal" class="editable-perf w-1/2 bg-card rounded-md text-center" id="${poidsInputId}" data-exercise="${exercise.Exercice}" data-set-index="${i}" data-sub-field="poids" placeholder="Poids" value="${set.poids || ''}" ${!isEditable ? 'disabled' : ''}>
                            <input type="text" inputmode="decimal" class="editable-perf w-1/2 bg-card rounded-md text-center" data-exercise="${exercise.Exercice}" data-set-index="${i}" data-sub-field="reps" placeholder="Reps" value="${set.reps || ''}" ${!isEditable ? 'disabled' : ''}>
                        </div>
                    </div>`;
                });
                setsHTML += '</div>';

                const copyButtonsHTML = showCopyButton ? `
                    <div class="flex items-center gap-3">
                        <button data-action="copy-last-perf" data-exercise-name="${exercise.Exercice}" class="text-xs text-cyan-400 hover:text-cyan-300 flex items-center gap-1" title="Copier toute la séance"><i class="fa-solid fa-copy pointer-events-none"></i></button>
                        <button data-action="copy-last-weights" data-exercise-name="${exercise.Exercice}" class="text-xs text-cyan-400 hover:text-cyan-300 flex items-center gap-1" title="Copier les poids"><i class="fa-solid fa-weight-hanging"></i></button>
                        <button data-action="copy-last-reps" data-exercise-name="${exercise.Exercice}" class="text-xs text-cyan-400 hover:text-cyan-300 flex items-center gap-1" title="Copier les répétitions"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                ` : '';

                card.innerHTML = `

        const renderHistoryModal = (exerciseName, period = '3m') => {
            let history = state.performance[state.currentProgram]?.[exerciseName] || [];
            if (!Array.isArray(history)) history = [];

            const now = new Date();
            let startDate = new Date();
            if (period === '3m') startDate.setMonth(now.getMonth() - 3);
            else if (period === '6m') startDate.setMonth(now.getMonth() - 6);
            else if (period === '1y') startDate.setFullYear(now.getFullYear() - 1);
            else startDate = new Date(0);

            const filteredHistory = history.filter(e => new Date(e.date) >= startDate);

            let listHTML = '<p class="text-secondary">Aucun historique pour cette période.</p>';
            if (filteredHistory.length > 0) {
                const groupedByMonth = filteredHistory.slice().reverse().reduce((acc, entry) => {
                    const month = new Date(entry.date).toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
                    if (!acc[month]) acc[month] = [];
                    acc[month].push(entry);
                    return acc;
                }, {});

                listHTML = Object.entries(groupedByMonth).map(([month, entries]) => {
                    const entriesHTML = entries.map(entry => {
                        const sets = (entry.sets || []).filter(s => s.poids || s.reps).map(s => `${s.poids || '-'}kg x ${s.reps || '-'}`).join(' / ');
                        return `<div class="p-2 bg-secondary rounded-md flex justify-between items-center">
                            <div>
                                <p class="font-semibold">${new Date(entry.date).toLocaleDateString('fr-FR')}</p>
                                <p class="text-sm text-secondary">${sets}</p>

                        </div>`;
                    }).join('');
                    return `<div class="mb-3"><h4 class="font-bold text-secondary mb-2">${month.charAt(0).toUpperCase() + month.slice(1)}</h4><div class="space-y-2">${entriesHTML}</div></div>`;
                }).join('');
            }

            const periodFilters = [
                { label: '3 Mois', value: '3m' }, { label: '6 Mois', value: '6m' },
                { label: '1 An', value: '1y' }, { label: 'Tout', value: 'all' }
            ];
            const filterHTML = periodFilters.map(f => 
                `<button class="filter-btn text-xs px-3 py-1 rounded-md ${period === f.value ? 'active' : ''}" data-action="filter-history" data-period="${f.value}" data-exercise-name="${exerciseName}">${f.label}</button>`
            ).join('');

            historyModalContainer.innerHTML = `<div class="modal-backdrop absolute inset-0" data-action="close-modal"></div>
            <div class="bg-card rounded-lg shadow-xl w-full max-w-2xl m-4 p-6 relative flex flex-col max-h-[80vh] border border-border-hover">
                <div class="flex justify-between items-center mb-4 pb-4 border-b border-border-color">
                    <h2 class="text-xl font-bold exercise-title truncate pr-4">${exerciseName}</h2>
                    <button data-action="close-modal" class="p-1 text-2xl icon-btn">&times;</button>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <h3 id="chart-title" class="font-semibold text-secondary"></h3>
                    <div class="flex gap-2">${filterHTML}</div>
                </div>
                <div class="bg-secondary rounded-lg p-2 h-48 mb-4"><canvas id="performance-chart"></canvas></div>
                <h3 class="font-semibold mt-4 mb-2 text-secondary">Historique des Séances</h3>
                <div class="flex-grow overflow-y-auto space-y-2 pr-2">${listHTML}</div>
            </div>`;
            historyModalContainer.style.display = 'flex';
            
            const allWeights = filteredHistory
                .flatMap(e => (e.sets || []).map(s => s.poids))
                .filter(p => p && p.toString().trim() !== '');

            let isBodyweight = false;
            if (allWeights.length > 0) {
                isBodyweight = allWeights.every(p => isNaN(parseFloat(p)));
            }

            const chartTitle = document.getElementById('chart-title');
            chartTitle.textContent = isBodyweight ? 'Évolution des Répétitions' : 'Évolution du Volume (kg)';

            const chartData = filteredHistory.map(e => ({
                x: e.date,
                y: (e.sets || []).reduce((acc, s) => {
                    const reps = parseInt(s.reps) || 0;
                    if (isBodyweight) return acc + reps;
                    const poids = parseFloat(s.poids) || 0;
                    return acc + (poids * reps);
                }, 0)
            })).filter(d => d.y > 0);

            if (chartInstances['performance']) chartInstances['performance'].destroy();
            const canvas = document.getElementById('performance-chart');

            if (chartData.length === 0) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = "14px Roboto";
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
                ctx.textAlign = "center";
                ctx.fillText('Pas de données pour le graphique.', canvas.width / 2, canvas.height / 2);
                return;
            }

            chartInstances['performance'] = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    datasets: [{
                        label: isBodyweight ? 'Répétitions' : 'Volume (kg)',
                        data: chartData,
                        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--glow-exo-title').trim(),
                        backgroundColor: 'rgba(34, 211, 238, 0.1)',
                        borderWidth: 2, fill: true, tension: 0.3,
                        pointBackgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--glow-magenta').trim()
                    }]

                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { color: 'rgba(129, 140, 248, 0.1)' }, ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() } },
                        y: { beginAtZero: true, grid: { color: 'rgba(129, 140, 248, 0.1)' }, ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() } }

                }
            });
        };

        const renderGlobalStatsModal = (period = 'month') => {
            const exerciseToGroupMap = {};
            Object.values(state.programs).forEach(program => {
                (program.exercises || []).forEach(exercise => {
                    if(exercise.Exercice && exercise.Groupe) {
                        exerciseToGroupMap[exercise.Exercice] = exercise.Groupe;
                    }
                });
            });

            const now = new Date();
            let startDate = new Date(0);
            if (period === 'week') {
                const dayOfWeek = now.getDay();
                const offset = (dayOfWeek === 0) ? 6 : dayOfWeek - 1;
                startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - offset);
            } else if (period === 'month') {
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
            } else if (period === 'year') {
                startDate = new Date(now.getFullYear(), 0, 1);
            }
            startDate.setHours(0,0,0,0);
            
            const allPerfsInPeriod = [];
            Object.entries(state.performance).forEach(([progName, exercises]) => {
                Object.entries(exercises).forEach(([exoName, history]) => {
                    history.forEach(entry => {
                        if (new Date(entry.date) >= startDate) {
                            allPerfsInPeriod.push({ ...entry, exerciseName: exoName });
                        }
                    });
                });
            });

            const allPerfDates = new Set(Object.values(state.performance).flatMap(p => Object.values(p).flat()).map(e => e.date));
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let calendarHTML = '<div class="calendar-day-header">L</div><div class="calendar-day-header">M</div><div class="calendar-day-header">M</div><div class="calendar-day-header">J</div><div class="calendar-day-header">V</div><div class="calendar-day-header">S</div><div class="calendar-day-header">D</div>';
            const offset = (firstDay === 0) ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) calendarHTML += '<div class="calendar-day empty"></div>';
            for(let day=1; day<=daysInMonth; day++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isActive = allPerfDates.has(dateStr);
                calendarHTML += `<div class="calendar-day ${isActive ? 'active-day' : ''}">${day}</div>`;
            }
            
            const sessionsInPeriod = new Set(allPerfsInPeriod.map(p => p.date)).size;
            const totalVolumeInPeriod = allPerfsInPeriod.reduce((total, p) => total + (p.sets || []).reduce((acc, s) => acc + ((parseFloat(s.poids)||0) * (parseInt(s.reps)||0)), 0), 0);
            
            const muscleCounts = {};
            allPerfsInPeriod.forEach(p => {
                const group = exerciseToGroupMap[p.exerciseName] || 'N/A';
                const setCount = (p.sets || []).filter(s => s.reps).length;
                muscleCounts[group] = (muscleCounts[group] || 0) + setCount;
            });
            
            const prs = {};
            for (const [progName, program] of Object.entries(state.programs)) {
                for (const exo of (program.exercises || [])) {
                    if (!exo.Groupe || !state.performance[progName]?.[exo.Exercice]) continue;
                    const bestSet = state.performance[progName][exo.Exercice]
                        .flatMap(e => (e.sets || []).map(s => ({...s, date: e.date})))
                        .filter(s => s.poids && s.reps && !isNaN(parseFloat(s.poids)) && s.poids.toString().trim().toLowerCase() !== 'pdc')
                        .reduce((best, current) => {
                            if (!best.poids) return current;
                            const bestScore = (parseFloat(best.poids) || 0) * (1 + (parseInt(best.reps) || 0) / 30);
                            const currentScore = (parseFloat(current.poids) || 0) * (1 + (parseInt(current.reps) || 0) / 30);
                            return currentScore > bestScore ? current : best;
                        }, {});
                    if(bestSet && bestSet.poids) {
                        const existingPrScore = prs[exo.Groupe] ? (parseFloat(prs[exo.Groupe].poids) * (1 + parseInt(prs[exo.Groupe].reps) / 30)) : 0;
                        const newPrScore = (parseFloat(bestSet.poids) * (1 + parseInt(bestSet.reps) / 30));
                        if (newPrScore > existingPrScore) {
                           prs[exo.Groupe] = { ...bestSet, name: exo.Exercice };
                        }
                    }
                }
            }
            
            let prHTML = Object.entries(prs).map(([group, pr]) => `
                <div class="p-2 bg-secondary rounded-md text-sm">
                    <p class="font-bold text-secondary">${group}</p>
                    <p class="font-semibold text-main">${pr.name}</p>
                    <p class="text-cyan-400">${pr.poids}kg x ${pr.reps} reps <span class="text-xs text-secondary">(${new Date(pr.date).toLocaleDateString('fr-FR')})</span></p>
                </div>
            `).join('');
            if (!prHTML) prHTML = `<p class="text-sm text-secondary">Aucun record trouvé.</p>`;

            const periodFilters = [
                { label: 'Semaine', value: 'week' }, { label: 'Mois', value: 'month' },
                { label: 'Année', value: 'year' }, { label: 'Tout', value: 'all' }
            ];
            const filterHTML = periodFilters.map(f => 
                `<button class="filter-btn text-xs px-3 py-1 rounded-md ${period === f.value ? 'active' : ''}" data-action="filter-stats" data-period="${f.value}">${f.label}</button>`
            ).join('');

            globalStatsModalContainer.innerHTML = `<div class="modal-backdrop absolute inset-0" data-action="close-modal"></div>
            <div class="bg-card rounded-lg shadow-xl w-full max-w-4xl m-4 p-6 relative flex flex-col max-h-[80vh] border border-border-hover">
                <div class="flex justify-between items-center mb-4 pb-4 border-b border-border-color">
                    <h2 class="text-xl font-bold exercise-title">Tableau de Bord Global</h2>
                    <div class="flex gap-2">${filterHTML}</div>
                    <button data-action="close-modal" class="p-1 text-2xl icon-btn">&times;</button>
                </div>
                <div class="flex-grow overflow-y-auto pr-2 grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-semibold mb-2 text-secondary">Activité</h3>
                        <div class="p-3 bg-secondary rounded-lg ${period !== 'month' ? 'hidden' : ''}" id="stats-calendar-container">
                            <h4 class="text-center font-bold mb-2">${new Date().toLocaleString('fr-FR', {month:'long', year:'numeric'})}</h4>
                            <div id="stats-calendar">${calendarHTML}</div>
                        </div>
                         <div class="grid grid-cols-2 gap-4 ${period === 'month' ? 'mt-4' : ''} text-center">
                            <div class="p-3 bg-secondary rounded-lg"><p class="text-2xl font-bold">${sessionsInPeriod}</p><p class="text-xs text-secondary">Séances</p></div>
