<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker V9 - Drive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            /* Palette Générale */
            --bg-main-1: #020617; --bg-main-2: #0f172a; --bg-main-3: #130b2a; --bg-main-4: #1e293b;
            --text-main: #e2e8f0; --text-secondary: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2); --border-hover: rgba(165, 180, 252, 0.5);
            /* Couleurs d'accent */
            --glow-app-title: #facc15; --glow-exo-title: #22d3ee; --glow-orange: #f97316;
            --glow-magenta: #ec4899; --glow-teal: #2dd4bf; --glow-yellow: #facc15;
            --glow-violet: #8b5cf6; --glow-red: #ef4444; --glow-green: #22c55e;
            --glow-drive: #3b82f6; 
            /* Styles Spécifiques */
            --bg-card-start: #1e293b; --bg-card-end: #0f172a;
            --card-border-top: rgba(203, 213, 225, 0.2); --card-border-bottom: rgba(2, 6, 23, 0.4);
            --bg-secondary: rgba(15, 23, 42, 0.7);
            --btn-add-start: #22c55e; --btn-add-end: #16a34a;
            --icon-color: #a5b4fc; --icon-delete-color: var(--glow-magenta); --icon-timer-color: var(--glow-violet);
            --icon-history-color: var(--glow-teal); --icon-stats-color: var(--glow-teal);
            --icon-backup-color: var(--glow-green); --icon-import-color: var(--glow-violet);
        }
        html:not(.dark) {
            --bg-main-1: #f1f5f9; --bg-main-2: #e2e8f0; --bg-main-3: #f0f3ff; --bg-main-4: #e5eaf9;
            --text-main: #1e293b; --text-secondary: #475569;
            --border-color: rgba(71, 85, 105, 0.2); --border-hover: rgba(99, 102, 241, 0.6);
            --glow-app-title: #ca8a04; --glow-exo-title: #0891b2; --glow-orange: #ea580c;
            --glow-magenta: #be185d; --glow-teal: #0d9488; --glow-yellow: #ca8a04;
            --glow-violet: #7c3aed; --glow-red: #dc2626; --glow-green: #16a34a;
            --bg-card-start: #ffffff; --bg-card-end: #eef2ff;
            --card-border-top: rgba(255, 255, 255, 0.9); --card-border-bottom: rgba(203, 213, 225, 0.8);
            --bg-secondary: rgba(248, 250, 252, 0.7); --btn-add-start: #22c55e; --btn-add-end: #15803d;
            --icon-color: #4f46e5; --icon-backup-color: var(--glow-green); --icon-import-color: var(--glow-violet);
        }
        @keyframes background-pan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes title-glow { 0% { text-shadow: 0 0 8px var(--glow-app-title), 0 0 10px #fff; } 70% { text-shadow: 0 0 15px var(--glow-app-title), 0 0 25px #fff; } 100% { text-shadow: 0 0 8px var(--glow-app-title), 0 0 10px #fff; } }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0px var(--glow-red), 0 0 15px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4), 0 0 30px rgba(0,0,0,0.7); } 100% { box-shadow: 0 0 0 0px var(--glow-red), 0 0 15px rgba(0,0,0,0.5); } }
        @keyframes number-glow { 0%, 100% { text-shadow: 0 0 6px var(--program-color, var(--glow-green)), 0 0 10px #fff, 0 0 14px #fff; } 50% { text-shadow: 0 0 12px var(--program-color, var(--glow-green)), 0 0 20px #fff, 0 0 28px #fff; } }
        @keyframes icon-glow-pulse { 0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 8px var(--glow-violet), 0 0 10px #fff, 0 0 15px #fff; } 50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 16px var(--glow-violet), 0 0 20px #fff, 0 0 35px #fff; } 90% { opacity: 1; transform: scale(1); } 95% { opacity: 0; transform: scale(0.9); } }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid var(--glow-drive); width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .icon-btn, #add-exercise-btn, .footer-btn { transition: transform 0.1s ease; }
        .icon-btn:active, #add-exercise-btn:active, .footer-btn:active { transform: scale(0.95); }
        .modal-container { transition: opacity 0.2s ease, transform 0.2s ease; opacity: 0; transform: scale(0.98); pointer-events: none; }
        .modal-container.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        #exercise-list { transition: opacity 0.2s ease-in-out; }
        .collapse-icon { transition: transform 0.3s ease; } .is-collapsed { transform: rotate(-180deg); }
        @keyframes flash-success-triple { 0%, 100% { background-color: transparent; } 15%, 45%, 75% { background-color: rgba(34, 197, 94, 0.5); } 30%, 60%, 90% { background-color: transparent; } }
        .input-bg { position: relative; } .flash-animation::after { content: ''; position: absolute; inset: 0; z-index: 1; border-radius: 0.375rem; animation: flash-success-triple 1.2s ease-in-out; pointer-events: none; }
        @keyframes border-glow-green-triple { 0%, 100% { box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 15%, 45%, 75% { box-shadow: inset 0 0 10px 3px var(--glow-green), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 30%, 60%, 90% { box-shadow: inset 0 0 0 2px var(--program-color, transparent), 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } }
        .card-glow-animation { animation: border-glow-green-triple 1.5s ease-in-out !important; }
        .newly-added { animation: fade-in-up 0.4s ease-out, border-glow-green-triple 1.5s ease-in-out; }
        @keyframes pulse-glow { 0% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 8px rgba(45, 212, 191, 0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 50% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 18px rgba(45, 212, 191, 0.6), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.2), 0 0 8px rgba(45, 212, 191, 0.3), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); } }
        .exercise-card.deleting { animation: slide-out-left 0.4s ease-out forwards; } @keyframes slide-out-left { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
        
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, var(--bg-main-1), var(--bg-main-2), var(--bg-main-3), var(--bg-main-4)); background-size: 400% 400%; animation: background-pan 25s ease infinite; color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        header { background-color: var(--bg-secondary); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); }
        .bg-card { background: linear-gradient(145deg, var(--bg-card-start), var(--bg-card-end)); border: 1px solid var(--card-border-top); box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px var(--card-border-top), inset 0 -1px 1px var(--card-border-bottom); }
        .has-today-perf { animation: pulse-glow 3s infinite ease-in-out; }
        .input-bg, select, .filter-btn { background-color: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); }
        select:focus, input:focus { border-color: var(--glow-exo-title); }
        #app-title { color: var(--glow-app-title); animation: title-glow 4s ease-in-out infinite; font-weight: 700; }
        #app-icon { color: var(--glow-violet); animation: icon-glow-pulse 6s ease-in-out infinite; }
        .exercise-title { color: var(--glow-exo-title); } .subtitle-color { color: var(--glow-orange); } .label-color { color: var(--text-secondary); }
        .exercise-number { font-weight: 700; font-size: 1.75rem; background: linear-gradient(45deg, var(--program-color, var(--glow-green)), #ffffff); -webkit-background-clip: text; background-clip: text; color: transparent; animation: number-glow 3s ease-in-out infinite; }
        .pending-input { border: 1px solid var(--glow-red) !important; background-color: color-mix(in srgb, var(--glow-red) 15%, transparent) !important; }
        #add-exercise-btn { background: linear-gradient(45deg, var(--btn-add-start), var(--btn-add-end)); border: none; box-shadow: 0 0 20px var(--btn-add-start); }
        button[data-action="drive-config"] { color: var(--text-secondary); } button[data-action="drive-upload"] { color: var(--glow-drive); } button[data-action="drive-download"] { color: var(--glow-green); }
        .toast-success { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; } .toast-error { background: linear-gradient(135deg, #db2777, #ef4444); color: white; }
        .collapsible-content.hidden { max-height: 0; opacity: 0; transform: translateY(-10px); }
        .collapsible-content { transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out, transform 0.5s ease-in-out; max-height: 2000px; opacity: 1; transform: translateY(0); overflow: hidden; }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="flex flex-col min-h-screen">
        <header class="shadow-md p-4 sticky top-0 z-20 border-b">
            <div class="max-w-4xl mx-auto">
                <div class="flex flex-wrap justify-between items-center gap-x-4 gap-y-2">
                    <div id="app-title-container" class="flex items-center gap-3">
                        <h1 id="app-title" class="text-xl font-bold">Fitness Tracker</h1>
                        <span id="app-icon" class="text-xl"><i class="fa-solid fa-dumbbell"></i></span>
                    </div>
                    <select id="program-select" class="input-bg border-border-color text-main text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block p-2.5 order-first sm:order-none sm:mx-auto"></select>
                    <div class="flex items-center space-x-1 sm:space-x-2">
                        <button data-action="drive-config" class="p-2 rounded-full icon-btn" title="Config Drive"><i class="fa-brands fa-google-drive fa-fw"></i></button>
                        <button data-action="drive-upload" class="p-2 rounded-full icon-btn" title="Sauvegarde Drive"><i class="fa-solid fa-cloud-arrow-up fa-fw"></i></button>
                        <button data-action="drive-download" class="p-2 rounded-full icon-btn" title="Chargement Drive"><i class="fa-solid fa-cloud-arrow-down fa-fw"></i></button>
                        <button id="collapse-all-btn" class="p-2 rounded-full icon-btn" title="Tout replier"><i class="fa-solid fa-compress fa-fw"></i></button>
                        <button id="expand-all-btn" class="p-2 rounded-full icon-btn" title="Tout déplier"><i class="fa-solid fa-expand fa-fw"></i></button>
                        <button id="clear-all-perf-btn" class="p-2 rounded-full icon-btn" title="Effacer du jour"><i class="fa-solid fa-eraser fa-fw"></i></button>
                        <button id="global-stats-btn" class="p-2 rounded-full icon-btn" title="Stats"><i class="fa-solid fa-chart-pie fa-fw"></i></button>
                        <button data-action="header-backup" class="p-2 rounded-full icon-btn text-green-400" title="Backup Local"><i class="fa-solid fa-file-arrow-down fa-fw"></i></button>
                        <button data-action="header-import" class="p-2 rounded-full icon-btn text-purple-400" title="Importer"><i class="fa-solid fa-file-arrow-up fa-fw"></i></button>
                        <button id="manage-programs-btn" class="p-2 rounded-full icon-btn text-yellow-400" title="Gérer"><i class="fa-solid fa-cogs fa-fw"></i></button>
                        <button id="theme-toggle-btn" class="p-2 rounded-full icon-btn"><i id="theme-icon" class="fa-solid fa-sun fa-fw"></i></button>
                    </div>
                </div>
                <p id="active-backup-name" class="text-xs text-secondary mt-1 truncate hidden"></p>
            </div>
        </header>
                <main class="flex-grow px-4 md:px-6 max-w-4xl mx-auto w-full pb-24 pt-4">
            <div id="exercise-list" class="space-y-4"></div>
        </main>

        <button id="add-exercise-btn" class="fixed bottom-5 right-5 text-white rounded-full p-4 shadow-lg z-30 transition-transform transform hover:scale-110"><i class="fa-solid fa-plus"></i></button>

        <div id="toast" class="fixed top-5 right-4 py-2 px-5 rounded-lg shadow-xl opacity-0 transform -translate-y-4 transition-all duration-300 z-50 flex items-center space-x-2">
            <i id="toast-icon" class="fas"></i><span id="toast-text"></span>
        </div>

        <div id="timer-display" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white py-4 px-8 rounded-lg z-50 hidden items-center gap-4 font-mono">
            <span id="timer-text" class="text-4xl"></span>
            <button id="timer-close-btn" class="text-2xl font-bold">&times;</button>
        </div>

        <div id="program-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <div id="history-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        <div id="global-stats-modal" class="modal-container fixed inset-0 z-40 items-center justify-center hidden"></div>
        
        <div id="modal-drive-config" class="modal-container fixed inset-0 z-[60] flex items-center justify-center hidden" style="background: rgba(0,0,0,0.8);">
            <div class="bg-card rounded-lg p-6 w-11/12 max-w-md border border-border-color">
                <h3 class="text-xl font-bold mb-4 text-cyan-400">Configuration Drive</h3>
                <div class="space-y-3">
                    <div><label class="block text-xs text-secondary mb-1">Client ID</label><input type="text" id="driveClientId" class="input-bg w-full p-2 rounded text-sm text-main"></div>
                    <div><label class="block text-xs text-secondary mb-1">API Key</label><input type="text" id="driveApiKey" class="input-bg w-full p-2 rounded text-sm text-main"></div>
                    <div><label class="block text-xs text-secondary mb-1">Folder ID</label><input type="text" id="driveFolderId" class="input-bg w-full p-2 rounded text-sm text-main"></div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button data-action="close-drive-config" class="px-4 py-2 text-secondary hover:text-white">Annuler</button>
                    <button data-action="save-drive-config" class="px-4 py-2 bg-blue-600 rounded text-white font-bold">Enregistrer</button>
                </div>
            </div>
        </div>

        <div id="modal-drive-picker" class="modal-container fixed inset-0 z-[60] flex items-center justify-center hidden" style="background: rgba(0,0,0,0.8);">
            <div class="bg-card rounded-lg p-6 w-11/12 max-w-md border border-border-color h-3/4 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-green-400">Charger un Backup</h3>
                    <button data-action="close-drive-picker" class="text-secondary hover:text-white">&times;</button>
                </div>
                <div id="driveFileList" class="flex-grow overflow-y-auto space-y-2 pr-2">
                    <div class="text-center text-secondary py-10"><span class="spinner"></span> Chargement...</div>
                </div>
            </div>
        </div>
        <input type="file" id="file-input" class="hidden" accept=".json" multiple>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- VARIABLES ---
        const app = document.getElementById('app');
        const programSelect = document.getElementById('program-select');
        const exerciseList = document.getElementById('exercise-list');
        const collapseAllBtn = document.getElementById('collapse-all-btn');
        const expandAllBtn = document.getElementById('expand-all-btn');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toast-icon');
        const toastText = document.getElementById('toast-text');
        const manageProgramsBtn = document.getElementById('manage-programs-btn');
        const globalStatsBtn = document.getElementById('global-stats-btn');
        const programModalContainer = document.getElementById('program-modal');
        const historyModalContainer = document.getElementById('history-modal');
        const globalStatsModalContainer = document.getElementById('global-stats-modal');
        const modalDriveConfig = document.getElementById('modal-drive-config');
        const modalDrivePicker = document.getElementById('modal-drive-picker');
        const addExerciseBtn = document.getElementById('add-exercise-btn');
        const clearAllPerfBtn = document.getElementById('clear-all-perf-btn');
        const activeBackupNameDisplay = document.getElementById('active-backup-name');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const timerDisplay = document.getElementById('timer-display');
        const timerText = document.getElementById('timer-text');
        const timerCloseBtn = document.getElementById('timer-close-btn');
        const fileInput = document.getElementById('file-input');

        let state = { currentProgram: null, programOrder: [], programs: {}, performance: {}, activeFileName: null, isDirty: false, theme: 'dark' };
        let driveConfig = { clientId: '', apiKey: '', folderId: '' };
        let tokenClient; let gapiInited = false; let gisInited = false;
        let timerInterval = null; let audioCtx; let backupDirectoryHandle = null; let chartInstances = {};
        let originalExerciseName = null; const isFileSystemAccessAPISupported = 'showDirectoryPicker' in window;
        let touchStartX = 0; let touchEndX = 0;
                // --- GOOGLE API & HELPERS ---
        function loadDriveConfig() { const saved = localStorage.getItem('FITNESS_DRIVE_CFG'); if(saved) driveConfig = JSON.parse(saved); }

        function checkGoogleLibs() {
            if(driveConfig.apiKey && driveConfig.clientId) {
                if(typeof gapi !== 'undefined') gapi.load('client', initializeGapiClient);
                if(typeof google !== 'undefined') { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: driveConfig.clientId, scope: 'https://www.googleapis.com/auth/drive.file', callback: '' }); gisInited = true; }
            }
        }
        async function initializeGapiClient() { await gapi.client.init({ apiKey: driveConfig.apiKey, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); gapiInited = true; }

        async function handleDriveUpload() {
            if(!gapiInited || !gisInited) { showToast("API non prête. Vérifiez Config.", true); openDriveConfig(); return; }
            tokenClient.callback = async (resp) => { if (resp.error) throw resp; await performDriveUpload(); };
            if (gapi.client.getToken() === null) tokenClient.requestAccessToken({prompt: 'consent'}); else await performDriveUpload();
        }

        async function performDriveUpload() {
            showToast("Sauvegarde Drive en cours...", false); cleanupEmptyPerformances();
            const dateString = new Date().toISOString().slice(0, 10); const content = JSON.stringify(state, null, 2);
            try {
                await saveFileToDrive(`backup_fitness_${dateString}.json`, content);
                await saveFileToDrive(`last_backup.json`, content);
                showToast("✅ Sauvegarde Drive réussie (Double)"); state.isDirty = false; renderHeader();
            } catch (err) { console.error(err); showToast("❌ Erreur Sauvegarde Drive", true); }
        }

        async function saveFileToDrive(fileName, content) {
            let fileId = null; const q = `name = '${fileName}' and '${driveConfig.folderId}' in parents and trashed = false`;
            const response = await gapi.client.drive.files.list({ 'q': q, 'fields': 'files(id, name)', 'spaces': 'drive' });
            if (response.result.files && response.result.files.length > 0) fileId = response.result.files[0].id;
            const blob = new Blob([content], {type: 'application/json'});
            if (fileId) { await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, body: blob }); }
            else { const metadata = { name: fileName, parents: [driveConfig.folderId], mimeType: 'application/json' }; const form = new FormData(); form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' })); form.append('file', blob); await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, body: form }); }
        }

        function handleDriveDownloadSelector() {
             if(!gapiInited || !gisInited) { showToast("Configurez Drive d'abord", true); openDriveConfig(); return; }
            tokenClient.callback = async (resp) => { if (resp.error) throw resp; await listDriveFiles(); };
            if (gapi.client.getToken() === null) tokenClient.requestAccessToken({prompt: ''}); else listDriveFiles();
        }

        async function listDriveFiles() {
            modalDrivePicker.classList.remove('hidden'); modalDrivePicker.classList.add('visible');
            const listContainer = document.getElementById('driveFileList'); listContainer.innerHTML = '<div class="text-center text-secondary py-10"><span class="spinner"></span> Recherche...</div>';
            try {
                const response = await gapi.client.drive.files.list({ 'q': `'${driveConfig.folderId}' in parents and mimeType = 'application/json' and trashed = false`, 'fields': 'files(id, name, modifiedTime)', 'orderBy': 'modifiedTime desc', 'pageSize': 20 });
                const files = response.result.files; listContainer.innerHTML = '';
                if (files && files.length > 0) {
                    files.forEach(file => {
                        const date = new Date(file.modifiedTime).toLocaleString(); const isLast = file.name === 'last_backup.json';
                        const el = document.createElement('div'); el.className = `p-3 rounded bg-secondary hover:bg-slate-700 cursor-pointer border border-border-color flex justify-between items-center transition ${isLast ? 'border-green-500/50' : ''}`;
                        el.onclick = () => loadFileContent(file.id, file.name); el.innerHTML = `<div><div class="font-bold text-sm ${isLast ? 'text-green-400' : 'text-cyan-200'}">${file.name}</div><div class="text-xs text-secondary">${date}</div></div><i class="fa-solid fa-cloud-arrow-down text-secondary"></i>`;
                        listContainer.appendChild(el);
                    });
                } else listContainer.innerHTML = '<div class="text-center text-secondary">Aucun fichier trouvé.</div>';
            } catch (err) { listContainer.innerHTML = '<div class="text-red-400 text-center">Erreur lors du listing.</div>'; }
        }

        async function loadFileContent(fileId, fileName) {
            showToast(`Chargement de ${fileName}...`); modalDrivePicker.classList.remove('visible'); setTimeout(() => modalDrivePicker.classList.add('hidden'), 200);
            try {
                const response = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' }); const json = response.result;
                if(!json.programs) throw new Error("Format invalide");
                state = json; state.activeFileName = fileName; saveState(); refreshAll(); showToast("✅ Données chargées !");
            } catch (err) { showToast("Erreur lors du chargement", true); }
        }

        function openDriveConfig() {
            document.getElementById('driveClientId').value = driveConfig.clientId || ''; document.getElementById('driveApiKey').value = driveConfig.apiKey || ''; document.getElementById('driveFolderId').value = driveConfig.folderId || '';
            modalDriveConfig.classList.remove('hidden'); modalDriveConfig.classList.add('visible');
        }

        const showToast = (message, isError = false) => {
            toastText.textContent = message; toast.className = `fixed top-5 right-4 py-2 px-5 rounded-lg shadow-xl opacity-0 transform -translate-y-4 transition-all duration-300 z-50 flex items-center space-x-2 ${isError ? 'toast-error' : 'toast-success'}`;
            toastIcon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle'; toast.classList.remove('opacity-0', '-translate-y-4'); setTimeout(() => toast.classList.add('opacity-0', '-translate-y-4'), 3000);
        };
        const cleanupEmptyPerformances = () => {
            const today = new Date().toISOString().split('T')[0];
            for (const progName in state.performance) {
                for (const exoName in state.performance[progName]) {
                    state.performance[progName][exoName] = state.performance[progName][exoName].filter(entry => { if (entry.date === today) return true; return (entry.sets || []).some(set => (set.poids && set.poids.trim()) || (set.reps && set.reps.trim())); });
                    if (state.performance[progName][exoName].length === 0) delete state.performance[progName][exoName];
                }
            }
        };
        function playSound() {
            if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1); o.start(); o.stop(audioCtx.currentTime + 1);
        }
        function startTimer(d) {
            clearInterval(timerInterval); let r = d; timerDisplay.classList.remove('hidden'); timerDisplay.classList.add('flex');
            const u = () => { timerText.textContent = `${String(Math.floor(r/60)).padStart(2,'0')}:${String(r%60).padStart(2,'0')}`; if (r <= 0) { clearInterval(timerInterval); playSound(); } r--; };
            u(); timerInterval = setInterval(u, 1000);
        }
        timerCloseBtn.addEventListener('click', () => { clearInterval(timerInterval); timerDisplay.classList.add('hidden'); });
                // --- RENDERING ---
        const saveState = () => { if (!state.isDirty) { state.isDirty = true; renderHeader(); } cleanupEmptyPerformances(); localStorage.setItem('fitnessTrackerState', JSON.stringify(state)); };
        const loadState = () => {
            const s = localStorage.getItem('fitnessTrackerState'); if (s) state = JSON.parse(s);
            state.programs = state.programs || {}; state.performance = state.performance || {}; state.programOrder = state.programOrder || Object.keys(state.programs);
            if (!state.currentProgram || !state.programs[state.currentProgram]) state.currentProgram = state.programOrder[0] || null;
        };

        const renderHeader = () => { if (state.activeFileName) { activeBackupNameDisplay.textContent = `Fichier : ${state.activeFileName}${state.isDirty ? '*' : ''}`; activeBackupNameDisplay.classList.remove('hidden'); } else activeBackupNameDisplay.classList.add('hidden'); };

        const renderProgram = (options = {}) => {
            const pName = state.currentProgram; let pColor = 'transparent';
            if (pName) { let h = 0; for (let i = 0; i < pName.length; i++) h = (h + pName.charCodeAt(i) * 37) % 360; pColor = `hsl(${h}, 85%, 65%)`; }
            document.documentElement.style.setProperty('--program-color', pColor); exerciseList.innerHTML = '';
            const exercises = (pName && state.programs[pName]) ? state.programs[pName].exercises || [] : [];
            collapseAllBtn.style.display = expandAllBtn.style.display = exercises.length > 0 ? 'inline-block' : 'none';
            if (exercises.length === 0) { exerciseList.innerHTML = `<div class="text-center text-secondary mt-8 p-8 bg-card rounded-lg"><p>Programme vide ou absent.</p></div>`; return; }

            exercises.forEach((ex, idx) => {
                const card = document.createElement('div'); if (ex.tempId) { card.id = ex.tempId; delete ex.tempId; }
                card.className = "bg-card rounded-xl p-4 relative exercise-card"; card.dataset.index = idx;
                if (options.newlyAddedIndex === idx) card.classList.add("newly-added"); else card.classList.add("fade-in-up");
                
                const today = new Date().toISOString().split('T')[0]; const hist = state.performance[pName]?.[ex.Exercice] || [];
                const todayEntry = hist.find(e => e.date === today); const lastPerf = hist.filter(p => p.date < today).pop();
                if (todayEntry && (todayEntry.sets||[]).some(s=>s.poids||s.reps)) card.classList.add('has-today-perf');
                const showCopy = !todayEntry && lastPerf && (lastPerf.sets||[]).some(s=>s.poids||s.reps);
                const display = todayEntry || lastPerf; const setsData = (display?.sets) || [{},{},{},{}]; const isEdit = !!todayEntry;

                let setsHTML = '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-1">';
                setsData.forEach((s, i) => {
                    const pid = `poids-${i}-${ex.Exercice.replace(/\W/g,'')}`;
                    setsHTML += `<div class="input-bg p-2 rounded-lg relative ${isEdit && (!s.poids||!s.reps) ? 'pending-input' : ''}">
                        ${isEdit ? `<button data-action="delete-set" data-exercise-name="${ex.Exercice}" data-set-index="${i}" class="icon-btn absolute top-0 right-0 p-1 text-xs">&times;</button>` : ''}
                        <div class="flex justify-between mb-1"><span class="text-xs text-secondary">Série ${i+1}</span>${isEdit?`<button data-action="set-pdc" data-target-id="${pid}" class="text-xs text-cyan-400 border border-cyan-400 px-1 rounded">PDC</button>`:''}</div>
                        <div class="flex gap-2"><input type="text" inputmode="decimal" class="editable-perf w-1/2 bg-card rounded text-center" id="${pid}" data-exercise="${ex.Exercice}" data-set-index="${i}" data-sub-field="poids" placeholder="Kg" value="${s.poids||''}" ${!isEdit?'disabled':''}><input type="text" inputmode="decimal" class="editable-perf w-1/2 bg-card rounded text-center" data-exercise="${ex.Exercice}" data-set-index="${i}" data-sub-field="reps" placeholder="Reps" value="${s.reps||''}" ${!isEdit?'disabled':''}></div></div>`;
                });
                setsHTML += '</div>';
                
                const copyHTML = showCopy ? `<div class="flex gap-3"><button data-action="copy-last-perf" data-exercise-name="${ex.Exercice}" class="text-xs text-cyan-400"><i class="fa-solid fa-copy"></i> Tout</button><button data-action="copy-last-weights" data-exercise-name="${ex.Exercice}" class="text-xs text-cyan-400"><i class="fa-solid fa-weight-hanging"></i> Poids</button><button data-action="copy-last-reps" data-exercise-name="${ex.Exercice}" class="text-xs text-cyan-400"><i class="fa-solid fa-repeat"></i> Reps</button></div>` : '';

                card.innerHTML = `<div class="exercise-number absolute top-2 left-3 pointer-events-none">${idx+1}</div>
                    <button data-action="duplicate-exercise" class="absolute top-2 right-10 p-1 icon-btn"><i class="fa-solid fa-copy"></i></button>
                    <button data-action="delete-exercise" class="absolute top-2 right-2 p-1 icon-btn"><i class="fa-solid fa-trash-can"></i></button>
                    <div class="pl-10 pr-16"><div contenteditable="true" class="editable font-bold text-lg exercise-title" data-index="${idx}" data-field="Exercice">${ex.Exercice}</div><div contenteditable="true" class="editable text-sm subtitle-color" data-index="${idx}" data-field="Groupe">${ex.Groupe||''}</div></div>
                    <div class="flex justify-between mt-3 pt-3 border-t border-border-color"><div class="flex gap-2 text-sm"><span class="input-bg px-2 rounded">${setsData.length} s</span><span class="input-bg px-2 rounded flex items-center gap-1"><input class="editable w-8 bg-transparent text-center" data-index="${idx}" data-field="Repos" value="${ex.Repos||''}">s <button data-action="start-timer"><i class="fa-solid fa-play"></i></button></span></div><button data-action="toggle-collapse" class="icon-btn"><i class="fa-solid fa-chevron-up collapse-icon ${ex.isCollapsed?'is-collapsed':''}"></i></button></div>
                    <div class="collapsible-content ${ex.isCollapsed?'hidden':''}">
                        <div class="pt-3 space-y-3"><div class="flex justify-between">${isEdit?`<div class="flex gap-2"><button data-action="add-set" data-exercise-name="${ex.Exercice}" class="icon-btn"><i class="fa-solid fa-plus-square"></i></button><button data-action="clear-performance" data-exercise-name="${ex.Exercice}" class="icon-btn"><i class="fa-solid fa-eraser"></i></button></div>`:''} <button data-action="view-history" data-exercise-name="${ex.Exercice}" class="icon-btn"><i class="fa-solid fa-chart-line"></i></button> ${copyHTML}</div>${setsHTML}<div class="grid md:grid-cols-2 gap-4"><div><label class="text-xs label-color">Notes</label><div contenteditable="true" class="editable text-sm p-2 rounded input-bg" data-index="${idx}" data-field="Notes d'exécution">${ex["Notes d'exécution"]||''}</div></div><div><label class="text-xs label-color">Objectif</label><div contenteditable="true" class="editable text-sm p-2 rounded input-bg" data-index="${idx}" data-field="Objectif charge/reps">${ex["Objectif charge/reps"]||''}</div></div></div></div>
                    </div>`;
                exerciseList.appendChild(card);
            });
        };

        const renderHistoryModal = (exName, period='3m') => {
            let hist = state.performance[state.currentProgram]?.[exName] || [];
            const now = new Date(); let d = new Date();
            if(period==='3m') d.setMonth(now.getMonth()-3); else if(period==='6m') d.setMonth(now.getMonth()-6); else if(period==='1y') d.setFullYear(now.getFullYear()-1); else d = new Date(0);
            hist = hist.filter(e => new Date(e.date) >= d);
            
            const listHTML = hist.slice().reverse().map(e => {
                const s = (e.sets||[]).filter(x=>x.poids||x.reps).map(x=>`${x.poids||'-'}x${x.reps||'-'}`).join(' / ');
                return `<div class="p-2 bg-secondary rounded flex justify-between"><div><div class="font-bold">${new Date(e.date).toLocaleDateString()}</div><div class="text-sm text-secondary">${s}</div></div><button data-action="delete-perf-entry" data-date="${e.date}" data-exercise-name="${exName}"><i class="fa-solid fa-trash-can"></i></button></div>`;
            }).join('') || '<p>Aucun historique.</p>';

            const filters = [['3m','3 Mois'],['6m','6 Mois'],['1y','1 An'],['all','Tout']].map(f=>`<button class="filter-btn text-xs px-2 py-1 rounded ${period===f[0]?'active':''}" data-action="filter-history" data-period="${f[0]}" data-exercise-name="${exName}">${f[1]}</button>`).join('');
            
            historyModalContainer.innerHTML = `<div class="modal-backdrop absolute inset-0" data-action="close-modal"></div><div class="bg-card rounded-lg shadow-xl w-full max-w-2xl m-4 p-6 relative flex flex-col max-h-[80vh]"><div class="flex justify-between mb-4 border-b pb-2"><h2 class="font-bold">${exName}</h2><button data-action="close-modal" class="text-2xl">&times;</button></div><div class="flex gap-2 mb-2 justify-end">${filters}</div><div class="h-48 mb-4 bg-secondary rounded"><canvas id="perf-chart"></canvas></div><div class="overflow-y-auto space-y-2 pr-2">${listHTML}</div></div>`;
            
            const ctx = document.getElementById('perf-chart').getContext('2d');
            const data = hist.map(e => ({ x: e.date, y: (e.sets||[]).reduce((a,s) => a + ((parseFloat(s.poids)||0) * (parseInt(s.reps)||0)), 0) })).filter(d => d.y>0);
            if(chartInstances['perf']) chartInstances['perf'].destroy();
            chartInstances['perf'] = new Chart(ctx, { type: 'line', data: { datasets: [{ label: 'Volume', data: data, borderColor: '#22d3ee', tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time', time: { unit: 'day' } } } } });
        };
                // --- EVENT LISTENERS ---
        const refreshAll = () => { document.documentElement.classList.toggle('dark', state.theme==='dark'); themeIcon.className=state.theme==='dark'?'fa-solid fa-sun':'fa-solid fa-moon'; renderHeader(); programSelect.innerHTML=''; state.programOrder.forEach(n=>{const o=document.createElement('option');o.value=n;o.text=n;programSelect.appendChild(o)}); if(state.currentProgram) programSelect.value=state.currentProgram; renderProgram(); };
        
        programSelect.addEventListener('change', (e) => { state.currentProgram = e.target.value; saveState(); renderProgram(); });
        themeToggleBtn.addEventListener('click', () => { state.theme = state.theme==='dark'?'light':'dark'; saveState(); refreshAll(); });
        
        // Gestion des inputs
        exerciseList.addEventListener('input', (e) => {
            if(e.target.classList.contains('editable')) { const card = e.target.closest('.exercise-card'); const idx = card.dataset.index; state.programs[state.currentProgram].exercises[idx][e.target.dataset.field] = e.target.innerText; }
            if(e.target.classList.contains('editable-perf')) {
                const exName = e.target.dataset.exercise; const prog = state.currentProgram;
                let hist = state.performance[prog][exName]; if(!hist) { hist=[]; state.performance[prog][exName]=hist; }
                let today = hist.find(x=>x.date===new Date().toISOString().split('T')[0]);
                if(!today) { today={date:new Date().toISOString().split('T')[0],sets:[]}; hist.push(today); }
                const sIdx = e.target.dataset.setIndex; if(!today.sets[sIdx]) today.sets[sIdx]={};
                today.sets[sIdx][e.target.dataset.subField] = e.target.value;
                e.target.closest('.exercise-card').classList.add('has-today-perf');
            }
        });

        // Click Handler Centralisé
        app.addEventListener('click', (e) => {
            const t = e.target.closest('[data-action]'); if(!t) return;
            const act = t.dataset.action; const pName = state.currentProgram;
            switch(act) {
                // DRIVE
                case 'drive-config': openDriveConfig(); break;
                case 'drive-upload': handleDriveUpload(); break;
                case 'drive-download': handleDriveDownloadSelector(); break;
                case 'close-drive-config': modalDriveConfig.classList.remove('visible'); setTimeout(()=>modalDriveConfig.classList.add('hidden'),200); break;
                case 'close-drive-picker': modalDrivePicker.classList.remove('visible'); setTimeout(()=>modalDrivePicker.classList.add('hidden'),200); break;
                case 'save-drive-config': driveConfig.clientId=document.getElementById('driveClientId').value; driveConfig.apiKey=document.getElementById('driveApiKey').value; driveConfig.folderId=document.getElementById('driveFolderId').value; localStorage.setItem('FITNESS_DRIVE_CFG',JSON.stringify(driveConfig)); modalDriveConfig.classList.remove('visible'); setTimeout(()=>location.reload(),500); break;
                
                // BACKUP LOCAL
                case 'header-backup': {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'})); a.download = `backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); break;
                }
                case 'header-import': fileInput.click(); break;
                
                // EXERCICE ACTIONS
                case 'add-set': state.performance[pName][t.dataset.exerciseName].find(x=>x.date===new Date().toISOString().split('T')[0]).sets.push({}); saveState(); renderProgram(); break;
                case 'delete-set': { const en=t.dataset.exerciseName; const ent=state.performance[pName][en].find(x=>x.date===new Date().toISOString().split('T')[0]); ent.sets.splice(t.dataset.setIndex,1); saveState(); renderProgram(); break; }
                case 'copy-last-perf': case 'copy-last-weights': case 'copy-last-reps': {
                    const en=t.dataset.exerciseName; const h=state.performance[pName][en]||[]; const last=h.filter(x=>x.date<new Date().toISOString().split('T')[0]).pop();
                    if(last) {
                        let today=h.find(x=>x.date===new Date().toISOString().split('T')[0]); if(!today){today={date:new Date().toISOString().split('T')[0],sets:[]}; h.push(today);}
                        const src = JSON.parse(JSON.stringify(last.sets));
                        today.sets = src.map((s,i) => { const exist=today.sets[i]||{}; if(act!=='copy-last-reps') exist.poids=s.poids; if(act!=='copy-last-weights') exist.reps=s.reps; return exist; });
                        saveState(); renderProgram();
                    } else showToast("Pas d'historique", true);
                    break;
                }
                case 'toggle-collapse': { const idx=t.closest('.exercise-card').dataset.index; state.programs[pName].exercises[idx].isCollapsed = !state.programs[pName].exercises[idx].isCollapsed; saveState(); renderProgram(); break; }
                case 'view-history': renderHistoryModal(t.dataset.exerciseName); historyModalContainer.style.display='flex'; setTimeout(()=>historyModalContainer.classList.add('visible'),10); break;
                case 'close-modal': [historyModalContainer, modalDriveConfig].forEach(m=>{m.classList.remove('visible'); setTimeout(()=>m.style.display='none',200);}); break;
                case 'delete-perf-entry': if(confirm('Supprimer ?')) { const h=state.performance[pName][t.dataset.exerciseName]; const i=h.findIndex(x=>x.date===t.dataset.date); h.splice(i,1); saveState(); renderHistoryModal(t.dataset.exerciseName); } break;
                case 'filter-history': renderHistoryModal(t.dataset.exerciseName, t.dataset.period); break;
                case 'start-timer': startTimer(60); break;
                case 'delete-exercise': if(confirm('Supprimer ?')) { state.programs[pName].exercises.splice(t.closest('.exercise-card').dataset.index,1); saveState(); renderProgram(); } break;
                case 'duplicate-exercise': { const ex=state.programs[pName].exercises[t.closest('.exercise-card').dataset.index]; const copy=JSON.parse(JSON.stringify(ex)); copy.Exercice+=' (Copie)'; state.programs[pName].exercises.push(copy); saveState(); renderProgram(); break; }
            }
        });

        fileInput.addEventListener('change', async (e) => {
            if(e.target.files[0]) { const t = await e.target.files[0].text(); state = JSON.parse(t); saveState(); refreshAll(); showToast("Importé !"); }
        });
        
        // INIT
        loadState(); loadDriveConfig(); checkGoogleLibs(); refreshAll();
    });
</script>
</body>
</html>
