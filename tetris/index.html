<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #090912;
    --panel: #0d0d1a;
    --border: #1a1a3e;
    --glow-cyan: #00f5ff;
    --glow-purple: #bf00ff;
    --glow-green: #00ff88;
    --text: #c8d0e0;
    --grid-line: rgba(255,255,255,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,245,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(191,0,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 400px;
    padding: 8px;
    height: 100dvh;
    justify-content: center;
  }

  header {
    text-align: center;
    letter-spacing: 0.3em;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 900;
    color: var(--glow-cyan);
    text-shadow: 0 0 10px var(--glow-cyan), 0 0 30px rgba(0,245,255,0.3);
    letter-spacing: 0.4em;
  }

  .game-area {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  canvas#board {
    border: 1px solid var(--border);
    box-shadow: 
      0 0 0 1px rgba(0,245,255,0.15),
      0 0 20px rgba(0,245,255,0.08),
      inset 0 0 40px rgba(0,0,0,0.5);
    background: #08080f;
    display: block;
    image-rendering: pixelated;
  }

  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 80px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--glow-cyan);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .panel-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 3vw, 18px);
    color: #fff;
    text-shadow: 0 0 8px rgba(0,245,255,0.6);
  }

  canvas#next {
    display: block;
    background: transparent;
  }

  .level-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .level-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--glow-cyan), var(--glow-purple));
    border-radius: 2px;
    transition: width 0.3s;
    box-shadow: 0 0 6px var(--glow-cyan);
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 340px;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.1s;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .btn:active, .btn.pressed {
    background: rgba(0,245,255,0.15);
    border-color: var(--glow-cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.3);
    transform: scale(0.95);
  }

  .btn-wide { width: 72px; height: 52px; }
  .btn-md { width: 60px; height: 52px; }
  .btn-drop { 
    width: 140px; height: 44px; 
    font-size: 13px; 
    letter-spacing: 0.1em;
    color: var(--glow-green);
    border-color: rgba(0,255,136,0.3);
  }
  .btn-drop:active { border-color: var(--glow-green); box-shadow: 0 0 12px rgba(0,255,136,0.3); }

  .btn-action {
    width: 60px; height: 44px;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  #startBtn {
    color: var(--glow-cyan);
    border-color: rgba(0,245,255,0.4);
    box-shadow: 0 0 8px rgba(0,245,255,0.1);
  }
  #pauseBtn { color: var(--glow-purple); border-color: rgba(191,0,255,0.4); }

  /* Overlay */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(9,9,18,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(4px);
    z-index: 50;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 8vw, 36px);
    font-weight: 900;
    color: var(--glow-cyan);
    text-shadow: 0 0 20px var(--glow-cyan), 0 0 60px rgba(0,245,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .overlay-sub {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(200,208,224,0.5);
  }

  .overlay-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 10px rgba(0,245,255,0.5);
  }

  .start-btn-big {
    background: transparent;
    border: 1px solid var(--glow-cyan);
    color: var(--glow-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    padding: 14px 32px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
    transition: all 0.2s;
  }

  .start-btn-big:active {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 30px rgba(0,245,255,0.4);
  }

  /* Line clear flash */
  @keyframes flashLine {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>

<div id="app">
  <header>
    <div class="title">TETRIS</div>
  </header>

  <div class="game-area">
    <canvas id="board"></canvas>

    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-label">NEXT</div>
        <canvas id="next"></canvas>
      </div>
      <div class="panel-box">
        <div class="panel-label">SCORE</div>
        <div class="panel-value" id="scoreDisplay">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">LEVEL</div>
        <div class="panel-value" id="levelDisplay">1</div>
        <div class="level-bar-wrap">
          <div class="level-bar" id="levelBar" style="width:0%"></div>
        </div>
      </div>
      <div class="panel-box">
        <div class="panel-label">LINES</div>
        <div class="panel-value" id="linesDisplay">0</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button class="btn btn-action" id="startBtn">NEW</button>
      <button class="btn btn-action" id="pauseBtn">PAUSE</button>
      <button class="btn btn-drop" id="dropBtn">▼ DROP</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-wide" id="rotBtn">↻ ROT</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-md" id="leftBtn">◀</button>
      <button class="btn btn-md" id="downBtn">▼</button>
      <button class="btn btn-md" id="rightBtn">▶</button>
    </div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay">
  <div class="overlay-title" id="overlayTitle">TETRIS</div>
  <div class="overlay-sub" id="overlaySub">APPUYER POUR JOUER</div>
  <div class="overlay-score" id="overlayScore" style="display:none"></div>
  <button class="start-btn-big" id="overlayBtn">▶ START</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const COLS = 10, ROWS = 20;
const CELL = Math.min(Math.floor((window.innerHeight * 0.55) / ROWS), 28);
const BOARD_W = COLS * CELL, BOARD_H = ROWS * CELL;
const NEXT_CELL = Math.floor(CELL * 0.7);

const board = document.getElementById('board');
const ctx = board.getContext('2d');
board.width = BOARD_W; board.height = BOARD_H;

const nextCanvas = document.getElementById('next');
const nctx = nextCanvas.getContext('2d');
nextCanvas.width = 4 * NEXT_CELL; nextCanvas.height = 4 * NEXT_CELL;

// ─── PIECES ───────────────────────────────────────────────────────────────────
const PIECES = [
  { shape: [[1,1,1,1]], color: '#00f5ff', shadow: 'rgba(0,245,255,0.4)' },
  { shape: [[1,1],[1,1]], color: '#ffe600', shadow: 'rgba(255,230,0,0.4)' },
  { shape: [[0,1,0],[1,1,1]], color: '#bf00ff', shadow: 'rgba(191,0,255,0.4)' },
  { shape: [[1,0,0],[1,1,1]], color: '#ff6b35', shadow: 'rgba(255,107,53,0.4)' },
  { shape: [[0,0,1],[1,1,1]], color: '#0088ff', shadow: 'rgba(0,136,255,0.4)' },
  { shape: [[0,1,1],[1,1,0]], color: '#00ff88', shadow: 'rgba(0,255,136,0.4)' },
  { shape: [[1,1,0],[0,1,1]], color: '#ff2d55', shadow: 'rgba(255,45,85,0.4)' },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let grid, current, next, score, level, lines, dropInterval, lastTime, animId;
let gameRunning = false, paused = false;
let touchStartX, touchStartY, touchMoved;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initGrid() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    shadow: p.shadow,
    x: Math.floor(COLS / 2) - Math.ceil(p.shape[0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  return Array.from({length: cols}, (_, r) =>
    Array.from({length: rows}, (_, c) => shape[rows - 1 - c][r])
  );
}

function valid(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = ox + c, ny = oy + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && grid[ny][nx]) return false;
      }
  return true;
}

function place() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c] && current.y + r >= 0)
        grid[current.y + r][current.x + c] = current.color;
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) {
    gameOver();
  }
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c !== null)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 600 - (level - 1) * 55);
    updateUI();
  }
}

function ghostY() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  return gy;
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawCell(cx, x, y, color, shadow, alpha = 1, cellSize = CELL) {
  const px = x * cellSize, py = y * cellSize;
  cx.globalAlpha = alpha;
  cx.fillStyle = color;
  cx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
  cx.shadowColor = shadow || color;
  cx.shadowBlur = 8;
  cx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
  cx.shadowBlur = 0;
  cx.fillStyle = 'rgba(255,255,255,0.18)';
  cx.fillRect(px + 2, py + 2, cellSize - 4, 3);
  cx.globalAlpha = 1;
}

function drawBoard() {
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, BOARD_W, BOARD_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(BOARD_W, r * CELL); ctx.stroke(); }
  for (let c = 0; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, BOARD_H); ctx.stroke(); }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) drawCell(ctx, c, r, grid[r][c], grid[r][c] + '66');
  const gy = ghostY();
  if (gy !== current.y) {
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c]) {
          const px = (current.x + c) * CELL, py = (gy + r) * CELL;
          ctx.strokeStyle = current.color;
          ctx.globalAlpha = 0.25;
          ctx.lineWidth = 1;
          ctx.strokeRect(px + 1, py + 1, CELL - 2, CELL - 2);
          ctx.globalAlpha = 1;
        }
  }
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c])
        drawCell(ctx, current.x + c, current.y + r, current.color, current.shadow);
}

function drawNext() {
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const s = next.shape;
  const ox = Math.floor((4 - s[0].length) / 2);
  const oy = Math.floor((4 - s.length) / 2);
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c]) drawCell(nctx, ox + c, oy + r, next.color, next.shadow, 1, NEXT_CELL);
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score.toLocaleString();
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = lines;
  const pct = (lines % 10) * 10;
  document.getElementById('levelBar').style.width = pct + '%';
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let dropAcc = 0;

function loop(ts) {
  if (!gameRunning || paused) return;
  const dt = ts - (lastTime || ts);
  lastTime = ts;
  dropAcc += dt;
  if (dropAcc >= dropInterval) {
    moveDown();
    dropAcc = 0;
  }
  drawBoard();
  drawNext();
  animId = requestAnimationFrame(loop);
}

function moveDown() {
  if (valid(current.shape, current.x, current.y + 1)) {
    current.y++;
  } else {
    place();
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function moveLeft()  { if (gameRunning && !paused && valid(current.shape, current.x - 1, current.y)) current.x--; }
function moveRight() { if (gameRunning && !paused && valid(current.shape, current.x + 1, current.y)) current.x++; }
function tryRotate() {
  if (!gameRunning || paused) return;
  const r = rotate(current.shape);
  if (valid(r, current.x, current.y)) { current.shape = r; return; }
  if (valid(r, current.x + 1, current.y)) { current.shape = r; current.x++; return; }
  if (valid(r, current.x - 1, current.y)) { current.shape = r; current.x--; return; }
}
function hardDrop() {
  if (!gameRunning || paused) return;
  while (valid(current.shape, current.x, current.y + 1)) { current.y++; score += 2; }
  place(); updateUI();
}

window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  switch(e.key) {
    case 'ArrowLeft': e.preventDefault(); moveLeft(); break;
    case 'ArrowRight': e.preventDefault(); moveRight(); break;
    case 'ArrowDown': e.preventDefault(); moveDown(); break;
    case 'ArrowUp': e.preventDefault(); tryRotate(); break;
    case ' ': e.preventDefault(); hardDrop(); break;
    case 'p': case 'P': togglePause(); break;
  }
});

function addBtnEvents(id, action) {
  const btn = document.getElementById(id);
  let interval;
  const start = () => { action(); interval = setInterval(action, 100); };
  const stop = () => clearInterval(interval);
  btn.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
  btn.addEventListener('pointerup', stop);
  btn.addEventListener('pointerleave', stop);
}

addBtnEvents('leftBtn', moveLeft);
addBtnEvents('rightBtn', moveRight);
addBtnEvents('downBtn', moveDown);
document.getElementById('rotBtn').addEventListener('pointerdown', e => { e.preventDefault(); tryRotate(); });
document.getElementById('dropBtn').addEventListener('pointerdown', e => { e.preventDefault(); hardDrop(); });
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('pauseBtn').addEventListener('click', togglePause);

board.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, { passive: false });

board.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning || paused) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > 20) { dx > 0 ? moveRight() : moveLeft(); touchStartX = e.touches[0].clientX; touchMoved = true; }
  if (dy > 30) { moveDown(); touchStartY = e.touches[0].clientY; touchMoved = true; }
}, { passive: false });

board.addEventListener('touchend', e => {
  if (!touchMoved) tryRotate();
});

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function startGame() {
  if (animId) cancelAnimationFrame(animId);
  initGrid();
  score = 0; level = 1; lines = 0; dropInterval = 600; dropAcc = 0; paused = false;
  current = randomPiece();
  next = randomPiece();
  gameRunning = true;
  updateUI();
  hideOverlay();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  if (!paused) {
    lastTime = performance.now();
    animId = requestAnimationFrame(loop);
  }
  document.getElementById('pauseBtn').textContent = paused ? 'PLAY' : 'PAUSE';
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  showOverlay('GAME OVER', 'SCORE FINAL', score);
}

function showOverlay(title, sub, sc) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlaySub').textContent = sub || '';
  const s = document.getElementById('overlayScore');
  if (sc !== undefined) { s.style.display = 'block'; s.textContent = sc.toLocaleString(); }
  else s.style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

document.getElementById('overlayBtn').addEventListener('click', startGame);

drawBoard_empty();
function drawBoard_empty() {
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, BOARD_W, BOARD_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(BOARD_W, r * CELL); ctx.stroke(); }
  for (let c = 0; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, BOARD_H); ctx.stroke(); }
}
</script>
</body>
</html>
