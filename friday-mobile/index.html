<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0A0E1A">
<meta name="description" content="Friday Mobile V1 POC — push-to-talk client tailnet">
<meta name="robots" content="noindex,nofollow">
<title>Friday Mobile V1 POC</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9ZL5wK4AAAAASUVORK5CYII=">
<style>
  :root {
    --bg: #0A0E1A;
    --accent: #00D4FF;
    --rec: #FF3B5C;
    --text: #E8F4FF;
    --dim: #5A6B85;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif; overflow: hidden;
               touch-action: manipulation; }
  #app { display: flex; flex-direction: column; height: 100dvh; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  header { display: flex; align-items: center; gap: 8px; padding: 12px 4px; font-size: 13px; color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: background .2s, box-shadow .2s; }
  .dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.recording { background: var(--rec); box-shadow: 0 0 12px var(--rec); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  #status-text { flex: 1; }
  #log {
    flex: 1; min-height: 0; overflow-y: auto; background: rgba(255,255,255,.03);
    border-radius: 12px; padding: 10px 12px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px; line-height: 1.45; color: var(--dim);
    -webkit-overflow-scrolling: touch;
  }
  #log .line { white-space: pre-wrap; word-break: break-all; }
  #log .line.warn { color: #FFB800; }
  #log .line.err { color: var(--rec); }
  #log .line.ok { color: var(--accent); }
  #fab-zone {
    flex: 0 0 auto; padding: 24px 0 16px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  #fab-wrap { position: relative; width: 140px; height: 140px; }
  #fab {
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a4a6b, #0a2a4a);
    border: 3px solid var(--accent); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; cursor: pointer; user-select: none;
    transition: transform .08s, background .15s, border-color .15s, box-shadow .2s;
    box-shadow: 0 0 24px rgba(0, 212, 255, .25);
    -webkit-user-select: none; -webkit-touch-callout: none;
  }
  #fab:active { transform: scale(.96); }
  #fab.recording { background: radial-gradient(circle at 35% 35%, #6b1a2e, #4a0a1a); border-color: var(--rec);
                   box-shadow: 0 0 32px rgba(255,59,92,.5); }
  #ring {
    position: absolute; top: -6px; left: -6px; width: 152px; height: 152px;
    pointer-events: none;
  }
  #ring circle { fill: none; stroke-width: 4; }
  #ring .bg-arc { stroke: rgba(255,255,255,.06); }
  #ring .progress { stroke: var(--rec); stroke-linecap: round;
                    transform: rotate(-90deg); transform-origin: 76px 76px;
                    transition: stroke-dashoffset .1s linear; }
  #ring.toggle .progress { stroke-dasharray: none; }
  #ring.hold .progress { stroke-dasharray: 6 4; }
  #mode-label {
    font-size: 11px; color: var(--dim); height: 14px; letter-spacing: .08em; text-transform: uppercase;
  }
  #mode-label.active.toggle { color: var(--rec); }
  #mode-label.active.hold { color: #FFB800; }
  #hint { font-size: 12px; color: var(--dim); text-align: center; max-width: 320px; }
  .meter { display: flex; gap: 2px; height: 24px; align-items: end; justify-content: center; margin: 8px 0 0; }
  .meter span { width: 3px; background: var(--accent); border-radius: 2px; transition: height .05s; }
  #ws-info { font-size: 10px; color: var(--dim); text-align: center; margin-top: 4px; opacity: .6; word-break: break-all; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="dot" id="conn-dot"></span>
    <span id="status-text">Déconnecté</span>
    <span id="elapsed" style="font-variant-numeric: tabular-nums;"></span>
  </header>
  <div id="log"></div>
  <div id="fab-zone">
    <div class="meter" id="meter"></div>
    <div id="fab-wrap">
      <svg id="ring" viewBox="0 0 152 152">
        <circle class="bg-arc" cx="76" cy="76" r="74"></circle>
        <circle class="progress" cx="76" cy="76" r="74"
                stroke-dasharray="464.96" stroke-dashoffset="464.96"></circle>
      </svg>
      <button id="fab" type="button">&#127908;&#65039;</button>
    </div>
    <div id="mode-label">&nbsp;</div>
    <div id="hint">Tap court &lt;200ms = TOGGLE &middot; Long press = HOLD &middot; Max 60s</div>
    <div id="ws-info"></div>
  </div>
</div>

<script>
"use strict";

// =============================================================================
// Config — Backend Friday via Tailscale (tailnet only)
// =============================================================================
// Ce front est servi depuis https://quang101182.github.io/App/friday-mobile/
// (origine déjà autorisée pour le micro grâce aux autres apps SubWhisper/etc).
// Le WebSocket pointe vers le PC Quang via Tailscale — le smartphone DOIT
// avoir Tailscale connecté pour résoudre/joindre l'host *.ts.net.
//
// Override au runtime : ?ws=wss://autre-host.ts.net:8443/ws
// =============================================================================

const DEFAULT_WS_URL = "wss://desktop-97pf6l1.tailc503e.ts.net:8443/ws";
const HOLD_THRESHOLD_MS = 200;
const MAX_DURATION_MS   = 60_000;
const WARN_AT_MS        = 55_000;

const $ = s => document.querySelector(s);
const fab        = $("#fab");
const ring       = $("#ring");
const ringProg   = ring.querySelector(".progress");
const RING_LEN   = 464.96;
const meter      = $("#meter");
const modeLabel  = $("#mode-label");
const connDot    = $("#conn-dot");
const statusText = $("#status-text");
const elapsedEl  = $("#elapsed");
const logEl      = $("#log");
const wsInfo     = $("#ws-info");

const params = new URLSearchParams(location.search);
const WS_URL = params.get("ws") || DEFAULT_WS_URL;
wsInfo.textContent = "WS: " + WS_URL;

for (let i = 0; i < 24; i++) {
  const s = document.createElement("span"); s.style.height = "2px"; meter.appendChild(s);
}
const meterBars = [...meter.querySelectorAll("span")];

function logLine(msg, kind) {
  const div = document.createElement("div");
  div.className = "line" + (kind ? " " + kind : "");
  const ts = new Date().toLocaleTimeString();
  div.textContent = "[" + ts + "] " + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.childElementCount > 80) logEl.firstElementChild.remove();
}

let ws = null;
let wsReady = false;
function connectWS() {
  logLine("WS connect -> " + WS_URL);
  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => {
    wsReady = true;
    connDot.classList.add("connected");
    statusText.textContent = "Connecté";
    logLine("WS open", "ok");
  };
  ws.onclose = ev => {
    wsReady = false;
    connDot.classList.remove("connected", "recording");
    statusText.textContent = "Déconnecté";
    logLine("WS close code=" + ev.code + " reason=" + (ev.reason || "-"), "warn");
    setTimeout(connectWS, 1500);
  };
  ws.onerror = () => logLine("WS error (Tailscale connecté ?)", "err");
  ws.onmessage = ev => {
    if (typeof ev.data === "string") {
      try {
        const m = JSON.parse(ev.data);
        if (m.type === "ack") logLine("<- ack chunk #" + m.n + " bytes=" + m.size + " total=" + m.total, "ok");
        else if (m.type === "rec_end") logLine("<- rec_end id=" + m.rec_id + " chunks=" + m.chunks + " bytes=" + m.total + " dur=" + m.duration_ms + "ms", "ok");
        else logLine("<- " + ev.data);
      } catch { logLine("<- " + ev.data); }
    } else {
      logLine("<- bin " + ev.data.byteLength + "b");
    }
  };
}
connectWS();

let mediaStream = null;
let mediaRec    = null;
let recState    = "idle";
let recStart    = 0;
let recId       = 0;
let chunkCount  = 0;
let bytesSent   = 0;
let pressTimer  = null;
let limitTimer  = null;
let progTicker  = null;
let warnTimer   = null;
let analyser    = null;
let audioCtx    = null;
let meterRAF    = 0;

function setRingMode(mode) {
  ring.classList.toggle("toggle", mode === "toggle");
  ring.classList.toggle("hold", mode === "hold");
}
function setProgress(p) {
  ringProg.setAttribute("stroke-dashoffset", RING_LEN * (1 - p));
}
function resetRing() {
  ring.classList.remove("toggle", "hold");
  setProgress(0);
}
function setModeLabel(text, kind) {
  modeLabel.textContent = text;
  modeLabel.className = kind ? "active " + kind : "";
}
function vibrate(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} }

async function getStream() {
  if (mediaStream) return mediaStream;
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    logLine("getUserMedia OK", "ok");
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    src.connect(analyser);
    return mediaStream;
  } catch (err) {
    logLine("getUserMedia ERR " + err.name + ": " + err.message, "err");
    throw err;
  }
}

function pickMimeType() {
  const cands = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4;codecs=mp4a.40.2",
    "audio/mp4",
    "audio/ogg;codecs=opus",
  ];
  for (const t of cands) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return "";
}

function tickMeter() {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  let sum = 0;
  for (const v of buf) { const d = (v - 128) / 128; sum += d * d; }
  const rms = Math.sqrt(sum / buf.length);
  const max = Math.min(1, rms * 4);
  meterBars.forEach((b, i) => {
    const dist = Math.abs(i - meterBars.length / 2) / (meterBars.length / 2);
    const h = max * (1 - dist * 0.3) * 24;
    b.style.height = Math.max(2, h) + "px";
  });
  meterRAF = requestAnimationFrame(tickMeter);
}
function stopMeter() {
  cancelAnimationFrame(meterRAF);
  meterBars.forEach(b => b.style.height = "2px");
}

async function startRecording() {
  if (!wsReady) { logLine("WS pas prêt - abort", "err"); return false; }
  await getStream();
  const mt = pickMimeType();
  if (!mt) { logLine("Aucun mimeType MediaRecorder supporté", "err"); return false; }
  recId = Date.now();
  chunkCount = 0;
  bytesSent = 0;
  recStart = performance.now();
  ws.send(JSON.stringify({ type: "rec_start", rec_id: recId, mime: mt }));
  mediaRec = new MediaRecorder(mediaStream, { mimeType: mt, audioBitsPerSecond: 32_000 });
  mediaRec.ondataavailable = ev => {
    if (ev.data && ev.data.size > 0) {
      chunkCount += 1;
      bytesSent += ev.data.size;
      ev.data.arrayBuffer().then(buf => {
        if (ws.readyState === WebSocket.OPEN) ws.send(buf);
      });
    }
  };
  mediaRec.onstop = () => {
    const dur = Math.round(performance.now() - recStart);
    ws.send(JSON.stringify({ type: "rec_end", rec_id: recId, chunks: chunkCount,
                              bytes: bytesSent, duration_ms: dur }));
    logLine("rec stop id=" + recId + " chunks=" + chunkCount + " bytes=" + bytesSent + " dur=" + dur + "ms", "ok");
  };
  mediaRec.start(500);
  fab.classList.add("recording");
  connDot.classList.add("recording");
  statusText.textContent = "Enregistrement";
  tickMeter();
  let t0 = performance.now();
  progTicker = setInterval(() => {
    const elapsed = performance.now() - t0;
    const p = Math.min(1, elapsed / MAX_DURATION_MS);
    setProgress(p);
    elapsedEl.textContent = Math.floor(elapsed / 1000) + "s";
    if (p >= 1) clearInterval(progTicker);
  }, 100);
  warnTimer = setTimeout(() => vibrate([60, 80, 60, 80, 60]), WARN_AT_MS);
  limitTimer = setTimeout(() => stopRecording("limit"), MAX_DURATION_MS);
  vibrate(15);
  logLine("rec start id=" + recId + " mime=" + mt, "ok");
  return true;
}

function stopRecording(reason) {
  if (recState === "idle") return;
  recState = "stopping";
  clearTimeout(limitTimer); clearTimeout(warnTimer);
  clearInterval(progTicker);
  if (mediaRec && mediaRec.state !== "inactive") {
    try { mediaRec.stop(); } catch (e) {}
  }
  fab.classList.remove("recording");
  connDot.classList.remove("recording");
  statusText.textContent = wsReady ? "Connecté" : "Déconnecté";
  resetRing();
  setModeLabel("\u00A0", "");
  elapsedEl.textContent = "";
  stopMeter();
  vibrate(reason === "limit" ? 200 : [30, 40, 30]);
  if (reason === "limit") logLine("Limite 60s atteinte - auto-stop", "warn");
  recState = "idle";
}

fab.addEventListener("pointerdown", async ev => {
  ev.preventDefault();
  if (recState === "toggle") { stopRecording("toggle_close"); return; }
  if (recState !== "idle") return;
  recState = "pending";
  const ok = await startRecording();
  if (!ok) { recState = "idle"; return; }
  pressTimer = setTimeout(() => {
    if (recState === "pending") {
      recState = "hold";
      setRingMode("hold");
      setModeLabel("HOLD - relâche pour stop", "hold");
    }
  }, HOLD_THRESHOLD_MS);
});

fab.addEventListener("pointerup", ev => {
  ev.preventDefault();
  clearTimeout(pressTimer);
  if (recState === "pending") {
    const elapsed = performance.now() - recStart;
    if (elapsed < HOLD_THRESHOLD_MS) {
      recState = "toggle";
      setRingMode("toggle");
      setModeLabel("TOGGLE - re-tap pour stop", "toggle");
    } else {
      stopRecording("hold_release");
    }
  } else if (recState === "hold") {
    stopRecording("hold_release");
  }
});
fab.addEventListener("pointercancel", () => {
  clearTimeout(pressTimer);
  if (recState === "pending" || recState === "hold") stopRecording("cancel");
});

window.addEventListener("beforeunload", () => stopRecording("unload"));

logLine("UI ready - autorise le micro au premier tap.", "ok");
logLine("Origine: " + location.host + " (permissions héritées)", "ok");
</script>
</body>
</html>
